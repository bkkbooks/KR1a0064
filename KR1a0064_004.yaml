body:
  text: 周易集説卷四宋俞琰撰上經四巽下艮上蠱元亨利涉大川先甲三日後甲三日蠱壞也春秋左氏傳云於文皿蟲為蠱榖之飛亦為蠱在周易女惑男風落山謂之蠱蓋器皿久不用則生蠧蟲是為皿蟲之蠱五穀久不動則生飛蟲是為穀蟲之蠱少男而長女則男為女所制是為女惑男之蠱風字從蟲風之落於山也其氣鬱而不伸則其入草木也皆滯淫而生蟲是為風落山之蠱蠱之為卦艮之剛在上而不交于下巽之柔在下而不交於上剛者止而不肯為柔者巽而不敢為事之所以壞也動而飭之則壞者可以復完故其占為元亨而又利涉大川甲三日指互震三畫而言震動也動而飭蠱蓋在此三爻之功也震東方之卦東方屬甲甲者數之首事之端也先甲三日謂蠱未飭之時也後甲三日謂蠱既飭之時也先後皆去聲先者先於此而究其既往之所以然也後者後於此而慮其將來之復然也初六幹父之蠱有子考無咎厲終吉家事致蠱有子能幹則考也免咎矣否則雖有子猶無子也父死則稱考今以父與考並稱者為子之職父在亦當幹父死亦當幹也初六巽體之柔力小任重始雖危厲然而才柔志剛終亦能幹所以吉也九二幹母之蠱不可貞初言考二言母父沒而母存也在內處中幹母之蠱者也貞固雖足以幹事然幹母之蠱則當和顔悅色柔聲下氣巽以入之使之身正事治而後已不可以剛強固執而盡用其才也夫以初六之柔而稱父九二之剛而稱母聖人之意可見矣向使父剛而母柔則何至於蠱唯其父柔而母剛此其所以蠱也歟九三幹父之蠱小有悔無大咎初六九二兩爻明父柔母剛所以致蠱此言幹父之蠱蓋九三之才正幹蠱者也過剛不中未免小有悔所以無大咎者雖過而正也蓋其巽體本順必不至於已甚也小有悔戒之也無大咎勉之也六四裕父之蠱往見吝父之蠱九三幹之於先巳有小悔六四不得不裕也裕者何寬而不暴緩而不迫所以善解之也幹則宜往裕則宜止六四艮體之止才位俱柔僅能以正自守而已下無應援往安能濟往則見吝也六五幹父之蠱用譽九三純乎剛則鋭而失之過六四純乎柔則緩而失之不及唯六五以柔居剛而又得中此剛柔相濟而善能幹蠱者也用譽謂以此而獲令名也上九不事王侯髙尚其事上居卦終蠱既飭矣無所謂蠱故不言蠱是時親已老而事親之日短何暇事王侯哉位在五之外又與三不相應不事王侯之象也髙尚其事謂其事出人意表誠可尊尚也兊下坤上臨元亨利貞至于八月有凶臨進而近逼于物也二陽浸長以逼於隂故為臨此卦下兊上坤説而順故其占為大通而又宜固守以正臨十二月之卦二陽雖長不足喜也倒轉為觀則四隂長於下二陽消於上故曰至于八月有凶觀八月之卦故言八月無凶而言有凶蓋當陽方長隂猶盛之時豫為他日隂長陽消之憂也初九咸臨貞吉臨有二義以爻之隂陽言則為大臨小以象之地澤言則為上臨下咸皆也初與四彼此相應而相臨故曰咸臨初九剛而守正貞也不以彼之順而遽為之説故吉九二咸臨吉無不利二與五彼此相應而相臨故亦曰咸臨九二剛而得中其説也不至于過又君臣相得故吉而無不利六三甘臨無攸利既憂之無咎六三不中不正處兊説之極據二陽之上自知其德不足臨人遂以巧言令色為説故曰甘臨與詩巧言盜言孔甘之甘同然説之不以道亦何所利及其既也知其過而憂之則非小人之無忌憚者矣故無咎六四至臨無咎所行詣其極謂之至上三爻皆坤德之順况又以六居四兹蓋順之至者也下臨初九而詣其極故曰至臨其德如此之至其位又正何咎之有六五知臨大君之宜吉知音智六五柔順得中智不自任而能下任九二剛中之賢則其智足以有臨而為大君之宜故吉陽大隂小六五隂爻而稱大以其順從九二之陽也上六敦臨吉無咎敦厚也上去二陽甚逺又非其應何以臨之上也過於應而敦臨之故吉而無咎與敦復之義同坤下巽上觀盥而不薦有孚顒若觀當依王弼作平聲盥將祭而潔手於阼階也薦奉牲牢以獻于寢室也觀盥而不薦有孚顒若者四隂在下觀九五之盥不待上九之薦巳皆觀感而化也有孚謂五與上同體而相信也顒昻首貌與詩卷阿顒顒昻昻之顒同九五中正而又誠實是故在下之近比者敬信之逺者亦皆尊仰之也初六童觀小人無咎君子吝初六以隂柔之小處下去五最逺蒙而無見是為童觀小人若是亦不足責君子而若是則可恨惜也六二窺觀利女貞六二以隂柔之小居內猶女子處閨門之中所見不明雖與九五正應而隔三四則其觀五也不過竊而觀之耳蓋無異於鑽穴隙而相窺也是豈女子之所宜故戒之曰窺觀利女貞六三觀我生進退觀之四隂爻皆以觀五取義六三曰我曰進退皆指五觀之者三也五居觀之君位故稱我五巽體故言進退觀八月之卦也陽主生隂主殺八月則四隂盛長而九五之生意亦巳微矣六三觀我生進退而未敢蔑視之者蓋猶有所忌憚也我既中正而未失道故六三望而畏之止于其下而不敢進六三蓋觀我之進退以為進退也六四觀國之光利用賓于王國與王皆指五陽明隂暗九五陽晝光明之象也彖以祭之盥薦言則五為在廟祭主四乃助祭之賓如書之虞賓詩之二王後天子以客禮待之者也四近五備見宗廟之美百官之富故曰觀國之光凡卦以隂爻為主者聖人必抑之觀以六四為主爻而逼近九五故戒之曰利用賓于王謂冝為賓不冝為主也九五觀我生君子無咎我五自謂也觀之變剝正在此爻臨所謂八月有凶者此也五於此時自觀我之生意不絶如線能無咎乎而曰無咎者五以陽剛中正處四隂之上而一舉一措能盡君子之道也君子雖謂九五亦指占者上九觀其生君子無咎上九雖不當位然以剛陽居尊位之上亦為下所具瞻蓋其生道與五一也上於此自觀其生而能盡君子之道則亦無咎君子亦指占者震下離上噬嗑亨利用獄噬齧也嗑合也初上兩剛爻象齒二三五柔爻象頤九四處於其間則象剛物梗於頤中其占當得亨通者有間則不通齧之而合則通也此卦下震上離威而明察獄之道也六五居尊柔而得中是以利用獄初九屨校滅趾無咎校爻教反獄具也初在下趾象也滅沒而不見也以剛物加于著屨之足而沒其趾故曰屨校滅趾懲之於小戒之於初則不進於惡故無咎六二噬膚滅鼻無咎九四之剛如乾胏橫于頤中諸爻之言噬皆以去四逺近取義六二純柔去四尚逺故其象為膚膚柔脆而易噬之物何至乎滅沒其鼻蓋用力不深則不能及胏故也用力深而及胏則其滅鼻也又何咎焉六三噬臘肉遇毒小吝無咎六三才柔位剛而近四故其象為噬臘肉臘以三言肉以六言肉之不中者為毒六三隂柔不中故言毒遇毒雖有小吝然噬終必嗑亦無咎也九四噬乾胏得金矢利艱貞吉胏者肉之帶骨者也肉象四之柔骨象九之剛在物為難噬之物在獄為難治之獄周禮秋官大司寇以兩造禁民訟入束矢於朝然後聽之以兩劑禁民獄入鈞金三日乃致于朝然後聽之金取其堅矢取其直得金矢則得其情而無情者不得盡其辭也九四離體之明雖善治獄而得其情然必利于艱貞則吉艱者不敢慢易也貞者固守以正也九四才剛而志柔剛則傷於果柔則守不固故為此戒六五噬乾肉得黃金貞厲無咎六五爻柔位剛居尊而近四故其象為噬乾肉謂其易噬而為力不勞也黃中色金剛物得黃金謂得罰贖之金書舜典金作贖刑是也六五仁柔之君明罰勑法于上任德而不任刑故其象如此貞則正固而不偏徇厲則欽慎而惟刑之恤故無咎上九何校滅耳凶上九居上耳象也何與荷通何可反負也施校所負物之處故沒其耳戒占者惡極罪大則有此凶也離下艮上賁亨小利有攸往賁文飾也此卦下離上艮離本乾體質剛而文以柔也艮本坤體質柔而文以剛也剛柔上下交相文飾故為賁也亨通也小字當依郭京作不字往進也賁既亨矣而又加進則文滅質矣豈冝往哉內文明而外止文明故亨止則不可動故不利有攸往初九賁其趾舍車而徒在下而能自修飾故曰賁其趾徒謂徒步而行也車指二捨六二之車而自徒行故曰舍車而徒初九剛正而不苟合故其象如此舍音捨六二賁其須二無應而比三三亦無應而比二故與之相賁賁以柔來文剛故亨文當從質非質則不能自飾隂必從陽非陽則不能自進六二純柔必待九三之動而後動故曰賁其須須待也六二蓋得文明以止之義矣九三賁如濡如永貞吉濡潤也九三處六二六四之間相為潤色而成文故曰賁如濡如然文過則質喪質喪則文弊要當永久以剛正之德固守則吉此亦文明以止之意也六四賁如皤如白馬翰如匪寇婚媾髮白為皤馬白為翰禮記云商人尚白戎事乘翰翰平聲鄭氏注云翰馬白色也四當賁道之變文返於質故其象如此四之應在初初賁其趾而徒行四乃皤其髮而乘白馬其情不相合如此匪寇而何然而質不可以無文文不可以無質賁六爻唯六四初九兩爻相應蓋剛柔相配文質相合匪寇也乃婚媾也六五賁于丘園束帛戔戔吝終吉賁于丘園謂敦本務實矯天下之文而歸之質也帛以十端為束戔音箋戔戔淺小不足貌六五柔順得中亦非儉不中禮者但聘賢而為禮淺小是乃吝嗇也然禮奢寧儉而以此化成天下故亦終吉上九白賁無咎上九白賁非無飾也以質素為飾耳賁極而返本如此故無過飾之咎坤下艮上剝不利有攸往剝消削也五隂盛而一陽孤立于上消削而將盡也與書泰誓剝喪元良之剝同此卦下坤而上艮得此占者唯當順時而止不冝有所往初六剝牀以足蔑貞凶蔑滅也隂之消陽自下而進初在下故為剝牀而先以牀足滅于下之象當此不利有攸往之時唯冝順時而止耳貞凶戒占者固執而不知變則凶也六二剝牀以辨蔑貞凶辨牀幹也既滅初之足於下又滅二之辨於中則進而上矣得此占者若猶固執而不知變則其凶必也二與初皆無應援故其占皆戒之曰貞凶六三剝之無咎初二四皆言剝牀三獨不言剝牀三與上應也隂皆剝陽而六三處羣隂之中與羣隂相失獨與上九相應又何咎之有六三蓋小人中之君子也之字衍文六四剝牀以膚凶膚第席也剝牀而及於牀之膚則切近於人之身矣故凶六五貫魚以宫人寵無不利衆隂象魚六五貫之則駢首受制而不亂宫人亦隂類任以宫閫之事而不使干預朝政則君子不為小人所害小人亦得以善終故無不利上九碩果不食君子得輿小人剝廬剝極而一陽獨留于上猶萬木搖落之時碩大之果尚存于木杪不食則其種相傳而有生生不息之道食之則斷絶其種而不復生故不曰未食而特曰不食輿者在下而載上之物指衆隂而言衆小人順一君子之象也廬者在上而覆下之物指一陽而言一君子蓋庇衆小人之象也一陽在上得衆隂之順承是為得輿衆隂在下剝去一陽之蓋庇是為剝廬君子而得輿則與小人俱存小人而剝廬則上無蓋庇亦不能以自存矣震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往復返也剝之一陽在外倒轉為復則返于內也嚮也五隂之朋往剝乎一陽今則五隂之朋來順乎一陽故亨疾害也此卦下震上坤動而以順行是以出入則無疾朋來亦無咎易以一爻為一日剝六畫併復初畫是為七日易窮則變其道與天道同故反剝為復則不過七日剛德方長前無阻礙是以利有攸往初九不逺復無祇悔元吉初居震動之始方動即復是不逺而復復之最先者也故不至於悔而元吉只從衣從氏當依馬融作之是反伊川程子曰只抵也與底通六二休復吉休復與休否之休同切比于初而其心好之蓋得震動之中而安詳和緩樂從其善者也向來隂皆往而剝陽今則返而從陽是復善也凡隂皆忌陽來陽來則媢疾以惡之今六二柔順中正見一陽之復而其心休休焉樂與之比吉之道也然以復之時位觀之則二之休復吉又不若初之早復而元吉六三頻復厲無咎頻急也六三不中不正居震動之極上無應援往將何之窮蹙窘迫而復猶人行至水頻而不可前則倉忙奔走而返故曰頻復雖不如六二休復之吉然窮而知復亦不至如上六迷復之凶是以厲而無咎六四中行獨復復之六四即剝之六三嚮與衆隂相失而獨應於上今在衆隂之中獨應於初故曰中行獨復六五敦復無悔初為復之主爻四與之應知所從矣五去初逺又非其應則其下而從之也未免過于四而加厚焉故曰敦復復善如此是以無悔其義與敦臨同上六迷復凶有災眚用行師終有大敗以其國君凶至于十年弗克征上六隂暗之極去初最逺窮而忘返故曰迷復既凶而又有災眚則無適而非凶矣其能變動而有為乎用之行師則終有大敗不特凶于而身又凶于而國以及其君雖至十年之久終弗克征也周易集説卷四
