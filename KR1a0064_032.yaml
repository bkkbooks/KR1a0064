body:
  text: 周易集説卷三十二宋俞琰撰繫辭下傳一八卦成列象在其中矣因而重之爻在其中矣八卦三畫之卦也列而為八則一卦有一卦之象蓋不特天地雷風水火山澤之象凡天地間所有之象無不具在其中也因而重之謂伏羲既畫八卦又因而重之則自二而四自四而八八而十六十六而三十二三十二而六十四也爻在其中謂三百八十四爻皆在其中也伏羲畫卦自下而起其始畫也惟一竒一耦再畫則於一竒一耦之上又生一竒一耦第三畫亦然於是乾一兌二離三震四巽五坎六艮七坤八自然成列及其重為六十四則乾居八之一兌居八之二離居八之三震居八之四巽居八之五坎居八之六艮居八之七坤居八之八又皆成列而各有次序無非理之自然也方其畫時雖出於聖人之手聖人亦不知其所以然也秀巖李氏曰言因而重之則重卦非文王明矣剛柔相推變在其中矣剛柔謂爻九六剛柔相推則一卦變而為六十四卦而四千九十六變無不在其中矣繫辭焉而命之動在其中矣繫辭焉以命之謂卦爻之下繫之以辭而告人以吉凶悔吝也動謂占者所值當動之爻象亦不出乎此矣或曰動謂所變之卦左氏以動爻為占者是也吉凶悔吝者生乎動者也吉凶悔吝皆生於爻象之動吉一而已而凶悔吝居其三則人之動也可不慎乎夫吉凶悔吝四者皆辭之所命也占者由所命之辭而動則動罔不吉不然則凶悔吝之三者隨至矣剛柔者立本者也易六十四卦凡三百八十四爻不過一剛一柔而巳易中凡言剛柔即九六也乾九坤六是以易之本立易非九六則何者為之本變通者趣時者也易窮則變變則通不變則不通也有一卦之時有一爻之時隨其時之宜而動此變而通之之道也故曰變通者趣時者也趣與詩棫朴左右趣之之趣同毛氏傳云趣趨也正義云卦既總主一時爻則就一時之中各趣其所宜之時吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也天下之事非吉則凶非凶則吉何以勝之曰貞則勝之貞者固守以正而不妄動也前言吉凶悔吝生乎動蓋動則有吉有凶今也固守以正而不妄動則動罔不吉何凶之有觀去聲古換反示也天地之道正所以萬古常示日月之道正所以萬古常明也人苟能正道固守而不二以二則萬事萬變紛紜乎其前亦莫之能亂不然何以制天下之動哉白雲郭氏曰天地之所以示人日月之所以常明皆正也天下之動所以貞夫一者亦以貞夫一則正二則非正也吉凶貞勝之道亦若是而巳矣夫乾確然示人易矣夫坤隤然示人簡矣確然健貌隤然順貌乾之德動而健故確然而示人者易坤之德靜而順故隤然而示人者簡示人即貞觀之謂也爻也者效此者也象也者像此者也此者何謂上文乾坤之所示也易六十四卦皆有所示不特乾坤也乾坤既有所示爻蓋效此所示者也象蓋像此所示者也紫陽朱子曰此謂上文乾坤所示之理爻之竒耦卦之消息所以效而象之爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭爻象動乎蓍策之中吉凶見乎辭命之際故謂爻象為內吉凶為外變謂爻象之變辭謂吉凶之辭易之功業由變而見聖人之情因辭而見欲知聖人與民同患之情但觀聖人之辭紫陽朱子曰業似吉凶生大業之業天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義天地以生物為德故人以天地之德為大德聖人位乎天地之中而贊天地之化育故天下以聖人之位為大寶釋文仁作人注云王肅卞伯玉桓玄明僧紹本作仁嵩山朝氏東萊吕氏皆從釋文紫陽朱子曰曰人之人今本作仁吕氏從古蓋所謂非衆罔與守邦秀巖李氏曰蔡雍云以仁守位以財聚人則漢以前已用此仁字而非始於王肅矣愚謂以此章上下文義詳之當依釋文作人守位以人大學所謂得衆則得國失衆則失國是也聚人以財大學所謂財聚則民散財散則民聚是也理財謂甲者還甲乙者還乙不可不理也正辭猶言正名蓋謂是則言是非則言非不可不正也禁民為非謂制為法令使民不敢悖理而為非也義宜也理財正辭禁民為非而得其宜此所謂義也夫財者利也聖人不曰生而巳聖人之德不過順天地之生而已位者生生之主也人者求其生生於我者也財者生生之本也理財正辭禁民為非又所以全其生生之道也右第一章紫陽朱子曰此章言卦爻吉凶造化功業古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情包犧即伏羲也包音庖字本又作庖按世紀云始取犧牲以供庖厨故號包犧氏上古茹毛飲血包犧則教民火食也孟京本作伏羲夫伏羲以前未有文字為政則結繩而己逮夫伏羲氏之王天下也觀象於天觀法於地俯仰之間天文地理之宜如日月星宿鳥獸草木昆蟲之類無所不觀又自一身至於萬物若近若逺無所不取於是始為之畫而八卦作焉八卦者伏羲氏之心畫也精可以通神明之德粗可以類萬物之情因而重之為六十四卦其實只是八卦故巽震相遇而文王名之曰益在伏羲則震下巽上而巳震離相遇而文王名之曰噬嗑在伏羲則震下離上而巳他卦皆然太玄云察龍虎之文觀鳥龜之理安定胡氏曰言鳥獸之文者蓋東方之宿為蒼龍南方之宿為朱雀西方之宿為白虎北方之宿為龜蛇紫陽朱子曰王昭素云與地之宜諸本多有天字俯仰逺近所取不一然不過以驗隂陽消息兩端而巳神明之德如健順動止之性萬物之情如雷風山澤之象節齋蔡氏曰神明之德不可見故曰通萬物之情可見故曰類作結繩而為網罟以佃以漁蓋取諸離罔古文作网伏羲作結繩為網罟以教民佃漁佃以取鳥獸於山林漁以取魚鱉於川澤使民有肉食鮮食之利也離謂重離説卦以離為日月相麗而虛其中有結繩而為網罟之象以一隂離乎二陽之間言之即鳥獸魚鱉麗乎網罟之象伏羲結繩為網罟為佃漁之用蓋取諸重離也紫陽朱子曰蓋字有義愚謂蓋取諸三字乃孔子以意逆志之辭謂古人制作無一不與易合非謂伏羲因有見乎離而後為網罟也白雲郭氏曰包犧之時未有犧牲作結繩為網罟以佃以漁而已當時之人知有網罟佃漁不知有所取也孔子以易道觀之然後知是有取於離故曰蓋取諸離漢上朱氏曰網舉綱紀通言罟止言其紀也少梅鄭氏曰巽繩離目兩目相連結繩為之罔罟也離為雉佃也巽為魚漁也包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益炎帝為耒耜耕耨以教民粒食故號神農益之為卦下震動上巽入皆木也中互坤土木入土而動有耒耜之象耜耒首耒耜柄斫木以木之鋭者因而削之為耜今人加以鐵謂之犁頭揉木以木之曲者因而揉之為耒今人謂之犁衝神農氏之時民厭食鮮食遂教民耕耨而民獲其利蓋取諸益益之名出於文王而神農之時益之名未立也蓋取諸益者謂神農作耒耜蓋有取於益卦非謂神農必按益卦之象然後為耒耜也神農之時震下巽上之卦雖未名之曰益而耒耜之利蓋有益之義也王昭素曰耨字諸本或作耜乃合文沙隨程氏曰飛走之類實害禾稼惟網罟佃漁之制立然後耒耜之利見於天下日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑噬嗑下震動上離明離明在上日中之象震動於下為致民聚貨交易於市之象日中者大明當天而萬物相見之時也市者萬民聚貨以相交易之地也天下之民各處其方何以致之天下之貨各産其地何以聚之今也日中之時為市則逺近之民皆得以相及而貨雖不一亦可坐而致其聚也神農氏為交易之法使民以其所有易其所無退而各得其所則無有餘不足之患也其所以致而聚之者蓋取噬而嗑之之義嗑合也聚而交易合之象也借噬為市猶履言禮音相似也後世古法多倣此括蒼龔氏曰其序與八政一曰食二曰貨同少梅鄭氏曰十三卦始離次益次噬嗑所取者食貨而巳食貨者生民之本也神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤時當變則變不變則窮於是乎有變而通之之道焉變而通之所以趣時也民之所未厭聖人不強去民之所未安聖人不強行夫惟其數窮而時將變聖人因而通之則民不倦不然則民皆以為紛更安得不倦由之而莫知其所以然者神也以漸相忘於不言之中者化也神而化之所以使民宜之也不然則民皆以為不便何宜之有易無有窮也窮者數也陽數窮於九隂數窮於六窮則變變則通通則久久則窮是以自天祐之吉無不利也乾用九六爻俱變則為純坤坤用六六爻俱變則為純乾羲農之時人文未著世未知有禮黃帝堯舜化天下以禮而使民宜之遂垂衣裳以示天下蓋取諸乾坤九六之變而衣上裳下蓋取乾尊坤卑之象也或曰自此以下如舟楫牛馬皆通變宜民之事而特以衣裳為先者羲農之後人害固巳消食貨固已足衣則鳥獸之羽皮而斯民耳目猶塗於聞見未識所謂尊卑上下也上之人無以示而教之則強弱相陵鬭攘爭奪與禽獸何異於是黃帝堯舜體乾坤之象示人以衣裳之儀一上一下不可顛倒一尊一卑不可紊亂使黎民皆觀感而化不惟得其宜且知有禮而不至於陵僭則名分正而民志定此天下所以治也正義云黃帝制其初堯舜成其末故連云黃帝堯舜橫渠張子曰立法須是過人者乃能之若常人安能立法凡變法須是通通其變故使民不倦豈有聖人變法而不通也涑水司馬公曰聖人守道不守法故能通變白雲郭氏曰垂衣裳而天下治謂無為而治也能無為而治者無他焉法乾坤易簡而已雲間田氏曰衣六幅裳十二幅而乾坤竒耦之畫備矣翁庶善曰乾之數極於九故王之司服九章坤之數終於六故后之司服六章刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙渙下坎水上巽木中互震動木動於水上有舟楫之象舟即船之異名刳木為舟因其木之長大而中空遂刳剔之以為舟也剡木為楫因其木之纎長而上鋭遂剡削之以為櫓為槳通謂之楫也楫以進舟舟以載物為舟楫之利以濟不通而民得其宜蓋取諸渙黃帝堯舜之時渙之名亦未立不過坎下巽上而巳蓋取諸渙者謂刳木為舟剡木為楫蓋有取於渙卦之義非謂黃帝堯舜必案渙卦之象而為舟楫也紫陽朱子曰致逺以利天下疑衍南軒張氏曰衣裳之垂固欲逺近之民下觀而化然道途之險阻則有所不通惟夫舟楫之利既興則日月所照霜露所隊莫不拭目觀化天下如一家中國如一人矣服牛乘馬引重致逺以利天下蓋取諸隨隨下震上兌上六兌之隂爻牛也初九震之陽爻馬也互巽為繩互艮為手所以服乘之也上古牛之鼻未穿馬之首未絡至是始服乘之以之引重致逺以利天下則動作行止皆隨人意而民得其宜蓋取諸隨夫舟以濟川車以行陸皆百姓日用之所利者舟車之作舟易而車難故舟先乎車古者大車駕以牛後世以其優於引重因用以耕小車駕以馬後世以其優於致逺因用以騎厚齋馮氏曰大車牛駕之載物而重者也小車馬駕之載人而輕者也牛曰服馬曰乘其實皆駕車之稱牛馬行而車隨之所以引重而致逺故取諸隨嵩山朝氏曰服字説文作犕音備愚按史記鄭世家周襄王使伯鞴請滑春秋左氏傳乃作伯服鞴與服通廣韻鞴有兩音一音服一音備犕但音備不音服釋文云一本無以利天下四字重門繫柝以待暴客蓋取諸豫豫下坤上震坤為闔戶互艮為闕重門之象也震動而有聲之木互艮為閽人擊柝之象也互艮為盜暴客之象也舟車既設川陸既通民雖獲其利然暮夜之際暴客亦可得而至矣不可不豫為之備也於是禦之以重門警之以擊柝而使民宜之蓋取諸豫柝夜巡所擊之木亦作柝今呼為梆子周禮野廬氏聚柝鄭玄云擊柝以宿衛之也漢書作􅢎馬融云兩木相擊以行夜白雲郭氏曰豫之一卦本無備豫之義而孔子又明備豫於此者以見諸卦之象無窮不可以一義盡也斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過小過下艮上震震動於上艮止於下為杵臼之象民既粒食矣又教之為杵臼之利治米此乃小有所過而民用以濟者也蓋取諸小過希道耿氏曰暴客不至而居者安可以治粟矣少梅鄭氏曰兌金斷巽木斷木為杵也巽木入坤土掘地為臼也坎陷也臼之象也弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽睽下兌上離兌屬西為刑殺離為戈兵此弧矢威天下之象也始者重門擊柝不過待暮夜之暴客耳然有甚於暴客者則非弧矢不足以服之於是弦木而為弧剡木而為矢為弧矢之利以威天下蓋取諸睽南軒張氏曰外有擊柝以防暴客內有杵臼以治粒食而無以威其不軌則雖有險而不能守雖有粟而不得食此弧矢之利不可緩也少梅鄭氏曰離為絲坎為弓弦木為弓也兌金剡木而鋭之剡木為矢也平庵項氏曰互坎為弓兌為上弦離為兵而麗於上此弓矢之象也上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯大壯下乾上震皆木也棟屋脊標也宇屋椽也棟直而承上故曰上棟宇垂而覆下故曰下宇詩七月蟋蟀在宇毛氏傳云屋四垂為宇震之一陽在上卦之下而承二隂上棟之象也乾三陽在下而相比下宇之象也乾覆於下而震動於上有宫室蔽風雨之象上古伏羲以前未有宫室冬則居營窟以避寒而無上棟下宇之安夏則居橧巢以避暑而有震風淩雨之患至黃帝堯舜始易以宫室為上棟下宇之制以待風雨蓋取諸大壯聖人之於物有為之者有易之者古未有是而民利之也今則為之所以貽於後也古有是而民厭之也今則易之所以革於前也以濟者其利生於已然也以待者其備在於未然也古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁蓋取諸大過大過下巽上兌其卦肖坎坎為隱伏葬埋之象也中互重乾之大木棺椁之象也古之葬者未有棺椁不過厚衣以薪葬於中野而已葬藏也劉向曰古之葬者厚衣以薪藏之中野顔師古曰言積薪以覆之也不封謂不堆土以為墳也孔子家語云孔子葬於魯北泗水上藏入地不及泉而封為偃斧髙四尺樹松柏而志焉封如字不樹謂不植松柏以識其處也喪期無數謂哀盡則止未有三年之制也後世聖人以送死為大事既為棺以周其身又為椁以周其棺遂過於厚蓋取諸大過前言上古此但言古蓋極逺者云上古其次逺者則云古上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬夬下乾上兌外決而內明後世聖人為書契以代上古結繩之政蓋取諸夬書文字也載之於簡策者也契約也所以合同也以刀刻其言於木者豫者執左取者操右彼此各有所據以為驗也上古民淳事簡大事則結以大繩小事則結以小繩後世聖人易之以書契者言有不能記事有不能信則證之以書契也百官以治者官用以為決斷則事辨而不相亂也萬民以察者民用以為明驗則情盡而不相欺也治謂決斷察謂明驗或曰夬者君子決小人之卦造書契亦以決小人之姦而防其偽也周禮質人掌稽市之書契説文云契約也徐鍇曰案周禮司約掌萬民之約大約劑書於宗彞注云大約邦國約也劑即劵契也左傳云王叔氏不能舉其契韓子云宋人得契密數其齒謂以刀分之有相入之齒縫也少梅鄭氏曰離為文書也兌金刻木契也平庵項氏曰以乾金為言於內兌金為決於外書以刀記言契以刀決之故為書契之象右第二章紫陽朱子曰此章言聖人制器尚象之事愚謂易象無乎不具非止此十三卦足以制器也天下之器亦多矣十三卦之外豈更無可取之象哉聖人蓋取其要者言之爾希道耿氏曰十三卦之辭或言利或不言利何也網罟非不為利也然必耒耜杵臼而後能裕萬民之食是則網罟之利不足言而耒耜杵臼之利大矣此所以耒耜杵臼言利也交易非不為利也然待舟楫馬牛而後備四方之貨則是交易之利不足言而舟楫馬牛之利大矣此所以舟楫馬牛言利也門柝非不為利也然門柝能保其內使暴客不能入而巳弧矢則又能威其外使暴客不能至是則門柝之利不足言而弧矢之利大矣此弧矢所以言利也獨於舟楫馬牛言利天下者舟楫馬牛之利無所不通可以周天下故也隆山李氏曰天下之事不至於夬則不通故雜卦之次序十三卦之制器尚象皆終於夬周易集説卷三十二
