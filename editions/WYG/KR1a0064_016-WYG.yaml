body:
  text: 周易集説卷十六宋俞琰撰彖傳三臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也臨十二月之卦也二陽在下四隂在上二陽以漸而長與四隂相逼故曰臨剛浸而長此以卦體釋卦名也象辭言澤上有地臨蓋謂上臨下尊臨卑此言剛浸而長則謂内臨外大臨小也浸猶水之浸物以漸而浸進也天地間一氣不頓長一形不頓虧必以其漸隂符經謂天地之道浸是也説而順以二體言臨之德説則與物相得順則與物无忤説而順則非以強暴相臨也剛中而應謂九二以剛中之德上應乎柔中之君也大釋元字正釋貞字天道謂隂陽之消長也陽剛之長雖以其漸而大亨亦必以其正不正則乖戾乗之而為愆矣君子當此大亨之時雖有應於上亦不可過用其剛是必行之以正不正則小人乘之而為害矣故曰大亨以正天之道也消不久謂陽之消不久可待也以月數論之尚有八月孰謂不久以卦體觀之臨倒轉即為觀蓋不過反掌間耳是故二陽長于下而以漸亦未足為喜倒轉為觀則二陽消於上而不久深可憂也嗚呼陽之長也以漸其消也亦必以漸今論其長則曰浸論其消則曰不久聖人豫為君子憂蓋如此大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣陽大隂小大壯四陽卦主陽而言故曰大者壯也觀四隂卦則當主隂而言今乃獨贊九五而曰大觀在上又曰中正以觀天下何也曰此聖人崇陽抑隂尊君卑臣之㣲意也按郭京易舉正彖辭脱觀亨二字此下脱是以亨三字大觀者仰而觀天俯而觀民无所不觀也在上以九五之位言順而巽以二體之德言中正以觀天下則又賛九五之德既中且正足以為觀以示天下也書君牙云爾身克正罔敢弗正民心罔中惟爾之中今九五為觀于上而中正如此况又以順巽相遇感則必通天下其有不化者乎下觀而化謂方盥之時四隂在下見其至誠而悉皆觀感而化也中庸云至誠如神又曰唯天下至誠為能化此之謂也聖人以不言之教寓於祭祀之時使人可望而不可即雖在下者盡皆羣小自當觀感於形迹之表而莫不肅然畏聳然服此之謂神道設教也彖以祭祀言故聖人曲暢神道之義神道天道也天道不言而化无為而成如雨行於地春則東夏則南秋則西冬則朔自然而然莫測其所以然是為神道聖人仰觀乎天以天之神道設教初不求天下之服而天下自皆心悦而誠服如舜恭己正南面而天下自治文王不大聲以色而萬邦作孚自然之感固如是也服謂四隂順服於下既皆觀感而化則莫敢進逼以犯其上也平菴項氏曰觀字卦名并一卦内並是平聲唯觀天下一字是去聲頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也頤口中兩旁肉二三五柔爻是也中有物謂九四之剛爻横於柔爻之間也初上兩剛爻如齒有噬嗑之狀故曰頤中有物曰噬嗑其取象蓋因於頤非自頤而變也頤下震上艮上下兩剛中則四柔噬嗑下震上離上下亦兩剛中則三柔亦有頤之象但以九四一剛間於其中故其象為頤中有物而卦名乃曰噬嗑或曰噬嗑倒轉為賁亦有頤中有物之象亦可以為噬嗑而以為賁何耶曰凡噬者必下動賁无震故不得為噬嗑也夫頤而中虚則无事於噬而自可合今有物焉則窒塞矣茍不以齒決之烏得而合故噬已則嗑嗑者窒塞者去而上下亨通故曰噬嗑亨文王曰噬嗑亨孔子添一而字蓋謂噬而嗑之則亨不噬則不嗑不嗑則不亨也剛柔分謂一剛一柔分居内外也剛柔分而不亂有明辨之象明辨乃察獄之本也内震動外離明動而明也雷動於内電明於外相資而並見合而章也合而章則威與照並行用獄之道也柔得中而上行指六五上行謂居尊位也六五雖以隂爻居陽位而不當然施之用獄則宜蓋用獄之道剛固不可過柔亦不可唯柔而得中乃得用獄之宜也進齋徐氏曰剛柔分未噬之象動而明方噬之象合而章已噬之象猶噬嗑然噬則頤分嗑則頤合此三句解噬嗑而亨之義賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁乃噬嗑之倒體柔來而文剛謂六二之柔自噬嗑六五而來分剛上而文柔謂分噬嗑初九之剛上為賁之上九即非自泰來或謂一隂一陽卦皆自復姤來二隂二陽卦皆自臨遯來三隂三陽卦皆自泰否來非也或又謂彖傳凡言剛來柔來皆從乾坤二卦來亦非也夫乾坤者衆卦之父母三百八十四爻无非皆乾坤也又豈但一爻為然哉小字當依郭京作不字上九乃陽畫之大不可以小言也柔來而文剛則文在内而内文明故亨分剛上而文柔則文在外而止止則不可動故不利有攸往郭京曰天文上脱剛柔交錯一句紫陽朱子曰先儒説天文上當有剛柔交錯四字理或然也天文謂七政之錯行列宿之森布人文謂君臣父子兄弟夫婦之倫序文明謂尊卑貴賤上下大小燦然有文以相接也止謂君君臣臣父父子子兄兄弟弟夫夫婦婦各安其分之所止也文貴乎明不明則无别又貴乎止不止則流明以止則无過與不及之患然後不害其為文禮以節文為義者此也夫賁人文也而兼言天文天人同一理也聖人仰觀天文以審察四時之變蓋觀夫賁之剛柔交錯也俯觀人文而為之移風易俗以化成天下蓋觀夫賁之文明以止也剛上之上上聲剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也上剥字卦名下剥字訓剥之義趙氏輯聞云以剥訓剥猶以巽釋巽為其不可以他釋也或曰下剥字音撲擊果而墮落之也與豳七月詩八月剥棗之剥同柔變剛謂上九一剛將為衆隂所變也夬五陽而一隂則曰剛決柔剥五隂而一陽則曰柔變剛何也曰陽性剛果一旦勇決則不可禦隂性柔緩必積日累月以漸而變也柔之變剛也蓋始於一隂之生變乾為姤變姤為遯又變遯為否又變否為觀及其變觀為剥則又將變剥而為坤也否言小人道長此但言小人長又何也曰否之時三隂在下與三陽勢均小人有長之道蓋猶未長今則一陽孤立於上而五隂羣處於下小人勢盛故孔子直言小人長不言其道也順者順夫天理止之者止而弗動非謂順小人之勢而止其惡也觀象謂觀此剥卦之象也觀此剥卦之象遂得處剥之道不然則逆而悖理動而激變非徒无益反受其害如漢之黨錮唐之白馬是已夫小人之與君子猶隂之與陽相為盛衰殆无終窮之理消則息息則盈矣亦无久盈之道盈則虚虚則消矣易窮則變變則通剥之終乃復之始剥窮上返下不久則又將為復是以君子觀剥之象而尚消息盈虚不敢妄動但順時而止以待天道之還耳故曰順而止之觀象也君子尚消息盈虚天行也復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎反者自外而來歸於内也孔子釋復亨而曰剛反蓋謂復之所以亨者剥上九之剛反而為復之初九也按郭京易舉正剛反下有也字動指下體之震順指上體之坤向在剥時君子之道不行則唯順而止之今倒轉為復則君子之動也以順而行時雖不同君子之行止則无非順也順者何順夫理也君子於此順理而行則无往不可故總而結之曰是以出入无疾朋來无咎天行謂天道之運行也剥窮於上而反於下則止者復動往者復來猶天道之運行周則復始也剛長謂初九之剛自此而長也釋利有攸往而曰剛長蓋賛初九之德初九乃復生之主爻也天地之心謂天地生萬物之心也天地生物之心无乎不在獨不觀果核中心一㸃其名曰仁者乎當其氣候之肅殺寂然不動无端倪之可見迨夫氣候之發生則其仁萌芽自核中而出即此觀之天地生物之心亦可見矣詩周頌云維天之命於穆不已天地生物之心蓋未嘗一日息也聖人於剥反為復靜極動初見天地生物之心未嘗一日息故曰復其見天地之心乎夫天地之心在在有之聖人則於復卦見天地之心爾非謂唯復卦見天地之心也或謂靜為天地之心非也或又謂動為天地之心亦非也无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉无妄之為卦内震外乾乾之三畫皆剛爻也今曰剛自外來而為主於内自何爻而來耶曰无妄乃太畜倒體无妄内卦初九之剛蓋從大畜外卦上九而來非從本卦升降也或謂訟與无妄皆自遯來訟九二无妄初九皆遯九三降而為之非也動謂震健謂乾動而健者君子之動以天是以无妄也剛中而應大亨以正天之命也謂九五剛德居中與六二正應而其所以大亨者以其正也是則天命之祐也无妄之往何之矣天命不祐行矣哉謂君子所行雖无妄其或有非常之變而天不我祐則不宜有所往往將何之往則悖理悖理則逆天逆天而行天其祐哉行矣哉猶論語云行乎哉正言之曰何之矣又反言之以歎之曰行矣哉蓋甚言其不宜往也夫无妄與臨皆大亨以正臨則為天之道无妄則為天之命何也曰運於上而自然者道也降於下而靡常者命也命即道也處此之時逢此非常之變則君子奈之何哉順天命而已矣今諸解者莫不曰彖辭言利貞蓋法无妄之道利在貞正失貞正則妄故其匪正則為過眚蓋以為人之匪正如六三九四之不正則有灾眚也吁既无妄矣則安有所謂匪正者乎當知彖辭所謂匪正蓋謂天之變非謂人之不正也大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利渉大川應乎天也大畜之為卦下乾上艮剛健乾之德也篤實艮之德也乾艮皆陽卦陽明故輝光艮之輝光即乾之輝光發于外者也畜之不已則日進一日其德愈著故曰大畜剛健篤實輝光日新其德書咸有一德云終始惟一時乃日新注云終始不衰是乃日新之義夫大畜倒轉為无妄則其剛自外而來是為初九无妄倒轉為大畜則其剛自下而上是為上九剛居上而六五在下承之有尊尚賢者之象故曰剛上而尚賢上上聲大抵有一剛賢在上則衆才畢止於下今夫乾之三陽在下視艮之一陽在上以為其類見尊於當時遂皆頫首受畜而不敢猖狂妄行茲蓋上之人有以制之也夫既有以制之故不曰健而止特曰能止健能止健者乾雖健而難制艮則能制之也制之非故抑其進也養之以待用也艮何以能制之也曰大正也陽卦為大隂卦為小小畜以小畜太非正也大畜以大畜大則正也夫唯其大正而能止健也故健者咸止於下由是踐履熟涵養深所畜者久无復有輕躁之失也養賢養在下之三陽也書説命云惟賢非后不食蓋賢者在下則家食仕則食君之禄禄所以養賢也應乎天謂六五隂柔其才不能以自濟必與剛陽相應然後能濟也乾為天高而在上者也今在下體亦謂之應乎天以明天之理無乎不在也頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉伊川程子曰人之養生養形養德養人无非皆頤養之道也動息節宣以養生也飲食衣服以養形也威儀行義以養德也推已及物以養人也愚謂養生養形養德養人雖有輕重要皆以正道固守則吉也為卦震下艮上中互重坤坤體中虚有以容物而物皆致養焉故訓頤為養觀其所養謂即此頤卦之象而觀其所養之道也所養之道如上養下下養上陽養隂皆正也但隂養陽則於理為顛倒非正也觀其自養謂反求諸已以觀其自養之道也自養之道如言語則正而有序不敢不慎也飲食則正而有度不敢不節也雖然頤之道貴乎正頤之時則不可失如天地之養萬物當寒而寒當暑而暑寒暑不失其時則萬物各得其宜聖人之於萬民也亦然聖人養萬民豈能一一徧及哉其先務則惟養賢而已賢者得所養則體聖人之意以下及萬民然亦安能家至户給而與之食哉不違其農時而已孔子蓋以萬物萬民之生與養時為大故不曰義不曰用而獨曰頤之時大矣哉始言其正終言其大頤之道備矣文王之意不過謂觀此頤卦中虚之象以反觀諸身以自求吾之口實止言自養不言養人孔子乃詳言天地養萬物聖人養賢以及萬民蓋又推廣彖辭之義云大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉易以陽為大大過謂陽之過也卦之六畫凡三畫是隂三畫是陽則為剛柔分大過卦乃四陽二隂之卦則陽盛而過於隂故曰大者過也在人事則泛言萬事大者之過凡大者皆是非一端也初六在下卦之下本也上六在上卦之終末也弱謂初上皆隂柔也以德言之中強而本末皆弱則不能勝其重任焉烏得而不橈故曰棟橈本末弱也剛毎患乎過今四剛共聚于中爻可謂剛過矣剛過唯恐其不中剛過而中則亦可以任扶顛持危之責而有以立大事成大功又何患乎過猶之治病焉病勢沉痼而攻之以瞑眩之藥自其治㣲疾之道觀之則謂之過自藥病相對言之則謂之中所謂時中是也巽而説行以二體之德言也巽順則與物理无忤和説則與人情相得處顛危之世剛過而不失其中又巽順而和悦則无非可行之道也以此而行則利有攸往而无不亨矣非其才有大過人者能若是哉乃亨謂如此而後亨通也他卦彖辭先言亨後言利有攸往往自往亨自亨也大過彖辭則先言利有攸往後言亨孔子於亨字上又添一乃字蓋明亨因於往不往則不亨也大過之時其事甚大與常時不同故贊之曰大過之時大矣哉楊繪曰不曰義者不可以常義拘不曰用者非常之用也習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉卦疊兩坎内外皆險是為重險險者何以二隂而陷一陽也八卦中唯險非吉德而又重焉險亦甚矣坎本坤體乾交之而成坎其中乾畫則水也乾行不息故坎水之流亦不息夫坎水流水也與兌澤不同澤乃水之所瀦瀦而後盈盈而後流孟子所謂盈科而後進者是也坎水則不然坎水乃江河大川之水晝夜常流流則不盈故曰水流而不盈水之源出於西北其流則趨於東南迂廻曲折不知更歴幾險而終至於海茲非行險而不失其信者乎最有信者莫如潮一日兩至隨月之盈虧以為消長凡月到坎離潮水亦到隨月早暮以為期信未嘗差失也剛中指二五兩爻剛中則遇險而不讋也同舟共濟胡越無患乎異心今二五同在險中則彼此同心而相維所以亨也往有功謂不可憚勞也坎勞卦也凡坎用事皆曰往有功需蹇解皆然漸雖無坎三四五互坎也天險指上坎地險指下坎蓋發明重坎之義也天險无形之險也不可升與論語天之不可階而升同地險乃有形之險也山川丘陵是也然天下豈皆山川丘陵王公於是鑿斯池築斯城以為封疆之衛故曰王公設險以守其國險之時用大矣哉時用謂有時乎用而非用之常也離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也麗附麗也以一隂附麗於二陽之間也在物為火火性善附麗也豈惟火哉天地之間凡有象有形如日月如百榖草木各有所附麗也日月麗乎天在上者之麗也百榖草木麗乎土在下者之麗也蓋發明重離之義在人則為所親附之人所由之道所主之事亦莫不皆有所附麗也明離之德也重明指上離而言明在上卦是為重明也正指下離而言下三爻蓋皆正也以上卦之重明附麗乎下卦之正故曰重明以麗乎正如象辭以重兌為麗澤亦謂上下卦相附麗非獨指一爻也句中有以字如同人之文明以健賁之文明以止皆論上下兩體之德也亦非獨指一爻也乃化成天下謂如此可以化民而成俗也柔麗乎中正雖以二五兩爻並言然所重則在六二中正蓋指六二也六五雖中然柔而不正豈能遽亨下與六二相附麗此所以亨故曰柔麗乎中正故亨釋畜牝牛吉而加是以二字蓋總結上文之所以亨然後有此吉也柔附本非今德在人當審所麗不然何亨之有亦何吉之有卦有六二六五兩隂爻孔子恐占者不知牝牛為六二故又如此詳言之六二盖離之主爻也周易集說卷十六
