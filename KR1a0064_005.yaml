body:
  text: 周易集説卷五宋俞琰撰上經五震下乾上無妄元亨利貞其匪正有眚不利有攸往無妄誠也不誠則虛偽虛偽則妄誠則真實真實則無妄誠者天之道動以天則純乎誠實是為無妄其占為始雖大亨通又冝固守以正乃可保其終也其匪正有眚蓋指上九乾道之變非天道之正也君子處此則當安時以俟命不冝有所往初九無妄往吉彖辭曰不利有攸往為匪正有眚而言也爻于初曰往吉初九陽剛居正無所謂眚往則吉也六二不耕穫不災畬則利有攸往治田之道春而耕秋而穫一歲而災三歲而畬未有不耕而穫不災而畬者今曰不耕穫不災畬何也天之命也非人之所能為也蓋無妄以初為主初震體既動于先矣二雖亦震體不過隨之而動是初耕于先災于先而二因以穫因以畬也初首造其事而二坐享其利豈非天祐之乎如此而有所往則利也六三無妄之災或繫之牛行人之得邑人之災牛指二繫之者五行人指初邑人三自謂也初為主于內而近得二是得牛也二應五牛蓋屬五初得牛則五失牛矣三與二為鄰而遭詰捕之擾是行人牽牛而去邑人無妄而有災也或疑六三不中不正何得謂之無妄蓋無妄之動以天六爻皆無妄者也聖人恐人疑其為有妄故特曰無妄之災九四可貞無咎彖辭曰其匪正有眚不利有攸往九四其正乎不正則不可動而往矣是可貞也故貞靜而止則無咎九五無妄之疾勿藥有喜上九匪正而有眚九五乃正而無眚者也雖與九四不相得不足為疾也何以藥為勿藥則有喜也上九無妄行有眚無攸利上九乾之窮匪乾之正蓋天道極而必變之時也行將何之人雖無妄而適遭天地之變是以行則必有災眚而無所利彖辭言其匪正有眚而爻以有眚屬之上九彖蓋為上九發也乾下艮上大畜利貞不家食吉利涉大川大畜之為卦乾下艮上艮能止乾之健而包蓄三陽于內則其所蓄者大也利貞謂所蓄既大固守以正則利也家食則獨善其身不家食而食祿于朝則兼善天下故吉內健而外能止則無躁進之失故其占為利涉大川初九有厲利巳它卦相應則相援大畜以止健為義則相應者乃其對敵蓋健者欲進而止者不欲其進也初九為六四所止進則必有危厲故曰如其已已則利九二輿説輹輹指初輿二自謂也輹處輿之下輹説則輿不行以象二與初同體同德初止則二亦止也九三良馬逐利艱貞曰間輿衛利有攸往三陽皆馬也九三得位而初九九二隨于其後故曰良馬逐九三過剛而健甚若遽與在下二陽俱進則有奔蹶之失故戒之曰利艱貞艱者不敢慢易也貞者固守以正也曰間輿衛曰字朱紫陽作日字人實反愚以噬嗑九四凖之疑是吉字蓋當大畜之時居九三之位惟冝艱貞則吉也間習也輿指二衛指初間習既熟則不至于顛仆故其占為利有攸往六四童牛之牿元吉童牛犢也六四爻位俱柔故其象為童牛牿當依陸續作角犢角繭栗非傷人者也初雖剛健四柔順以止之而無傷善之心則初也亦巳其行而不敢相犯四與初兩不相傷其占為元吉六五豶豕之牙吉豶符云反豶豕去其勢者也六五爻柔位剛故其象為豶豕豶豕雖有牙不能傷人二雖剛健五柔順以止之而無傷善之心則二也亦説其輹而無怨尤五與二兩不相傷故吉然豶豕與童牛異矣故其占雖吉而不如六四之元吉上九何天之衢亨彖言貞以其能止健也爻于上言亨止極則行畜極則通猶行于天衢通豁而無礙也晦叔王氏曰何當作行震下艮上頤貞吉觀頤自求口實頤養也貞吉謂養以正則吉也為卦外實中虛上止下動象人之頤頷觀頤觀其所養之道也如上養下下奉上陽養隂此皆正理若以隂養陽則其理顛倒非正也自求口實求其自養之道也口實不獨為飲食書仲虺之誥云豫恐來世以台為口實蓋言語亦口實也初九舍爾靈龜觀我朵頤凶舍音捨龜之靈能食氣以自養初九剛明其才智亦足以自求口實乃捨內求外觀人之朵頤是捨其所不當捨觀其所不當觀凶之道也朵頤者頤頷充實如花朵之下垂也我指上九爾初九自謂頤有兩陽爻初九為內卦之主躁動于下不能自求口實故爾之上九為外卦之主靜止于上能自求口實故我之六二顛頤拂經于丘頤征凶顛者倒也與鼎初九顛趾之顛同以六二之隂養初九之陽事屬倒置故曰顛頤經謂常理拂違悖也二五君臣相應此常理也不相應則下不奉上上不養下而違悖其常理故曰拂經王肅曰丘指六五艮為山五居艮山之半丘也六二與六五皆隂爻隂道常乏皆不足以相養而二也欲與三隂皆求養于五是妄求而自取其凶也故于丘頤征凶六三拂頤貞凶十年勿用無攸利口容止貴乎靜拂頤貞凶謂六三躁動之極不正又不中悖其養正之道固執而不改是以凶也十年勿用無攸利謂十年之久並不可動動亦無所利也六四顛頤吉虎視耽耽其欲逐逐無咎二曰顛頤四亦曰顛頤而吉凶不同者二與五不相應四與初則相應也是故二拂經而凶四則不拂經而吉也虎指初九之剛陽耽耽視近而志逺也虎常餓而其欲逐逐然象初九躁動于內以二之養為不足而又求養于四也四以隂養陽雖為顛頤然自上施下亦頤道之正也是以吉而無咎六五拂經居貞吉不可涉大川二五不相應下無以奉上上無以養下故皆曰拂經六五以隂柔居尊而養道不足獨不言頤僅能順以從上不能動而有為故曰居貞吉不可涉大川上九由頤厲吉利涉大川君子求諸巳小人求諸人彖辭云自求口實而由人乎哉上九陽實而有餘自得其養故曰由頤與由豫之由同居頤之終在衆隂之上位高任重亦危厲矣所以吉者六五順從之也才剛而有為故利涉大川巽下兊上大過棟橈利有攸往亨大陽也陽盛而過乎隂是為大過四剛爻並聚于中而初上兩端皆弱屋棟橈動之象也橈乃教反剛雖過而二五皆得中內巽外説故其占為利有攸往亨初六藉用白茅無咎初六巽體之柔處下而承九二之剛猶茅之藉物也在大過之時而過于敬慎若是何咎之有九二枯楊生稊老夫得其女妻無不利楊之枯夫之老是皆大者過也然九二過而得中剛柔相濟猶楊枯而根生蘖則有復榮之理人老而得女妻則有得子之理故無不利稊與女妻皆指初六稊鄭玄作荑杜兮切九三棟橈凶卦有四剛爻而九三剛過特甚故以彖之棟橈屬之太剛必折故凶九四棟隆吉有它吝隆高起貌九四以剛居柔其棟隆而不橈故吉它指三四與三比同是棟也三既橈四獨能隆乎君子惡傷其類故為之羞吝有它與比初六同比之有它吉蓋因它人而吉大過之有它吝蓋因它人而吝九五枯楊生華老婦得其士夫無咎無譽華呼瓜反即今之花字九五與上六相比楊譬則枯而生花人譬則老婦得其士夫九五中正本無過為但以所比非嘉偶而可醜耳故無咎亦無譽上六過涉滅頂凶無咎下與三應則過涉五四沒入兊澤而不見其頂不亦凶乎夫既凶矣而又曰無咎者才弱雖不足以濟難而志存大義不可咎也坎下坎上習坎有孚維心亨行有尚習重也重乾重坤不言習六子之重獨坎言習何也郭京曰習坎上脫一坎字坎險陷也謂二隂為險而一陽陷于其間也卦之兩體皆坎是為習坎五為卦主與二同遭險陷而皆以剛德居中故其象占為有孚維心亨謂二五彼此同德相孚同心相維故雖處險陷而有亨通之道也彖義如此而爻于二五皆無相孚之義何也曰彖自彖義爻自爻義也坎忌不流流則通故勉之曰行有尚初六習坎入于坎窞凶窞徒感反坎中小坎也彖言習坎而爻以繫之初六以初六在重險之下也處習坎之時往則有功初乃入于坎中之坎而失其道是以凶也凡重卦坎離震艮巽兊皆無正應坎之初六才弱而無以自拔故其陷益深如此九二坎有險求小得地之窪陷曰坎兩隂畫之虛象之坎以有水乃見其有險九二陽畫陷于其中坎有險之象也才剛志柔未能出險不過近比初六六三求小得而已而初六六三皆入于坎陷彼方自救之不暇奚足以為大援故其占曰求小得六三來之坎坎險且枕入于坎窞勿用自彼而至此曰來自此而往彼曰之來之坎坎謂其在重坎之中動止皆坎勞而又勞也三居下坎之上亦險矣上坎又壓于其上故曰險且枕枕去聲六三有其志無其才位又不正徒爾往來勞苦終未能出險蓋下坎方將脫而又有上坎在前徒冝守靜耳豈冝動哉故戒之曰入于坎窞勿用六三與初六皆隂爻隂虛故皆言坎窞六四樽酒簋二用缶納約自牖終無咎樽酒乃特樽之酒一樽而已象九五剛陽之竒也簋竹器數用偶以盛黍稷者簋上更有二字當與損之二簋同二簋之食象六四隂柔之偶也二副也缶土器樽屬即瓦罍是也二用缶為句樽酒二簋二用缶者樽薦以簋而副以缶所以備乏少也納交結也約信誓也牖暗室中通明處也牖非行禮之地其禮又簡薄何以無咎蓋是時君臣同在險難中彼此以誠實質信相結而弗納于邪終亦無咎四近五剛柔相比而其位皆正故其象占如此九五坎不盈只既平無咎坎不盈以其流也彖傳云水流而不盈是也九五坎中之陽爻陽動象水之流水流則不盈不盈則適至于既平故無咎水若不流則盈盈則有泛濫之患又安得平而無咎彖辭云行有尚蓋為九五勉也只與復無只悔之只同上六係用徽纆置于叢棘三嵗不得凶上居坎之終當出坎矣乃用徽纆攀係于五五自與四結約不從上之攀係則上之所用非其道也無己則下求于三而三也正入于坎窞豈能為之援乎上而下求于三則猶置身荆棘叢中不可得而出矣故雖三嵗之久亦不能免其凶也離下離上離利貞亨畜牝牛吉離附麗也謂一隂附麗于二陽之間也貞正也離雖以中爻為主在重離之時六二居下離之中則正六五居上離之中則不正正則亨不正則不亨故戒之曰利貞亨六二為卦主畜牝牛吉指六二也畜許六反養也牛性本順而又牝焉順之至也六二以柔居柔故其象為牝牛火忌炎上六二處下而正又能養之以柔而無犯上之僭故吉初九履錯然敬之無咎詩鶴鳴云它山之石可以為錯錯乃琢玉之礪石也坤初六柔而在下其象為履霜離初九剛而在下故其象為履錯然居離之初方與人相親附不可肆其炎上之性而遽進唯敬慎如履錯然乃可以避咎不然則厥足用傷豈能無咎此爻與履九四履虎尾之義同彼訴訴故終吉此敬之故無咎六二黃離元吉六二以柔順文明之德麗于兩剛之間得中處下而無炎上之失故其象為黃離其占曰元吉九三日昃之離不鼓缶而歌則大耋之嗟凶三處下體之中其位過中猶日之昃而餘景迫于崦嵫故曰日昃之離耋者年之至也與詩車𥻘逝者其耋之耋同當此時處此位不自遣以樂餘年則死期將至徒有嗟嘆而巳故曰不鼓缶而歌則大耋之嗟釋文云古文無凶字九四突如其來如焚如死如棄如突吐訥反與詩甫田突而辨兮之突同九四不中不正有剛暴陵爍六五之象故曰突如其來如凶焰猶火弗戢則將自焚故曰焚如大逆不道衆所棄絶死而不收猶死灰之委棄故曰死如棄如六五出涕沱若戚嗟若吉以六居五非其正也迫于九四之剛暴故悲見于色而出涕沱若憤形於聲而戚嗟若如此而不言凶何也曰位雖不正德則柔中而無過為所以轉凶而為吉也上九王用出征有嘉折首獲匪其醜無咎王指五出征而稱王征伐自天子出也上九處離火炎上之極剛暴尤甚于九四乃為惡之渠魁是以王出而親征之王者得此占則可用以出征也折首獲匪其醜謂折取其魁首而脅從罔治則其所執獲者匪其同惡之醜類也有嘉謂有明而仁恕之美也無咎謂無貪而殘暴之咎也醜與詩采芭執訊獲醜之醜同周易集説卷五
