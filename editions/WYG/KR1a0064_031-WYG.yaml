body:
  text: 周易集說卷三十一宋俞琰撰繫辭上傳四子曰夫易何爲者也夫易開物成務冒天下之道如斯而已者也何爲問辭如斯答辭讀易者不知聖人所以作易之意則徒爾玩其辭耳夫聖人作易何爲而作也蓋將以開物成務冒天下之道也聖人之意如是而巳開物謂物理未明易則明之成務謂事體未定易則定之冒天下之道謂天下之理無不包括於卦爻之中也伊川程子曰開物者燭理也成務者適變也紫陽朱子曰開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中又曰易之爲書大抵皆因卜筮而設逐卦逐爻開示吉凶包括無遺如將天下許多道理覆冒其中今人說易所以不將卜筮爲主者只是怕小却這道理故憑虛失實茫昧臆度而巳不知由卜筮而推上通鬼神下通事物精及於無形粗及於有象皆包􅇁在此隨取隨得是故聖人以通天下之志以定天下之業以斷天下之疑以用也易能開物故聖人用以通天下之志易能成務故聖人用以定天下之業易能冒天下之道故聖人用以斷天下之疑紫陽朱子曰聖人作易教他占吉則爲凶則否所謂通志定業斷疑此也是故蓍之德圓而神卦之德方以知六爻之義易以貢蓍用於卦未定之先故其德圓卦成於蓍巳定之後故其德方蓍之德圓象天天數用九而體七七七則五十而虧一卦之德方象地地數用六而體八八八則六十而盈四神謂其知來知謂其藏往也六爻之義各有所取蓋隨其時位也易者變也貢者以吉凶告人也圓而神所以能通天下之志方以知所以能定天下之業易以貢所以能斷天下之疑嵩山晁氏曰易字陸音容易韓音變易今從韓誠齋楊氏曰貢者獻也書云伻來獻卜是也聖人以此洗心退藏於密吉凶與民同患曰洗心曰退藏於密則聖人此心無一塵之累矣又曰吉凶與民同患則聖人此心不勝其憂焉何也曰蓍之德圓而神天下之志通矣卦之德方以知而天下之業定矣六爻之義易以貢而天下之疑斷矣聖人遂以此洗心滌慮而無思退藏於密而無爲故曰聖人以此洗心退藏於密無事則潛心淵黙寂然不動人莫能窺及其有事則其神知之用又隨感而應故曰吉凶與民同患當知無思無爲寂然不動者易也在聖人則洗心退藏於密感而遂通天下之故者易也在聖人則吉凶與民同患聖人即易易即聖人其道一也神以知來知以藏往來謂將來之事蓍之神則無不知之往謂既往之事卦之知則無不藏之聖人之神猶蓍之神也聖人之知猶卦之知也所以知來所以藏往與蓍卦一也或曰藏往之藏當作識與大畜象辭多識前言往行之識同蓋因上文退藏之藏遂訛爲藏少梅鄭氏曰圓者運而不窮可以逆知來物方者其體有定可以識於既往紫陽朱子曰神以知來如明鏡然物來都看見知以藏往只是現在有底事都識得愚謂藏與識頗相似識誤爲藏恐或然也其孰能與於此哉古之聰明叡知神武而不殺者夫其孰能與於此哉問辭也古之聰明叡知神武而不殺者夫答辭也聰明謂耳目無所蔽叡知謂心志無所疑惑殺者武之事武則必殺今言不殺者聖人之聰明自足以通天下之志聖人之叡知自足以定天下之業其斷天下之疑則神武之決也又何假乎蓍卦之占亦猶古者神武之君威服天下而不假兵之血刃也紫陽朱子曰神武而不殺得其理而不假於物之謂或曰聰明叡知神武而不殺蓋古語而孔子援以贊聖人之大也是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫天之道謂天理之自然民之故謂人事之所以然聖人洗心退藏於密是以明於天之道吉凶與民同患是以察於民之故神物謂蓍也以其前知故稱之曰神物明天道遂知神物之可興察民故遂知民之必用而不可不有以開其先而前用之也湛然純一之謂齋肅然警惕之謂戒古人之祭也七日戒所以逺夫外物之干也三日齋所以專夫一念之敬也其於卜筮也亦然今曰聖人以此齋戒以神明其德夫其德謂蓍之德也神明謂神而明之在乎聖人也占者能以敬心求蓍有如聖人之齋戒則蓍也受命如響無有不應者矣不然則蓍乃枯草朽莖何神物之有紫陽朱子曰蓍龜靈物也雖聖人亦必神明其德者必齋戒而後靈不齋戒則不靈也是故闔户謂之坤闢戸謂之乾戸一而巳闔之闢之則二隂陽之動亦一氣耳靜則氣入萬物皆由之而入此闔戸也動則氣出萬物皆從之而出此闢戸也戸之闔猶坤隂之靜故曰闔戸謂之坤戸之闢猶乾陽之動故曰闢戸謂之乾先言坤之闔者由靜而動也人之呼吸必先闔而後闢亦隂陽之義也伊川程子曰涵養之道出入之息者闔闢之機而已又曰闔闔往來見之鼻息横渠張子曰人之有息蓋剛柔相摩乾坤闔闢之象也一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神闔已則復闢闢已則復闔一闔一闢而互換故謂之變隂往則陽來陽往則隂來往來循環而不窮故謂之通見謂隂陽之發見隂陽初發見乃謂之象形謂隂陽之有形隂陽既有形乃謂之器因隂陽之全體裁制而用之以昭示天下故謂之法即隂陽之妙以利民生之日用使之出乎此入乎此民咸用之由於其中而莫知其所以然故謂之神白雲郭氏曰坤隂物也故有闔戸之象乾陽物也故有闢戸之象既能闔復能闢是所謂變也朝闢之暮闔之日復一日往來闔闢不窮是所謂通也通也者通其變也至於戸之可見則曰法也其有形則曰器也制而用此者則曰法也利於出入之用而天下之民無不用之者又其所以爲神也如是則一戸之設豈茍然哉故治天下之道無他焉如制一戸之法使之變通可久斯得之矣雖黄帝堯舜之治不過如此是故易有大極是生兩儀兩儀生四象四象生八卦大音泰易無體而有至極之實理故曰易有大極唯實故有唯有故生是以大極生兩儀兩儀生四象四象生八卦原夫兩儀之未生也是爲大極渾渾淪淪一而巳矣逮夫動而生陽爲陽畫之竒靜而生隂爲隂畫之耦則陽一隂二是爲兩儀儀也者一陽一隂對立之狀也爾雅云儀匹也謂其隂陽相並也自兩儀而上每畫各生一竒一耦則太陽一少隂二少陽三太隂四是爲四象自四象而上每又各生一竒一耦則乾一兌二離三震四巽五坎六艮七坤八是爲八卦合太極之一兩儀之三四象之十之三十六則其數五十即大衍之數也大衍之數五十而其數四十有九者存太極本體之一而用兩儀四象八卦之四十九也自漢唐諸儒論大衍之數者莫不知五十去一爲太極之本體但兩儀四象八卦之用數則無一語及之徒知其體不知其用何哉蓋索之髙逺而不復近思之爾八卦定吉凶吉凶生大業八卦具而定吉凶則足以斷天下之疑矣吉凶定而生大業則有以成天下之務矣夫易之爲書六十四卦具乃可以占吉凶何爲獨言八卦也平庵項氏曰凡繫辭之稱八卦即六十四卦也八卦更相上下爲六十四卦故例以八卦稱之其言伏羲始作八卦者亦謂六十四卦夫吉凶乃易之占辭何爲生大業也横渠張子曰有吉凶利害然後人謀作而大業生若無施不宜則何業之有是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以爲天下利莫大乎聖人法象莫大乎天地而易之法象與天地同變通莫大乎四時而易之變通與四時同懸象著明莫大乎日月而易之懸象著明與日月同易也可謂大矣雖然作易而非有聖人之位亦不足以爲法於天下用易而非有聖人之德亦不足以爲利於天下故繼之曰崇髙莫大乎富貴備物致用立成器以爲天下利莫大乎聖人聖人者與天地合其德與日月合其明與四時合其序備物致用立成器以爲天下利如十三卦所陳者是也紫陽朱子曰立下疑有闕文節齋蔡氏曰立字下當有象字探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜賾謂雜亂探者抽而出之也隱謂幽僻索者尋而得之也深謂不可測鉤者曲而取之也逺謂難至致者推而極之也賾非探而不出故以蓍龜鉤之逺非致而莫至故以蓍龜致之凡物象之賾隱事理之深逺蓍龜皆探索之鉤致之故能定天下之吉凶成天下之亹亹詩崧髙云亹亹申伯鄭氏箋云勉也爾雅亦訓勉音尾亹亹猶勉勉大抵有疑而莫能決其心必怠得卜筮以決之而吉凶既定自然加勉則其所以亹亹者是卜筮成之也聖人何與焉故於莫大乎聖人之後又繼之曰莫大乎蓍龜蓍爲筮龜爲卜易之筮止用蓍而兼言龜者古人占事則蓍龜並用書大禹謨云龜筮協從洪範云龜筮共違于人是也秀巖李氏曰莫大乎蓍龜古本作莫善乎蓍龜是故天生神物聖人則之前云是興神物獨指蓍而言蓋承上文蓍之德此云天生神物乃指蓍與龜並言蓋承上文莫大乎蓍龜此二物皆能前知故皆謂之神物孰生之天生之也則之者以之爲法也後云河圖洛書亦皆神物也故皆言則之則之者或曰蓍龜並生於上蔡蓍草叢生百莖半之則應大衍之數五十龜背之文中間五段兩旁四段周圍二十四段腹之文十二段總而計之四十九段則應大衍虛一不用而用四十有九之數蓋皆神物也天地變化聖人效之天地變化謂四時也暑往則寒來寒往則暑來是謂變化聖人效之如卦爻之動靜蓋倣效天地之變化天垂象見吉凶聖人象之天垂象謂日月也日月往來有盈昃薄蝕循其度則吉失其度則凶此天之垂象以見吉凶也聖人作易而示人以吉凶蓋象之而巳象者像也天地變化有理可測故言效日月往來有象可見故言象河出圖洛出書聖人則之伏羲之時未有文字如因河圖洛書之文而畫卦故曰河出圖洛出書聖人則之蓋非圖書有天生之數而聖人就取之也闗子明以五十五數爲河圖四十五數爲洛書劉牧兩易之謂河圖之數四十五洛書之數五十五說者以闗爲是劉爲非其實皆不然案書顧命云天球河圖在東序天球玉也河圖而與天球並列則河圖亦玉也玉之有文者爾崐崘産玉河源出崐崘故河亦有玉洛水至今有白石洛書蓋白石而有文者也聖人則之謂則其文以卦畫耳初無所謂五十五數與四十五數也夫五十五數易數也易固有之也易安有所謂四十五數哉四十五數者戴九履一左三右七五居中而上列二四下列六八分布而爲九宫子華子言之大戴禮言之乾鑿度言之在易則聖人無一語及之蓋非易數也河圖之說禮運亦嘗言之不過曰河出馬圖而論語亦嘗言之不過曰河不出圖吾巳矣夫並無所謂數之五十五與四十五洛書之說則他經無所見孔安國注洪範乃以爲洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九數愚案禹貢但言導洛不曾言洛之出書安國亦何所據而有是說耶夫孔子曰河出圖洛出書聖人則之聖人指作易之聖人蓋伏羲也是河圖洛書伏羲之時具有之也劉向父子班固輩皆循安國之說遂以爲河圖授羲洛書錫禹如此則是伏羲時止有河圖未有洛書也不亦謬乎夫孔子兼圖書二者並言安國之徒乃岐而二之已與孔子之說大相戾況書所謂天錫禹洪範九疇蓋未嘗謂錫以洛書安國之徒乃謂洛書有九數疇之數亦九遂肆其說謂禹得洛書而敘九疇何其妄耶彼既以洛書爲數九而歸之禹於是以河圖爲十數而歸之伏羲吾不知河圖洛書之有數安國之徒曷從而知之而圖之數十書之數九又果何所據耶蓋皆出於緯書也緯書不經牽合附會怪誕之甚漢儒多習䜟緯之學其爲義疏往往採諸緯書自其有九篇六篇赤文緑字之說故班固以初一至六極六十五字爲本文顧野王以農用敬用十八字爲神龜所附者豈不甚可笑哉東坡蘇氏曰九宫不經蓋緯書所言之數非易數也南軒張氏曰鄭康成溺於緯書乃云河圖有九篇洛書有六篇又以河圖爲八卦洛書爲九疇此皆蕪穢聖經者也易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易有四象所以示者示之以象而使人有所見也係辭焉所以告者告之以辭而使人有所知也定之以吉凶所以斷者吉凶既定而使人有以決其疑也横渠張子曰吉凶變化進退剛柔易之四象歟白雲郭氏曰自易有四象以下與前文不相屬又非别章疑其錯簡侯果曰四象謂神物也變化垂象也圖書也愚謂横渠之說如此白雲之說又如此則易有四象以下當在剛柔者晝夜之象也之下侯氏之說非也右第十一章紫陽朱子曰此章專言卜筮易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也大有上九爻辭云自天祐之吉无不利孔子於係辭傳凡三言之此則兼言所乗所應皆𤼵明文王言外之意也天之所助者順也順則不悖於理是以天祐之人之所助者信也信則不欺於人是以人助之爻但言天此又兼言人天人蓋一理也當大有之時六五以柔德居中而在下衆陽皆助之以其信也上九居六五之上是履信也身雖在外而乃心未嘗不在君是思乎順也順則天助之矣九三賢人也上之應在三又與之同德相尚故曰又以尚賢也其德如此是以自天祐之吉無不利紫陽朱子曰在此無所屬或是錯簡横渠張子曰此篇宜在立心勿恒凶下蓋上言莫益之故此言多助也白雲郭氏曰當在憧憧往來困于石公用射隼皆稱易曰故自天祐之宜在其前也下篇七爻自憧憧往來皆稱易曰與天祐之同宜從郭氏子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意說卦以盡情僞繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神書以記言言有餘則非書之所能記言以達意意有餘則非言之所能盡達然則聖人之意其不可見乎曰可見聖人立象以示人使之觀象而黙㑹其意所以盡也夫聖人之作易設卦觀象然後係之以辭卦在是則象在是象在是則意在是矣意者心之所向而寓於象者也情實也僞妄也僞則不情情則不僞人之情僞萬端非言可盡設之以卦所以盡情僞也係之以辭所以盡言也變而通之則有以成天下之務而其用不窮足以盡其利矣鼓之舞之則有以成天下亹亹而其妙莫測足以盡其神矣立象設卦係辭此聖人作易之事變通鼓舞此聖人用易之事王弼輩乃欲忘象忘言果聖人之意乎聖人之意正在乎言象也或曰首言書不盡言言不盡意疑是古語次言然則聖人之意其不可見乎是設問之辭以下是答辭紫陽朱子曰言之所傳者淺象之所示者深觀竒耦二畫包含變化無有窮盡則可見矣變通鼓舞以事而言兩子曰字疑衍其一蓋子曰皆後人所加故有此誤如近世通書乃周子所自作亦爲後人每章加以周子曰字其設問答處正如此也乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣緼之義與論語緼袍之緼同衣中之綿絮胎是也乾坤其易之緼耶謂乾坤緼於易六十四卦之中非謂易緼於乾坤兩卦之中也易之中所緼竒耦是也竒爲九耦爲六凡九皆乾凡六皆坤六十四卦凡三百八十四爻爲竒者百九十二皆乾畫也爲耦者百九十二皆坤畫也以每爻三十六策積之則六千九百一十二皆乾策也以每爻二十四策積之則四千六百八皆坤策也合之則萬有一千五百二十無非皆乾坤之策兹非乾坤爲易之緼乎其中矣易之所以爲易者乾九坤六之變易也兩不立則一不可見故九六毁而不成列則無以見其爲易也易不可見則乾坤九六兩者之用息矣乾坤未嘗毁亦未嘗息特以爻畫之九六若不成列則無以見其變易之理爾下篇云剛柔者立本者也本即緼之謂也前言易行乎其中此言易立乎其中立與行同歟異歟曰立者體也行者用也紫陽朱子曰易之所有隂陽而已凡陽皆乾凡隂皆坤畫卦定位則二者成列而易之體立矣又曰毁謂卦畫不立易只是隂陽卦畫若無此卦畫豈復更有易乎誠齋楊氏曰二篇之策凡陽爻百九十二皆乾之九也隂爻百九十二皆坤之六也平庵項氏曰凡係辭之稱乾坤即竒耦二畫也乾純於竒坤純於耦故例以乾坤稱也是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業道無形故曰形而上者器有形故曰形而下者如卦有上下之體爻有剛柔之質皆形而下者其理則道也道非器不形器非道不立器亦道也道亦器也道器蓋未嘗相離也因其自然之化而裁制之則謂之變推廣而流行之則謂之通舉而措之天下之民則謂之事業前章云一闔一闢往來不窮天地之變通也此云化而裁之推而行之聖人之變通也是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻紫陽朱子曰重出以起下文郭京曰誤增夫象二字東萊吕氏曰是故夫象四字衍文節齋蔡氏曰夫當作爻象即卦爻即辭也極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎德行聖人有以見天下之賾故能極天下之賾聖人有以見天下之動故能鼓天下之動賾以象著卦有象則窮天下之至雜至亂無有遺者故曰極動以辭決使天下樂於趨事赴功者手舞足蹈而不能自巳故曰鼓易不變則竒耦乃死象故化而裁之則在乎變變而後通故推而行之則在乎通易道固神矣神而明之則在乎其人若夫黙而成之不言而信則又在乎人之德行前言變通而歸之事業聖人以易道舉而措之天下也此言變通而歸之德行聖人以易道存之於一身也右第十二章誠齋楊氏曰此章言聖人作易之意其散在六十四卦之爻其象聚在乾坤之二卦聖人用易之道其散在天下之事業其聚在一身之德行也周易集說卷三十一
