body:
  text: 周易集說卷二宋俞琰撰上經二坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川訟爭辨也上乾剛下坎險又為內險外健皆訟之道也九二為成卦之主爻有孚窒惕中吉終凶皆指九二有孚窒惕謂九二雖與九五同德相孚然為二隂所陷而曲直未判則此心未免窒塞而不通惕懼而不自安也中吉謂剛而得中所以吉也終凶謂訟不可成要其終則雖勝亦凶大人指九五利見謂占者訟而有理則宜見之也坎水之險在下乾以剛乘險以實履陷故其象占又為不利涉大川初六不永所事小有言終吉初六以隂柔處訟之初才弱位卑而為訟不成故不言訟而曰不永所事小有言終吉夫彖辭言終凶爻辭乃言終吉何也曰彖為訟者言爻為不訟者言也九二不克訟歸而逋其邑人三百戶無眚九二以剛居柔故不克訟逋逃也與五不相應遂歸而逋既逋則近已者皆無連坐之患故曰其邑人三百戶無眚六三食舊德貞厲終吉或從王事無成六三柔而不訟故不言訟食猶食邑之食言所享也訟六三之貞即坤六三之貞故稱舊德其位雖處九二剛陽之上而危厲然以貞道自守而不訟亦終吉也故曰食舊德貞厲終吉王指五或從王事無成與坤之六三同是亦舊德也彼言或從王事無成又言有終此但言或從王事無成而不言有終何也曰彼順而此險也險非善後之道也九四不克訟復即命渝安貞吉九四以剛居柔故亦不克訟即就也渝變也鄭國風羔裘詩云舍命不渝大雅板詩云敬天之渝皆訓變訟非善事四也捨其不善以復其善遂聽命於五而渝變前日之所為安守今日之正理故吉九五訟元吉九五以剛明之德居尊而又中正彖辭所謂大人是也訟之有理者見之必獲伸矣元吉乃吉之盡善者也蓋其始焉本吉非若九四轉凶而為吉也上九或錫之鞶帶終朝三褫之鞶帶大帶也所以束身而用其恭也上九終極其訟徼幸取勝故或有鞶帶之錫錫之所以愧之也鞶帶指三錫之者五也三與上相應蓋與之從事於王所者也三不有其成上乃得受此錫褫解也終朝三褫之愧可知矣三去聲坎下坤上師貞丈人吉無咎師兵衆也貞正也此卦下坎上坤動衆行險而以順師之正也丈人當如困彖辭作大人指九二陽德之大也剛中而有應衆隂皆順從之故吉而無咎初六師出以律否臧凶在師之初故曰師出律言其和否方九反否臧不善也春秋左氏𫝊云師克在和不在衆今以六歸初柔邪而不中焉得和不和則不善喪師之道也故曰否臧凶按周禮太師執同律以聽軍聲蓋古者出師必吹律律和則知士卒同心猶後世軍中風角鳥占也九二在師中吉無咎王三錫命在師之中為成卦之主故以彖辭吉無咎屬之所以吉而無咎者有應于上而六五之君寵任之專也剛中而無過故為三承王命之奬諭王指五三去聲六三師或輿尸凶或疑辭行師而用人不一則衆有疑二之心也輿與文子輿死扶傷之輿同尸與春秋左氏𫝊秦封殽尸楚收晉尸之尸同輿尸謂師徒撓敗輿載其尸而歸也六三半動半靜柔邪而不中故其凶如此六四師左次無咎左次退舍而處于僻左之地也按春秋莊公八年師次于郎以俟陳人蔡人次謂止而不進也易以陽為右隂為左六四爻位俱隂故稱左才志柔弱雖不能成進取之功然居得其正而能完師以退故亦無咎六五田有禽利執言無咎長子帥師弟子輿尸貞凶下有二應是為田有禽言當依郭京作之畋于田所以去害稼之物執之則利故無咎師至五乃師旋論功之時故言長子弟子之得失長子指九二弟子指六三六三柔而不中其可使哉必固使之故有輿尸之凶是誰之過歟貞謂六五固執而不知變也上六大君有命開國承家小人勿用師至上乃定功行賞之時故言大君有命開國承家君指六五以隂柔之小下從九二陽剛之大故稱大開國謂封為諸侯承家謂𫝊之子孫而世襲其爵小人勿用謂小人得此占則不宜動而用事也坤下坎上比吉原筮元永貞無咎不寧方來後夫凶比相親也九五以一陽居尊而衆隂在下皆比之故吉原再也禮之原廟原𧖟春秋左氏傳之原田皆訓再初筮得坤再筮得坎九五乃為成卦之主剛得中而元永貞故無咎坎勞卦是為不寧謂六四輔已而不憚其勞也來謂在下三隂之順從也坎為加憂坤隂多疑師旋之後天下歸附方新上下憂疑未定四也不遑寧處以五之意達于初二三又以初二三之意達于五然後上下相應而初二三乃始順從而來比也上處外獨後于五是為後夫不得其比故凶初六有孚比之無咎有孚盈缶終來有它吉此爻凡兩言有孚當分為兩說始言有孚孚于四也次言有孚孚于二也四乃五之近臣初與之比固亦無咎二與五乃君臣正應初與二比則可因二以比五此則吉之道也缶指二虛而能受故象缶盈之者五也謂二五相比之深如水之盈缶也始者二往比五終則五來應二故曰終來二非初之正應故言它六二比之自內貞吉五為比主二應五而自內比之則無假於它故言自貞吉謂六二能固守以正不比三而比五則吉也六三比之匪人匪非也比上六之後夫則所比非其人矣六四外比之貞吉二在內而應五故曰比之自內四在外而承五故曰外比之二四皆守正而不與三比故其占皆曰貞吉九五顯比王用三驅失前禽邑人不誡吉九五以剛明中正之德居尊至公無私而下皆順從故曰顯比師二至五比五至二皆歷三爻故師言三錫比言三驅王用三驅失前禽猶王制天子不合圍之義禽既去則不追故曰失前禽前禽即後夫衆已比五而上獨後至是為後夫衆皆隨五而上獨前去是為前禽邑人指二誡者戒其不妄殺也是時下皆順從而邑人蓋知上意故不待誡凡此皆吉之道也上六比之無首凶比道貴先而上六獨為後夫比之無首者也故凶乾下巽上小畜亨密雲不雨自我西郊釋文云畜本作蓄勑六反六四以隂柔之小為成卦之主而才力單弱包蓄三陽不住是為小畜內健而外巽四與五又相孚故亨雲隂氣西郊隂方陽倡隂和則隂陽和洽而為雨隂先陽倡則隂陽不和而無雨今也雲雖密而不雨蓋自我西郊故也我與西郊皆指四在下三陽皆不順從故其象如此初九復自道何其咎吉復謂返於本位也以初九之剛往應六四之柔而受其制豈不失其道而有咎今也返而以正道自守故能轉咎而為吉九二牽復吉與初九相牽連而復故吉九三輿說輻夫妻反目輻當如大畜九二作輹車下橫縛也說音脫輻指二輿三自謂也二牽初而復則三之輿說其輹而不行矣九三與六四隂陽相並夫妻之象也陽不受制於隂則其情不和故曰夫妻反目六四有孚血去惕出無咎四與五相孚而位據羣剛之上不能無爭爭則必傷而言血去者六四柔順而正雖與五合志不挾勢以陵下蓋無爭也無爭則無傷況又惕然而懼釋位而出則亦無咎矣其義與需六四同九五有孚攣如冨以其鄰五與四相孚親密而固結之甚故曰攣如易以陽實為冨九五陽爻故曰冨冨以其鄰謂九五之所以冨蓋能任用六四併力以畜乾也上九既雨既處尚德載婦貞厲月幾望君子征凶彖辭云密雲不雨謂隂陽不和也爻至上九畜極則倒轉為履乾上兊下其澤自天而降昔之不雨者今既雨矣雨則和和則止故曰既雨既處處上聲尚德載婦貞厲月幾望皆指六四隂之所尚冝處下以德載物今也三陽在下而六四髙據其上豈所冝哉倒轉為履之六三而居下則順承三陽而為載乃所冝也隂畜陽猶婦畜其夫畜道既極猶固執而不知變則危矣故曰婦貞厲幾音機近也月與日正相對為望幾望謂將望而光未盈也能以危厲為戒而不自滿假則如月之幾望也君子指占者而言以正道而行謂之征君子得此占雖以正道而行亦冝處靜而不冝動下無應援動將何之動則凶也兊下乾上履虎尾不嘻人亨履虎尾謂乾剛在前兊柔自後躡之也乾雖剛猛如虎兊以和說應之則不至見害故曰不嘻人嘻直結反齧也占者所履如此亨之道也初九素履往無咎履道貴柔不貴剛在履之初而以剛居剛本亦有咎唯能安于素履處卑下而不僭則其往也無咎九二履道坦坦幽人貞吉九二以剛居柔而得中履道之坦坦者也處靜守貞內安恬退而不自亂故其象為幽人其占曰貞吉六三眇能視跛能履履虎尾嘻人凶武人為于大君視欲其正而六三不正眇也雖能視不足以有明也行欲其中而六三不中跛也雖能履不足以有行也彖辭言履虎尾此亦言履虎尾六三乃成卦之主爻也彖辭言不嘻人此乃言嘻人凶彖自彖義爻自爻義也六三不中不正又以柔居剛動則遇害故為嘻人之凶武人得此占則見危授命奮不顧身可以有為而進用于大君也大君指九五而言九四履虎尾訴訴終吉乾之剛猛如虎上九其首九四正尾也故亦曰履虎尾訴所革反訴訴驚貌九四雖不中不正然以剛居柔履危而知懼故其占為始雖甚危其終則吉九五夬履貞厲履以和行而九五下無正應唯以剛明自任凡事決而不和又固執而不知變危厲之道也上九視履考祥其旋元吉視履為句考祥其旋為句祥當依荀爽作詳初居履之始故言往上居履之終故言旋昔往而今旋也能自視所履而加考察之功詳審其旋不失其素而終始如一則元吉不然何元吉之有乾下坤上泰小往大來吉亨泰者天地交而上下相通之時也小往謂隂往居外大來謂陽來居內內君子而外小人故其占曰吉亨初九拔茅茹以其彚征吉茅茹茅之根也彚音謂類也初進則二三俱進猶茅根牽連拔則俱起故其象為拔茅茹以其彚而其占為征行之吉九二包荒用馮河不遐遺朋亡得尚乎中行荒與書說命荒野之荒同初九在下剛而不中荒野草茅之士也九二包容之故曰包荒若九三則非但剛而不中又處健體之極徒步涉河死而無悔者也九二亦用之故曰用馮河馮音慿詩小旻云無敢馮河毛氏注云馮陵也三隂在外雖逺九二亦不弃之故曰不遐遺朋謂坤之朋六四上六是也中行指五尚配也五交于二則五也喪其坤朋而二也得尚乎五故曰朋亡得尚于中行向使六五不朋亡而唯與六四上六為黨則二欲上交于五其可得乎九三無平不陂無往不復艱貞無咎勿恤其孚于食有福陂彼僞反有平則有陂有往則有復無有久平而不陂久往而不復者三處泰道方中之時亦未至乎極聖人居安慮危故為此戒艱則操心也危而不敢慢易貞則守德也固而不敢放縱如此則無過咎而彼之孚可以勿憂我之福可以自享蓋在我者禮義不愆則自治有餘何用它恤六四翩翩不冨以其鄰不戒以孚翩翩降以相從之貌易以隂虛為不冨六四隂爻故曰不冨四當小人道消之時所以翩翩然下交于初者其心自歉其不冨遂以其鄰偕來也戒備也戒而孚則非其願不戒以孚則其中心願也泰之時上下交而其志同君子小人兩不相疑又何戒備之有三陽以其彚交于上故三隂亦以其鄰交于下三交于上勿恤其孚故四交于下亦不戒以孚六五帝乙歸妹以祉元吉六五以隂柔居尊下應九二為帝乙歸妹之象祉祿也以祉以祿及下也以二視五則自下而尚于五以五視二則自上而歸于二上下相交吉之盡善者也卦互歸妹故其象占如此上六城復于隍勿用師自邑告命貞吝隍城下塹城以積土而成圯則土復歸隍泰極則倒轉為否故其象如此其占曰勿用謂不可動而用事也是時城圮隍塞自治且不暇何暇興師動衆以治人也哉師衆也邑都邑國之內也師自邑告命則征伐自大夫出也泰之三隂本在外以聽命于內者倒轉為否則三隂乃居內以制其外嚮也內君子外小人至此則內小人外君子君子反聽命于小人也貞吝戒占者固執而不識時勢則有甚可羞吝也周易集說卷二
