body:
  text: 周易集說卷三十五宋俞琰撰繫辭下傳四易之爲書也原始要終以爲質也六爻相雜唯其時物也質謂卦體初爻原其事之始上爻要其事之終所以爲一卦之體質也時謂所占之卦遇乾爲乾之時遇坤爲坤之時物謂所值之爻陽爻爲陽物隂爻爲隂物六爻之剛柔雖相雜而不一然占者其物則不雜也易之爲書蓋如此其初難知其上易知本末也初辭擬之卒成之終物有本末事有終始況易乎初爻乃一卦之本事未成之始故隱而難知上爻乃一卦之末事已成之終故顯而易知惟其難知故其辭但擬之而巳惟其易知故卒其辭以成之於終若夫雜物撰德辨是與非則非其中爻不備中爻謂初上之間四爻卦之互體是也物謂爻之隂陽德謂卦之德内外二卦固各有其德而雜物撰德則自其中四爻之隂陽雜而互之又自撰成兩卦之德於其間也爻有中有不中有正有不正有應有不應有與有無與故有是與非是者何當於理也非者何悖於理也初上爲事之始終初則是非未見上則是非已定辨其是非則在中間四爻非此則不備也崔景曰孔疏扶王弼義以此中爻爲二五必不然矣洪容齋曰中爻者謂二三四與三四五也如坤坎爲師而六五之爻曰長子帥師以正應九二而言蓋指二至四爲震也坤艮爲謙而初六之爻曰用渉大川蓋自二而上則六二九三六四爲坎也紫陽朱子曰先儒解此多以爲互體又曰互體說漢儒多用之左傳中占得觀卦處亦舉得分明看來此說不可廢噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣噫嘆辭要約也存謂得位亡謂失位得位則多吉失位則多凶約之以此則若是若非瞭然在目而吉凶居可知矣馬融曰彖辭卦辭也正義云彖辭謂文王卦下之辭聰明知達之士觀此卦下彖辭則能思慮有益以過半矣何謂文王卦下之辭曰乾元亨利貞之類是也彖辭蓋統論一卦六爻之體知者觀之則巳得其大要雖未十分詳盡而亦思過半矣今諸解者往往指彖傳爲彖辭誤矣大哉乾元之類乃孔子之所述是彖傳也豈可以爲彖辭哉思過半者省半思索也思字當依正義作平聲括蒼龔氏曰居可知矣言無待於動也觀其彖辭則思過半矣言無待於爻也二與四同功而異位其善不同二多譽四多懼近也柔之爲道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪以中爻之互體言則二四同是一體故其功同以上下二體之逺近言則二居下而逺於君四居上而近於君故其位異若論其善則二中而四不中故其善不同二應五逺於君而其勢伸故多譽四逼五近於君而其勢屈故多懼柔之爲道不利逺而利中故以柔居下而逺則不利居下而中則亦無咎人之爲人無咎最難今既無咎矣則不必問其利也故其要在乎無咎也三與五互爲一體故其功同三居下而賤五居上而貴故其位異三多凶賤故也五多功貴故也三五雖有君臣上下貴賤之殊然以柔居之則其位不正而危以剛居之則其位正而勝也勝與前章貞勝之勝同或音平聲非也夫二與四三與五皆同功異位而二四言其善不同三五不言其善不同何也曰二四皆臣也可以比量其善五君也三臣也臣不可與君比量其善也郭京曰近也二字本王氏注今誤爲正文陸乗曰位有得中違中之間故五得中而多功三違中而多凶二得中而多譽四違中而多懼紫陽朱子曰其要无咎若作平聲則是要約之義若作去聲則是要其歸之意又曰其要只欲无咎右第九章指示學者觀六爻之法兼明中爻互體之用易之爲書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也易之爲書至廣至大天道人道地道靡所不有是爲悉備道非二不立故立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義以爻畫言之三畫有上中下之别以象天人地之三才六畫則初二爲地三四爲人五上爲天此所謂兼三才而兩之故六也六者何即隂陽剛柔仁義是也故曰六者非他也三才之道也平庵項氏曰言其道之至謂之三極言其質之定謂之三才道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉道即三才之道也三才之道有變動爻亦有變動爻者效三才之變動者也故曰爻物謂隂陽二物也陽爲貴隂爲賤爻有貴賤之等殊與物之貴賤等殊无異故曰物物相雜謂文謂隂陽相雜猶青黄之相間故曰文文有當不當初三五陽位也九居之則當六居之則不當二四上隂位也六居之則當九居之則不當當則吉不當則凶吉凶蓋生於文之當不當也童溪王氏曰此聖人因故六之辭而有及於故曰爻故曰物故曰文故曰吉凶生焉以詳明夫六爻之所以然也其可忽諸易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危紂末無道文王未囚易惟六十四卦三百八十四爻耳未有辭也殷德既衰周德既盛易道遂興故曰易之興也其當殷之末世周之盛德邪當文王與紂之事邪以世言故先殷而後周以德言故先文王而後紂文王遭羑里之難其心危而不安故其辭亦危而不安辭謂彖辭爻辭彖辭凡六十四爻辭凡三百八十四皆文王之辭也或謂文王止作彖辭不作爻辭謬矣今以彖辭觀之未見其所謂危辭也其危辭則於爻辭見之謂爻辭非文王之辭可乎占法不變者斷以彖變者斷以爻謂文王不作爻辭不知占法者之妄論云爾李隆山李西溪辨之甚明兹不復贅危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也乾之九三重剛而不中而以警惕自處則曰厲无咎者危懼而使之平安也如豫之隂柔處下而以豫自鳴則曰鳴豫凶者慢易而使之傾覆也易道甚大取喻則甚詳細而百物不廢其要不過使人知懼欲其慎終如始而无咎焉耳此之謂易之道而聖人作易之本意也百物不廢如否之苞桑坎之叢棘大過之枯楊困之蒺藜葛藟蓋取諸草木井之鮒漸之鴻中孚之豚魚晉之鼫鼠坤之牝馬離之牝牛蓋取諸蟲魚鳥獸艮之背咸之頰舌噬嗑之耳鼻明夷之心腹蓋取諸身坤之囊訟之帶鼎之鉉震之七坎之樽簋井之瓶甕旅之斧解之矢巽之牀渙之机大有之大車既濟之茀蓋取之車服器用他如泥沙龜貝膏血酒食丘園陵廟之類茍可以爲吉凶得失之象者即取以言之是爲百物不廢也右第十一章言文王所以作彖辭之本意夫乾天下之至健也德行恒易以知險夫坤天下之至順也德行恒簡以知阻乾六畫純剛是爲天下之至健坤六畫純柔是爲天下之至順得諸心爲德見諸事爲行不難苦爲易不煩冗爲簡自上視下所見爲險自下升上所向爲阻天下之至健莫如乾天下之至順莫如坤乾惟健之至故其德行恒易而不艱苦坤惟順之至故其德行恒簡而不煩冗夫乾至健而德行恒易何爲而知險也夫坤至順而德行恒簡何爲而知阻也曰乾道自上而臨下故知險也坤道自下而承上故知阻也人之處憂患者體乾之健而德行恒易則知險而不陷於險矣體坤之順而德行恒簡則知阻而不困於阻矣平庵項氏曰易與險相反惟中心易直者爲能照天下巇險之情即所謂通天下之志也簡與阻相反惟行事簡靜者爲能察天下煩壅之機即所謂成天下之務也阻者填壅隘塞之狀與險惡不同能說諸心能研諸侯之慮定天下之吉凶成天下之亹亹者能謂易之能也天下之吉凶層見疊出何以定之易能使人說諸心則天下之吉凶定矣天下之亹亹者成矣侯之二字横渠張子紫陽朱子皆以爲衍文愚謂王弼略例舉此亦無此二字横渠張子曰易簡故能說諸心知險阻故能研諸慮平庵項氏曰能道占者之心而使之說故能定其吉凶之期能因占者之慮而爲之研故能成其亹亹之事是故變化云爲吉事有祥象事知器占事知來變化謂易之隂陽云爲謂人之言動易道之變化人事之云爲初無二理凡吾所云所爲吉事則必有上天之禎祥蓋可以理推也至於象事則知制器之法占事則知方來之兆此所謂易簡而天下之理得也平庵項氏曰云爲即尚其辭尚其變也象事占事即尚其象尚其占也天地設位聖人成能人謀鬼謀百姓與能天地設位於上下聖人中立乎其間贊天地之化育所以成天地之功能也而百姓亦與能焉何也曰聖人作易明則謀之於人幽則謀之於鬼幽明兩盡而其謀悉見之於易故雖百姓之愚亦得以觀象玩辭觀變玩占而有以定吉凶成亹亹此之謂與能也與去聲如中庸夫婦之愚可以與知之與同八卦以象告爻彖以情言易之象以八卦之畫而著故曰八卦以象告易之情以爻辭彖辭而見故曰爻彖以情言剛柔雜居而吉凶可見矣剛謂爻之九柔謂爻之六九六相錯則吉凶之理判然可見也變動以利言吉凶以情遷變動謂爻之變動以利言者爻之變動本教占者趨吉避凶而無不利焉耳然或變動而吉或變動而凶何也曰以其情而遷也情有善有不善善則轉凶而爲吉不善則轉吉而爲凶也是故愛惡相攻而吉凶生逺近相取而悔吝生情僞相感而利害生是故兩字承上文而言上文曰吉凶以情遷故下文又詳言之也曰相攻曰相取曰相感即所謂情也其情有以愛而相攻者有以惡而相攻者有以逺而相取者有以近而相取者有以情實而相感者有以虛僞而相感者此吉凶悔吝利害之所由生也或曰愛惡相攻因於逺近相取逺近相取因於情僞相感蓋相感而後相取相取而後相攻也感者情之始動利害之開端也取則情巳露而悔吝著矣攻則情至横極而吉凶分也横渠張子曰情僞相感而利害生此則是以人事言故有情僞利害也屈信相感而利生此則是理也惟以利言凡易之情近而不相得則凶或害之悔且吝上文曰逺近相取而利害生兼逺近利害並言下文獨舉其近與害而曰近而不相得則凶或害之悔且吝必其相感之初不以情實而以虛僞也感以情實則利生感以虛僞則害生今乃僞焉則其不相得也終必至於惡而相攻蓋不但有害又有凶與悔且吝紫陽朱子曰此疑是指占法而言蓋逺而不相得安能爲害惟切近則凶害便能相及也一箇凶人在五湖四海之内安能害自家若與之爲鄰近則有害矣平庵項氏曰相感者情之始交故以利害言之相取則有事矣故以悔吝言之相攻則其事極矣故以吉凶言之逺近愛惡情僞其居皆有逺近其行皆有情僞其情皆有愛惡也故末句總以相近一條明之近而不相得則以惡相攻而凶生矣以僞相感而害生矣以近相取而悔吝生矣是則一近之中備此三條也凡爻有比爻有應爻有一卦之主爻皆情之當相得者也今稱近者止據比爻言之反以三隅則逺而爲應爲主者亦必備此三條矣但居之近者其吉凶尤多故聖人概以近者明之將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈厚齋馮氏曰六辭與易全不相闗恐斷簡錯見於此王介甫郭子和蓋嘗疑之或曰此指尚占命筮之辭上傳曰君子將有爲也將有行也問焉而以言其受命也如響此六辭恐是占者所問之言蓋言者心聲也有諸中則必形諸外也孟子所謂詖淫邪遁之四辭其意亦如此虞翻曰將叛者其辭慙坎人之辭也中心疑者其辭枝離人之辭也吉人之辭寡艮人之辭也躁人之辭多震人之辭也誣善之人其辭游兌人之辭也失其守者其辭屈巽人之辭也平庵項氏曰六辭之中吉一而巳躁叛疑誣失居其五猶吉凶悔吝之分吉居其一凶悔吝居其三也叛非叛逆之叛但背實棄信者皆是也言與實相叛故慙吉者靜躁者動叛者无信疑者自信誣者敗人失守者自敗皆相反對也以類推之艮吉也震躁也兌叛也巽疑也坎喜陷爲誣善離喜麗而失守大約不出於六仁者黙勇者譁能言者寡信善巽者少決智人多險文士罕守剛柔之變盡於此矣又曰上繫鋪敘易道之廣大而至於徳行之成自博而約也下繫指示爻象之精要而極於辭情之辨自本而末也誠齋楊氏曰此言學易而有得者可以知言矣孟子曰我知言蓋得乎此大抵歉於中者必愧於外秦舞陽色變而荆軻爲之辭謝是也故曰將叛者其辭慙將有言於人而逆疑其不售也必左右其說以嘗之此不有售焉則彼必售矣商鞅之說孝公是也故曰中心疑者其辭枝直情無所煩言至正無所揣摩申公之對武帝是也故曰吉人之辭寡人惟無躁競也人而躁競則巵言以眩世而無所忌強聒以撼人而不能巳能令人厭亦能令人喜厭者察其空空而喜者意其有挾也淳于髠之見梁惠王連語三日三夜是也故曰躁人之辭多小人之疾君子而欲毁君子也必深匿其毁之之迹疾之愈甚則毁之愈緩或顯譽其人而隂寓其忮或泛爲之說以旁見其意故毁行而人不悟公孫𢎞之譖仲舒汲黯是也故曰誣善之人其辭游人之心未有無所主者所主者義乎攻之者愈衆而主之者愈堅所主者不義乎外必周爲之防而内必深窒其隙幸而遇庸人雖欲攻之莫知所以攻之者不幸而遇智者先得其隙而入之逆奪其防而據之則一語而折夷之之見孟子是也故曰失其守者其辭屈西山真氏曰緘黙不言者有似乎寡敷陳無隱者亦近乎多聽言者苟不察焉則懷姦者得吉士之名盡忠者入躁人之目豈不誤哉右第十二章言得乾坤易簡之理則辭變象占之理無不知也周易集說卷三十五
