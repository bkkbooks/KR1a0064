body:
  text: 周易集説卷一宋俞琰撰上經一周代名易書名猶周書題周以别於夏殷也易有二義變易也交易也變易者陽變隂隂變陽也交易者陽交隂隂交陽也觀先天圖可見經即篇也孔子稱乾坤之䇿曰二篇則經字乃後人所加吕東萊謂經分上下必始於文王郭白雲謂序卦已分其來尚矣皆不言分經之由邵康節曰重卦之象不易者八反易者二十八故卦有六十四而用止乎二百一十有六知此則知經之所以分上下者蓋有由焉非茍然也或疑上經卦三十下經卦三十四多寡不均殊不知卦有對體有覆體何謂覆體屯倒轉為蒙需倒轉為訟之類是也何謂對體乾坤坎離頤大過中孚小過相對而不可覆者是也餘皆一卦倒轉為兩卦故上經卦三十約之則十八下經卦三十四約之亦十八謂之不均可乎卦分內外二體凡六十四陽六十四隂約為三十六則上經純陽卦六純隂卦四下經純陽卦四純隂卦六隂陽相重之卦上下經皆八不亦均乎上經陽爻八十六隂爻九十四約為十八則五十二陽五十六隂共一百八下經陽爻一百六隂爻九十八約為十八則五十六陽五十二隂亦一百八其均如此孔穎達謂繫辭分上下無異義直以簡帙重大是以分之朝以道乃曰古者竹簡重大分經為二篇今又何必以二篇成帙蓋皆不知六十四卦約之則為兩十八也乾下乾上乾元亨利貞乾健也畫竒屬陽而體剛故其性健此卦乾下乾上而六畫之竒純乎陽剛健之至也元大也亨通也利宜也貞正而固也其占為始雖大通又宜固守以正然後可保其終蓋不可恃其至健而妄動也初九潛龍勿用初即一之異名卦畫自下而上故以一為初一言初則六為終六言上則一為下互文相通也九陽數潛藏也龍大而靈變之物以象乾六爻之變也勿禁止之辭用謂動而施為初九在下乾之下陽氣潛藏故其象為潛龍潛則隱而未見故其占為君子勿用九二見龍在田利見大人田地上也龍之出見而在田猶君子出仕而在位也大人有大德之人也九二在下乾之中乃陽氣發見於地上之時故其象為見龍在田其占為利見在下之大人見龍之見音現利見之見如字九三君子終日乾乾夕惕若厲無咎六爻皆君子也此爻居天田之間正當人位故特稱君子以發之在下乾之終故曰終日下乾終而上乾繼之故曰乾乾夕日之過中也惕懼也若助語九三處重乾之交而自強不息又因日之過中省察自己之不中而兢兢焉故其象如此厲危而不安也咎譴責也夫以九居三剛而不中居下之上乃危地也其占何以無咎曰君子終日乾乾至於日之夕而猶惕懼故雖危厲亦無咎也夕惕若為句厲無咎為句九四或躍在淵無咎或疑辭謂其在兩乾之間而或上或下也淵深水龍之所居也九四亦剛而不中者也離地而躍於人之上能無咎乎所以無咎者躍而在淵處卑而不犯上也乾六爻雖皆君德以位言則唯五為君餘皆臣也九四爻剛位柔以臣近君以淵近天故其象占如此九五飛龍在天利見大人九五君位之至尊猶天之不可階而升也故其象為龍之飛而在天其占為利見在上之大人上九亢龍有悔亢口浪反極甚之為亢上九過中而居乾終六陽之窮故其象為亢龍悔懊恨也有過則有悔上九位髙而不知退動極而不知止故其占曰有悔用九見羣龍無首吉筮法陽數窮於九隂數窮於六窮則必變乾爻用九坤爻用六蓋取其變也見如字見羣龍無首為句乾為首乾六爻皆九則變而為坤是為羣龍無首之象吉善也占者見此象而處後則善不可為首也剛太過則折非善道也故上九亢龍有悔六陽變為六隂則剛而能柔吉之道也故用九見羣龍無首吉坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉坤順也畫偶屬隂而體柔故其性順此卦坤下坤上而六畫之偶純乎隂柔順之至也坤順乾之健故其占亦為元亨北地馬羣每十牝隨一牡而行不入它羣是為牝馬之貞坤道以隂從陽其貞如牝馬之從牡則利故曰利牝馬之貞易中凡稱君子皆指占者而言有攸往謂有所行也坤從乾而行先乎乾則迷而失道後乎乾則得乾為主而利故曰君子有攸往先迷後得主利朋坤類也西南坤之本方兊離巽皆坤類是為得朋出而從乾則東北震艮坎非坤類是為喪朋君子之出處隨寓能安一是皆以貞自持蓋無往而不吉故曰西南得朋東北喪朋安貞吉初六履霜堅冰至六隂數霜隂氣之始凝也坤初而言履霜堅冰至以象小人惡迹始雖甚微如霜之在地盛而與君子為敵則如冰之堅固也至謂馴致其道必至於此極也六二直方大不習無不利以六居二得坤道之正又在坤道之中正則無私無曲中則無偏無黨是以執直而不回執方而不移也易以陽為大隂為小六二隂小而稱大何也曰從乾也從乾而行則大也習與書太甲篇習與性成之習同不習謂六二中正不與初六不中不正之朋相習為不善也擇善而得所從則不疑其所行故無不利六三含章可貞或從王事無成有終以六居三隂中有陽故曰含章謂其有美而不露於外也可貞謂當其可而貞非純乎固執也或疑辭謂非必也從王事謂從乾君之事坤道固宜靜而有守或有王事則動而從之弗違也無成謂持美以歸於君不居其成功也有終謂職分居此則當終其勞也六三爻柔位剛而在下體之終故其象占如此六四括囊無咎無譽咎致罪譽致疑唯能謹密如囊口之結括則無咎無譽六四爻位俱柔而近六五故其象占如此六五黃裳元吉黃中色裳下服坤之從乾猶裳之承衣也六五柔順而得中降尊而處卑故其象如此其占為大善之吉坤六爻皆臣道坤之六五其位雖君其道則臣故不言黃衣而言黃裳蓋唯黃裳則元吉不黃裳則大凶上六龍戰于野其血玄黃上六居坤終六隂之窮隂盛而與陽對敵故其象為龍之戰鬬野外也在外卦之外故言野血傷也玄黃者隂陽之雜也戰而兩敗俱傷故曰其血玄黃用六利永貞筮法體七八而用九六者七八少不變九六老則變也坤六爻俱六則變而為乾本體蓋隂柔也以其隂柔之動或失於邪故戒之曰利永貞永久也震下坎上屯元亨利貞勿用有攸往利建侯屯張倫反此卦下震上坎震動也坎險也動而遇險則其動艱難而未能遽通屯之義也處屯之時不動則不能出險動則可以大亨然動乎險中則宜固守以正故其占曰元亨利貞蓋總上下二體而言處屯之道也勿用有攸往指上體之坎謂坎險在前不可遽往也利建侯指下體之震謂宜建立侯國之君也初九磐桓利居貞利建侯磐大石也與漸六二之磐同桓柱也禮記檀弓篇所謂桓楹是也橫渠張子曰磐桓猶言柱石或以磐桓為盤旋徘徊之義誤矣居不動也初九震體好動故戒之曰磐桓利居貞震為長子以剛德處下為成卦之主而有濟屯之才故以彖辭利建侯屬之此爻凡兩言利當分為兩説春秋左氏傳云孔成子遇此占以示史朝史朝對曰各以所利蓋居貞自是居貞之利建侯自是建侯之利不可紐為一説也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字邅張連反難行不進之貌乘當依項平菴按陸德明釋文作繩證反四馬曰乘班分布貌與春秋左氏傳班荆之班同如助語六二雖是震體之動然非動之主况其才柔弱豈能濟屯所以屯如邅如乘馬班如者待初九之動而後動也五坎體之盜故言寇與二正應則匪寇矣乃婚媾也六二隂柔故稱女子曲禮云女子許嫁笄而字字以代名也今曰女子貞不字者以初九近而見逼故未可字也十年乃字者十年之後初既求四為婚媾則彼自得偶無復見逼然後可以字也婚媾而十年乃字此亦屯道艱難而未能遽通之義夫屯如邅如乘馬班如自是一説匪寇婚媾女子貞不字十年乃字又自是一説易中多有一爻而取兩象者皆當分為兩説混而為一則鑿矣六三即鹿無虞惟入于林中君子幾不如舍往吝即就也鹿指五無虞謂無應也書舜典云咨益汝作朕虞孔安國云掌山澤之官周禮有山虞鄭玄云虞度也度知山林之大小及所生者幾音機近也舍武夜反止也幾謂時位至于六三則當盡其才力不可不及也舍謂職分終于六三則又當量其才力不可過也吝恨惜也六三才柔而志剛蓋欲往濟九五之屯而上無應援猶即鹿而無虞人引導故雖入于林中不若止而弗往往則俱陷徒恨惜也君子指占者而言三居下體震動之極而互艮止故其象占如此惟當作雖與豐初九雖旬無咎之雖同六四乘馬班如求婚媾往吉無不利六四言乘馬班如是亦有志於濟屯而其才不逮者也初來求四四往應初得婚媾之正故吉而無不利九五屯其膏小貞吉大貞凶九五正陷於坎險之中而膏澤不下於民故其象為屯其膏處屯之時與常時不同唯能退託不明而以謙小自守則吉若以尊大自居固執而不知變則凶故其占曰小貞吉大貞凶上六乘馬班如泣血漣如二比初四應初俱言乘馬班如蓋皆待其動而後動也上與初非應非比亦言乘馬班如何所待而然耶曰上與三四皆有濟屯之志而無其才者也既不能自動而又居屯之窮唯有憂懼而泣血漣如故其象如此其占不言凶者時勢使然非其罪也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙與書伊訓蒙士之蒙同內險而不自安外止而不能動蒙之義也亨以下占辭也九二以剛德居中能啓羣隂之蒙故蒙有亨通之道焉我指二童蒙指五五君也蒙之主也乃主二而稱我何也曰五在六十四卦中乃定位之主二在蒙乃成卦之主蓋一時得權者也曲禮云禮聞來學不聞往教蒙六五以柔德居中虛已以求二非二往求於五故曰匪我求童蒙童蒙求我筮者揲蓍叩神以決疑也初筮指九二再三指上九告如字三去聲瀆與少儀毋瀆神之瀆同不告與詩小旻我龜既厭不我告猶之義同初筮則其志専一故告再三則煩瀆故不告蓋童蒙之求師與人之求神其道一也貞正也二五皆不正故戒之曰利貞初六發蒙利用刑人用説桎梏以往吝發蒙教之於初也教之弗聽則刑之宜也若不施鞭撲遽説其桎梏縱之使往必待其罪大惡極而後擊之雖恨惜亦無及矣説音脫桎梏刑具此爻凡兩言用善用之則利不善用之則吝也九二包蒙吉納婦吉子克家此爻凡兩言吉包蒙之吉謂包初六在下者之蒙也納婦之吉謂納六三近比之隂柔也九二剛得中而無過故為包蒙納婦皆吉以剛處內而上與六五之柔相應故又為子克家之象克家能治其家也六三勿用取女見金夫不有躬無攸利取音娶金夫指九二之剛六三隂柔不正不中不可取也捨上九之應而近唯九二之從此女子見金夫而不有其躬者也其象如此故其占為無攸利六四困蒙吝六四與九二上九相逺困而不學是可恨惜也純乎隂柔而乘應亦皆隂柔故其象占如此六五童蒙吉蒙之六五以隂柔之小而居尊位此童蒙之君也能下求九二剛陽之助故吉上九擊蒙不利為寇利禦寇上九乃蒙極而怙終者也其罪當擊故曰擊蒙為當依王晦叔作去聲與論語為衛君乎之為同寇指六三坎體之盜上九而下與之應則不利處乎上而拒之則利故曰不利為寇利禦寇乾下坎上需有孚光亨貞吉利涉大川需待也乾健而遇坎險則未能上進需之義也需以五為成卦之主爻有孚光亨貞吉皆指五孚信也九五與九二同德相信是為有孚陽明而光故亨固守以正而不妄動故吉坎水之險在前乾以剛健臨之而又能需則不至乎陷溺故其象占為利涉大川初九需于郊利用恆無咎爾雅云邑外謂之郊郊乃近邑之地也易以中爻為邑初上為郊初近二故言郊恆久也需于郊雖去坎水逺亦不宜輕動故其占為利用恆然後可以無咎九二需于沙小有言終吉沙與泥相連則稍近坎水之險矣需于此雖小有言語之相侵然九二剛而得中不急於進故亦終吉九三需于泥致寇至泥比沙則逼於坎水之險矣九三過剛不中非能需者也故致寇至六四需于血出自穴血傷也三陽自下而進四當避之需于此而不避必見傷矣六四純乎柔順者也故能釋位而去以聽三陽之進則彼自來我自出兩無傷也穴乃隂虛之地六四隂爻之虛故言穴九五需于酒食貞吉酒食者需客之具所以待三陽之來也唯能固守以正而不亂則吉故曰需于酒食貞吉五為需主故以彖辭貞吉屬之上六入于穴有不速之客三人來敬之終吉上六需極故不言需隂爻之虛故其象亦為穴倒轉為訟則穴在下故曰入于穴三陽皆進而在上非己所召有不速之客三人來之象詩伐木云以速諸父鄭玄云速召也需既極矣故三客不待召而自來柔不可以敵剛寡不可以敵衆故戒之曰敬之終吉周易集説卷一
