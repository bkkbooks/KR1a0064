body:
  text: 周易集説卷十宋俞琰撰下經五兊下兊上兊亨利貞兊説也兩剛在下而一柔見于外有和説之色見于面之象以兊遇兊則上下皆和説有亨通之道焉然説之不以道則流入於邪佞故戒之曰利貞初九和兊吉初九剛正而處卑謙和而不妄説所比者九二剛中之君子則其説也和而不流故吉九二孚兊吉悔亡九二切比六三之小人本當有悔然剛而得中能下與初九同德相孚則其説也以道故吉而悔亡六三來兊凶六三隂柔不中不正犯分而妄説者也以九二不與之比乃來致九四以為説來與豐六五來章之來同彼以上而致下故吉此以下而致上故凶九四商兊未寧介疾有喜商度也未寧未定也九四上承九五下比六三故不能決而商度所説未之定以九居四爻剛位柔半動半靜故其象如此介如地之疆介各有分限不可侵越也人有節守亦謂之介與豫六二介于石之介相似疾指六三之柔邪四雖與三相近然三居下體四居上體各分上下非若豫六二與初六六三同體也四也介然自守不與之比則三雖柔邪安能為吾疾害如此則四之從五也專而有君臣相説之喜也九五孚于剝有厲剝謂隂剝陽小人害君子也上六隂柔小人處説之極妄説以剝陽者也九五與之同體而相孚則有危厲必矣諸爻稱兊五獨不稱兊五君也君道當威嚴尊重不可妄説也上六引兊上六兊之主爻居兊之終説極則可以已矣九五引之遂恣其所説而不已與萃六五引吉之引同彼引於上此引於下也坎下巽上渙亨王假有廟利涉大川利貞渙者水之融液而流散也與詩溱洧方渙渙兮之渙同箋云仲春之時冰以釋水則渙渙然渙之為卦下坎水之流上巽風之散有巽風解凍而渙然冰釋之象坎為險為加憂人之氣憂則結喜則散結則如冰之凝沍散則如水之泮渙憂患渙散而亨通故曰渙亨假大也渙之時憂患既散天下無事王者乃大立宗廟以奉祖考之祭祀故曰王假有廟人之所信服者唯鬼神為甚王者有定居則有廟所以收天下之心係天下之望也坎水大川也巽木以為舟楫故利涉貞者君子之常況處渙之時乎是宜固守以正也初六用拯馬壯吉拯救也馬壯指九二馬者人之所託遇險難而託以壯馬則無不濟矣初雖無應能變而通之用拯救之道以自拔於險難中而得壯馬馳驟以速行是以轉凶而為吉處渙之初陷于坎險之底而憂患猶未散故其象占如此而不言渙九二渙奔其機悔亡機尊者所慿之物渙之時九五尊居正位在下者所賴以為安是為機之象九二奔而從之去危而就安也夫以九居二又陷於險何以悔亡蓋剛而得中互震則有動而出險之道不至於困窮是以悔亡六三渙其躬無悔三居坎體之上險將脫而憂患散矣雖與初六同體而同在險中同受憂患然欲自脫其身而逃則它不暇顧故曰渙其躬夫六三不中不正而所為如此豈能無悔蓋居渙之時它爻皆無應獨三有應于上三能求援而出離乎險故無悔六四渙其羣元吉渙有丘匪夷所思隂柔本在下之物今也上同於五則不與在下二隂為黨矣既不應初又不比三是離散其羣也如此則吉之最大而盡善者也故曰渙其羣元吉丘小山六四自謂也夷亦指初與三初唯知順承九二而已三則志在外四也又能散其所有而上與五同蓋其所思在公而非初與三所能及也故曰渙有丘匪夷所思羣以其衆言夷以其等類言九五渙汗其大號渙王居無咎散人之疾而使之愈者汗也散天下之難而使之安者號令也汗心液也國家有大號令當出于人君之心而周浹乎四海猶汗出于人之心而周浹乎四體王居謂王者所居之位彖言王假有廟此言王居蓋相發也難既散而王假有廟則王有定居矣九五之位王位也王者居之則無咎居之者非行王道則不稱其位不能無咎也王居上多一渙字觀爻傳可見上九渙其血去逖出無咎血指六三之傷害也坎為血六三坎體血也去逖出三字疑羡當依爻傳作渙其血上居渙終去坎甚逺而無傷害故其象為渙其血其占曰無咎渙諸爻唯三與上應然三可以應上上不可以應三何則易爻凡在險中者貴乎出險在險外者戒乎入險三在險而欲脫險必賴剛陽之援故不可不應上上而下應于三則又入于坎而有傷害矣能無咎乎兊下坎上節亨苦節不可貞節乃渙之倒體以兌下坎上取義坎水凝沍于下得巽風而流散是為渙坎水流動于上得兊澤而砥定故為節節者約也有限而止之之謂非但訓止也澤上有水平則瀦滿則泄是澤有常限而不可過所以謂之節人之於事酌其深淺制其長短得中而無過為有定限而不至於失節則其道可通行于世故曰節亨節之過則為吝嗇非通行之道也聖人又恐其以苦節為常固執而不知變故戒之曰苦節不可貞初九不出户庭無咎户庭户內之庭也户指九二竒畫庭初自謂也在上雖有六四之應而九二塞於其前故不出也初九以剛正自守而謹畏如此故無咎九二不出門庭凶門庭門內之庭也門指六三偶畫庭二自謂也初不出二亦不出初無咎而二凶何也初為幾事未成之時雖言語亦不可妄出況户庭乎是以不出則無咎至二則可以出矣當出而不出則凶夫不出門庭不失為謹願之士亦何至乎凶蓋當出不出則上之人疑其叛巳烏得不出出處之節各有攸當故九二與初九凶咎不同六三不節若則嗟若無咎六三隂柔不中當節而不節則説極而悲至矣故曰不節若則嗟若嗟者自知其過而悲嘆也若語辭如是而曰無咎者聖人喜其能悔過而又開其遷善之門也爻辭釋之曰不節之嗟又誰咎也蓋發明文王言外之意謂六三自取其咎無尤於人也六四安節亨六三失位而處兊澤之極是乃溢而不節六四當位而順承九五之君故為安節安者順而無所勉強之謂安分守節以輔成其君之甘節故亨九五甘節吉往有尚甘乃五行之中味書洪範土爰稼穡稼穡作甘是也禮之用和為貴節得其中則和和則人皆甘之吉之道也九五制節之主也中正以通無往不可蓋不傷財不害民往則有功而可嘉尚也上六苦節貞凶悔亡居節之極儉不中禮故曰苦節甘與苦中與不中而已矣節而苦唯可施於己不可施於人固執以為常則凶也即凶矣何以悔亡蓋禮奢寧儉節雖苦不猶愈於縱欲而至於敗度敗禮者乎戒之以凶以其過於中也許之以悔亡以其正也兊下巽上中孚豚魚吉利涉大川利貞中孚謂信之由衷信不由衷非中孚也中孚之為卦下兊説上巽順在下者説以向上在上者巽以向下而二隂兩兩相向于其間此中孚之象也剛居二五信存于中此中孚之義也豚魚江豚也兊為澤巽為風澤上之風來必有兆江豚出而吹浪乃澤上有風之兆人之行事信如豚魚則吉也兊澤亦大川也巽木為舟楫動於兊澤之上故其象占又曰利涉大川中孚之道宜固守以正而不變故又戒之曰利貞初九虞吉有它不燕居中孚之初乃與人結交之始也初應四而比二從二乎從四乎能虞度其所從而不失其正則吉故曰虞吉它指九二中孚之道出乎誠心相與今既與六四為正應則雖近有九二之相比而其志亦不變也若其志變捨正而適它背四而從二則不誠矣豈中孚利貞之道哉燕安也有它不燕謂有它則志不定也金君卿曰燕當為變字之誤也九二鳴鶴在隂其子和之我有好爵吾與爾靡之鶴澤鳥二隂位三與二同是兊體二鳴而三和之故曰鳴鶴在隂其子和之二有好爵而與三共之此皆出于中心之相孚也好爵謂其位得中靡與縻同爾指三吾我九二自謂也三乃兊之主爻二稱吾我而呼三為爾易道崇陽而抑隂貴中而賤不中也六三得敵或鼓或罷或泣或歌敵匹敵也六三與六四兩隂相並而成匹故曰得敵與艮敵應之敵同彼以應言此以比言也中孚之道近乎誠誠則一今六三本與上九相應又近附六四是其心之二而不一也既與上應又欲比四中無所主而動止悲喜皆不常故曰或鼓或罷或泣或歌罷如字以六居三爻柔位剛半動半靜而又不中不正故其象如此六四月幾望馬匹亡無咎六四之隂在上而下與初九之陽正應其德柔順而不自滿假如月之將望故曰月幾望匹並也古者駕車用四馬不能用純馬則兩服兩驂各一色又小大必相稱故兩馬為匹六三六四同德而又相並是為馬匹三與四比自以為得敵四守正而不與三比則馬匹亡矣六四近君之正人也當中孚利貞之時與不正之人相比能無咎乎絶去之則無咎也九五有孚攣如無咎有孚攣如謂近與六四同體而相孚也與小畜九五同為中孚之主當化及萬邦而萬邦作孚不當專取六四之近臣今若此豈能無咎然而六四亦正人也誠心相與皆以其正何咎之有上九翰音登于天貞凶翰音羽蟲曲禮云雞曰翰音雞之鳴必先振其羽如詩七月云莎雞振羽皆翰音之類也翰音不能登天乃欲效鳴鶴之登天徒自勞耳上九窮而不知變固執而自信如此凶之道也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉過者事之過常也陽大隂小四隂過於二陽是為小過小者雖過而二五當權用事者皆得其中不至於過甚則亦有亨道焉蓋時當小過不容不稍有所過過所以矯一時之失而求就其中也然小者之過似非常分要當固守以正若徒欲隨時而茍通則害事悖理故戒之曰利貞可小事指二五不可大事指三四處小過之時可過者小事而已大事則不可過也飛鳥遺之音謂過之不逺也小過繼中孚之後中孚肖離離有飛鳥之象變為小過則肖坎坎見離伏見坎不見離則鳥已飛過但聞其遺音也隂本在下之物唯宜居下若居上則僭非所宜也為卦震上艮下唯可過於止不可過於動故曰不宜上宜下夫小過以柔過剛義不當大吉但二五以柔得中故小事粗吉三凶四厲初上又以不得中而凶未見其為吉之大也大字疑衍初六飛鳥以凶彖辭言不宜上宜下彖傳釋之曰上逆而下順也今初六以柔處下其道順也而言凶何耶以其上應於四則逆也夫以六居初不中不正之小人奚足以任大事乃不安艮止之分而妄徼震動之舉如小鳥髙飛力盡必墮以此致凶救止莫及故曰飛鳥以凶六二過其祖遇其妣不及其君遇其臣無咎祖指九四妣指六五妣者母沒之稱既沒矣何以謂之遇遇也者母雖沒祭則母子之精神相接于祖廟中也妣乃已之所自出蓋其思慕之心又親于祖故曰過其祖遇其妣遇妣而過於祖此母子之私恩也雖過之君子不以為過也遇臣則不可過於其君故曰不及其君遇其臣君指五臣指初初居二下故為臣也彖言可小事不可大事不宜上宜下而六二柔順中正不為過甚故其象如此其占無咎九三弗過防之從或戕之凶小過之時隂衆而陽寡隂過於陽陽弗能過於隂也九三雖剛豈能敵上六之柔故曰弗過弗過則當思所以為之防故曰防之既防之矣又曰從或戕之何也謂衆隂用事之時君子不幸處羣小之中與上六小人為應君子於此唯當止而防之不可往從之也從之則禍自外至必遭或者殘害之凶也或戕之指五五與三非正應故稱或戕殘也書梓材云無胥戕詩十月之交云曰豫不戕皆訓殘九四無咎弗過遇之往厲必戒勿用永貞九四剛失位而不中曷能無咎蓋當不可大事之時剛而居柔非過剛而敢為大事者也故無咎卦名小過謂小者過大者不過故九三九四皆曰弗過九四與初六為正應而隂陽相遇故曰遇之遇者不期而自會乃出於不意往則自此而往彼蓋有不容己者今既與之遇則其勢又不可不往往與小人交危厲之道也故往厲既知其往厲則必須戒備故曰必戒既知其往厲必戒則不可任其事故又戒之曰勿用既勿用矣終身以正道固守而不變可也故又勉之曰永貞此爻皆以兩字為句六三密雲不雨自我西郊公弋取彼在穴密雲不雨自我西郊其象與小畜同小畜以小畜大而諸陽不為六四用小過則以小過大而二陽不為六五用也易中大事稱王小事稱公小過之六五可小事不可大事故不稱王而稱公弋小器僅可射近非逺到之物取彼在穴此亦可小事不可大事之謂隂爻之虛為穴在穴謂九三九四兩陽爻在六二六五兩隂爻之間也六五雖隂乃小過之君故稱我自隂言之既以西郊隂方為我故以陽為彼上六弗遇過之飛鳥離之凶是謂災眚上六之隂與九三之陽正應本相遇也而三以上為小人遂為之防而不肯相從上亦不肯以禮下之故曰弗遇上處小過之極超乎六爻之上故曰過之彖辭言不宜上而上乃震動之體動極而忘返如飛鳥離于矰繳不亦凶乎是天災也亦人眚也故曰飛鳥離之凶是謂災眚離與詩新臺鴻則離之之離同上六過甚而不中故其象占如此離下坎上既濟亨小利貞初吉終亂濟渡也書説命若濟巨川亦訓渡既濟已濟也為卦下離火上坎水水火相交而致用則既濟者事之已成也亨小當依紫陽朱子作小亨六二之柔爻為卦主是以僅能小亨時雖既濟唯能以正道固守則利故戒之曰利貞初吉謂離明在內思患而豫防之則吉也終亂謂坎難在外正而無變通之道則亂也初九曳其輪濡其尾無咎曳拖也與睽六三見輿曳之曳同曳輪而尾濡用力之甚也古者舟車皆用以濟衛國風氓詩云淇水湯湯漸車帷裳蓋用車也輪指四曳之者初也初九爻位皆剛有濟險之才上與四應四猶在險中初也竭力救之輪雖曳而不敗尾雖濡而不溺何咎之有六二婦喪其茀勿逐七日得婦六二本爻自謂茀指初爾雅云輿革前謂之鞎後謂之茀竹前謂之禦後謂之蔽詩碩人之翟茀載驅采芭韓奕之簟茀皆是也初往應四則二喪其茀矣而曰勿逐七日得何哉四方陷於重險中雖與初應何暇顧初初之往也勢亦不容久留必當復還也初復還則二之所喪將復得雖不追逐可也所以戒之曰勿逐七日得者六二以中道自守又何患乎喪若急往追逐則失其所守之正也其義與震六二同九三髙宗伐鬼方三年克之小人勿用髙宗武丁廟號商家中興之賢王也髙宗征伐之事於詩殷武見之伐鬼方則經傳皆未之見大雅蕩詩云覃及鬼方注云鬼方逺方也九三以剛居剛正當二體之間有髙宗中興而征伐之象三與上應上六隂爻逺而在險鬼方之象也三至上凡歷三爻故曰三年克之小人得此占則勿宜變動而用事故曰小人勿用六四繻有衣袽終日戒繻程子朱子皆依王弼作濡衣袽衣之緼也繻有衣袽所以防滲濕也有之為言有備則無患不至乎旋求而無之之窘也戒備也六四才位俱柔心小而慮事細密故能終日為之戒備九五東鄰殺牛不如西鄰之禴祭實受其福東鄰指二二離體離正南而鄰於東也西鄰五自謂五坎體坎正北而鄰於西也離之隂爻為牛坎之陽爻為水禴祭以水雖不如殺牛之盛然九五以陽實居中其心誠實有以感格乎鬼神而祭則受福彼六二之祭雖盛蓋不如九五以誠實而受福也上六濡其首厲卦以在下為尾在上為首上六至既濟之終已出坎水之上矣下應九三則又沒入于坎水之中豈不危厲或謂既濟倒轉為未濟則首反向下而濡濕危厲孰甚焉其説亦通坎下離上未濟亨小狐汔濟濡其尾無攸利未濟謂事之未成它日必成今則未也為卦坎下離上二者各不相交是未濟之象也濟之名由坎而得既濟坎在上而難在五亨之者二也故既濟之亨主二未濟坎在下而難在二亨之者五也故未濟之亨主五陽大隂小六五隂爻而隂性多疑故以為小狐汔幾也與井卦之汔同井到九二然後得水汔至謂自上而下幾及乎九二而猶未至也未濟到上九然後脫險汔濟謂自內而外幾及乎上九而猶未濟也狐之渡水其尾必揭用力蓋在尾今小狐汔濟而濡其尾弱而不能用力又安能濟故其占為無攸利初六濡其尾吝既濟初九既登岸矣雖濡其尾又誰咎之未濟初六方將涉險而尾即濡是其志雖急於濟而其才柔弱不能濟也豈不可羞吝乎九二曳其輪貞吉輪九二自謂曳之者六五也貞吉謂九二處未濟之時以陽居隂其位不當唯以正道自守以待上之人曳之而後行則吉蓋不可妄動也夫曳其輪一也既濟初九僅無咎未濟九二乃吉初不中而二中也六三未濟征凶利涉大川居下坎之上似亦濟矣而又有互坎在前蓋亦未濟也六三位不當征行且凶況涉大川乎紫陽朱子曰利字上當有不字九四貞吉悔亡震用伐鬼方三年有賞于大國以九居四其位不當故戒之曰貞吉悔亡蓋妄動則有悔貞則吉而其悔亡也鬼方指初震用伐鬼方者震動而使之驚畏也詩時邁云薄言震之莫不震疊與此震同自四至初凡歷三爻故曰三年三年之久厥亦勞矣功成有賞故封以大國也六五貞吉無悔君子之光有孚吉五與二四皆當權用事者也在未濟之時能以正道固守則吉故三爻皆戒之以貞吉六五所以無悔者柔得中而無用剛之悔也光謂六五文明之德著見也不曰天子之光而曰君子之光謂承乘應皆剛陽君子相助以為明也有孚吉謂五與衆陽相孚是以吉也上九有孚于飲酒無咎濡其首有孚失是此爻凡兩言有孚當分為兩説不可渾而為一也有孚于飲酒謂所乘有六五之孚也濡其首有孚謂所應有六三之孚也上居未濟之極極則濟矣六五飲之以酒是天下無事而君臣宴樂何咎之有故曰有孚于飲酒無咎卦之上為首濡之者三也卦至上則已脫重坎之險矣不必與三應也與三應則又沒入於坎水中豈不濡其首乎失是謂失六五六五近而在是而上又下孚于三則近失五也故曰濡其首有孚失是周易集説卷十
