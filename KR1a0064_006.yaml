body:
  text: 周易集說卷六宋俞琰撰下經一艮下兊上咸亨利貞取女吉咸有交相感之義為卦下艮上兊柔上而剛下山澤二氣相通男女二情相合内正外說感則必應蓋不患其不通特患其不正耳故曰咸亨利貞艮以少男下於兊之少女得婚禮之正故其象占又為取女吉取音娶初六咸其拇拇當作􅡑虞翻曰足大指也初六艮體之止居下體之下而與九四相感是不能止而欲動者也故曰咸其拇所感未深而足猶未移故不言吉凶六二咸其腓凶居吉腓脛肉也二居下體股足之間故其象為腓六二與九五正應非戒其不得相感但陰當從陽不可躁而先動耳動則失艮止之本體而凶故曰咸其腓凶居而安汝止以待上之人感而後應則吉故曰居吉九三咸其股執其隨徃吝股髀也三居二之上猶股居腓之上隨謂二隨三猶腓之隨股也艮六二言腓兼言隨皆指本爻咸九三言隨則指六二六二腓也蓋隨股者也且夫初應四二應五皆以柔應剛尚欲其知止而不動况九三剛陽為艮之主爻而與上六正應是宜以主自持詎冝躁動哉今乃執其所隨者而與之俱徃不唯失艮體之止又失其為主之道則其徃也豈不自取羞吝乎九四貞吉悔亡憧憧往來朋從爾思四兊體以說感初躁動而不正本亦有悔今曰貞吉悔亡蓋勉之也四居股上脢下又當三陽之中心之象也不言咸其心咸感之道不可以容心也言憧憧又言思責其容心而任私也憧憧徃來謂以私心相感而不定也朋指初六之私應朋從爾思謂私心如此則從其所思者唯初六不正之朋也所感者狹非感之主故爾之九五咸其脢无悔脢心之上口之下也下不為四之憧憧上不為上之頰舌无思无言而以至誠感人何悔之有上六咸其輔頰舌上六感人以言故曰咸其輔輔頷也頰舌當自為句說終感極故不能不費其頰舌㢲下震上恒亨无咎利貞利有攸徃恒乆也剛上而柔下男外而女内恒乆之道也此卦下㢲上震㢲而後動是以亨且无咎然動而過於㢲則又不冝故戒之曰利貞㢲而動於外何所徃而不利故勉之曰利有攸徃初六浚恒貞凶无攸利浚深也與詩小弁莫浚匪泉之浚同初六㢲體之柔而在下卦之底其性務入有深入之象隂柔不正處恒之初而遽求深又固執而不知變凶之道也施之它事皆无所利故其象為浚恒其占曰貞凶无攸利九二悔亡九二剛而不正本當有悔然其處恒也得中而无過為則悔亡矣故爻辭更无它語但曰悔亡九三不恒其徳或承之羞貞吝㢲為進退其究為躁三居㢲體之極躁進躁退此不恒其徳者也承指在下之九二非其應故言或九三不恒其徳而九二羞與為伍故曰或承之羞九三本剛正之人若固執而不改則亦可惜故又曰貞吝九四田无禽易以陽畫之實為有隂畫之虚為无師六五言田有禽九二之陽應之也恒九四之應乃初六之隂故曰田无禽乆非其位雖乆无益猶畋獵而无所獲也六五恒其徳貞婦人吉夫子凶九三不恒其徳剛而不中也六五恒其徳柔而中也然以柔順固執乆而不變是妾婦之道非夫子所冝故曰恒其徳貞婦人吉夫子凶夫六五以柔順之道下應九二之剛在它卦則未為失在恒則不可故不以君道言君道貴剛不可以柔順為恒也上六振恒凶振如振書振鐸振衣蓋抖擻連動之意上六以震體之極處恒之終輕動如此故其象占為振恒凶艮下乾上遯亨小利貞遯退避也與書微子行遯之遯同二隂在下雖微其勢浸長陽當退避故為遯君子處此能退避小人而逺去則其身雖窮其道不屈是以亨也小指二隂小利貞戒二隂不可以已之勢浸長而遂侵逼於陽也初六遯尾厲勿用有攸徃爻以上為首下為尾初在下猶之大軍前遯而我以單騎進逼其後不亦危乎故曰遯尾厲勿用有攸徃初六艮體之止故其象占如此六二執之用黄牛之革莫之勝說六二艮體之止又中正柔順非進逼於陽者也執之謂挽留九三使不遯也陽遯而隂執之故此爻不言遯黄中色牛順畜革柔而堅靱之物二留三甚堅故曰執之用黄牛之革說吐活反即脫字也六二挽留九三如此堅固九三雖剛亦莫之勝豈能脫身而去或曰勝羡文蓋因漸九五而誤九三係遯有疾厲畜臣妾吉係遯有疾厲謂九三亦艮體之止欲遯而不能遯遂為六二隂柔所係如有疾病纒綿而不安也畜臣妾吉謂以此私係之情畜養臣妾則吉也畜許六反九四好遯君子吉小人否好呼報反四與初應君子雖與小人情好相合義茍當遯則絶之而去故曰好遯君子吉謂君子如是則吉小人否謂小人反是也否方有反九五嘉遯貞吉九四剛而不正其逺小人也以情九五剛而中正其逺小人也以禮此好遯嘉遯之别也貞吉謂得此占者能以貞道自守則吉也九五不以君位言蓋遯非人君之事也上九肥遯无不利上九乾體剛健下无係應遯而无疾故曰肥遯去二隂甚逺不憂小人之害故无不利乾下震上大壯利貞易以陽為大四陽盛長故曰大壯乾三陽之剛在下又加以震一陽動於上不亦壯乎若逞其强壯以无道行之是乃血氣之壯非君子之所謂壯也故彖辭无他語但戒之曰利貞初九壯于趾征凶有孚初在下為趾以剛居剛壯于進者也在下而壯于進其凶必矣上无正應不若退處于下則有九二同徳之相孚故于征凶之後繼之曰有孚九二貞吉彖言大壯利貞戒其不可用壯也九二雖不正然以剛居柔壯而得中故爻辭不言壯但戒之曰貞吉九三小人用壯君子用罔貞厲羝羊觸藩羸其角小人愚而好自用故逞其血氣之壯君子則无是也故曰小人用壯君子用罔九三爻位俱剛又當乾健之極若自任其壯固執而不改則亦危矣故以貞厲戒之羝羊牡羊也羸與纍通羊性很而喜觸壯羊尤甚恃其角之壯不顧可否而進遂罣其角於藩籬而不能脫君子而用壯如是則與羝羊无異矣藩指四九四貞吉悔亡藩決不羸壯于大輿之輹九四震體之動而又不正豈能无悔然爻剛位柔不極其壯故因占設戒曰貞吉悔亡三以九四之剛在前如藩籬之障而不能進故觸而受羸四以六五之柔在前不拒其來如藩籬剖破而无俟乎觸故不羸曰藩決不羸而不及羊承九三之辭也輹車下横縛大輿指五輹四自謂四在五下而承五猶輹之輔輿也輹壯則才力足以承輿故曰壯于大輿之輹它爻言壯而不及大九四為大壯成卦之主爻故以大言之六五䘮羊于易无悔羊指九四之剛非六五之柔所能制是以在其畔而亡去易王肅音亦畔也與埸通陸續亦以為疆埸之埸夫剛過而用壯則有悔六五非用壯者也故无悔上六羝羊觸藩不能退不能遂无攸利艱則吉九三言羝羊觸藩九三自謂也此言羝羊觸藩指九三也何以見之上六隂柔其象不可以為羝也退謂應三三觸藩羸角上欲下為之援而其才柔弱故不能也遂專也四為壯主上雖欲自專亦不能也得此占者雖无所利若處以艱難而不敢慢易則亦吉也坤下離上晉康侯用錫馬藩庶晝日三接晉進也康當作亨郭京云王弼舊本作晉亨此卦下坤上離順而麗乎大明故亨錫如師錫錫貢下錫上也古者上與下下與上通謂之錫侯用錫馬蕃庶諸侯朝王之禮也晝日三接王接諸侯之禮也諸侯進獻于王而其物既大且多所以表其順也王接諸侯于晝以訪問之時所以昭其明也三釋文作息暫反初六晉如摧如貞吉罔孚裕无咎初與四應初方進而四在上止抑之而使之退處于下故曰晉如摧如摧罪雷反抑也釋文云退也二與已比又同體冝若相孚者而以我見摧於四不我孚也故曰罔孚初蓋不特見摧于四又不見信于二所以吉且无咎者貞與裕也占者弗獲于上蓋唯守貞則吉設不為朋友所信亦當處以寛裕則无咎六二晉如愁如貞吉受兹介福于其王母愁狀由反釋文云鄭𤣥作子小反云變色貌六二將欲上進而九四媢疾以惡之故曰晉如愁如四雖惡之二也能以貞道自守而不求倖進故吉王母隂之尊指六五也介福大福也大明之主在上四豈能阻二之進二進則五接之故受福六三衆允悔亡允信也從也三居二隂之上二隂皆順從之以其能相引而與之俱進也若不顧其下冒然獨進則衆怨歸之能无悔乎居非其位本當有悔衆允之是以悔亡也不言晉者以九四阻于前未能遽進也九四晉如鼫䑕貞厲鼫䑕螻蛄也俗呼為土狗非詩之碩䑕也詩之碩鼠乃大鼠也與此不同孔氏正義按蔡邕勸學篇云鼫䑕五能不成一伎術注云能飛不能過屋能縁不能窮木能遊不能渡谷能穴不能掩身能走不能先人本草經云螻蛄一名鼫䑕謂此也荀子勸學篇作梧䑕崔豹古今註作鼫䑕傳寫之訛爾六五大明之君在上而九四突然而來猶鼫䑕見火而飛撲必遭爇也晉之時衆皆以柔進四獨以剛進故其象如此而占曰貞厲謂固執而不改則危也六五悔亡失得勿恤徃吉无不利六五以隂居陽冝有悔矣以大明之徳在至尊之位而下皆順從是以悔亡失謂三隂上進而為四所阻也得謂三隂之志皆欲上行終必從巳也勿恤不必憂慮也五居離體之中燭理甚明行有不得則反求諸己而巳矣得失不計也持此以徃則動罔不吉又何不利之有六五晉之主也不言晉者雖居尊位而柔順謙虛不敢自以為進也上九晉其角維用伐邑厲吉无咎貞吝上居晉終故不言晉如而直言晉角剛而居上之物維交結也與随上六之維同剛進之極而更无可進故返而與五相維而用以治其私邑邑指四上之應在三而九四以剛據其上固不容不伐然而兵凶器也能以危厲為戒斯可吉而无咎若肆其剛暴固執而不知變則太剛必折遂有可羞吝者矣晉貴柔而惡剛故九四上九皆言厲離下坤上明夷利艱貞夷有二義以天道言之滅也明入地中滅而不見也以人事言之傷也闇君在上明者必見傷也其占為昏闇之時處以艱守以貞則利不可輕易妄動也初九明夷于飛垂其翼君子于行三日不食有攸徃主人有言居明夷之初不敢髙飛遂垂斂其翼以向下此見機之明不待難作而蚤避者也初與四應四將弃其家而出門庭初之行蓋與四俱也三日不食謂急於逃難而不遑食也有攸徃應四也主人指二二蓋内卦之主爻也主人有言謂主人驚怪其去而責之也夫知幾而蚤去此君子獨見主人固不識也豈得无咎六二明夷夷于左股用拯馬壯吉初雖艱于飛尚可以行二則進而居大臣之位故傷其左股而艱于行夫人手足之用以右為便今雖傷其左股亦未甚切用以拯救之其唯馬壯乎馬壯則行健去速也凡乘車者馬在前今六二前有九三之剛賴其拯救以速行此亦轉凶為吉之道也九三明夷于南狩得其大首不可疾貞嵗終畋獵曰狩大首大物之首也時維明夷而能獵于南方離明之地則其所得者大也不可疾自為句貞自為句九三以剛居剛又互震體之動故戒之曰不可疾剛而正則非為邪也故又勉之曰貞六四入于左腹獲明夷之心于出門庭六四雖在近君之地入而无用猶居隱僻之地故曰入于左腹得意于逺去故曰獲明夷之心于出門庭六五箕子之明夷利貞居明夷之時不晦其明則立被禍害不守其正則又非賢明故其象為箕子之明夷其占曰利貞箕子當依蜀才作其子蓋其子即箕子也不敢顯稱箕子之名遂微其辭而曰其子孔子逆知文王之意乃于彖傳顯言其為箕子後人因彖傳稱箕子遂併爻辭其字加竹作箕文王本文蓋即是其子非箕子也其子指六二之應六二在内為明夷之主之子也鼎初六言其子指九四亦是應爻係辭傳云易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危文王之辭危蓋于此爻見之矣上六不明晦初登于天後入于地五為明夷之主處其下者明必見傷故在下諸爻皆言明夷上獨處其外而不見傷故不言明夷不明晦者所見不明而自取其晦也當此之時幸而獨處于外髙飛逺舉不被矰繳之害猶登天然今乃下與三應是所見不明而深入于地也豈非自取其晦耶離下㢲上家人利女貞家人一家之人也齊家之道冝先正乎内故曰利女貞卦唯六二六四兩柔爻雖皆以柔徳居正而所謂利女貞者指六二故爻辭獨六二曰貞吉蓋相𤼵也初九閑有家悔亡閑防也家之在下者最難防初九剛而不中不能无悔所以悔亡者離體而有先見之明能防閑于有家之始也六二无攸遂在中饋貞吉遂專也婦人无專制之義故曰无攸遂在閨門之内唯酒食是議故曰在中饋六二柔順中正女之正位乎内者也故其象如此其占曰貞吉九三家人嗃嗃悔厲吉婦子嘻嘻終吝嗃嗃當依劉向作熇熇大雅板詩云多將熇熇說文云火熱也九三以剛居剛又離之極太嚴太察剛明皆不得其中一家之人如被火氣熏灼而焦熬之甚无乃過乎三能悔而改其過則雖厲亦吉否則婦子嘻嘻終有羞吝者以婦指六二子指初九九三熇熇于上則二與初不能不嘻嘻于下也嘻嘻如詩之噫嘻禮之嘻其甚矣皆歎懼之辭六四富家大吉六四陰虚而承乘應皆陽實是上下内外皆富實而六四起家而居有之也四㢲體居得其位而以㢲順之道保有其富是以大吉九五王假有家勿恤吉假當依馬融作古雅反訓大有家之有與書夙夜浚明有家亮采有邦之有同恤憂也王假有家而勿恤尚大也其義與豐彖辭王假之勿憂同何謂尚大存大體舉大綱不屑屑然小節之拘也王者以天下為家當以天下為公盖不可徇私意而惟家之恤也九五以剛健中正為尊家人之嚴君也六二以柔順中正處下此九五之家相也九五有如此之家相則其勿恤而吉也可知矣上九有孚威如終吉上九與九五同德相孚故曰有孚以剛居柔威而不猛故曰威如家人之終乃家道既成之時平日以誠信待人家人皆熟見而深信之又能以端莊臨下家人皆畏而愛之身愈脩家愈齊是以終吉兌下離上睽小事吉睽乖異也火上澤下其性相違中女少女其志不同睽之象也所以小事吉者内說而外明六五柔為卦主而下應九二之剛也初九悔亡喪馬勿逐自復見惡人无咎處睽之初剛動于下本有悔也何以悔亡蓋當人情睽乖之際而兩窮相遇自然以類相合合則悔亡也馬指四始焉為五所乘不與初合是為喪馬逮夫五與二應則四无所從不得不與初合是不待追逐而自來復也惡人亦指四以九居四剛而不中不正惡人也見惡人而避之彼必驚訝是速其咎也見而以正色待之彼亦无所用其惡又何咎初九才剛體說剛則自守者堅說則不拒絶人故其象占如此九二遇主于巷无咎遇不期而會也主一卦之主六五是也五雖應二然當睽乖之時非有期於應故其象為遇主于巷不遇于正直寛大之途而遇于委曲隘陋之巷二五皆失位也得此占者不可直道而行當宛轉將就以求通而不至于枉己屈道則亦无咎六三見輿曳其牛掣其人天且劓无初有終輿所以載而行牛所以行是輿也三欲應上而承乘皆剛故其輿在後為二所曳其牛在前為四所掣其人上傷于四内傷于二是為見輿曳其牛掣其人天且劓天字當依胡安定朱紫陽作而與耐同而者髠其首存其鬢者也篆文而與天相類故訛為天劓截其鼻也見與乾用九之見同蓋指占者而言得此占而見此象者其初睽乖而不合故曰无初睽乆必合而九六之應終當相遇故曰有終九四睽孤遇元夫交孚厲无咎四與初處睽乖之時而並无應初不言睽孤而四言睽孤何也曰在下而剛介獨立不過窮居无援而已乃士之常也在上而剛介獨立則失其輔助非處上之道也元夫指初九未遇則彼此无應既遇則彼得所依此得所助是以交孚夫當睽乖之時旣失位又无應孤立于上危厲為甚今與同德者相交而彼此相孚則雖危无咎矣元夫猶言善士六五悔亡厥宗噬膚徃何咎卦名睽而爻辭之義則欲其合不合則有悔合則悔亡初曰悔亡初見四而四與之交孚則睽者合也五亦曰悔亡五徃二而二與之遇則亦睽者合也易以同體而居先者為宗同人之二與初同體故以初為宗睽之五與四同體故以四為宗膚指六三之柔噬之者四也五與二應其情本自相合所以不合者六三間之也四旣噬而去其間則五之徃也何咎上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪宼婚媾徃遇雨則吉四曰睽孤无應于下也上有應而亦曰睽孤盖剛明之極猜很太甚人情乖離其勢孤立于上也見六三牽輿之牛疑其為背負泥塗之豕此乃以潔為汚也見六三載人之輿疑其為載鬼之車此乃以无為有也先張之弧以三為㓂而射之疑之甚也後說之弧知三匪㓂而弗射疑稍釋也上與三九六相應陰陽相配婚媾也睽極必合疑乆必釋乃知其非㓂而實親也羣疑既釋徃與三遇則陰陽和洽而為雨故吉說音脫三互坤體之盗故言宼周易集說卷六
