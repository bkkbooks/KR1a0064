body:
  text: 周易集說卷二十五宋俞琰撰爻𫝊六小子之厲義無咎也居漸進之初而上應無援此固丈夫之所安而幼稚之子處此則以為危厲畏謹如此宜其無咎也飲食衎衎不素飽也素飽猶詩伐檀素餐注云素空也德不稱其祿位是謂尸位素餐今六二以中正之德居中正之位則非尸位素餐而徒飽者也夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也醜類也九三本乾體與上二陽同類是羣醜也今捨二陽而居下故曰夫征不復離羣醜也離去聲女以漸而歸四與三以近比而茍合失其漸進之道故曰婦孕不育失其道也在下二隂皆坤畫順也順則其情相親有寇難則相與保護故曰利用禦寇順相保也順釋利字與蒙上九爻傳相似或得其桷順以巽也求安之道茍能順所遇之時而處之以卑巽何所處而不安秀巖李氏曰此爻乃所以成巽者故云終莫之勝吉得所願也二五以中正相配始雖有間之者終必相合但其合有漸耳終得遂其室家之願也其羽可用為儀吉不可亂也鴻之飛長幼有序雖疾風不亂用其羽而為儀則亦不可亂也歸妹以娣以恆也跛能履吉相承也以恆者歸妹用娣以其廣繼嗣而為恆久之道也相承者佐其嫡以相與奉承其夫也恆也之上無以字嵩山朝氏曰孟氏京氏無此以字利幽人之貞未變常也屯六二曰反常謂字乃女子之常不字則非常至十年之後而乃字則反復返其常也此曰未變常謂嫁者女子之常今九二不願嫁似乎變常然能以幽靜自守是亦女德之常未為變常也歸妹以須未當也從嫁當以娣姪以須則未當也秀巖李氏曰當作平聲叶韻愆期之志有待而行也爻辭言愆期而爻𫝊直述其志以見愆期在我而不茍從人蓋有待而行非為人所棄也行謂出嫁詩泉水云女子有行是也帝乙歸妹不如其娣之袂良也其位在中以貴行也六五位在上卦之中以尊貴而行中道則服飾之美不至於過也夫以帝妹下嫁於諸侯服飾雖過美亦無害然而古之人尚德不尚飾務內不務外豈以服飾外觀之美為美哉郭京曰上句舉經不當有也字上六無實承虛筐也上六以位言上六隂虛無實則六三所承乃虛筐也六三亦無實而特言上六蓋其失在上三不足責也雖旬無咎過旬災也彖辭云宜日中爻辭云雖旬無咎皆勉之使中者爻𫝊云過旬災則戒其不可過也文王唯恐其不及孔子則又恐其過蓋與彖𫝊天地之日月說同或疑不釋往有尚蓋過旬而不往則災往則有尚其義一也有孚發若信以發志也爻云發若𫝊乃云發志志蓋五之志也在心為志五居中故言志以其昭昭使人昭昭則六二可以發六五之志也然信而後諫未信則以為謗已故必待上之人與吾相信然後可以發其志而撤去其蔽故曰有孚發若信以發志也信釋孚字蛟峰方氏曰君雖障蔽至誠未有不動也豐其沛不可大事也折其右肱終不可用也九三剛而不中故不可以當大事其應在上而上六乃柔暗之人則九三雖有剛明之才亦不可輔之而成大事也或曰不可大事蓋釋日中見沫謂其所見者微小故不能成大事也人之股肱用事者必居其右折則不可復續今既折矣雖欲見用終不可得也終不可用與剝上九同蓋絶辭也豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也二四皆豐其蔀而此言位不當者六二中正九四蓋不中不正而自致之也二四皆日中見斗而此言幽不明者二處離明之中此在離明之外其居使之然也郭京曰遇其夷主吉志行也今本脫志字蓋九四之志將以有為者也而處位不當又遭不明之時非得剛明者為之助則不能以有為也今也上有六五之相遇下有初九之相資此九四之志所以得行也徂徠石氏曰四雖幽晦而遇夷主是以志行而吉蓋祖郭京之說六五之吉有慶也六五以位言慶者幸而相喜賀之辭以六居五柔暗之君也下無剛陽之應又為上六所蔽本不能致吉幸得九四為之輔而獲吉故曰六五之吉有慶也豐其屋天際翔也窺其户閴其無人自藏也上六豐大其屋如翬斯飛翔于天際可謂極其壯麗矣抑孰知豐極則變而為旅豈能久處耶窺其户閴其無人非果無人也有其人而不能下求之爾有如九三剛明之人與已為正應乃使之埋光鏟彩於下其蔽之也是誰之過歟蓋上六自藏之也孟子云不祥之實蔽賢者當之然則豐之上六其凶實自為之非由乎人也旅瑣瑣志窮災也初之災孔子不悲其時之窮但言其志窮何也以其自取之也得童僕貞終無尤也在旅得童僕之代勞而不至困乏又能以正道固守何尤之有故曰得童僕貞終無尤也童僕指初貞則六二自謂若以為得童僕之貞則初六豈貞良者哉旅焚其次亦以傷矣以旅與下其義喪也過剛非處旅之所宜也過剛而其次被焚亦既傷矣與下之道復如此義當喪也上言在上指本爻為上此言與下指初六為下三與上皆剛而不中故上以焚言此以喪言蓋各舉其一以相發也節初齊氏曰亦以傷鄱陽胡氏作亦已傷謂已見傷於上而復不改以待下也旅于處未得位也得其資斧心未快也大抵未得位則在人之下其才未得伸其志未得行况處旅乎旅之四與初皆在人之下者也初六艮體柔而止四與初位處上卦之下其為人也髙明不以得利為喜故其心不快君子之志蓋在乎得位行道雖兼金乘馬之饋亦未足快于其心豈但資斧終以譽命上逮也逮及也上逮者上及乎尊位也故有譽命如九四之未得位則安得譽命上釋終字節齊蔡氏曰上謂上爻終以譽命及五以旅在上其義焚也喪牛于易終莫之聞也易中凡稱卦名皆言其所遇之時凡曰在上皆言其所處之位以旅之時而其位在人之上自髙如此人必怒其僣而害之宜乎其遭焚故曰其義焚也剛亢絶物况又無應則其喪牛于易也竟無一人告之故曰終莫之聞也或曰喪牛于易一作喪牛之凶進退志疑也利武人之貞志治也初承二而應四而重巽之卦剛柔皆無正應初也從四乎從二乎是以無所決擇而其志疑惑若能如武人之貞以自斷其承上之心而順從九二之剛則其志治而不亂矣夫志一也且疑且治何也爻柔故志疑位剛故志治紛若之吉得中也不言用史巫三字蓋省辭也得中謂事神之禮冝如此亦非過為也二居下卦之中故言得中頻巽之吝志窮也九三過剛豈巽順者哉窮而後巽非其本志也田獲三品有功也為大臣者當謙恭下士以收拾天下之人才如巽之六四可為有功矣有功謂田獵而有獲也九五之吉位正中也大抵巽不可過甚况人君乎故以九五兩字表而出之謂九五之所以吉者其位正得其中也巽在牀下上窮也喪其資斧正乎凶也居上而過於巽窮而不知變者也固執而凶則其凶正當然也非自外來也紫陽朱子曰正乎凶言必凶和兊之吉行未疑也人有貮心則疑九四之商兊是也初九在兊之初唯知近比於九二則其所行蓋未疑也孚兊之吉信志也二與初同德相信其志蓋在初而不在三也二剛中有守决不妄說于三故曰孚兊之吉信志也來兊之凶位不當也位不當明六三位不正也乾正位在九五坤正位在六二震以初九離以六二艮以九三巽以六四坎以九五兊以上六或以六三為重兊之主非也九四之喜有慶也九四以位言慶幸之之辭九四居此位能截斷六三不使之為害蓋幸而有此喜故曰九四之喜有慶也孚于剝位正當也兊正秋之卦初為孟秋中為仲秋末為季秋重卦則以初二為孟三四為仲五上為季孟秋七月屬否仲秋八月屬觀季秋九月屬剝兊之九五正當剝之六五故曰位正當也當平聲平菴項氏曰位正當也言雖兊爻正當剝位也履夬二卦皆成于乾兊故履之九五稱夬亦曰位正當也言其在履而當夬位也中孚九五有孚攣如即用小畜九五之辭故亦曰位正當也言巽體居上四五以正相孚皆與小畜相當也否九五大人吉亦曰位正當也言此爻正當乾卦九五大人之位也易中言位正當凡四爻皆兼取兩卦相當之義此外得位之爻或稱正或稱當無兼稱者上六引兊未光也上六以位言以六居上得說之正是兊之正位也乃俯從所引為說而不已未足多也又何光焉初六之吉順也隂當從陽初六之所以吉者以其位處下而能順承九二之剛也鄭亨仲曰陽資隂則逆隂資陽則順明夷之六二渙之初六其所資者皆九也故兩卦皆以順為言渙奔其機得願也居渙之時猶在險難之中望五之機奔就之則其所願得矣渙其躬志在外也外謂上也三將脫身于險而與上相應志蓋在外渙其羣元吉光大也六四隂爻安得光大正從九五之陽是以光大王居無咎正位也以九居五王位之正也位釋居字伊川程子曰能如五之為則居尊位為稱而無咎也渙其血逺害也上與三相應三曰志在外此曰逺害何也為小人謀則欲其親君子而從善為君子謀則欲其棄小人而逺害也害釋血字不出户庭知通塞也爻辭云不出户庭無咎孔子恐占者泥于不出之說遂于爻𫝊明之曰不出户庭知通塞也謂處節之初雖當慎守而不出户庭又必知時之通塞也通則行塞則止義當出則出矣而初則塞而未可出也橫渠張子曰見塞于九二故不出不出門庭凶失時極也當其可之謂時九二之出維其時矣其出也不早不後正當其中今也當出而不出則失時之極也不節之嗟又誰咎也不節之嗟咎將誰執當自思其過可也平菴項氏曰又誰咎也凡三同人之初九以為褒辭解之六二以為貶辭節之六三王弼從解沙隨程迥從同人安世謂三辭皆無褒貶但言人當自謹而已出門同人我所當擇致寇之端我所當省不節之嗟我所當慮得失由巳皆無所歸咎也雖與他爻無咎小異然亦得補過之方于本義無悖也觀需九三自我致寇敬慎不敗也則解之自我致戎又誰咎也亦教以自反非必貶辭也安節之亨承上道也上謂九五也六四之所以安節亨者蓋能奉承九五中正之道而行之也甘節之吉居位中也節貴乎中中則無過無不及當節而不節則六三有不節之嗟過于節則上六有苦節之凶惟九五甘節而吉者蓋居位之中當位以節無過無不及也苦節貞凶其道窮也節而得中則可以通行過則其道窮矣洓水司馬公曰其道窮也者謂其道不可通行於世也初九虞吉志未變也彖辭云利貞謂中孚之道當固守以正也今以九居初正也正則其志專一而與四相應蓋未變也家人之初九亦言志未變皆示人以慎始之道也其子和之中心願也真誠相孚此中心所願也平菴項氏曰中心願甚言其孚故泰之六四不戒以孚亦曰中心願也或鼓或罷位不當也六三居不當位心無所主故或鼓或罷而不定若初九則不如是也馬匹亡絶類上也絶釋亡字類釋匹字上指六四謂六四絶六三之類于上也伯玉毛氏曰馬匹亡者隂之絶類而從陽者也坤以喪朋為吉中孚以絶類為無咎節初齊氏曰絶類上謂其逺絶六三之匹類乎上也或云絶類以從上或云絶類以自上皆有增字釋經之嫌不若以上為六四而云六四之絶其類乎上為得孔子釋匹字之意且於六三得敵可以互發有孚攣如位正當也小畜之九五云有孚攣如中孚之九五亦云有孚攣如小畜以六四為全卦之主中孚則以六四為上卦之主中孚之九五正當小畜之九五其位同故其辭亦同詳見兊九五爻𫝊解當平聲翰音登于天何可長也翰音而欲效澤鳥之長鳴吾見其力盡而不能繼又何可長也橫渠張子曰上九處中孚之窮不久將變而為小過之初六故小過初六之爻辭曰飛鳥以凶飛鳥以凶不可如何也處小過之時可下不可上可止不可動初六不安分處下是燕雀而欲為鴻鵠之髙飛豈所宜哉以此而凶則其凶不可免吾末如之何也已矣不及其君臣不可過也遇妣而過其祖此小過也遇臣而過其君謂之小過可乎蓋遇妣可過于祖遇臣則不可過于君故在祖言過在君言不及不及其君謂人臣之分不可過也從或戕之凶如何也被戕害而曰凶如何蓋甚言其必凶也不釋防之者以其不能防也能防則不為其戕害也弗過遇之位不當也往厲必戒終不可長也位不當謂九四剛失位而不中也當小人過而亨之時為君子者宜以禮待遇小人蓋逢此之時居此之位不容不然故曰弗過遇之位不當也不得已而往則其往也不可以久處故曰往厲必戒終不可長也密雲不雨已上也已上謂隂過于陽也隂陽和則雨今也隂過于陽豈能成雨乎紫陽朱子曰已上太髙也弗遇過之已亢也六五曰已上謂其已過也上六又過甚故曰已亢曳其輪義無咎也初九與六四為正應在既濟之初恐六四之復陷也竭力以挽其輪輪雖敗其義亦無咎况不敗乎七日得以中道也失而復得以六二能以中道自守也三年克之憊也憊者勞苦而疲困也敵强曰克三年之久然後克之則老師費財其憊可知也終日戒有所疑也懲熱羮者吹冷虀今六四在既濟之時而復涉險難能無疑乎所以為之防者故疑其又有後患也東鄰殺牛不如西鄰之時也實受其福吉大來也祭在時不在豐禴祭蓋時祭也時祭雖薄明神所饗是以吉太來也時字蓋釋禴字虛齊趙氏曰曰實曰大曰福曰吉皆坎中之陽也濡其首厲何可久也既濟之終變為未濟蓋為久也平菴項氏曰上六居濟之終而復陷于險如病愈之後復遇病其能久乎濡其尾亦不知極也人之才力有限不可强也在未濟之初早已濡其尾尾濡則不能舉豈能濟乎兹蓋不度其才力之所至而冒然驟進不得其中者也故曰濡其尾亦不知極也極之義與節九二失時極同亦字承既濟上六濡其首而言極與正叶猶坤之發與大叶家之實與順叶蓋魯音之叶如此不必改極為敬以叶正亦不必改正為直以叶極也九二貞吉中以行正也以九居二而其位不正故以貞吉戒之然以剛德居中而無過為則其所行亦正也九二在他卦為不正在未濟之時以剛居柔蓋得為下之正者也未濟征凶位不當也六爻皆位不當而獨於六三曰位不當以六三才弱而處下體之上也貞吉悔亡志行也爻以六三為未濟則九四其濟矣乎九四已脫下卦之險為近君之大臣是以其志行也君子之光其暉吉也暉者日旁之光故周禮視祲以十暈為十輝今曰君子之光其暉吉也則不獨為六五之吉與之比者皆吉也飲酒濡首亦不知節也爻辭既兩言有孚而分飲酒濡首為二事則爻𫝊所謂飲酒濡首亦當分為二事諸說皆以飲酒濡首渾為一說未之詳玩爾飲酒蓋謂孚于六五則足以止矣濡首謂又孚于六三則不知止焉故曰飲酒濡首亦不知節也周易集說卷二十五
