body:
  text: 周易集說卷二十宋俞琰撰爻𫝊一爻𫝊者孔子釋文王爻辭而𫝊述其意也初九濳龍勿用此爻辭也文王之所作也濳龍勿用陽在下也此爻𫝊也孔子之所述也古易爻𫝊自為一篇不以附經自費氏以此解經而鄭𤣥傳費氏之學始移附各卦經文之後猶未若王弼以之分附於諸爻之下也弼更以象辭置於爻辭之前又於象辭之首并爻𫝊之首皆冠以象曰二字於是後人以象辭為大象爻辭為小象而爻𫝊則謂之象𫝊其謬甚矣夫象辭云天行健君子以自强不息不過如斯而已矣安有所謂大小哉所以有大象小象之稱者蓋妄認爻辭亦以為象辭故也既妄認爻辭以為象辭故又妄稱爻𫝊以為象𫝊也嗚呼爻𫝊不謂之爻𫝊而謂之象𫝊自漢以來列易於學官専置博士而世無一人為之辨何邪古易始變亂於費直次變亂於鄭𤣥大變亂於王弼遂使六爻之意皆不連屬且如坤六三以時發也以發字作去聲與大字害字叶又如蒙六四獨逺實也以實字作去聲與巽字順字叶又如未濟初六亦不知極也以極字作去聲與正字叶皆魯音也至今東原之人皆以入聲字作去聲如瀆為豆識為志曲逆為去遇之類是也若從王弼以爻𫝊分綴於各爻之下非但不是其韻叶又上下文前後相承之義亦泯而不見矣愚故用古易爻𫝊例並不以附經而自為一篇庶幾六爻連屬而文意不間斷云濳龍勿用陽在下也乾初九爻辭云濳龍勿用孔子釋之曰陽在下者九陽爻而在初之下位也紫陽朱子曰陽謂九下謂濳見龍在田德施普也以九居二則出濳離隱而其德及物矣故曰見龍在田德施普也中而不偏故所施周普施去聲始豉反終日乾乾反復道也反復道者反而復諸道也反復並如字廣平游氏曰反復冝與復卦之反復同或讀反復為翻覆非也夫易道貴中過中非道也三居下乾之終於時為夕已云過中矣君子因其時而惕乃反求諸身省察其不善以復其善故曰終日乾乾反復道也或疑爻𫝊每只舉上一句而不及下文何也曰反復道即釋夕惕若厲無咎之義雖不舉下文而下文之義在其中矣或躍在淵進無咎也四居上乾之下則其位近五矣進而干分犯義則不能無咎進而恪守臣位則非干分犯義者也乾九四之進如此是以無咎飛龍在天大人造也二五均大人也二止言德施普五乃言大人造以眀九五乃乾之主爻有大人之德又有大人之位施為造作其功用與天同也大人釋龍字造釋飛字亢龍有悔盈不可久也上九所以有悔者盈也天道惡盈惟中可久盈不可久也盈釋亢字不可久謂有悔用九天德不可為首也彖𫝊云首出庶物此乃云不可為首何也曰用九蓋言乾六爻之變也變則與不變異矣九雖天德今既變而為坤則不可為首非謂乾不可為首也若謂乾不可為首則萬物何所資始而又誰為之首乎履霜堅冰隂始凝也馴致其道至堅冰也孔子釋乾初九曰陽在下釋坤初六曰隂始凝也以眀三百八十四爻凡九皆乾之陽凡六皆坤之隂而乾九坤六所以為易之緼也霜隂之始凝也冰隂之大凝也始者未甚凝馴致其道則因循日久以漸而積必至於大凝也馴音循謂順習也二若順初而與之同惡相習則其禍可勝言哉所喜者六二有所守而不習則初六之惡無相濟者矣按魏志許芝云初六履霜隂始凝也郭京易舉正云今本於霜字下誤增堅冰二字審如是則王弼時猶未差誤王弼後始差誤爾紫陽朱子曰當從魏志或曰爻辭云堅冰至要其終而言爻𫝊云至堅冰原其始而言六二之動直以方也不習無不利地道光也陽動隂靜六二隂爻而言動者從乾陽而動也六二以位言諸爻唯六二中正而其德直方雖在羣小之中唯知從乾陽之大而不為羣小所移是以其道光眀夫地道屬隂為幽為暗安得光所以光者從乾而動他爻不言地六二獨言地以見六二乃坤卦之主爻也或疑孔子釋此爻止言直方而不及大殊不知動即大坤隂之靜固小從乾陽而動則大也含章可貞以時發也或從王事知光大也時釋可字發去聲叶大字韻詩四月飄風發發之發亦與害字叶以時發者當其時之可而發也可貞則貞可發則發唯其時而已知音智坤隂本不光大今曰知光大者以其從王也從王即從乾之謂也六三其知矣乎見六二從乾遂亦從乾此其所以光大也伊川程子曰只舉上句解義則并下文他卦皆然括囊無咎慎不害也六三半剛半柔半動半靜故稱其知六四純柔全不動故稱其慎乾之時剛正之君在上四也進則無咎不幸處坤之時切近六五四也慎則不害各隨其時也爻辭言無咎無譽爻𫝊止言無咎當此時在此位得無責咎幸矣何稱譽之云慎釋括囊不害釋無咎黃裳元吉文在中也六五以隂柔之爻居陽剛之位而剛柔相雜是以謂之文也文與中皆釋黃字在中謂在上體之中也龍戰于野其道窮也鳥窮則啄獸窮則攫隂窮則與陽戰此必然之道也用六永貞以大終也坤體本小變為乾則其用大故曰以大終也雖磐桓志行正也以貴下賤大得民也爻辭曰磐桓利居貞爻𫝊乃曰志行正何其相反也曰勉之使行以經綸天下之屯也初九以剛陽之爻居陽剛之位正也所居既正故其所行亦正是以身雖磐桓志則上行而與六四相應也然則磐桓非不動也不輕動耳故曰雖磐桓志行正也蓋因爻之所已言而發其所未言也易以陽為貴隂為賤初九陽畫而在六二隂畫之下故曰以貴下賤衆隂皆順之故曰大得民大凡位之處下者皆當謙小况在屯難之時乎今也以貴下賤而大得民是宜建之為侯也六二之難乘剛也十年乃字反常也爻𫝊凡稱本爻之名皆以本爻所居之位言今曰六二之難乘剛也蓋謂六二之所以屯如邅如者以隂柔而乘初九剛陽之上也難字釋屯如邅如之義凡爻以剛乘柔則順以柔乘剛則逆逆則其情乖而不相得此屯之六二所以有屯如邅如之難也男子生而願為之有室女子生而願為之有家人倫之常也今女子貞而不字則非人倫之常矣至於十年之久而乃字則從其人倫之常故曰反常安定胡氏曰此爻施於人事猶君子守正専應不妄所從也即鹿無虞以從禽也君子舍之往吝窮也郭京曰何以從禽也今本脫何字從禽謂畋獵也古者畋獵必有虞人引導今即鹿而無虞人則何以從禽况乎坎險在前往則遇險豈不自取困窮乎是以君子止而弗往弗往則不至於困窮也曲禮云猩猩能言不離禽獸安定胡氏曰凡飛走可擒獲者皆謂之禽周禮云羔豚犢麋雉鴈謂之六禽龜山楊氏曰獸亦禽也求而往明也求而後往在我彼求而我往則其往也可以為明矣如不待其招而往則是不知去就之義謂之明可乎六二不近為初九所逼故爻辭稱其貞六四雖與初九正應必待其求而後往故爻𫝊稱其明龜山楊氏曰待求而後往非擇義之明疇克爾屯其膏施未光也施去聲釋膏字九五陽明之德為二隂所掩故未光曰未光則猶望其光也伊川程子曰此人君之屯也泣血漣如何可長也屯極如此而不知變故曰何可長也和靖尹氏曰否上九陽剛故能傾否此以上六隂柔不足以濟屯而皆曰何可長也意不同而言各有當也秀巖李氏曰何可長也凡四言之此爻與豫之上六中孚之上九皆戒之之意若否之上九則幸之之辭也利用刑人以正法也用刑雖非聖人之本心而國之有法不可不正若使有罪者皆漏網而去法安在哉法釋刑字子克家剛柔接也子雖克家不可以獨任其剛必剛柔相接乃可今二五剛柔相接而上下相應在朝廷則為君義臣行在家則為父慈子孝故曰子克家剛柔接也言子之所以成克家之功者以上下之情相接故也伊川程子曰茍非上下之情相接二雖剛中安能尸其事乎勿用取女行不順也陽倡而隂和男行而女隨順也女先求男於理為悖况又舍上九之正應以從九二故其行為不順困蒙之吝獨逺實也易以陽為實隂為虛初六六三近九二之陽六五應九二之陽而又近上九之陽獨六四與九二上九並不相近故曰獨逺實也不言實逺而言逺實蓋道不逺人人自遠於道耳紫陽朱子曰實叶韻去聲童蒙之吉順以巽也卦有九二上九兩剛爻六五仰而承上九順也俯而應六二巽也順則舍己從人樂取諸人以為善巽則其言可入人亦樂告之以善大扺童而蒙則心和氣平故順巽以聽人而人皆披肝瀝膽以忠言告之故吉長而蒙則心髙氣盛無復巽順以聽人則人皆箝口結舌而不敢進言凶禍之所必至也平菴項氏曰五本互坤為順動而交二則成巽利用禦寇上下順也節齊蔡氏曰剛上柔下故順愚謂處上而禦六三之寇則順處下而為六三之寇則不順矣今也上以剛禦柔下以柔從剛則上下皆順也需于郊不犯難行也利用恆無咎未失常也需于郊則去坎水甚逺不犯險難而行君子於此蓋居易以俟命不行險以僥幸也初九乾體乾乃剛健之物其道以上行為常今以險在前遂不敢冒險而進雖需之久亦未為失其常道也未失常釋無咎需于沙衍在中也雖小有言以吉終也衍平也寬也在中謂在下體之中也比之郊則去水稍近比之泥則去水尚逺居得其中故也固不至於陷溺然亦浸淫矣故未免六四有言語之相侵惟能寬綽厥心守中而無過為堅忍而不妄動則亦不及於險難而以吉終也需之時以近險為戒大近則大傷小近則小傷故三則致寇二則小有言需于泥災在外也自我致寇敬慎不敗也災害也易以上卦為外下卦為內需之坎險在上故曰災在外寇盜之至豈自至哉由九三才位俱剛進不顧前是以致之故曰自我致寇然居得其正而能以敬慎自持亦不至於有害故曰敬慎不敗需之時蓋有待而進非戒其不得進也要在相時而動不可不敬慎小心耳敬慎小心實轉凶為吉之道也解之六三亦致寇矣解之爻𫝊何以曰又誰咎曰解之災在內六三又不敬慎故也伊川程子曰災患難之通稱對眚而言則分也紫陽朱子曰發明占外之占聖人示人之意切矣需于血順以聽也柔固不可以敵剛况三陽之衆乎四能順以從時則三陽之進聽其自進不與之競也或曰三四乃乾坎之㑹三若恃健而不畏坎必敗故以敬慎告之四若據險而不畏乾必傷故以順聽告之酒食貞吉以中正也彖𫝊云以中正也但言其位此云以中正也則以德位並言五居君位無不中者特恐不正耳不正則昵比六四之隂而言路為六四蹇礙豈能下孚於三陽而使之進乎今九五所以吉者以其剛得中而又能守之以正也不速之客來敬之終吉雖不當位未大失也上六以隂柔之爻居隂柔之位謂之當位可也而曰不當位何也一說以當字作平聲謂不當主人之位也需以五為主則他爻皆客也上六雖不當主人之位然與人恭而有禮則亦未至於大失也一說以當字作去聲謂需極而成訟則乾升於上坎降居下上降為六三雖其位不當然以隂承陽則亦未大失也愚以噬嗑彖𫝊凖之則當字疑作去聲為是然他卦爻辭言位不當位正當又皆平聲則從平聲為長不永所事訟不可長也雖小有言其辨明也訟終凶豈可長久哉彖𫝊云訟不可成蓋言訟之通義而不欲其成爻𫝊云訟不可長蓋言初為訟端而不欲其長九二為興訟之主初六之所以辨者辨已不為九二之所挾也雖六三見疑而小有言語相傷然上有九四之應辨之則必明也辨與三辨也彼言而此辨也不克訟歸逋竄也自下訟上患至掇也不克訟而歸唯有逋而已矣竄釋逋字謂伏之深也下不可以訟上也自下訟上以卑亢尊能勝之乎不能勝也不能勝則禍患至矣禍患之至豈非自作弗靖以掇取之乎掇謂自取之速也食舊德從上吉也平菴項氏曰食舊德從上吉也此從字與從王事不同此謂從上六也愚謂九二訟上而患至六三從上而吉蓋下無訟上之理訟上者人情之所同惡從上者義理之所當然也訟之六三與上九剛柔相應雖近比九二而心則從上不為九二所挾此所以吉復即命渝安貞不失也迷而不復則非但不失且有害矣既復而即命渝而安貞則不失也訟元吉以中正也九五之所以訟元吉者以其中正也或曰九五乃聽訟之主書吕刑云咸庶中正則中正者聽訟之道也紫陽朱子曰中則聽不偏正則斷合理以訟受服亦不足敬也服命之寵聖王所以褒有德顯有功也上九以訟而受服斯亦不足敬也已南窗湯氏曰聖人謂不足敬蓋惡人之好訟也師出以律失律凶也失律釋否臧二字失律謂不和師出以和不和故凶在師中吉承天寵也王三錫命懷萬邦也好生惡殺天之心也不嗜殺人則天之所寵也九二剛中而有應於上在師中而無過是以自天祐之而獲吉故曰在師中吉承天寵也王者以止戈為武不以多殺為功九二能順承王命之不殺而招徠之俾四海之內聞盛德而皆來臣故曰王三錫命懷萬邦也如以王三錫戰功則天下被不仁之禍尚何懷萬邦之有潘謙之疑此為互文欲作在師中吉懷萬邦也王三錫命承天寵也紫陽朱子以為不當改師或輿尸大無功也師行而信任専一則大有功不然則大無功也或曰大指九二弟子輿尸則長子無功也左次無咎未失常也見可而進知難而退兵家之常也六四才力不足退而左次未為失常也未失常釋無咎與初九一意長子帥師以中行也弟子輿尸使不當也九二剛得中而無過為以之行師不亦宜乎如六三之隂柔不中而使之則不當矣使之者誰六五之君也或曰使字恐只是位字轉寫之訛耳蓋指六三也大君有命以正功也小人勿用必亂邦也正功謂有功必賞雖小人亦當賞之也亂邦謂小人得上則挾功以逞必生僭竊之禍也或曰書武成之終云列爵惟五分土惟三復云敦信明義崇德報功蓋小人有功武王亦必報之若崇德則小人勿用矣盡上六之義者其唯武王乎漢髙祖不知此義乃裂土以大賞戰功遂召韓彭英盧之亂光武鑒髙祖之失自定天下之後一例論功行封而用之於左右者鄧禹耿弇賈復數人而已如臧宫馬武之徒皆不與焉蓋亦知此義矣比之初六有他吉也比以所遇之時言初六以所處之位言比道貴先而以從五為吉孔子恐占者雖知諸爻皆當比五而不知初六所以比五之由故特表而出之曰比之初六有他吉也謂初六處比之時其位在下去九五最逺初之比五蓋因近比於二而得之也比之自內不自失也六三不中不正六二不可與之比也今也比五而不比三則以隂從陽而其所以自守也正又何失焉其義與坤六二不習否六二不亂羣同比之匪人不亦傷乎比匪其人則必為其所害故曰比之匪人不亦傷乎或曰上無正應近而二四皆不與之比則亦可以躬自悼矣外比于賢以從上也內有六三外有九五而六四介乎三五之間將誰之從是必擇其善者而從之可也四也外比於五豈非棄邪而親善捨下而從上者乎上釋外字平菴項氏曰賢上皆指五也以德言之為賢以位言之為上比之四應在下故謂五為上以别下也訟之三其應在上若就五則反下故以從上别五義各有當也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也九五顯比而所以吉者其位正居上卦之中也逆謂上六背五而去彖辭所謂後夫者是也順謂初二三嚮五而來彖辭所謂下順從者是也舍逆即去者不追之謂取順即來者不拒之謂伊川程子曰禮取不用命者乃是舍順取逆也順命而去者皆免矣比以向背而言謂去者為逆來者為順也故所失者前去之禽也諸說解逆順二字皆不然乃謂禮言畋獵之事以禽獸背已而去為順向已而來為逆而其面傷者弗以獻故前禽弗射而舍之彼所謂逆順皆祖王弼之說而與此相反此以理言彼則以勢言也亦不指何爻為前禽今以六畫之象觀之當依蔡節齊以上六為前禽上使中釋吉字謂九五在上以中使中所以吉也平菴項氏曰春秋傳服則舍之舍置也不必用上聲讀又曰使與師六五同師五使三不當故凶比五使二得中故吉比之無首無所終也比而有首則終有所託無首則終將若何紫陽朱子曰以上下言之則為無首以始終言之則為無終周易集說卷二十
