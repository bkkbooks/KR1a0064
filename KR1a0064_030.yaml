body:
  text: 周易集説卷三十宋俞琰撰繫辭上傳三天一地二天三地四天五地六天七地八天九地十此二十字韓康伯在夫易何為者也之上案班固律厯志在天數五地數五之上伊川程子曰宜在此紫陽朱子遂移在此章之首愚謂陽數竒故以一三五七九為天隂數偶故以二四六八十為地天地者隂陽對待之定體一至十則隂陽流行之次序以五行言之不過一二三四五蓋正數也六七八九十乃其配耳一屬水其位居北二屬火其位居南三屬木其位居東四屬金其位居西五屬土其位居中央以五加北方之一則為六加南方之二則為七加東方之三則為八加西方之四則為九復以四方之一二三四會而歸於中央則成十或曰自一至十天地之全數也五六居中天地之中數也以五十有五去其五餘得五十是為大衍之數以五十有五去其六餘得四十有九是為揲蓍之數虛齋趙氏曰天一生水位乎北地六成之地二生火位乎南天七成之天三生木位乎東地八成之地四生金位乎西天九成之天五生土位乎中央地十成之舊説以此為河圖或以為洛書皆無所據其實天地五行生成之數五位相得而各有合者此也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也天數五至行鬼神也四十四字韓康伯本置在再扐而後挂之下紫陽朱子移置在此愚謂天數五指一三五七九之五者皆陽也地數五指二四六八十之五者皆隂也氣有二而行有五二非五不能變化故天數有一三五七九地數有二四六八十五非二不能自行故一三五七九則為天二四六八十則為地也五位相得者一二也三四也五六也七八也九十也猶甲陽得乙隂丙陽得丁隂戊陽得已隂庚陽得辛隂壬陽得癸隂五者之隂陽皆相得也各有合者一六也二七也三八也四九也五十也猶甲陽合已隂乙隂合庚陽丙陽合辛隂丁隂合壬陽戊陽合癸隂五者之隂陽各自相合也天地二十有五謂一三五七九積而為二十五也地數三十謂二四六八十積為三十也總而計為五十有五是皆天地之數也一三五七九乃天之五行二四六八十乃地之五材一生一成一往一來造化功用皆不出乎此故曰此所以成變化而行鬼神也伊川程子曰變化言功鬼神言用又曰有理則有氣有氣則有數行鬼神者數也數氣之用也紫陽朱子曰變化謂一變生水而六化成之二化生火而七變成之三變生木而八化成之四化生金而九變成之五變生土而十化成之鬼神謂凡竒偶生成之屈伸往來者大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後挂宋咸易辨云天地之數是自然之數大衍之數是推衍之數愚謂推衍者自太極生兩儀則陽一隂二衍而為三兩儀生四象則太陽一少隂二少陽三太陽四衍而為十四象生八卦則乾一兌二離三震四巽五坎六艮七坤八衍而為三十六通太極之一兩儀之三四象之十八卦之三十六則其數五十今日大衍之數五十其殆是乎崔憬曰捨一不用者以象太極虛而不用也憬蓋知太極為數之體而不用矣而未知兩儀四象八卦為數之用也鄭武子揲蓍古法云天地之數五十有五而大衍不盡天地之數何也蓋太極生兩儀兩儀生四象四象生八卦所衍者不及五也又云大衍之數五十其用四十有九言於五十中虛一不用也蓋蓍四十九合成一圍辟猶渾沌未分乃所虛之一是其用之本也此易之太極也愚謂太極之一非數也數自此而起是為數之體非數之用故不用不用而虛其一所以存太極之本體而其用則惟兩儀四象八卦所衍之數則其用四十九也聖人用四十九蓍如下文所云之法挂其一而以四揲之則四其九而為三十六四其六而為二十四四其七而為二十八四其八而為三十二蓋出於理勢之自然而非人之智力所能增損此大衍之數五十而用惟四十有九是為不可易之法蓋不可易者聖人之法可易則非聖人法也分而為二謂以四十九蓍信手分而為二以置左右也象兩謂自一而生二凡所謂兩者無不象之豈特象兩儀故不實言之也挂懸也挂一者於所分右邊蓍中取一蓍懸於前與左右蓍鼎立而為三也象三者自二而生三凡所謂三者亦皆象之不特象三才也夫其所以挂一者何也有所待也以待兩手四揲之餘歸併而為一也舊法挂一乃挂於小指間則與扐同矣既有中指兩扐又加以小指則為三扐是五歲之中不待再閏乃有三閏矣蓋挂自挂扐自扐詎可以在前之挂雜於指間之扐哉揲時設反連數之也説文云揲閲持也揲之以四者先取左蓍四四而數之置於左次取右蓍亦四四而數之置於右也象四者象一歲之春夏秋冬也竒紀宜反與畸同竒者所揲四數之餘也歸者歸併而為一也既四四而數左右之蓍而得正策之數則其四四之後必有餘數或一或二或三或四也扐即得反扐者勒也歸竒於扐以象閏者先以左揲所餘之數勒於左手中指外以象三歲一閏也閏者月之餘日積分而成月者也五歲再閏者三歲一閏之後再積日而再成月則五歲之間又再閏也古者閏法之置起於氣盈朔虛氣謂二十四氣朔謂日月之合朔何謂氣盈朔虛蓋周天有三百六十五度四分度之一日之行一晝夜一度三百六旬有六日則周天而為一期月之行一晝夜十三度有竒常以二十九日半而與日合故厯法以兩月而置一小盡氣之行常以十五日二時五刻為一氣以三十日五時二刻為一月之氣故朔常不足而氣常有餘併朔虛氣盈計之則一年所餘十一日有竒三而積之則一閏常不及三歲又以其餘計之則再閏常五歲有餘今曰五歲再閏故再扐而後挂者一變之中有五節挂一為一節揲左為二節扐為三節揲右為四節再扐為五節一節象一歲三節之扐象三歲一閏五節之再扐象五歲再閏是謂第一變也既再扐而象再閏然後置前挂扐之蓍於一處而以所揲見存之正策合而為一是為第二變如初法再分再挂再揲再扐也不言分揲而獨言挂者以明再變三變以至十有八變每變皆當挂也或曰近世有第二第三變不挂之説雖其初揲不五則九再揲不四則八其數亦同然其三變之餘為老陽少隂皆二十七為少陽者九為老隂者十其於隂陽多寡既巳乖戾而所謂老隂蓋絶無僅有若用三變皆挂之説則六十四變而為老陽者十二為少隂者二十八為少陽者二十為老隂者四老則陽多而隂少少則陽少而隂多然而隂陽之變各三十二而其數適平以此論之則再變三變皆當挂一也明矣林至易禆云蓍數之變九六各一乾坤之象也七八各三六子之象也蓋以六十四變而八分之老陽得八老隂得八三少陽三其八得二十四三少隂三其八得二十四此體數也用數則不能無增損於其間體數則隂陽各半用數則隂侵陽陽侵隂是以少則陽少而隂多少陽多隂均二十四而少陽之四益於少隂則少陽二十而少隂二十八也老則陽進而隂退老隂之四歸於老陽則老陽二十而老隂四也以此證之則再變三變皆當挂一也抑明矣紫陽朱子曰繫辭言蓍法想别有文字今不可見但如天數五地數五此是舊文五位相得而各有合是孔子解文天數二十有五地數三十凡天地之數五十有五此是舊文此所以成變化而行鬼神也亦是孔子解文分而為二是本文以象兩是解文挂一揲之以四歸竒於扐皆是本文以象三以象四時以象閏之類皆是解文也乾之策二百一十有六坤之策百四十有四孔子則斷之以當期之日二篇之策萬有一千五百二十孔子則斷之以當萬物之數於是可見案韓康伯本此下有天數五至行鬼神也凡四十四字參錯於其間朱紫陽移置於天一至地十之後乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日策籌也即蓍之莖數也筮法初變挂扐之數不五則九再變不四則八三變亦不四則八凡三變之後得五與四四通計十三則其過揲所得者四其三十六而其數九得九與八八通計二十五則其過揲所得者四其三十四而其數合十有八變計之則為乾之策二百一十有六為坤之策百四十有四合之為三百六十則當一期之日數期即期音基周歲是也日行天一歲一周凡三百六十五度四分度之一書堯典云期三百六旬有六日是也今略其餘舉其成數言之耳若得五與八八或九與四八通計二十一則其過揲所得者四其二十八而其數七亦乾策也若得九與四四或五與四八通計一十七則其過揲所得者四其三十二而其數八亦坤策也合十有八變計之則為乾之策一百六十有八為坤之策一百九十有一合之則亦三百六十聖人不書者以乾坤用九六之變而不用七八也七八蓋不變也若併七八與九六合為三十以應乾坤十二爻之數亦為三百六十蓋九六七八皆乾坤之策也或者止認九六為乾坤之策遂以七八為子之策誤矣二篇之策萬有一千五百二十當萬物之數也二篇謂易之上經下經也上下經六十四卦凡三百八十四爻陽爻百九十二每爻各四九三十六策積之得六千九百一十二策隂爻百九十二每爻各四六二十四策積之得四千六百八策合之則萬有一千五百二十策應總稱一鈞為銖萬有一千五百二十之數而曰當萬之數者萬蓋盈數也取其盈數言之不論其餘也若以陽爻之七計之則每爻各四七二十八策積之得五千三百七十六策亦乾策也以隂爻之八計之則每爻四八三十二策積之得六千一百四十四策亦坤策也合之亦為萬有一千五百二十此乾坤所以為易中之藴也若併七八與九六合為三十以應六十四卦三百八十四爻之數亦為萬有一千五百二十易所以言九六而不言七八者九六乃可參兩七八則不可參兩也兼山郭氏曰以畫言之則雖六子亦皆乾坤之畫無六子之畫也如震之初乾畫也乾策也震之二三坤畫也坤策也在震初無是畫無是策也乾畫不得不稱九坤畫不得不稱六也故惟乾坤有用九用六之道諸卦之得竒畫者皆用乾之九也得偶畫者皆用坤之六也終無用七用八之道故九六者有象七八無象是故四營而成易是故二字連上文而言也童溪王氏曰營求也用蓍之法以四而揲之成易之數以四而求之故老陽數九四而求之則其策二十有四少陽數七四而求之則其策二十有八少隂數八故四而求之則其策三十有二隂陽老少六爻之本也故曰四營而成易若夫乾坤之策三百有六十而二篇之策萬有一千五百二十亦以四而求之故乾陽爻六六九五十有四四而求之則二百一十有六坤隂爻六六六三十有六四而求之則百四十有四以乾之五十有四合坤之三十有六為九十焉亦四而求之則三百有六十而二篇之策陽爻一百九十有二其數一千七百二十有八隂爻一百九十有二其數一千一百五十有二總而言之二千八百八十亦四而求之則萬有一千五百二十也凡此皆求以四而得之此易之書所以成於四營也愚謂童溪之説是也正義乃云四度經營蓍策乃成易之一變誤矣先儒皆祖其説以分二挂一揲四歸竒為四營非也因又謂分挂揲扐只可以謂之易未可以謂之變亦非也夫挂揲扐者一是為一變分挂揲扐者十有八乃為十有八變若從其説則是一易而十七變矣非十有八變也況歸竒於扐者再併二挂一揲四則為五營矣豈可以為四營也哉十有八變而成卦十有八變者每一度分挂揲扐為一變三度分挂揲扐為三變則成一爻九變則成三畫之卦於內又九變則成三畫之卦於外凡十有八變而後成六畫之卦也八卦而小成引而伸之觸類而長之天下之能事畢矣八卦乃三畫之卦小成謂內卦成於下也引而伸之者外卦又成於上則為六畫之卦六十四也觸類而長之者八卦可伸而為六十四卦則六十四卦可伸而為四千九十六卦也以四千九十六卦以斷吉凶則天下所能之事畢盡矣顯道神德行是故可與酬酢可與佑神矣易之道變化無窮未易見也顯之者辭也顯而可見則幽者闡矣是謂顯道易之德行至簡至易亦可測也神之者數也神而莫測則顯者微矣是謂神德行道之顯故可與酬酢德行之神故可與佑神紫陽朱子曰道因辭顯行以數神酬酢謂應對佑神謂助神化之功又曰德行以人事言惟決之於鬼神則德行神矣又曰神不能自説吉凶必俟易始見是易能佑助於神也子曰知變化之道者其知神之所為乎自隂而陽者變也自陽而隂者化也所以一變一化而無窮者道也神者何隂陽不測之謂也豈可以遽知若夫神之所為則可以變化之道而知之何謂神之所為如上文所言蓍數之法變化往來進退分合此乃神之所為也紫陽朱子曰變化之道即文數法是也皆非人之所能為故夫子歎之而門人加子曰字以别上文也節齋蔡氏曰變化之道即下文至精至變之事神即下文至神之事右第九章紫陽朱子曰此言天地大衍之數揲蓍求卦之法然亦大略矣意其詳具於太卜筮人之官而今不可考耳易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占易有聖人之道四焉曰辭曰變曰象曰占得其主而用之者各有所主是故用之於言者主乎辭用之於動者主乎變用之於制器以盡創物之智者主乎象用之於卜筮以明龜策之吉凶者主乎占以用也尚主也如漢書尚食尚方之尚是也紫陽朱子曰易有聖人之道四焉今且以乾之一爻明之如初九潛龍勿用辭也有九則有六九老陽也六老隂也陽至九而極則變為隂隂至六而極則變為陽此變也潛龍象也勿用占也推之三百八十四爻莫不皆然也是故君子將有為也將有行也問焉而以言其受命也如響無有逺近幽深遂知來物非天下之至精其孰能與於此君子將動而有為有行必求之易所為所行有疑必告蓍而問其所占之吉凶蓍也受人之命而答之其速如響之應聲無有逺近幽深悉以告人遂使占者前知未來之物易其至精矣乎非聖人不能研其精故曰非天下之至精其孰能與於此紫陽朱子曰命乃將筮而告蓍之語冠禮筮日宰自右贊命是也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此紫陽朱子曰參伍錯綜皆古語也而參伍尤難曉案荀子云窺敵制變欲伍以參韓非云省同異之言以知朋黨之分偶參伍之驗以責陳言之實又云參之以比物伍之以合參史記云必參而伍之又云參伍不失漢書云參伍其價以類相準此足以相發明矣參與伍兩數自是參差不齊故舉以為言如云什伍其民如云或相什伯非直為參與伍而巳也揲蓍本無三數五數之法只是交互參考錯者交而互之一左一右有迭相為用之意綜者總而挈之一低一昂如織者之綜索也愚謂蓍無三數五數之法則參非謂數之三伍非謂數之五也參伍以變錯綜其數不過以分挂揲扐之餘數驗過揲之正數一出一入更相考核以審其多寡之實究九六七八以定卦爻之動靜耳參雜也伍猶行之成列也筮法初變不五則九再變不四則八三變亦不四則八或得五四四或得九八八或得五八八或得九四八或得五四八遂成一爻凡十有八變而成卦此所謂參伍以變也如左揲右揲得四九三十六策而其數九則其挂扐之策得一五兩四謂之三少而其數亦九或左揲右揲得四六二十四策而其數六則其挂揲之數得一九兩八謂之三多而其數亦六或左揲右揲得四七二十八而其數七則其挂扐之策或一九一八而一四或一五而兩八謂之兩多一少而其數亦七或左揲右揲得四八三十二策而其數八則其挂扐之策或一九而兩四或一五一四而一八謂之兩少一多而其數亦八此所謂錯綜其數也知參伍以變之變而通其變則爻之文在是天地之文盡在是矣此所謂成天地之文也知錯綜其數之數而極其數則卦之象在是天地之象盡在是矣此所謂定天下之象也變者數之未定數者變之已成文者象之未成象者文之已定通變以成文極數以定象易其至變矣乎非聖人不能通其變故曰非天下之至變其孰能與於此世之通於數者論參伍錯綜則以九宫言之九宫縱橫皆三五十五也東坡蘇氏曰九宫不經蓋緯書所言之數非易數也易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此人莫不有思易則無思也人莫不有為易則無為也未有所感則言在册象在畫蓍在櫝寂然不動若無與於物既有所感則凡天下萬事萬物吉凶悔吝之理無有不通者易其至神矣乎非聖人不能窮神故曰非天下之至神其孰能與於此夫寂然不動易也感之者人也未占之時寂然不動如鑑之明如谷之虛及其占也感而後應遂通天下之故則如鑑之照形谷之應聲有何思有何為平庵項氏曰蓍之變策之數爻之文卦之象皆寂然不動之物初不能如人之有思亦不如人之有為皆純乎天者也及問焉而以言則其受命也如響無有逺近幽深遂知來物則感而遂通天下之故皆同乎人也夫易聖人之所以極深而研幾也深藴奧而難見也幾細微而未著也極深謂以易之至精窮天下之至精研幾謂以易之至變察天下之至變不極其深無以研其幾深蓋其體幾蓋其用也紫陽朱子曰研猶審也幾微也所以極深者至精也所以研幾者至變也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至天下之志不一何以通之唯深也故能通天下之志天下之務至衆何以成之唯幾也故能成天下之務疾則速行則至未有不疾而速不行而至者唯神也故不疾而速不行而至深就心言在內者也故能通志幾就事言在外者也故能成務深與幾皆言能而神獨不言能蓋神之所為非人力之所能也上文以至精至變與至神並言此以深幾神並言蓋至精所以極深至變所以研幾神則統言易之妙也精也變也深也幾也皆神之所為也紫陽朱子曰通志猶言開物也人所以閉塞者為其淺耳深則能開通之矣又曰所以通志而成務者神之所為也平庵項氏曰至精至變至神易之體也唯深唯幾唯神易之用也物情難盡唯精於占者能極逺近幽深之情而係其辭故雖深而無不至也事變至微人所易忽唯明於變者能推分合錯綜之文而見其象故雖微而無不察也至於神則無所用其力矣或指精變深幾為四者精主占而言深即占之辭變主變而言幾即變之象亦不出於四事也子曰易有聖人之道四焉者此之謂也前言易有聖人之道四焉此又重言之蓋總此章所言之意紫陽朱子曰變化之道莫非神之所為也故知變化之道則知神之所為也矣易有聖人之道四焉所謂變化之道也觀變玩占可以見其精之至矣玩辭觀象可以見其變之至矣然非有寂然感通之神則亦何以為精為變而成變化之道哉變化之道所以為神之所為也所以極深者以其精也所以研幾者以其變也極深研幾所以不疾而速不行而至者以其神也此覆明上文之意復以聖人之道四焉者結之也平庵項氏曰自將有為以下專論尚其占一事猶以四事終之者占則有辭變則有象舉其一則四事皆在其中也右第十章紫陽朱子曰此承上章之意言易之用有此四者愚案韓康伯本此下有天一至地十二十字紫陽朱子連以天數五至行鬼神也四十字共移置於大衍之前秀巖李氏雖依朱子以天一地二與天數五合而為一却仍依康伯置於此章之末周易集説卷三十
