body:
  text: 周易集說卷十七宋俞琰撰彖傳四咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣書咸有一德之咸訓皆今曰咸感也謂咸之為卦有上下相感之義非以感訓咸亦非以咸為無心之感或者泥於字說遂以咸為無心之感非也夫人之所以相感者心也既謂之感矣以為無心可乎但不可容心而有所私耳若其無心又焉能感剛上而柔下二氣感應以相與釋咸之所以亨也柔上謂上卦兑之隂爻剛下謂下卦艮之陽爻二氣即山澤之氣感應以相與謂山澤之氣往來相通此感則彼應彼感則此應一感一應而彼此相與也但曰二氣而不言山澤者山澤形也言山澤則不見隂陽感應以相與之義也止而說釋咸之所以利貞也夫婦之道止而不說則離說而不止則亂今也內止而外說則其止不至於固而其說亦不至於亂也男下女釋咸之所以取女吉也禮記郊特牲云男子親迎男先乎女剛柔之義也蓋古者婚禮自問名至於親迎皆以男先下女今以艮男下兑女是得婚禮之正也總而結之故曰柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感天地氣交相感也聖人感人心謂聖人之心與衆人之心交相感也然天氣不下降則地氣不上騰萬物安得化生聖人不通天下之志則下情無由上達天下安得和平天地之間有感斯有應也故曰天地感而萬物化生聖人感人心而天下和平觀天地之所以感者如此萬物之所以應者如此則大而天地小而萬物其情理皆可得而見之也故又贊之曰觀其所感而天地萬物之情可見矣天地與萬物既皆以情言則咸感之道不可以為無心也抑明矣恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣咸恆二卦六爻皆相應而名義不同者咸以少男下少女交感之道也恆則長男居外長女居內夫夫婦婦恆久之道也恆倒轉為咸則柔上而剛下咸倒轉為恆則剛上而柔下剛上柔下則其分正而可久此以卦之主爻言恆也一陽動于二隂之下為震雷一隂入於二陽之下為巽風相與謂相薄而不相悖也咸言二氣相與者山澤通氣耳蓋專以氣言雷風則又有聲不特氣也雷得風則迅風得雷則烈雷風相與則其氣相須而可久此以卦象言恆也巽而後動則其德不暴而可久此以卦德言恆也三剛三柔皆相應則其交不疑而可久此又以六爻之應言恆也恆者久也久也者久於其道也孔子以久訓恆懼愎者以執為久也故釋恆亨無咎利貞則曰久於其道也蓋謂所久在道非妄執也又懼夫昧者不知道之所在也故又曰天地之道恆久而不已也蓋謂道在不已所以能久也釋利有攸往乃曰終則有始何耶蓋又申不已之義也若使天地之道終而不復始則亦已矣又安能久惟其終則有始是以不已則久也又慮其不知天地之道何以恆久而不已也遂又以日月四時推而明之曰日月得天而能久照四時變化而能久成蓋謂日往則月來月往則日來其道循環而不已故能久照也寒往則暑來暑往則寒來其道代謝而不已故能久成也若夫聖人者與天地合德與日月合明與四時合序者也聖人久於其道而不已故能致天下之化成也天即道也日月得天得此恆久不已之道也四時變化無非皆恆久不已之道也即此觀之則天地所以生萬物而不息萬物所以生生而不窮其情理皆可得而見也故又曰觀其所恆而天地萬物之情可見矣恆彖傳凡六言久蓋以久訓恆孔子明言曰恆久也或以常為恆非也或以變為恆亦非也趙氏輯聞云聖人於乾以常對恆並言則恆常自為二義於需言未失常乃取用恆之義常未能恆恆乃包常變為言若常可訓恆則聖人當云恆常也蓋恆之訓久乃久逺之義非常變之義今人避諱故曰常據義當曰久遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉遁非亨道也遁而亨也者蓋謂身遁而道亨非謂遁而後亨也剛當位謂以九居五而得其正應謂與六二相應而不與為敵此君子隨時用權明哲保身之道也是時君子小人情猶相得未至於上下不交也故君子心雖欲遁而身猶在位其義則不可遽遁也未可遽遁則惟有以正自守以權應柔順時而行耳故曰剛當位而應與時行也此釋君子當遁則遁而所以致亨之由也浸而長猶水之浸物以漸而長也其義與臨卦彖傳同彼言剛長此則柔長也文王曰小利貞所以戒小人不宜進逼君子孔子又恐君子持祿固位當遁而不遁故釋之曰浸而長蓋謂二隂在下雖微其勢方來四陽在上雖盛其勢將往往者屈來者伸君子於此蓋不容不遁也此時不遁則何時而可遁耶自常情觀之二隂以艮體止於下而不動四陽在上其勢猶盛君子何必遁識時者觀之則不然蓋二隂之止暫止也今雖止而不動徒以我四陽尚盛未敢肆爾然自此浸長必將上進蓋不終止於其下也諸儒皆謂剛當位而應與時行也為二五君臣相應君子宜與時消息茍可以致其力則相與扶持之又謂小利貞為君子尚可致力以小有為唯紫陽朱子云隂已浸長如何可以有為愚謂隂已浸長固不可有為然時未可遁則君子要當與時而偕行義茍當遁則君子亦當與時而偕行君子之遁非為身也蓋為道也故孔子贊之曰遁之時義大矣哉大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣易以陽為大大壯者謂四陽長而強盛也剛以動故壯就二體釋卦名謂乾剛在內加以震動於外是以壯也然而過於剛則為暴而已奚足以為壯故又曰大者正也謂大者貴乎正唯正然後可以為大不正則血氣之壯徒壯耳非大也大者壯以卦體爻畫言大者正則以理言正大謂既正且大也極正大之理則至公無私可以見天地生物之情故曰正大而天地之情可見矣或曰觀四隂二陽隂長而消陽之卦也大壯四陽二隂陽長而消隂之卦也觀之四隂進則五九消矣大壯之四陽進則六五消矣五君位也故二卦彖傳皆不言消長聖人之意微矣伊川程子曰天地之道常久而不已者至正至大也正大之理學者默識心通可也不云大正恐疑為一事也趙氏輯聞云易於咸於恆於萃言天地萬物之情而此不及萬物者萬物之情正者未必大大者未必正不得與天地並也不言大正而言正大别於大正小正也復言天地之心大壯言天地之情心藴於中情則外見復雷在地中天地生物之功伏而未露故聖人有以見其心大壯雷在天上天地生物之心巳達於外故聖人有以見其情晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉以日之進言與升漸木之進不同晉下卦坤地也上卦離日也日出地上其明進而盛升漸雖亦有進義而無明盛之象升恆自下而進漸特進而有序皆非晉之比也以明夷對觀之彼日之入此日之出也大明指離之六五謂明王在上尊居君位猶晝日之大明也順指坤之三隂謂諸侯在下盡臣道之順而附麗乎大明之君也上明下順君臣相得在君上而言則進而至於光大也在臣下而言則進而承其光寵也明出地上以上下二體之象言順而麗乎大明以上下二體之德言柔進而上行謂六五之柔進居上卦之尊位也晉乃明夷之倒體在明夷為六二倒轉為晉則進而為六五謂自臨卦而來者非也或曰三女之卦在上者獨離為得尊位則謂之上行乃若巽在上則六四皆謂之上合又謂之上同合者合於五同者同於五不得謂上行也是在上則上六皆謂之上窮亦不得為上行也是以兩字乃總結一卦彖辭之義與咸之彖傳同康當作亨今以亨為康蓋因彖辭之誤而誤爾按郭京易舉正云王弼舊本有亨字彖傳是以下亦脫亨字明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之明入地中明夷此以卦象釋卦名也繫辭傳云易之興也其當殷之末世周之盛德耶當文王與紂之事耶孔子釋六十四彖無非皆推廣文王彖辭之義而獨於明夷稱文王蓋明入地中明夷正文王與紂之事之象也紂無道而國將亡文王有大明之德而幽囚於羑里豈非明入地中其明隱而不見之象乎或以明入地中為衍文非也晉言明出地上蒙言山下有險豈皆衍文耶內卦離故曰內文明外卦坤故曰外柔順大難謂羑里之囚也其難關係天下之大民命之所寄故曰大難文王之德內藴文明外施柔順是故蒙被大難而不與九侯同受其害不然在大難之中亦難乎免矣以之謂用此道也文王處明夷昏暗之時三分天下有其二以服事殷卒能脫身羑里蓋用此道也故曰文王以之晦其明謂隱其明以自晦也紂之時小人雖衆皆不能窺見箕子之所為箕子之明蓋不彰於外也若使逞其智而內不文明矜其能而外無柔順有如後世楊修曹子建之徒則被害久矣豈能蒙此大難哉內難謂家難也其難關係一家之內宗社之所寄也箕子為紂之近親身處其國內而切近其難故曰內難紂淫酗日甚箕子諌之則勢不可去之則義又不可未免徉狂自晦而其志則以道自任固守以正而不變此箕子所用之道也故曰箕子以之文王總一卦而言箕子則指內卦六二而言非指六五也白雲郭氏曰明夷獨為聖人明德遭難之事初無衆人之象故止言文王箕子家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣家人以巽離成卦故彖辭獨言女彖傳以男女並言蓋專指二五爻畫之隂陽而生義也言女正而必兼男正者君子以修身為齊家之本身不修則家不齊也以六居二以九居五其位皆正故曰女正位乎內男正位乎外先女而後及男家人以內為本也然天尊地卑男尊女卑一定而不可易故又曰男女正天地之大義也君長也嚴君猶言君長蓋一國有一國之長一家有一家之長父母乃一家之長也為一家之長不可不嚴不嚴則紀綱不立下無忌憚凡事玩弛而家道廢矣治家之道與治國同故曰家人有嚴君焉父母之謂也嚴君即男女之正位乎內外者也父母主恩而稱嚴君不可以恩廢禮也乃若父盡父道子盡子道以至兄弟夫婦亦各盡其道則尊卑有等長幼有序男女有别而家道正矣推此以及天下天下可不勞而定故曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣不曰定天下而曰天下定蓋風化自近始此正則彼自正也彖辭舉其端故但言利女貞彖傳極其全故兼言男女之正而又以父子兄弟夫婦推廣而備言之大學云身修而后家齊家齊而后國治國治而后天下平孟子云天下之本在國國之本在家家之本在身其說皆出於此睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉睽之為卦下兑上離皆隂卦也火與澤雖俱動而火自動於上澤自動於下竟不相同非若坎離之隂陽相逮也中女少女雖同處一家及其有行則各適其所歸其志蓋不同非若坎離之隂陽相合也夫上火下澤為睽上澤下火為革革亦二女同居而其志又且不相得乃大亨何歟曰革以九居五以六居二大亨者以其正也睽則反是此所以僅為小事吉也夫物極必反睽久必合聖人於此有合睽之道焉何則說而麗乎明也當是之時二志乖睽雖說亦見疑非麗乎明不可也睽乃家人之倒體家人六二之柔本居下倒轉為睽則六二進為六五而上行又得中而應九二之剛則睽者合矣是以小事吉也古今蓋無久睽不合之勢聖人亦無視亂不救之理且如天地異位睽也而隂陽升降共成化育之功則其事同男女異姓睽也而婚嫁往來俱有室家之願則其志通萬物散殊睽也而在大化中均禀隂陽之氣則其事類天地也男女也萬物也其體雖睽其用則合當睽之時合睽之用則不止小事吉而已孔子恐人不明其大故贊之曰天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉難謂跋涉之艱苦險在前謂前有坎水之險下卦艮止中互離明明則知止而不陷於險也險之在前人皆見之固不待智者而後見見險而能止則其所見蓋有出於衆人之外者非衆人所能及故孔子特贊之曰見險而能止知矣哉往得中謂以九居五往而得其中也道窮謂九三處下卦之終而又在艮止之極也往有功謂往而濟蹇必見大才大德之人乃有功也夫處險之時見險而不知止固不可謂之智見難而弗往救則非易之教也故彖言利見大人孔子釋之曰往有功蓋恐其終於止而弗往也九五尊居君位不失其正近而上六六四下而九三六二其位皆正初六位雖不正然以隂而處下蓋亦正也則是通國上下各守其分而無有不正故曰當位貞吉以正邦也卦雖名蹇而諸爻皆無凶辭亦以其正故也用謂變動而用事蹇之時非終於止而不用亦非小有才者之所能用故曰蹇之時用大矣哉平菴項氏曰險而止為蒙止於外也見險而能止為知止於內也止於外者阻而不得進止於內者有所見而不妄進此蒙與蹇之所以分也屯與蹇皆訓難屯者動乎險中經綸以濟難者也蹇者止乎險中崎嶇以涉難者也此屯與蹇之所以分也解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉解之為卦下坎險上震動險非動莫解故曰解險以動唯動故能免乎險而不陷而卦名所以謂之解故曰動而免乎險解九四為震體之主動而在外剛而不過上二隂順之動而得衆人之助故曰解利西南往得衆也解乃蹇之倒體解九二即蹇九五向也險難在前則吾不可不任濟蹇之責當是時而往則往為得其中道今險難解散無所事乎往則以來為得其中道故曰其來復吉乃得中也難解之初乃與民維新之時人方厭亂而餘風遺俗亂政弊法有不可因者早革之則有功事勢既定而人心安於故常乃始圖之則擾矣尚何功之有故曰有攸往夙吉往有功也蹇之時艮山止於下坎水滯流於上蹇而為險今為解則震雷動於上坎水浹洽於下解而為雨是艮其所以蹇而震其所以解也方其未解則天地之氣蹇澀而不舒及其既解則天地之氣發達而雷雨作雷雨作則百榖草木之甲無不開拆故贊其時曰大矣哉隆山李氏曰以畫觀之解者蹇之反以卦觀之解者屯之反也大率屯蹇皆難之方興而解則難之散也又以三卦之二體細觀之蹇之止乎險下固不若屯之動乎險中而屯之動乎險中又不若解之動乎險外也周易集說卷十七
