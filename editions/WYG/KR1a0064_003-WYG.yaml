body:
  text: 周易集説卷三宋俞琰撰上經三坤下乾上否之匪人不利君子貞大徃小來否備鄙反否者天地不交而上下閉塞之時也是時用事於内者皆非其人而君子之正道不行是以不利若猶持禄固位而不去其不為小人所害者鮮矣大往謂三陽之往小來謂三隂之來泰倒轉為否昔之在内者今則往而居外昔之在外者今則來而居内大抵與泰相反蛟峯方氏曰之字羨彖𫝊釋卦辭乃加之字後人因彖𫝊有之字遂亦加焉初六拔茅茹以其彚貞吉亨泰初九言㧞茅茹以其彚此君子以類同進之象否初六言拔茅茹以其彚此小人以類同進之象貞吉亨謂君子固守以正而不動則身吉而道亨也彖言不利君子貞初乃言貞吉亨何也曰彖指在位君子顯而未退者也爻指在野君子𨼆而不出者也六二包承小人吉大人否亨包謂二在上而包初以君子而蓄小人也承謂初在下而承已以小人而順君子也小人大人皆指占者而言小人吉謂小人而能順承君子則亦吉也二應五以隂從陽故稱大六二蓋中正而无私者也大人否亨謂六二雖居羣隂之中而不與羣隂相習為惡惟能包容在下之小人是以身雖處否道則亨也六三包羞包謂三包二以小人而蓄君子也羞謂六二中正恥與六三不中不正者為伍也與恒九三或承之羞同九四有命无咎疇離祉命君命也有命无咎謂有君命則无咎无君命則有咎也疇類也指二陽而言古字儔與疇通書洪範九疇之疇亦訓類離附麗也祉禄也凡為大臣者戒於専權専權則无君君必疑忌之不但身受禍同類亦因之而被害也否之九四為近君大臣雖有剛健之才可以濟否然其志柔弱非奉九五之命不敢自擅是以在已无咎而同類附麗者亦因之而受祉也九五休否大人吉其亡其亡繫于苞桑休與詩菁菁者莪我心則休之休同否至五否將傾矣大人處此則安詳和緩不動聲色而措天下於泰山之安故曰休否大人吉不然則荒忙急迫適以激其變非吉之道也大人指占者而言其亡其亡儆之至也桑之方苞柔弱而不可係物以此為戒而防其亡則存者庶乎其可保也桑柔木詩言柔桑是也草木叢生曰苞與詩四牡苞栩苞杞之苞同上九傾否先否後喜傾覆也否終則倒轉而為泰故曰傾否方其否也上下不交而人情鬱塞及其傾也小人誅滅而天下大悦故曰先否後喜物理極則必反故泰極則為否否極則又為泰此泰否之相仍也如損極則成益益極則又成損其道一也不特泰否損益為然諸卦皆然明乎此則知彖傳所謂剛柔上下之義矣離下乾上同人于野亨利渉大川利君子貞同人與人同也以離遇乾謂之同天可也而曰同人何也曰天人一理也天道至公无私同人之道亦當至公无私也野外也六二為成卦之主得位得中而外應乎乾之九五有亨通之道焉故曰同人于野亨剛健而能有為是以利渉大川文明以健中正而應是為君子之同不為小人之茍同故曰利君子貞初九同人于門无咎門指六二初出門即與二遇是乃不約而同非私意也故无咎六二同人于宗吝易以同體居先者為宗與睽六五之宗同同人之道外同于野則亨今不外同于五而惟内同于初吝道也睽之五與同人之二皆離體離以柔爻為主而二卦皆以剛爻為宗何也曰崇陽而抑隂易之教也九三伏戎于莽升其高陵三歲不興戎兵器也伏戎于莽伏于四之下以拒四也升其高陵升于二之上以望五也三歲不興謂上無應援遂至三歲不敢顯發也三至上凡歴三爻故曰三歲九三剛而不中欲同于二而懼四五之見攻故其象如此不言凶以其有忌憚也九四乘其墉弗克攻吉墉指三乘之者四也四欲同二而三在下隔之故有乘其垣墉以攻取之象九三爻位俱剛且三歲不興九四以剛居柔其能攻乎知義之弗克而弗攻蓋能自反而改過者也是以轉凶而為吉九五同人先號咷而後笑大師克相遇五與二正應而隔於三四未得其同故悲憤而先號咷以大師克之遂得與二相遇故喜而笑號平聲上九同人于郊无悔邑外為郊郊外為野彖以二體之内外言則二在内五在外五去二逺故為野爻以五視上則五居中上在外上去五近故為郊野也郊也均之為外也但逺近之異耳上九同人于郊則不與諸陽爭二故无悔乾下離上大有元亨大有所有者大也六五以一隂居尊而上下五陽皆應之則大者皆為小者所有也此卦下乾上離其徳剛健而文明二五又相應是以元亨初九无交害匪咎艱則无咎无交謂初最在下无以交于五也初之應在四所承者二而皆兩剛相遇其情皆不相得是无交而有害也然匪初之咎盖其居孤逺而𫝑使然也故曰无交害匪咎若病其无交而輕易遽進則不能无咎矣故又戒之曰艱則无咎九二大車以載有攸往无咎九二剛而得中在下而應上其象為大車以載其占曰有攸往无咎若使无應于上則雖大而能載載而能往上之人信任不力欲无咎也難矣九三公用亨于天子小人弗克三居下體之上公侯之象也亨與享通香兩反謂朝獻也九三剛而居正不以有自私故其象如此小人反是故曰小人弗克九四匪其彭无咎彭如字詩載驅云行人彭彭出車云出車彭彭大明云駟騵彭彭烝民云四牡彭彭皆取人馬强盛之義今曰匪其彭者諸陽皆為六五所有此六五之盛非九四之盛也九四雖在三陽之上而勢逼六五然處有若無處實若虚何咎之有此爻在大有之時以剛居柔又離體之明故其象占如此六五厥孚交如威如吉五與二為正應五以信任二二以信事五故曰厥孚交如六五以柔居剛不厲而威非作威者也故曰威如既有誠信以接下而人信之又有威嚴以自重而人畏之為大有之君而剛柔得冝如此故吉上九自天祐之吉无不利上九在卦之終大有之極也處離之上明之極也大而不以大自高有而不以有自滿至明故也又能下從六五蓋知君臣之大義而順乎理者也是以自天祐之吉而无不利艮下坤上謙亨君子有終謙者有而不居之謂内艮止而外坤順謙之徳也剛屈乎柔之下謙之義也始雖屈終則伸此謙之所以亨而君子之所以有終也與書大禹謨謙受益之意同有終猶言今終以其善後而无禍患也此卦凡三言君子皆􅃌占者初六謙謙君子用渉大川吉以六處初徳柔而位卑謙而又謙故曰謙謙占者用此謙謙之道而行則臨大事涉大險何所往而不濟故曰君子用渉大川吉六二鳴謙貞吉雄鳴則雌應陽倡則隂和謙之所以為謙者三也其謙也勞而不伐有功而不徳故聞其風被其澤者悉從于謙六二其鄰也與之隂陽相得而鳴聲相和故曰鳴謙謙而不貞則近于邪佞非吉之道也今以六居二蓋柔順中正謙而貞者也故吉九三勞謙君子有終吉以剛承柔以功下人勞而謙者也君子惟有終身之謙故有終身之吉三乃謙之主爻又居下卦之終故以彖之君子有終屬之六四无不利撝謙以柔乘剛其位又在功臣之上非所利也而曰无不利者以其撝謙也撝即春秋公羊傳莊王撝軍退舎之撝撝與麾同撝謙者以手撝却九三而辭讓其承已所以示不敢當之意也六五不冨以其鄰利用侵伐无不利陽道常饒隂道常乏六五隂爻之虛故曰不冨用上六以為輔故曰以其鄰侵伐當依郭京作征伐所以征不服也在下有恃險負固而不服者則不容以謙道待之也此爻乃用兵之吉占它事亦无不利獨不言謙何也曰六五君也君道不可専尚謙柔也上六鳴謙利用行師征邑國三以謙為倡首二承之上應之故皆曰鳴謙邑國指四四據其應故行師征之也上居謙之極過謙則取侮豈所冝哉故其象占曰利用行師征邑國坤下震上豫利建侯行師豫者安和悦樂之義内坤順而外震動順以動則人心和樂故建侯行師二者皆利豫之主爻在四四震體震為長子是冝立之為君故其象為建侯四互坎險以一陽統衆隂故其象為行師初六鳴豫凶四為豫之主爻初與四應而鳴聲相和故曰鳴豫以隂柔居豫之初而不中不正此乃乍得志之小人也恃有强援在上遂恣其逸樂而聲聞于外凶之道也彖辭之義為和豫爻辭之義則為逸豫非其説之不一也彖自彖義爻自爻義各有所取也六二介于石不終日貞吉介于石素有定見也不終日知幾之速也君子見幾而作不俟終日雖在初與三之間不為逸樂所移故爻辭不言豫而獨言貞吉謂能固守以正而吉也豫諸爻惟六二正而且中故其象如此六三盱豫悔遲有悔盱張目上視也六三隂柔不中不正仰望于四此乃近上之小人也小人附勢自以為樂能无悔乎其象如此其占為事當速悔若猶豫遲疑則又有後悔也九四由豫大有得勿疑朋盍簪由謂由巳非由乎人也九四處衆隂之中自得其樂故曰由豫與由頤之由同大有得謂五隂皆為九四所有也朋指在下三隂四能盡其忠誠勿懐疑二則朋皆翕從何患其不速簪速也盍合也九四為豫之主爻而逼近六五之柔君故其象占如此六五貞疾恒不死隂柔居尊沉溺于豫固執而不知變是為貞疾受制于權臣此腹心之痼疾也疾者豫之反書金縢云王有疾弗豫是也有疾則弗豫故六五不言豫權雖去已位則未亡遂得恒乆而不死上六冥豫成有渝无咎冥暗也與升上六之冥同以隂柔處豫之極迷而忘返是為冥豫渝變也以其動體而能變故其占又為其事雖成而能有渝則无咎震下兊上隨元亨利貞无咎隨從也巳往從人人來從已皆隨也此卦下震上兊動而説則彼此相從而不相違隨之義也其占為始雖動而大亨通終冝以正道固守而不妄説然後无咎不然則所隨不正終亦不免乎有咎初九官有渝貞吉出門交有功官主守也初九震體震以剛爻為主官也官雖貴乎有守然處隨之時不可守常而不知變也變者何趨時從權不以主自居也故曰官有渝渝變也變而不失其正則吉故又戒之曰貞吉隨之六爻専取其相比相隨不取其應初九蓋不可捨六二之正而從九四之不正也何況四與初兩剛相遇无相得之情豈可與之為交今初九出門而與六二交則不私其隨又得所從而不失其正故曰出門交有功六二係小子失丈夫小子指六三之柔爻丈夫指初九之剛爻隂性善係弗能兼與係上則失下故曰係小子失丈夫六三係丈夫失小子隨有求得利居貞六三係九四之丈夫故失六二之小子隨道以隨上為貴隨陽則有得今以下隨上以隂隨陽故曰隨有求得然六三之與九四皆不正者也以不正係不正則其隨也乃枉道趨利而詭隨求必茍求得必茍得故戒之曰利居貞得此占者惟冝守靜不冝妄動九四隨有𫉬貞凶有孚在道以明何咎九四之隨九五𫉬乎上而有道者也以臣從君以隂從陽故曰隨有𫉬居隨之時為君側之大臣初其所應三其所係二又係于三是天下无不隨之也然其位近五而勢陵于君能无疑乎四于此率天下以隨五可也揜為巳有不可也若固執而不知變則其凶咎必矣所恃以无恐者有九五之君與已同徳而相信也道謂為臣之道在道者其志在于盡臣道也以明謂得以自明也九五蓋剛明之主也見九四率天下以隨巳則察其不僭而信其志不在于已私而在于道也四于是得以自明矣又何咎之有九五孚于嘉吉初為内卦之主故不言隨五居尊位而受天下之隨故亦不言隨嘉指四四盡為臣之道率天下以隨五是可以為嘉也美之至為嘉也書云嘉謀言之至美也詩云嘉賓臣之至美也五既孚于四則初交二二係三三係四无不進而隨五矣此五之所以吉也上六拘係之乃從維之王用亨于西山拘者執而不捨之謂維交結也與坎彖辭晉上九解六三之維同皆兩人相維之義上居隨極无可隨者故亦不言隨返而拘係于五五乃從其所係而維之隨極而固結之甚也若用之于亨祀則誠極意専足以通于神明而神明亦隨之故其象占又為王用亨于西山亨與享通當依朱紫陽作祭享之享香兩反周易集説卷三
