body:
  text: 周易集説卷三十八宋俞琰撰説卦傳三乾為天為圜為君為父天積陽而居上乾三畫純陽故為天物之體圓者常動乾陽體而運轉不息故為圜尊而居上君之象也萬物資之以為始父之象也白雲郭氏曰包犧氏始作八卦以通神明之德以𩔖萬物之情此皆所謂𩔖萬物之情也乾之於八卦天之於三才君之於臣父之於子皆一道也是之謂𩔖也平菴項氏曰乾道大而无極唯天足以盡之運而无極唯圜足以盡之故以二象為首句也在國則君在家則父皆物之元也為玉為金其質純粹故為玉其性堅明故為金或曰玉謂其不變金謂其變為寒為冰乾居西北極高而至剛之地其位屬亥於時為十月其候為水始冰地始凍故為寒為冰冰生於水而寒於水觸之則其利如刄冰蓋水之勁氣也或曰寒隂氣冰隂物隂盛之極自坤而變乾故為寒為冰為大赤純陽極剛而明甚故為大赤漢上朱氏曰赤陽色也陽始於子坎中之陽故坎為赤極於已純陽也故乾為大赤為良馬為老馬為瘠馬為駁馬乾健故為良馬老陽故為老馬純剛故為瘠馬瘠言其骨之峻非羸弱之謂也崔憬曰骨屬陽肉屬隂乾純陽骨多故為瘠駁雜也晁以道曰駁馬其九四乎説文云駁馬色不純也詩東山云皇駁其馬注云黄白曰皇駵白曰駁即不純也白雲郭氏曰孔氏謂駁馬有牙如鋸能食虎豹誤矣未有蹄物能搏虎豹者也愚案山海經爾雅並云駁如馬而鋸牙食虎豹既曰如馬則駁乃别是一物非易之駁馬也孔氏引以為證不審諦爾為木果圓實而在上故乾為木果坤為地為母坤積隂處下故為地萬物資之以生故為母以配父為布古者以泉貨為布蓋取廣布流行之義乾之所至坤亦至焉故為布或曰地南北為經東西為緯故為布為釡釡所以化生物為熟物乾生之坤則化之以其能熟萬物故為釡平菴項氏曰六十四升為釡坤包六十四卦如釡之包六十四升也坤卦半為乾全為坤乾與坤交為六十四故惟坤為能具六十四卦之體為吝嗇隂性至靜受而不施故為吝嗇為均均者土之均也坤之氣動而闢至而廣无有逺近高深悉皆含育而成就之故為均陶人制物之形者謂之均亦此義也崔憬曰地生萬物不擇善惡故謂之均為子母牛性順而多孕育故為子母牛平菴項氏曰自萬物言之坤皆為母就牛言之又為子母牛者為少為牝為孕育為隨順兼數義也乾馬老瘠故坤牛牸犢明少且肥皆相反也為大輿方而能載者輿也地之形方載華嶽而不重故為大輿坤隂本小以其載陽所以大也為文為衆竒為質偶為文竒則一偶則衆坤三畫皆偶故為文為衆横渠張子曰坤為文衆色也為衆容載廣也為柄柄一作缺乾性圜轉而曲坤性執方而直大抵與乾相反故乾為圜坤為柄其於地也為黑乾極陽故為大赤坤極隂故為黑黑者地之肥美而能生殖者也平菴項氏曰黑者幽隂之色也不言黄而言黑者黄者坤之離𤣥者乾之坎皆中爻之色也若論其極則乾正為赤坤正為黑故先天圖乾南而坤北也震為雷震以一陽動於二隂之下為隂氣所包而未能出則激薄而有聲故為雷為龍龍之説見前此重出不然則龍之青者也何以見之龍為馬馬之牡者也坤則為馬之牝震則為馬之善鳴乾為龍此乃龍之大者也震之於龍是為青龍又何疑焉平菴項氏曰震為龍虞翻謂當作駹蒼色也朱子發謂當作􅔀東方尾星也為𤣥黄𤣥黄者天地之雜也乾色本赤坤色本黑震乃乾剛坤柔之始交而赤黑相雜故為𤣥黄正義云𤣥黄雜則成蒼色也為旉旉音敷華之通名陽止於終則結為果實陽動於初則發為華蘂震以一陽動於初而陽氣始發故為旉平菴項氏曰震為旉李鼎祚云本作專延叔堅説為旉大布也案釋文引王肅干寳説皆以旉為花􅞉則字之為旉久矣古文花字為華為荂為􅞉皆音敷為大塗震東方之卦於時為春萬物皆自此而出故為大塗大謂得乾陽之第一畫也為長子震一索而得男繼乾父之體故為長子不稱長男而稱長子者以其承父之正傳主國之重器非坎艮二男比也楊繪曰震為長男代父之任故位於生物之地世子宅於東宫蓋取諸此也為決躁決指陽畫躁指隂畫動於𥘉為決動於中動於末再三動而不巳則為躁為蒼筤竹為􅍉葦筤音郎􅍉音丸蒼筤青色也青為震之本色􅍉葦與詩七月所謂􅍉葦同毛氏傳云薍為􅍉葭為葦孔氏曰釋草云薍似葦而小初生者為菼長大為薍成則名為􅍉葦初生為葭長大為蘆成則名為葦愚謂竹與􅍉葦皆根固而叢生上虛而下盤固陽在下之象也漢上朱氏曰􅍉葦震之廢氣故竹堅而􅍉葦脆竹久而􅍉葦易枯其於馬也為善鳴為馵足為作足為的顙震陽始動故為馬之善鳴震居左故為馬之馵足震動於下故為馬之作足爾雅云後右足白驤左足白馵詩小戎云駕我騏馵注云左白曰馵京房本以馵為末末之説未詳作動也魯頌駉詩云思馬斯作子由蘇氏曰作奮起也或云雙足並舉也上靜而下動故為作足的白也巽為白又為廣顙震變而為巽故為的顙之馬詩車鄰云有馬白顚爾雅云駒顙白顚劉備庾亮皆名其所乗之馬為的顱蓋馬之白額者也平菴項氏曰馵與的皆巽之色也震巽同生故有巽之氣焉於足則白在後左於顙則白在前左足者震之本象也巽之生在其後故為後足白首者乾之象也乾之爻往而生震其上二爻遂成巽象巽在其上故為顙白也其於稼也為反生反生者百昌産於土而歸於土又自土中戴甲而出麻豆之屬是也震之陽實在下動而上行故於稼為反生翁庻善曰夫稼之始也根於土土之氣上升焉則為榖已而榖之墜則又反而生於土焉生生不窮之妙也其究為健為蕃鮮究終竟也陽長而不已則其究為乾之健蕃謂草也與坤文言傳草木蕃之蕃同鮮乃魚也即書益稷鮮食之鮮震三爻俱變則為巽故為蕃鮮震居東得木之正氣巽居東南得木之餘氣是故震之為花也變巽則為草震之為龍也變巽則為魚漢上朱氏曰震巽皆為木者何巽之初草之根也震之初木之根也巽之二三木之在上者也震之二三草之在上者也木有柔者木之草也草有剛者草之木也説卦舉一隅爾又曰郭璞謂魚者震之廢氣也巽王則震廢故虞翻以巽為魚巽為木為風巽内柔而外剛本靜而末動故為木他卦言木如乾為木之果坎為木之堅多心艮為木之堅多節離為木之科上槁震兌坤雖不言木震乃木之旉兌乃木之毁折坤乃木之衆多者也順而无所不入故為風風能揚沙走石其中與末皆剛也雖鍼竅線縫亦入其本柔也陽激隂為雷隂激陽為風故雷與風皆有聲横渠張子曰隂氣凝聚陽在内者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有逺近虚實故風雷有大小暴緩為長女巽一索而得女故謂之長女震為長子故巽為長女以配之巽離兌皆稱女所以配三男也為繩直為工木有曲直繩者糾木之曲而取直工則引繩之直以制木者也横渠張子曰為繩直順以達也為工巧且順也為白巽者震之反震為草木之初生故其色青巽為草木之枯死故其色白白所以受采者其性巽順也為長為高長如風行而長高如木生而高為進退為不果進退風之性也巽懦而不決故為進退二陽在外進也一隂在内退也外剛而内柔一隂盤旋乎二陽之下故為不果大抵與震相反為臭臭以風而傳隂氣在下盤鬱而不散故為臭其於人也為寡髮為廣顙為多白眼髮者血之餘血隂物也陽多隂少巽二陽而一隂故為寡髮陽廣隂狹巽二陽在上如人之額闊故為廣顙躁人之眼多白目睛不正也離以柔居中目之正故為明巽以柔居下目之不正故為多白眼釋文云寡虞本又作宣黑白雜為宣髮平菴項氏曰宣髪者白髪也虞翻謂馬君不當改宣為寡然寡亦脫髮之象與廣顙同𩔖也宣髪廣顙者變坎上爻水不上潤故不成血盛之髪也多白眼者遷離中爻於下故不成中虚之眼也為近利市三倍利市謂物之美而利於市者也案春秋昭公十六年左氏傳云爾有利市寳賄利市蓋古語也倍蒲亥反詩贍卬云如賈三倍謂其善賈而得利之多也巽順而多有所入故為近利市三倍謀利者必於市南方離日之中為市巽居東南與離相近也一隂在下為巽之主而在上二陽皆為其所有則其本小而其利甚博矣三倍謂在上二陽畫毎畫三分之則其數六而三倍於一隂之二也其究為躁卦其終變而為震故曰其究為躁卦震為決躁也震巽皆言其究所以例其餘也王荆公曰言巽為躁卦則知艮為靜卦矣或曰震得陽氣之先者也巽得隂氣之先者也故其卦皆有究極之義乾鑿度云物有始有壯有究漢上朱氏曰巽三變成震震三變成巽舉此則知乾三變成坤坤三變成乾離三變成坎艮三變成兌矣坎為水水内明坎之陽在内故為水坎以一陽居二隂之中猶水之在地中也漢上朱氏曰坎生於坤本乎地也故潤下離生於乾本乎天也故炎上為溝瀆坎以陽畫為水二隂夾之是為溝瀆白雲郭氏曰江河溪澗皆水也溝瀆人所為者也平菴項氏曰坎勞卦也溝瀆隱伏矯輮弓輪為通為盗皆事之勞者也為隱伏一陽匿於二隂之中為二隂所蔽故為隱伏為矯輮為弓輪矯者矯曲而使之直也輮者輮直而使之曲也弓與輪皆矯輮之所成凡矯輮之物内不剛則易折外不柔則又不可以矯輮坎内剛而外柔一陽鬰於二隂故為矯輮為弓輪宋衷曰水流有曲直故為矯輮正義云弓者激矢如水之激射也輪者運行如水行也其於人也為加憂為心病為耳痛為血卦為赤一陽陷於二隂之中故為加憂心耳以虚為體坎中實故為心病為耳痛坎為水血在人身則水之屬也赤其色也故為血為赤乾為大赤坎得乾之中爻故止於為赤横渠張子曰坎為血卦周流而勞血之象也漢上朱氏曰黄帝書腎主血心藏血腎坎水也心離火也離中隂而藏血坎離交也其於馬也為美脊為亟心為下首為薄蹄為曳乾為馬坎得乾之中爻而剛在中故為馬之美脊為馬之亟心亟急也内剛勁故其心急下首者柔在上也薄蹄者柔在下也為曳羡文白雲郭氏曰易曰見輿曳又曰曳其輪故輿為曳而馬无曳也乾震之馬四而坎之言馬五亦知曳為輿矣其於輿也為多眚其於輿也為多眚如郭白雲所云當作其於輿也為曳中實而重為曳多眚疑當在心病之下目有病為眚心與目皆屬離坎與離相反故在坎為病為眚為通水由地中行萬折必東故為通或曰通以輿言輿可以濟險故為通愚則曰均是輿也得時則為通失時則為曳為月月體隂本黑受日之光而白外隂而内陽也坎之體外隂而内陽故為月為盗行險以僥倖剛而善隱伏盗也坎以剛陽匿於隂中故為盗平菴項氏曰盜之潛行有水之象月隂於夜亦盗之象也其於木也為堅多心内剛故為木之堅多心水生木木得水之潤則堅離為火為日為電離麗也火麗乎木日麗乎天電麗乎雲皆有所麗而明者也故離為火為日為電電光乃日之光然必麗乎雲則見无雲則无電也胡致堂曰或謂雷霆何為而然者有形耶有神耶曰古人未之言也然先達大儒亦嘗明其理矣蓋天地間無非隂陽聚散闔闢之所為也可以神言不可以形論非如異學所謂龍車石斧鬼鼓火鞭怪誕之難信也故其言曰隂氣凝聚陽在内而不得出則奮擊而為雷霆雖聖人復起不能易矣凡聲陽也光亦陽也光發而聲隨之陽氣奮擊欲出之勢也電緩小則震亦緩小電迅大則震亦迅大震電交至則必有雨震而不電電而不震則无雨由隂氣凝聚之有疎緩迅宻也曰世人所得雷斧者何物也曰此猶星隕而為石也本乎天者氣而非形偶隕於地則成形矣然而不盡然也曰雷之破山折樹殺人者何謂也曰先儒以為隂陽之怒氣也氣鬱而怒方爾奮擊偶或值之則遭震矣然而不盡然也電之閃爍激疾如金蛇飛騰之狀何謂也曰電之發也唯光爾適映雲際則如是不當乎雲際而在同雲之中則无此矣凡天地造化之迹茍不以理推則必入于幻怪誕偽之說而終不能明故君子窮理之為要也為中女離再索而得女故謂之中女為甲胄為戈兵外剛故為甲胄甲鎧也胄兜鍪也所以内衛也剛在外而火氣上鋭故為戈兵所以外禦也胄字與冒字相似從目胄字從月乃胄子之胄也其於人也為大腹外大而中虚故為大腹平菴項氏曰坎離者乾坤之精氣也乾為首故坎為下首坤為腹故離為大腹離非能大於坤也大腹下首皆疾證也為乾卦火性燥故為乾卦王荆公曰離為乾卦則坎為濕卦可知矣鄭正夫曰離言乾卦而坎不言濕坎言血卦而離不言氣互相備也為鼈為蟹為蠃為蚌為龜外剛内柔故為鼈為蟹為蠃為蚌為龜龜鼈之卵蟹之肓皆黄者内坤也括蒼龔氏曰蠃則形鋭而善麗蚌則内虚而含明白雲郭氏曰鼈蟹蠃蚌龜介物也介物甲胄𩔖也其於木也為科上槁科空處與孟子盈科之科同離中虚而外乾燥故為木之科上槁蓋與坎之堅多心相反宋衷曰隂在内則空中木中空則上枯槁也艮為山山止而不動者也艮止也陽動之極而止於二隂之上故為山為徑路震之陽始出則為大塗艮之陽小而上窮故為徑路横渠張子曰艮為徑路通或寡也為小石陽大隂小艮之陽畫為山故隂畫為小石白雲郭氏曰山與小石如坎水溝瀆之義為門闕艮體上實下虚故為門闕為果蓏木之植生而其實有核者曰果桃李之屬是也草之蔓生而其實无核者曰蓏𤓰瓠之屬是也陽剛在上故為果隂柔在下故為蓏平菴項氏曰果蓏氣之止於外者也乾純陽但為木果艮一陽二隂故為木之果又為草之蓏震為旉草木之始也艮為果蓏草木之終也果蓏能終而又能始故於艮之象為切為閽寺周官閽人掌王宫中門之禁止物之不應入者寺人掌王之内人及女宫之戒令止物之不得出者艮以剛止於外以衛内之柔故為閽寺宋衷曰閽人主門寺人主巷艮為止此職皆掌禁止者也為指指謂手指一説以為足指括蒼龔氏曰指於四支之末而能止者也平菴項氏曰為指義與堅多節同為狗狗説見前此重出白雲郭氏曰陽卦之中獨艮不言馬其剛在上所用益小故於獸畜之𩔖无行徤之功徒有噬齧之象狗鼠黔喙之屬皆是也漢上朱氏曰狗當作豿爾雅謂熊虎醜其子豹蓋虎子未有文猶狗也為鼠鼠與狗皆善齧艮剛在前故為狗又為鼠白雲郭氏曰且坎之為隱伏也在賢者為隱在小人為盗艮之為利則為狗為害斯為鼠皆一義而二象也為黔喙之屬黔青黑色喙亦剛在前也謂之屬則凡黔喙者皆是也沙隨程氏曰黔東北方之色青黑雜也白雲郭氏曰震之剛動於下故言足坎之剛動於中故言心艮之剛動於上故言喙其於木也為堅多節坎之剛在内故為木之堅多心艮之剛在外故為木之堅多節白雲郭氏曰堅多節剛不中也中則為心不中則為節心則利用節則不利於用二卦之辨也兌為澤澤乃瀦水之地物之潤而見乎外者亦為澤兌之隂見乎外故為澤坎體上下俱虚澤體則上虚而下實故川壅則成澤決則成川為少女三索而得女位在末故謂之少女為巫為口舌巫尚口舌以言語説人者也兌上折口之象也陽動於内舌之象也白雲郭氏曰古之巫與今之巫異古之巫誠人也今之巫妄人也誠可用以通神妄非聖人之所用也為毁折春氣發生於震東方而萬物敷榮震主生故以為旉秋氣肅殺於兌西方而萬物摇落兌主殺故以為毁折横渠張子曰物成則上柔者必折也括蒼龔氏曰毁折反所謂蕃鮮也為附決附謂柔附剛也兌隂卦隂柔多疑不能決也附二陽以決故為附決正義云秋物成熟賫程之屬則毁折果蓏之實則附決其於地也為剛鹵鹵鹹也東方謂之斥西方謂之鹵剛鹵乃産金産鹽之地兊下實而澤見於外故為地之剛鹵正義云水澤所停則鹹鹵也平菴項氏曰毁折附决與剛鹵同不能生物兊為金為秋皆決折之氣也鹵者水之死氣也坎水絶於下而澤見于上則足以為鹵而巳矣物之相附者至秋而盡決隂在陽中為附二陽下而一隂上則附者決矣此自離而兊之序也然震之本志巳為決躁但至離而附故未決耳至兊則毁折之矣雖欲復附得乎決象𩔖兊故亦為決鄭少梅謂剛者出金鹵者出鹽雖不生五榖而寳貨興焉然予以為此亦末作之象也凡兊之象皆屬末口舌者行之末妾婢者女之末金寳者利之末也為妾兌少女故為妾從姊為娣從姑為姪蓋皆女之末也為羊羊説見前此重出漢上朱氏曰為羊鄭康成本作陽虞翻本作羔今從鄭鄭云此陽謂養无家女行賃炊㸑今時有之賤於妾也郭璞引魯詩曰陽如之何又曰今巴濮之人自呼阿陽右第十一章分八卦為八門而百物不廢所以反覆推廣象𩔖使之明備以資占者之決也雖然亦舉其大槩而巳安能盡天地間萬物之象而説之哉荀爽九家集解所謂坤為裳坎為狐之𩔖不過因爻中有此而增之耳非本文也平菴項氏曰乾為父坤為母震為長子巽為長女離為中女兑為少女皆見於象而中男少男獨不重見乾為馬坤為牛震為龍艮為狗兌為羊皆見於象而巽雞坎豕離雉獨不重出巽為躁卦坎為血卦離為乾卦五卦皆不稱卦震究為健為蕃鮮巽究為躁而六卦皆不稱究蓋互相例也周易集説卷三十八
