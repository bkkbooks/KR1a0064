body:
  text: 周易集説卷二十七宋俞琰撰文言傳二坤至柔而動也剛至静而徳方後得主而有常含萬物而化光坤道其順乎水天而時行天屬乾陽而剛地屬坤隂而柔地體雖柔動而生物其用則剛坤卦六爻純乎隂柔是為至柔動則變為乾陽而剛故曰坤至柔而動也剛地雖動而生物其體本静坤卦六爻純乎隂静是為至静唯其至静所以其徳方正而截然不易故曰至静而徳方天數居始而為一地數居次而為二坤道之常葢當處後不可攙先也攙先則失坤道之常矣唯處乾之後順乾而行則得其所主而不失坤道之常也故曰後得主而有常含藏蓄也萬物無大無小地皆藏蓄於其中博厚之至也陽變而隂化天施而地生坤之含萬物僅能化生耳非若乾之能變而又能化能施而又能生也故孔子於乾言變化於坤但言化而不言變葢乾能兼坤坤僅得乾之半也光謂地道之光陽明而隂暗坤隂物安得光横渠張子曰效法故光漢上朱子曰坤之光即乾之光愚謂坤本無光動而從乾是以光也順謂順乾而行也承天謂天氣在上而降施於地地則順承而受之也時行謂以時而行時乎春夏而天氣發生則地氣亦為之發生時乎秋冬而天氣收斂則地氣亦為之收斂坤之為道葢如此其順也此章申彖傳之意所謂至柔而動也剛申徳合无疆之義至静而徳方釋貞義後得主而有常後順得常之謂含萬物而化光即含𢎞光大品物咸亨之謂坤道其順乎承天而時行即乃順承天之謂自此以後皆申爻傳之義或疑文言傳兩贊用九至用六則無一語及之殊不思坤至柔而動也剛此非贊用六而何洪容齋曰頃見僧曇瑩云動者謂爻之變也坤不動則已動則陽剛見焉在初為復在二為師在三為謙自是而往皆剛也其說最為分明有理愚謂曇瑩所云不過謂一爻之動耳坤爻傳所為六二之動是也今曰坤至柔而動也剛葢謂六爻俱動而至柔之坤變純剛之乾非但為一爻之動也積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辯之不早辯也易曰履霜堅冰至蓋言順也坤之初六隂柔不中不正不善也不善之積極而至於弑君弑父實從此始以積善並言葢明善不善皆在所積天道福善禍淫作善則降之百祥作不善則降之百殃茍積善則不獨身受其福又福于而家以及其子孫是謂餘慶積不善則不獨身受其禍又禍於而家以及其子孫是謂餘殃必者禍福之應如影隨形如響隨聲理之所必然也積善而曰必有餘慶所以勸天下忠臣孝子而使之勉於為善也積不善而曰必有餘殃所以懼天下亂臣賊子而使之不敢為惡也乃臣弑君子弑父豈一朝一夕之故原其所由來則自小而大從微而著如霜而至於冰皆以漸而積也辯察也由辯之不早辯葢罪其君父之不明明者知漸不可積於是防其微而辯之於早故天下之惡無由而成葢知霜冰之戒也若小惡不遏坐視其長則末流之弊有不可勝言者是誰之過歟由君寵其臣而不早辯其臣之惡父寵其子而不早辯其子之惡故也葢言順也之順與前坤道其順乎之順不同葢謂事勢之順不知不覺積漸因循而至於此極也積不善申履霜隂凝之義弑君弑父申至堅冰之義非一朝一夕之故申馴致其道之義也誠齋楊氏曰順當作馴紫陽朱子曰古字順慎通用直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也發明六二之直方而曰直其正也方其義也則下文當曰正以直内義以方外今乃曰敬以直内而不曰正以直内何也或曰劉元城嘗改敬以直内為正以直内矣然正無下功夫處故須敬言敬則正在其中敬則有所操守而不失其本然之正也或又曰禮記云直其正也政乃敬之訛爾敬訛為政政又轉而為正亦猶詩體無咎言禮記乃云履無咎言體訛為禮禮又轉而為履理或然也敬者主一於此而無他適之謂義者裁制於彼而合其宜之謂敬以操守於内而心不他適則其直於内也洞然而畧無私曲義以裁制於外而事皆合宜則其方於外也截然而不可移易君子蓋無往而非敬無往而非義也敬義立謂内不枉已外不徇物而卓然自立也二所主者敬而義則自此而出焉故有内外之辯敬在是則義在是内直則外自方非謂敬必在内義必在外也徳不孤謂擇善而得所從也六二在羣隂之中不與羣隂為黨其勢似孤其徳則不孤蓋以敬義自立捨坤隂從乾陽又焉得孤不疑謂擇善之明而不惑也坤徳雖柔順而六二所行者正不習初六之隂邪則其從乾陽而行也夫復何疑此章以敬釋直字義釋方字又以敬以直内是持守功夫義以方外是講學功夫從程子朱子之説則坤六二之所謂不習可以為不學乎平菴項氏曰習重習也二之所習謂習初也地利隂邪不可使盛若朋類相習積隂不已則賊亂之所由興也初二一隂方生聖人積慮其習曰積曰漸曰馴曰順皆深絶之六二之隂洊至位當重習獨能不習故聖人喜之蓋初不正而二正初不中而二中每事相反而不相重是以知其不習也又曰隂與隂相敵則孤孤則小隂從陽則不孤不孤則大婦能如此則得乎夫臣能如此則得乎君皆隂徳之不孤者也張播本直方大上有易曰二字隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也隂從陽而不敢專也故雖有美亦含之而不發也以用也或用之從王事則歸美於君弗敢以成功自居故曰隂雖有美含之以從王事弗敢成也弗敢成者非其才之不足而不能成也為下之道當如是也伊川程子曰如是則上無忌惡之心下得恭順之道也愚謂下之事上猶隂之從陽便觀地之承天可見乃若妻之從夫臣之從君皆此道也故曰地道也妻道也臣道也不言子道臣與子一也夫天氣降而至於地地中生物者皆天之氣地唯順而承之不敢居其成功是謂地道無成既曰地道無成而又曰代有終何也曰天數止乎九是無終也地數終於十則有終矣是故乾能始物不能終物坤繼其終而終之則坤之所以為有終者終乾之所未終也坤不有其成而有其終故曰地道無成而代有終也代繼也古之人為臣而盡臣道者以地道自處而不矜不伐唯知代天之功以終其勞及其成功則歸之天不敢貪天之功以為已力蓋知地道無成而代有終之義也美釋章字以妻道臣道並言蓋申無成有終之義此獨言地道則舉其大者爾書君陳云爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳嗚呼臣人咸若是惟良顯哉其坤六三之謂歟天地變化草木蕃天地閉賢人隱易曰括囊无咎无譽蓋言謹也乾陽用事則天地變化草木蕃賢人出坤隂用事則天地閉賢人隱當此天地閉賢人隱之時一語之差則凶禍隨至不謹宻可乎易之所謂括囊无咎无譽蓋言君子之謹宻不可不如是也且夫乾之初九在下卦之下去九五之君甚逺其隱宜乎坤之六四在上卦之下居近君之地而乃隱焉何也曰坤六五亦臣也非君也以人臣而處君位與乾九五異矣而六四適近之此六四大不幸也乾九五在上而天地閉塞天下終有戰爭之禍則六四以隱為咎蓋時異事殊君子亦唯隨時之治亂以為進退也時當進君子亦進乾九五是也時當隱君子亦隱坤六四是也謹即慎不害之謂曰閉曰隱皆釋括囊之義也君子黄中通理正位居體美在其中而暢於四支發於事業美之至也黄中謂君子有中徳之美也通理謂通達乎道理也正位謂知君臣之大義而以正上下之名位也居體謂以臣道自居而不失為下之體也美在其中而暢於四支以至發為事業儘有可觀豈非美之至乎正位居體蓋坤之正位在六二而六五非正是宜正之也坤之體當居下而居上非所宜也黄中通理正位居體釋黄裳元吉之義美在其中暢於四支發於事業釋文在中之義黄中通理以身言故曰四支居者身居之也黄中故能正位通理故能居體或者難曰六十四卦皆以五為君九居五為剛中之君六居五為柔中之君今乃以坤之六爻全為臣道無乃不可乎愚曰不然易中以六居五蓋半矣莫非君也在泰在大有之類則為謙順之君在離在未濟之類則為文明之君在豫在恒之類則為暗弱之君惟坤之五雖君位坤實臣道不濟不取君義此童溪王氏之説也坤之六爻皆順承乾五之一君故坤之五不得為君此誠齋楊氏之説也竊謂六十四卦自貞而下隂陽相雜剛柔相交始有所謂隂陽之配應剛柔之乗承於是乾則全卦皆為君徳而乾之九二其位雖臣其徳則君也坤則全卦皆為臣道而坤之六五其位雖君其道則臣也豈可與諸卦例言哉隂疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄疑謂似也坤至上六隂盛而與陽相似也隂當從陽也盛極則不能降以相從也不相從則與陽為敵故曰隂疑於陽必戰乾君象也故乾之彖傳謂乾之六爻為六龍龍君象坤乃臣而上六亦稱龍何也聖人以坤之上六處臣道之盛極而天下不知有君故特以龍言故曰為其嫌於無陽也故稱龍焉為去聲爾雅云十月為陽鄭𤣥曰十月純坤用事嫌於無陽故名此月為陽天道不可一日無陽人道不可一日無君也節初齊氏曰蓋與春秋天王狩于河陽同一書法狩于河陽非天王而曰天王嫌於無王也聖人於陽亦然血隂物也臣雖强不離隂類故曰猶未離其類也故稱血焉離去聲𤣥者天之色黄者地之色血言𤣥黄則天地雜類而隂陽無别矣故曰夫𤣥黄者天地之雜也隂陽相戰雖至於天地之雜亂然而天地定位於上下其大分終不可易故其中又分而言之曰天𤣥而地黄周易集説卷二十七
