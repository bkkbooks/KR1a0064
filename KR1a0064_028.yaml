body:
  text: 周易集說卷二十八宋俞琰撰繫辭上傳一辭乃文王之辭繫謂繫屬於卦爻之下傳者孔子傳述文王之意故曰繫辭傳係一作繫按陸德明釋文云若從􅌛下系者音口奚切非也又云王肅本作繫辭上傳訖於雜卦皆有傳字或疑今本除去傳字徑以孔子之辭爲繫辭何也范諤昌曰繫辭非孔子命名止可謂之贊係耳歐陽文忠公曰係者有所係之謂也言其爲辭各聨屬於卦爻之下也今乃以孔子贊易之文爲上下係辭何其謬也况其文乃槩言易之大體雜論易之諸卦其辭非有所係不得謂之係辭者必矣然自漢諸儒已有此名不知從何而失之也或又疑司馬談論六家要指引易大傳云天下一致而百慮同歸而殊塗此係辭傳中語也何乃謂之易大傳耶李秀巖曰意者秦漢諸儒自爲易大傳一書如伏生尚書大傳之比而司馬氏不詳考誤以係辭傳爲易大傳耳劉向封事亦引易大傳云誣神者殃及三世此豈係辭傳中語乎亦猶差之毫釐謬以千里本易緯之文而司馬遷答壺遂問所引乃冠以易曰二字鹵莽類此要不足據也秀巖又謂係辭傳文體全與文言傳同疑此二傳乃後人取孔子之說而彚次之故文勢節目頗與中庸相似愚亦深疑之竊謂係辭傳乃文言傳之餘耳是故嵩山晁以道以文言傳先係辭傳愚今所編蓋依晁氏古易置係辭傳於文言傳之後分章則依朱子本義天尊地卑乾坤定矣天地者乾坤二卦之象也天居上而其道尊地居下而其道卑是故易之設卦也先乾而後坤則尊卑之道如天髙地下之不紊而乾坤二卦定矣乃若連山首艮歸藏首坤則乾坤蓋未定也白雲郭氏曰連山以艮爲首歸藏以坤爲首周易以乾爲首故繫辭傳首云天尊地卑乾坤定矣卑髙以陳貴賤位矣尊卑者天地上下之定理髙卑者天地上下之定分不言髙卑而言卑髙以卦畫言也伏羲卦畫蓋自下而上也陳分列也貴賤謂卦爻之上下也易道賤卑而貴髙故其六位之分列則以卑而在下者爲賤髙而在上者爲貴而貴賤於是乎位矣動靜有常剛柔斷矣陽常動隂常靜故曰動靜有常乾竒畫屬陽而剛坤偶畫屬隂而柔斷者剛柔各自有體而其質不同也不言隂陽而言剛柔以其可見者言也隂陽氣也剛柔質也質可見氣不可見也虞翻曰斷分也方以類聚物以羣分吉凶生矣方有陽方有隂方各以其類聚物有陽物有隂物各以其羣分吉善也凶不善也卦有二體之上下爻有六位之逺近隂陽分合其情不同此吉凶所由生也在天成象在地成形變化見矣在天成象日月星宿之屬是也在地成形山川草木之屬是也變化謂隂變爲陽陽化爲隂也仰觀乎天俯察乎地其成象成形者如此則易中隂陽之變化於是乎見矣自天尊地卑至此言聖人作易因隂陽之實體爲卦爻之法象是故剛柔相摩八卦相盪易中凡言剛柔皆指爻畫之竒偶摩錯也盪推盪也易卦之畫皆起於一竒一偶自一竒一偶兩相摩錯而爲八卦又自八卦兩相推盪而後爲六十四卦觀先天圖可見是故者以此之故也接上文以起下文也後倣此鼓之以雷霆潤之以風雨日月運行一寒一暑雷霆指震風雨指巽坎日月指離坎雷霆也風雨也日月也無非皆乾坤之變化也或疑不言山澤何哉曰山澤在地成形者也此但以在天成象者言之耳然山澤出雲雲騰而致雨蓋出於山澤者也雖不言山澤而山澤在其中矣雨以潤而風亦謂之潤以風能滋物之氣也乾道成男坤道成女男女謂六子乾交坤故震艮坎得乾道而成男坤交乾故巽離兌得坤道而成女在人亦然人自不察耳在物亦然凡牡皆得乾道者也凡牝皆得坤道者也乾知大始坤作成物知猶主也萬物資乾之陽爲始而乾主始物故曰乾知大始作猶動也坤之隂從陽而動代乾之終而成生物之功故曰坤作成物紫陽朱子曰知訓管字如知州知縣之知不當解作知見之知白雲郭氏曰自易言之則始於乾坤而乾又爲坤之始是爲大始也自物言之則萬物始於坤坤始於乾是爲大始也乾以易知坤以簡能乾之始物以其易也坤能成物以其簡也易者平易而不難非輕易之謂簡者簡約而不煩非茍簡之謂乾主乎健要動便動故易坤順乾而行凡其所能皆順從乎乾而不敢爲主故簡然則乾知大始於其前坤作成物於其後坤之能蓋成乾之能也嵩山晁氏曰姚信謂能字當作從易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業前知字訓主此知字訓識從就也人之所爲如乾之平易而心無巇險則人皆可得而知如坤之簡約而事不煩擾則人皆可得而從易知則與之同心者多故有親易從則與之協力者衆故有功有親則存諸内者日以崇故可以長久有功則其著於外者日以廣故可以宏大可以長久者賢人之德也可以宏大者賢人之業也若夫聖人之德業則與乾坤同其久同其大無所謂可不可平庵項氏曰稱賢人者明乾坤之德人皆可充而至也若但言聖人則嫌於必生知安行而後可而進修之路絶矣易簡而天下之理得矣天下之理得而成位乎其中矣易如乾之易簡如坤之簡則天下萬事萬物雖衆而其理得矣天下之理得則成位乎天地之中而與天地參矣龜山楊氏曰行其所無事不亦易乎一以貫之不亦簡乎如是而天下之理得矣又曰行其所無事一以貫之只是一個自然之理嵩山晁氏曰而成位乎其中矣王肅作易成位乎其中矣右第一章紫陽朱子曰此章以造化之實明作經之理又言乾坤之理分見於天地而人兼體之也聖人設卦觀象繫辭焉而明吉凶玉篇云卦兆也謂占事知來而有吉凶先見之兆也或曰卦者掛也古人筮占則畫竒偶於板而懸卦於前所以謂之卦象者物理之似有取六畫之象者有取三畫之象者亦有取一畫之象者無非象也辭謂卦之彖辭爻辭聖人作易每設一卦則先觀卦中之象然後係之以辭而明其吉凶之理以示人蓋有畫斯有象有象斯有辭有辭而後吉凶之理始明今人捨象而玩辭但求辭之理不求象之理淺矣剛柔相推而生變化剛柔者爻之九六也九六相推故生變化不然則一卦止爲一卦而已變化從何而生何謂變化柔爻動而變爲剛剛爻動而化爲柔一卦爲六十四卦六十四卦爲四千九十六卦也白雲郭氏曰易稱剛柔皆指九六是故吉凶者失得之象也悔吝者憂虞之象也易言吉凶在人則爲失得易言悔吝在人則爲憂虞聖人觀彖爻有失得之象則係以吉凶之辭觀彖爻有憂虞之象則係以悔吝之辭君子玩吉凶悔吝之辭則見所謂失得憂虞之象也上文止言明吉凶而不言明悔吝蓋吉凶既明則悔吝亦明矣舉重以見輕也紫陽朱子曰吉凶悔吝者易之辭也得失憂虞者事之變也得則吉失則凶憂虞雖未至凶然已足以致悔而取羞矣蓋吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也又曰悔是吉之漸吝是凶之端又曰過便悔不及便吝悔屬陽吝屬隂亦猶驕氣是盈客氣是歉也節齋蔡氏曰憂慮也虞度也能慮能度則可免失而至得矣此言上文觀象係辭明吉凶之義變化者進退之象也剛柔者晝夜之象也柔變而爲剛進之象也剛化而爲柔退之象也剛屬陽而明晝之象也柔屬隂而暗夜之象也然有進則有退有退則有進未有常進而不退常退而不進者也有晝則有夜有夜則有晝未有常晝而不夜常夜而不晝者也是故剛雖晝之象退而化爲柔則夜之象也柔雖夜之象進而變爲剛則晝之象也通乎晝夜進退之道則知剛柔變化之道矣六爻之動三極之道也卦本三畫自下而起初畫爲下再畫爲中三畫爲上重而六之則各分上中下是故初動則與四應二動則與五應三動則與上應故曰六爻之動三極之道也伊川程子曰三才以物言三極以位言愚謂三極之道言道之體三才之道言道之用是故君子所居而安者易之序也所樂而玩者爻之辭也易之序謂易中所著事理當然之次第不但謂六位之先後也爻之辭謂六爻所言吉凶悔吝也居以位言安謂安其分也樂以心言玩謂繹之而不厭也君子觀易之序而循是理故安觀爻之辭而達是理故樂平庵項氏曰虞翻本序字作象以與下文合似不必爾是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利象謂卦象之不變者變謂六爻之變者玩謂觀之詳與翫字通用觀則一見而决翫則反覆而不捨審諦之至也君子平居無事之時則觀其象而熟翫其辭以考其所處之當動而將有爲將有行則觀其變而熟翫其占以考其所占之吉凶蓋其動靜之間舉無違理是以自天祐之吉無不利或曰觀象翫辭如蔡墨云在乾之姤如莊子云在師之臨謂之在者是也觀變玩占如陳侯遇觀之否晉侯遇大有之睽謂之遇者是也右第二章紫陽朱子曰此言聖人作易君子學易之事白雲郭氏曰前章終於天下之理得而成位乎其中謂在上尊位之聖人也不曰聖人而曰賢人謂能法乾坤易簡非獨聖人可得天下之理賢者亦可修而得也此章終於君子玩易蓋兼窮通之君子其玩易皆一也稱君子蓋兼聖賢言之彖者言乎象者也爻者言乎變者也彖者每卦之下彖辭也爻者每畫之下爻辭也象謂一卦之全體彖指全體而言變謂九六之一節爻指一節而言國語云王饗有體薦燕有折俎又云禘郊之事則有全烝王公立飫則有房烝親戚燕享則有殽烝韋耀注云全烝全其牲體而升之俎凡禘郊皆血腥房大俎也詩云籩豆大房謂半解其體升之房也殽烝體解節折升之俎也謂之折俎愚謂易中所謂彖乃是象之全體亦猶禘郊之全烝故彖字與象字相似而字皆從豕易中所謂爻乃是象之分體亦猶燕饗之殽烝後人加肉於爻下而爲肴字蓋别於易也諸說惟東坡蘇氏曰爻折俎也實得古人稱爻之義及論彖之義乃云彖者豕也則於彖之外添出一豕矣象雖彖屬然非豕也或謂彖爲六牙象則無問其六牙不六牙畢竟彖即是象或又謂彖形如豕則彖又非象矣至謂彖九竅惟鼻不具而其尾甚長夜欲寐則返其尾以遮鼻夫返尾窒鼻此蜼也周禮有蜼彞詎可以周禮之蜼爲易之彖哉吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也吉凶言失得之大不若悔吝之小悔吝言疵纇之小又不若无咎之善无咎者本亦有過以其善能補是以無咎聖人嘉其能而許之以善蓋開其遷善之門也誠齋楊氏曰言動之間盡善之謂得不盡善之謂失小不善之謂疵不明乎善而誤入乎不善之謂過覺其小不善非不欲改而已無及於是乎有悔不覺其小不善猶及於改而不能改或不肯改於是乎有吝吾身之過猶吾衣之破也衣有破補之斯全身有過補之斯還還者何復之於善也補不善而復之於善何吝之有是故列貴賤者存乎位列分别也位六爻之位也位有上有下在上爲貴在下爲賤以初上分别之上貴而初賤以三五分别之五貴而三賤以二四分别之四貴而二賤爻之貴賤以位而分别故曰列貴賤者存乎位六爻蓋皆有位也或謂初上無位謬矣齊小大者存乎卦陽爲大隂爲小隂卦多陽以隂爻爲主陽卦多隂以陽爻爲主如復姤之類是也王肅曰齊猶正也陽卦大隂卦小卦列則小大分也紫陽朱子曰齊猶定也辯吉凶者存乎辭善爲吉惡爲凶辯猶明也爻之吉凶非辭莫明故曰辯吉凶者存乎辭平庵項氏曰吉凶悔吝无咎皆辭也獨吉凶言辭者悔吝可以介而免无咎可以悔而致必有憂震之心者然後能用力於微焉至於吉凶則得失之大者讀其辭者皆可辯也此而不悟聖人亦末如之何也矣憂悔吝者存乎介憂者憂其將然也未有吝悔而先爲之憂也既憂之則不至悔吝也介猶界限之界謂交物之際截然自守不陷於凶咎之途也與豫六二介于石兌九四介疾有喜之介同或曰介纎芥也謂小小疵病耳震无咎者存乎悔震者動而不安也咎譴責也悔謂能見過而内自省也震動而不安則幡然自改亦足以補其過矣又何吝之有也是故卦有大小辭有險易辭也者各指其所之卦有小大辭有險易辭也者卦以陽爻之大者爲主則其辭平易如復如謙之類是也卦以隂爻之小者爲主則其辭艱險如小畜如夬之類是也各指其所之者隨其時之所值而命之辭其辭則各指示其所向而使占者得以知所適從也漢上朱氏曰之者動爻也虛齋趙氏曰之變卦也言本爻之辭正指之卦之義占筮之法蓋本諸此右第三章紫陽朱子曰此章釋卦爻辭之通例易與天地準故能彌綸天地之道易謂易之書也準猶齊平而無毫釐髙下之差也天地之道即易之道易之道即天地之道天地如此易亦如此故曰易與天地準惟其與天地準故能贊天地之化育而彌綸其道漢上朱氏曰九準陽六準隂伊川程子曰彌徧也綸理也在事爲倫在絲爲綸彌綸徧理也紫陽朱子曰彌如彌縫之彌有終竟聨合之意綸有選擇條理之意仰以觀於天文俯以察於地理是故知幽明之故觀視也察視之詳也幽隂之不可見者也明陽之可見者也幽明之故謂隂陽之所以然也聖人何以知之曰仰以觀於天文俯以察於地理故知之也天在上屬陽而明故言文其文可以仰而見故言觀地在下屬隂而幽故言理其理亦可以俯而知故言察以者用也用易中隂陽之理而觀察之也紫陽朱子曰天文則有晝夜上下地理則有南北髙深晝明夜幽上明下幽觀晝夜之運日月星辰之上下可見天文幽明之所以然也南明北幽髙明深幽觀南北髙深可見地理幽明之所以然也平庵項氏曰伏羲之始作易也仰觀於天見隂陽之象俯察於地見剛柔之形於是制爲竒偶之畫以準之使萬物之情皆以類從而天文地理遂與人事物情相通爲一而幽明之故可得而知矣原始反終故知死生之說死生有說乎曰有說可知之乎曰可知何以知之曰原始反終則知之原始者推原其始反終者於其終而反求其始也人能原其始而求其所以終又能反其終而求其所以始則知死生之說矣夫天地大化雖生生不窮然有生則有死未有生而不死者生則氣聚而成形蓋出於大化死則氣散而形潰復歸於大化兹萬理之所必然無他說也人惟不窮其理故不知其說往往以死爲諱而臨終則怖窮理則知其說而視死如歸亦無所怖豈以死爲諱哉伊川程子曰原始則足以知其終反終則足以知其始死生之說如是而已矣故以春爲始而原之其必有冬以冬爲終而反之其必有春死生其與是類乎又曰理窮則自知生死之說不必以死生别是一道理而求精氣爲物游魂爲變是故知鬼神之情狀人爲萬物之靈亦萬物中之一物耳以變對物而言則物者有是物也變則無矣人之生也氣聚而精凝則顯而可見是爲物及其死也氣散而魂游則隠而不可見是爲變謂之變則與物異矣伊川程子曰既是變則存者亡堅者腐更無物也愚謂古人以死者爲物故又爲物化蓋生則爲物死則爲故故即變也化即變之成也在易則爻有等謂之物得乾之陽爲陽物得坤之隂爲隂物變猶乾變爲坤坤變爲乾之類是也或以物爲太𤣥之歾歾音歿非也鬼神之情狀隠顯聚散而已隠顯理也聚散氣也自其理之隠顯者言之則知鬼神之情自其氣之聚散者言之則知鬼神之狀理其情也氣其狀也横渠張子曰形聚爲物形潰反原反原者其游魂爲變歟所謂變者對聚散存亡爲文非如螢雀之化指前後身而爲說也又曰精氣者自無而有游魂者自有而無自無而有故顯而爲物自有而無故隠而爲變又曰動物本諸天以呼吸爲聚散之漸植物本諸地以隂陽升降爲聚散之漸物之初生氣日至而滋息物生既盈氣日反而游散至之為神以其伸也反之爲鬼以其歸也紫陽朱子曰精氣爲物是合精與氣而成氣魂而精魄也變則是魂魄相離雖獨說游魂而不言魄而離魄之意自可見矣與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛相似者易似天地天地似易彼比相似也蓋天地一隂陽也易亦一隂陽也若幽明若死生若鬼神莫非隂陽也聖人之作易仰則觀象於天俯則觀法於地所謂幽明之故與夫死生之說鬼神之情狀皆與天地隂陽相似故不違戾其知雖周知乎萬物之情而所以濟天地之用者必以其道故不過差雖有時乎從權旁行亦不至乎廢經而忘返故不流蕩樂天順其理也知命安其分也樂夫天理之自然而知命分之當然則此心與天爲徒故不憂安土不懷居也土即地也不擇地而居則隨所寓而安也敦篤厚也安土敦乎仁則巳私盡去純乎天理無所往而非仁故能愛範圍天地之化而不過曲成萬物而不遺範如鑄金之模範圍如匡郭之周圍曲謂委曲成謂成就天地之化大而無窮萬物微而且衆範圍之而不過曲成之而不遺此聖人用易以贊其化育也通乎晝夜之道而知晝陽也夜隂也有晝則有夜有夜則有晝如前所謂幽明死生鬼神是也通謂通達而兼明之也聖人通乎晝夜之道而幽明死生鬼神之理無不知也故神无方而易无體神妙而不可測或在陽或在隂故無定方易惟變所適或爲陽或爲隂故無定體横渠張子曰語其推行故曰道語其不測故曰神語其生生故曰易其實一物指事異名爾右第四章鄭𤣥虞翻皆以是故知鬼神之情狀與天地相似故不違相連解說紫陽朱子曰此章言易道之大聖人用之如此平庵項氏曰自仰以觀於天文至故知鬼神之情狀此三知者言易之所知與天地準也自與天地相似故不違至安土敦乎仁故能愛此四故者言易之所能與天地準也自範圍天地之化而不過至神無方而易無體此四而者言彌綸之功也周易集說卷二十八
