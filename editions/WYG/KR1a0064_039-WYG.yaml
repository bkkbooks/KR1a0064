body:
  text: 周易集説卷三十九宋俞琰撰序卦傳序卦者孔子釋文王六十四卦之先後次第也上經三十卦約之為十八下經三十四卦約之亦為十八此上下經之分也乾坤隂陽之純坎離隂陽之中為天地四正故易以乾坤坎離居上震巽艮兌反是則居下咸恒損益在下蓋震巽艮兌之交也上經首乾坤者天地之道二體之分也下經首咸恒者夫婦之道二體之合也易道貴中不欲其終下經泰否在上乾父坤母自交也需訟同人大有无妄大畜小畜履以乾父交六子故在上師比謙豫之在上則以坤母交三男也晉夷萃升之在下則以坤母交三女也剥復臨觀所以進而上者一陽二陽為主也夬姤遯大壯所以退而下者一隂二隂為主也困井革鼎家人睽蹇解豐旅渙節此六子自交故居下而屯蒙居上者三男繼父母用事也屯蒙以坎交震艮而在上故噬嗑賁以離交震艮亦在上隨蠱漸歸妹皆震巽艮兌之交而隨蠱在上長男長女為主也頤大過中孚小過雖皆震巽艮兌之交然頤大過互乾坤故在上中孚小過止肖坎離故在下向微孔子為之序則後世簡編脱落寧不錯亂又焉知某卦先某卦後哉孔子懼其或然此序卦所以作也韓康伯乃謂序卦非易之藴謬矣紫陽朱子曰謂非易之精則可謂非易之藴則不可有天地然後萬物生焉天地者萬物之父母故有天地然後萬物生焉人亦物也言萬物則人在其中矣天地乃乾坤之形體乾坤乃天地之性情不言乾坤而言天地以見乾坤為易之藴凡陽畫皆乾凡隂畫皆坤而三百八十四爻無非皆乾坤也諸卦言受而乾坤不言受乾坤蓋象卦之父母也盈天地之間者唯萬物故受之以屯萬物生於天地間无有逺近高深在在有之是盈天地之間者唯萬物也受之以屯謂以屯卦繼乾坤二卦之後也節初齊氏曰坤上六云龍戰于野其血𤣥黄屯上坎下震坎為血震為𤣥黄此所以繼於坤也屯者盈也屯者物之始生也屯者盈也謂其氣鬱結而未能通暢則充塞乎天地之間也屯者物之始生也謂萬物初生之時如是也正義云上言屯者盈也釋屯次乾坤其言已畢更言屯者物之始生也者開説下物生必蒙直取始生之意非重釋屯之名也平菴項氏曰屯不訓盈也當屯之時剛柔始交天地絪緼雷雨動蕩見其氣之充塞也是以謂之盈爾故謂之盈者其氣也謂之物始生者其時也謂之難者其事也若屯之訓聚紛紜盤錯之義云爾物生必蒙故受之以蒙物之始生精神蔽而未發若蒙冒然故屯之後繼以蒙序卦自乾坤以後皆言受不過第其次序而巳不必深求其義若深求其義則鑿矣夫謂乾坤之後受以屯為有説則可謂屯之後受以蒙為有説則不可蓋蒙乃屯之倒體屯之後必繼以蒙不容不蒙也一説謂屯者氣之始蒙者識之始此屯蒙所以繼乾坤一説謂聖人以屯蒙居乾坤之後者三男繼父母用事也何以見之蓋卦畫自下而始震居長坎居中艮居少則震下坎上而為屯坎下艮上而為蒙此屯蒙所以繼乾坤也夫三男之後當繼以三女今屯蒙之後繼以需訟而不以鼎革何也曰易道崇陽而抑隂也夫屯蒙二卦長男少男各一而中男二何也古為徐氏曰父母之生子也長男少男各一而已居長少之間者皆中男也故自屯至比中男者六也蒙者蒙也物之穉也蒙者蒙也上蒙字卦之名下蒙字物之蒙也釋文穉作稚物之穉謂萬物穉小之時也鄭𤣥曰蒙幼小之貌齊人謂萌為蒙嵩山晁氏曰先儒説蒙為微昧闇弱之名得於㣲弱而失於昧闇矣若蒙之名義在乎昧闇則屯之草昧已兼乎蒙矣物穉不可不養也故受之以需需者飲食之道也物之穉小者養而後長大孟子云茍得其養无物不長茍失其養无物不消物穉蓋不可不養也蒙之後繼以需需乃飲食之道也雨澤之潤益萬物乃萬物之所需飲食之潤益於人乃人之所需也人之所需莫急於飲食也平菴項氏曰需不訓飲食也人之所需飲食為急故以需為飲食之道也需乾下坎上陽為榖實而水氣上蒸亦有釀酒㸑食之象也飲食必有訟故受之以訟飲食者人之所大欲也所需不如所欲則必爭故訟繼需後樂記云夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮一獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也訟必有衆起故受之以師師者衆也師之興由有爭也爭必有衆起謂其必至於動衆也故訟後繼以師師者衆也衆必有所比故受之以比比者比也衆必有所比无所比則何所依歸故師後繼以比比者比也相親附之謂也上比字卦之名下比字人之比也郭京作比者親比也脱親字平菴項氏曰師比二卦相反師取伍兩卒旅師軍之名比取比閭族黨州鄉之名師以衆正為義故取其大者衆者而名之比以相親為主故取其小者近者而名之比必有所畜故受之以小畜比則必有所畜而非所畜之大故比後繼以小畜畜聚也與蓄同畜有止而聚之義説者皆訓畜為止其實乾之三陽聚于下故謂之畜也物畜然後有禮故受之以履嵩山晁氏曰案王輔嗣略例所引下有履者禮也一句誤入注中愚謂物之畜聚則有大小之别高下之等而禮在是矣故小畜之後繼以履禮蓋人之所履非以禮訓履也平菴項氏曰履不訓禮也人之所履未有外於禮者外於禮則非所當履故以履為有禮也履上天下澤亦有履之名分焉厚齋馮氏曰卦本以兑履乾為義正與小畜以巽畜乾對也天澤上下自是賛象之意然市合之取諸噬嗑備預之取諸豫古人用字聲同者皆通則履之為禮因天澤之象亦可兼通要之立卦之義則以踐履之履也履而泰然後安故受之以泰泰者通也禮之用和為貴拘束之甚則不安人之踐履和而舒泰然後安故履後繼以泰泰者通也謂其通行而无礙也紫陽朱子曰晁氏云鄭氏本无而泰二字物不可以終通故受之以否物无終通而不塞之理故泰後繼以否否者塞也物不可以終否故受之以同人向也乾坤否塞而上下不交今也乾離相同而上下相親矣向也不利君子貞今也利君子貞矣向也君子在外以儉德辟難今也同人于野亨利渉大川則疇昔在外辟難之君子皆出而濟難矣大抵與否義相反蓋物不能終否極則必反故否後繼以同人與人同者物必歸焉故受之以大有善與人同則物必歸焉故繼同人以大有大有者大者皆為吾所有也有大者不可以盈故受之以謙所有既大不可以有自滿故受之以謙有大而能謙必豫故受之以豫有大而不能謙則滿而必溢疾之者衆矣又安能豫有大而能謙則滿而不溢人皆敬之而无有疾之者矣則吾亦得以安和説樂故謙後繼以豫伊川程子曰有大而能謙承二卦之義而為次也豫必有隨故受之以隨豫者安和説樂之謂也安和説樂而无拒人之意則人皆欣然願隨之故豫後繼以隨以喜隨人者必有事故受之以蠱蠱者事也以喜説之道隨人必有事也无事則何喜何隨故曰以喜隨人者必有事事久則弊弊則壊故隨之後繼之以蠱也伊川程子曰以喜隨人者故受之以蠱承二卦之義以為次也蠱事也蠱不訓事蠱乃有事也平菴項氏曰蠱不訓事蠱者壊也物壊則萬事生矣事因壊而起故以蠱為事之元如人之亡謂之事故也以喜隨人者必淪胥以壊故雜卦曰豫怠又曰隨无故也怠則不憂无故則无所脩飭萬事之壊皆起於怠與隨所謂荒于嬉毁于隨者此之謂也方其隨也自以為无故也孰知多事之端實肇於此乎聖人繼之曰必有事其辭切矣有事然後可大故受之以臨臨者大也有事然後可大无事則何大之有故蠱後繼以臨臨者大也謂其所臨者大非訓臨為大也平菴項氏曰臨不訓大臨者以上臨下以大臨小凡稱臨者皆大者之事也故以大釋之若豐者大也則豐真訓大矣是以六十四卦之中有二大而不相妨焉物大然後可觀故受之以觀物之小不足觀物之大則可觀故臨後繼以觀可觀而後有所合故受之以噬嗑嗑者合也可觀而後有來合之者未有无所可觀而遽來合者也可觀而後有所合故觀後繼以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也无故而合必无故而離是以君子不茍合也君子之合也必有文以飾之故噬嗑之後繼以賁賁者飾也伊川程子曰物之合必有文文乃飾也如人之合聚則有威儀上下物之合聚則有次序行列則必有文也賁所以次噬嗑也白雲郭氏曰人之合則有上下長少非禮以飾之則无分无分則亂故不可茍合致飾然後亨則盡矣故受之以剥剥者剥也文飾太過亨之極也文飾之極則實喪故曰致飾然後亨則盡矣故賁後繼以剥剥者剥也上剥字卦名下剥字謂物之剥落而盡也物不可以終盡剥窮上反下故受之以復物不可以終盡也剥窮則上反下一陽自外而來復於内故剥之後繼以復復則不妄矣故受之以无妄復者反本而復於善也復於善則合正理而不妄矣故復後繼以无妄有无妄然後可畜故受之以大畜誠實无妄然後可以蓄其德而至於大故无妄之後繼以大畜物畜然後可養故受之以頤頤者養也物既畜聚然後可養故大畜之後繼以頤頤者養也圭叔吕氏曰萬物盛多而後養道備也需之養養之小頤之養養之大不養則不可動故受之以大過有所養則可動不養則不可動有所養而不動則已動則必有大過人者焉故頤後繼以大過圭叔吕氏曰養充則動而有大過人者矣物不可以終過故受之以坎坎者陷也物不可以終過過則必至於陷故大過之後繼以坎坎者陷也陷必有所麗故受之以離離者麗也陷於險中而无所附麗則不能出矣陷而有所附麗故坎後繼以離離者麗也王昭素本云離者麗也麗必有所感故受之以咸咸者感也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯有天地然後有萬物有萬物則人出其中然後有男女人為萬物之靈不過萬物中之一物耳以其靈於物故特謂之人人既有男女則有夫婦既有夫婦則有父子父居尊子居卑自然之道也既有父子之尊卑則有君臣之尊卑尊卑既立遂有上下之分既有上下之分則其相接也粲然有文而禮形焉秩然合宜而義見焉不然則禮義安所錯哉錯音措虞翻曰錯置也干寳曰錯施也伊川程子曰天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恒也天地二物故二卦分為天地之道男女交合而成夫婦故咸與恒皆二體合為夫婦之義夫婦之道不可以不久也故受之以恒恒者久也艮兌二少為咸咸則交震巽二長為恒恒則久夫夫婦婦將以偕老也其道不可以不久故咸後繼以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以久居其所久則當退是乃天之道也故恒後繼以遯遯者退也嵩山晁氏曰鄭本作物不可終久於其所物不可以終遯故受之以大壯物不可以終遯故遯後繼以大壯壯與遯蓋相反者也遯於義為退則大壯似於進矣而雜卦又曰大壯則止何也蓋大壯在遯之後晉之前介乎進退之間退而方止止而未進也固不可以言退然亦不可以言進序卦不訓謂其難以字訓而可以意曉也物不可以終壯故受之以晉晉者進也大壯則止物不可以終止而不進也故大壯之後繼以晉晉者進也伊川程子曰物无壯而終止之理既盛壯則必進也進必有所傷故受之以明夷夷者傷也進而不顧則必有所傷故晉後繼以明夷夷者傷也平菴項氏曰晉之義不止於進乃進而明也明之極必至於无徒故其進也必有所傷傷於外者必反於家故受之以家人雜卦曰家人内也傷於外而反於内故明夷之後繼以家人東坡蘇氏曰人窮則反本疾痛則必呼父母此傷於外則反於家也白雲郭氏曰行有不得者皆反求諸已治國治天下而不治者必反於家治自近始實一道也家道窮必乖故受之以睽睽者乖也治家之道窮極而不少恕則必睽乖離散故家人之後繼以睽睽者乖也白雲郭氏曰治道不可窮極有家有國有天下皆一也濂溪周子曰家人離必起於婦人故睽次家人以二女同居而其志不同行乖必有難故受之以蹇蹇者難也乖則人情不和必有艱阻故睽後繼以蹇蹇者難也白雲郭氏曰合則有飾乖則有難理之宜也平菴項氏曰凡言屯者皆以為難而蹇又稱難者卦皆有坎也然而屯動乎險中則誠行乎患難者也蹇之見險而止則但為其所阻難而不得前爾非患難之難也故居屯者必以經綸濟之而遇蹇者則待其解緩而後前其難易固不侔矣物不可以終難故受之以解解者緩也物无終難之理急甚則必緩故蹇後繼以解解者緩也緩者寛也緩必有所失故受之以損寛緩則玩而不知懼其有所失也必矣失則損故解後繼以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也損益盛衰若循環然損而不巳天道復還故必益益而不巳則所積滿盈故必決此乃理之常也損之後繼以益深谷為陵之意也益之後繼以夬高岸為谷之意也夬者決也決之義與孟子若決江河之決同家語云孔子讀易至於損益喟然而歎子夏避席問曰夫子何歎焉孔子曰夫自損者必有益之自益者必有決之吾是以歎也家語之言損益即與書禹謨滿招損謙受益一意却與序卦之説不同序卦蓋言損益盛衰之理家語則言自損自益之報決必有遇故受之以姤姤者遇也決開也遇合也開則必合決則必遇故夬後繼以姤姤者遇也平菴項氏曰陽之長也人以為君子之當然故曰復如人之復常也隂之長也人以為小人之天幸故曰遇如人之遭遇也物相遇而後聚故受之以萃萃者聚也物之相遇合然後㑹聚而成羣故姤後繼以萃萃者聚也平菴項氏曰物相遇而聚者彼此之情交相㑹也故謂之萃以衆言之也比而有所蓄者係而止之也故謂之畜自我言之也畜有止而聚之義聚者不必止也聚而上者謂之升故受之以升物之積小而成高大者聚而上也聚而上者謂之升故萃後繼以升平菴項氏曰升主騰上而言徒上不足以擬之故曰聚而上者謂之升如雲之升煙之升魂氣之升皆聚而上者也若象之地中生木爻之升階則但以上為升爾升而不巳必困故受之以困升者自下而上不能不用力也升而不已則力竭而困憊故升後繼以困升高不知回竟作黏壁枯觀蝸牛可見困乎上者必反下故受之以井極則必反是以困乎上者必反乎下也困窮於上井養於下故困後繼以井伊川程子曰承上升而不已必困為言謂上升不巳而困則必反於下也物之在下者莫如井井所以次困也井道不可不革故受之以革井之為物居其所而不可革者也其道則不可不革蓋井舊而有泥滓存之則穢濁而不可食渫而治之去其舊而潔然一新乃可以食故井後繼以革洪容齋曰大衍之用四十九一行以之起厯而革卦之序在周易正當四十九諸儒賛易皆不及此革物者莫若鼎故受之以鼎革物者莫若鼎鼎能變腥為熟易堅為柔也故革後繼以鼎主器者莫若長子故受之以震震者動也鼎動器也宗廟祭祀用之震居三男之長是為長子長子繼父而主祭者也故鼎後繼以震震者動也動者出而用事之初也或曰困井以坎水上下取義革鼎以離火上下取義此困井革鼎四卦所以相次也深居馮氏曰自乾坤四十有九卦而革去故五十卦而鼎取新震乃以長男而代父易之序也物不可以終動止之故受之以艮艮者止也物不可以終動動極而當止則止之可也故震後繼以艮艮者止也物不可以終止故受之以漸漸者進也物不可以終止止極而動其動必以漸故艮後繼以漸漸者進也漸不可訓進謂其進之漸也平菴項氏曰晉者明出地上進而明也徒進不足以盡之漸者山上有木以漸而進者也漸者進之方而漸亦非進也凡若此𩔖皆取其大意以明卦之序非以卦義為盡於此也進必有所歸故受之以歸妹進以漸而不驟則其進必有所歸故漸後繼以歸妹得其所歸者必大故受之以豐豐者大也窮而无所歸則小進而得其所歸則必大故歸妹之後繼以豐豐者大也窮大者必失其居故受之以旅大而能謙則豫大而至於窮極則必失其所安故豐後繼以旅旅而无所容故受之以巽巽者入也旅者親寡之時非巽順无所容茍能巽順則雖在羇旅之中何所往而不能入故旅後繼以巽巽者入也入而後説之故受之以兌兌者説也人之情相拒則怒相入則説入而後説之故巽後繼以兌兌者説也説而後散之故受之以渙渙者離也人之氣憂則結聚説則舒散説而後散之故兌後繼以渙渙者離也離散之謂也物不可終離故受之以節離散而無所制則放肆而不可收拾故渙後繼以節紫巖張氏曰渙所謂離蓋民情未一之義受之以節則有禮制存乎其間而將以合其情非若睽之乖也節而信之故受之以中孚節者制之於外孚者信之於中節得其道而能守之以信則可以信乎人故節後繼以中孚有其信者必行之故受之以小過自信之篤則行之必力不免小有過而失中故中孚之後繼以小過平菴項氏曰自恃其信者其行必果而過於中有其信猶書所謂有其善之有言其以此自負而居有之也有過物者必濟故受之以既濟能過於物必可以濟不然豈能濟哉故小過之後繼以既濟平菴項氏曰大過則踰越常理甚矣故必至於陷小過則或可以濟事故有濟而无陷也大過訓動小過訓行明過皆經越之義非過失之過也物不可窮也故受之以未濟終焉生生之謂易蓋變易而不窮也既濟則窮焉物不可窮故既濟之後繼以未濟易六十四卦循環不已未濟之後則又乾坤也或曰未濟六爻雖不當位而炎上潤下終歸於正猶乾坤也故易以未濟終焉趙蕤曰終焉二字疑非仲尼之辭蓋後人傳之誤也嵩山晁氏曰未濟之終復始於乾坤𤣥以將凖未濟曰隂氣濟物乎上陽信將復始乎下明此理也伊川程子曰未濟則未窮也未窮則有生生之義周易集説卷三十九
