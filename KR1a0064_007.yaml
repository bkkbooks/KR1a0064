body:
  text: 周易集說卷七宋俞琰撰下經二艮下坎上蹇利西南不利東北利見大人貞吉蹇難也足不能進而行之難也坎險在艮山之前進則䟦渉勞苦不容不退而止也卦有艮坎而无坤乃曰利西南不利東北何哉西南去坎險逺故利東北去坎險近故不利亦猶純坤卦无艮而曰西南得朋東北喪朋蓋舉彼以明此也孔子釋之曰蹇利西南徃得中也不利東北其道窮也西南乃指九五東北乃指九三九五剛得中故利九三剛過而失中故不利文王以坎艮之方位言孔子則釋以坎艮之主爻也大人指九五蹇難之時非見大才大德之人莫濟又必居貞而不失其所守則吉故曰利見大人貞吉時雖蹇難然自二至上其位皆正所以吉也初六徃蹇來譽徃蹇謂徃則䟦渉勞苦也徃以坎言來以艮言來者對徃之辭諸爻皆以進前為徃退歸為來初六以陰柔處重險之底位卑才弱又无應援雖不徃可也不徃則有見險而能止之令譽蓋與其進前自經于溝瀆而莫之知則不若退歸于下居易以俟命也六二王臣蹇蹇匪躬之故王指五二應五乃王之大臣也諸爻皆有徃來之辭此言王臣蹇蹇而不言徃來盖委質為王之臣則當盡掃趨利避害之心絶去徃來遷就之計但知努力向前雖在險阻艱難中蹇而又蹇不以䟦渉勞苦辭也故事故也六二柔順中正而公爾忘私所以捐軀赴難雖跛而猶行蓋為王之事非為己之事也九三徃蹇來反反當依郭京作正以九居三正也又為内體艮之主爻在下二陰皆倚之為重者也雖有應在上陰柔不足為援徃則徒爾䟦渉勞苦不若來之為愈來則得位于内而内喜之又不失本體艮止之正也六四徃蹇來連連如孟子連諸侯之連六四居重險之間而其才純乎陰柔又无應援豈能獨徃然為王之近臣則又不容坐視其難而弗救近有九三剛陽之才得衆而為主于内四能連之則亦庶乎其可也九五大蹇朋來大蹇大者蹇也九五陽畫之大為蹇之主故彖以為大人爻以為大蹇它爻皆言徃此獨不言徃君守君位不可以它徃也朋來謂六二之朋來為之助也上六徃蹇來碩吉利見大人上六才弱亦不足以濟蹇位居蹇極又將焉徃若能來就九三相與共濟則有碩大之功而吉也碩與剥上九碩果之碩同碩亦大也九五既言大故以九三為碩諸爻並不言吉皆未能出蹇也上獨言吉蹇極則變而為解也利見大人謂在蹇之時皆宜見九五大人上六不可以在外自弃而不見也坎下震上解利西南无所徃其來復吉有攸徃夙吉解散也下坎上震動而出險則昔之蹇難悉解散也與孟子猶解倒懸之解同當作佳買反序卦雜卦云解緩也作胡賣反與此不同猶觀卦彖爻皆作平聲彖傳觀天下却作去聲蓋自是一義卦唯坎北震東而曰利西南是亦舉彼以明此也孔子釋之曰利西南徃得衆也无所徃其來復吉乃得中也則利西南指九四而言无所徃其來復吉指九二而言九二即蹇九五向也徃而在上今則來而在下是為來復九四即蹇九三向也艮體止而不動今則進而在四變為震體之動是為有攸徃而夙夙蚤也蹇難解散之時若无所徃則以來復而安静為吉若尚有所當解之事而徃則以蚤徃蚤復為吉不可乆煩擾也初六无咎初六陰柔處九二剛陽之下安静而无所徃故无咎九二田獲三狐得黄矢貞吉田畋獵也狐多疑之物指乗承應之三陰黄中色矢直物大抵蓄疑則敗謀不足與有成今夫難解之後君臣上下而有疑心則處事皆緩矣九二乗初六承六三應六五皆陰性之多疑者也九二茍无中直之道何以釋其疑羣疑既釋二也得其中直而又固守以正是以吉也獲以物言得以已言衆皆疑而我釋其疑故言獲中直則在我而巳故言得六三負且乗致宼至貞吝乗當依釋文作平聲六三陰柔不中不正而居下卦之上此小人无德而居髙位者也上承九四下據九三負且乗之象也以陰柔居兩剛之間猶負荷貨財之人又乗車馬以行豈不招致宼盗之至乃又固執而不知變則其取羞吝也必矣九四解而拇朋至斯孚而猶汝也三居四之下无應而附于四乃四之拇也朋指四之應四應初又比三則其應不專也初也蓋不能不致疑焉疑則不信安肯至而相助今九四解去六三而專應初六則初六之至也斯見信而相合矣故曰解而拇朋至斯孚六五君子維有解吉有孚于小人解之維即坎之維謂君子相維持也六五下應九二近比九四二君子相與維持而凡事皆從解釋使小人有生路可趨吉之道也故曰君子維有解吉小人指在下衆陰君子无害小人之心而小人與君子共處亦不疑君子之害己彼此相孚故曰有孚于小人上六公用射隼于髙墉之上獲之无不利隼指三三小人之鷙也故象隼墉亦指三三内外之限也故象墉同人九四乗三以三為墉解上六應三故亦以三為墉在解極之時而猶有鷙害之物則不容不去之也自上而攻下其勢順故獲之而无不利易中大事稱王小事稱公公用此占則動而有獲无不利也公指五用謂五用上也兊下艮上損有孚元吉无咎可貞利有攸徃曷之用二簋可用享損裁減也凡自抑其過以就義理皆損之道也有孚元吉无咎可貞利有攸徃指上九曷之用二簋可用享指六三損之成卦蓋在此二爻也孚信也上與三應而彼此相信是有孚也元吉吉之盡善也无咎无人咎之也可謂時之可貞謂固守以正損下而益上豈易事哉必有孚元吉无咎可貞然後利有攸徃與人不相孚則凶且有咎尚可固執而又有所徃哉用謂用損之道也曷之用問辭二簋可用享荅辭陽一陰二六三陰畫之偶故言二簋二簋言其簡略也可用者適時之變而非其常也享盛禮也古者祭神祇祭祖考與王享諸侯諸侯享王通謂之享當損之時而行享禮雖二簋之儉亦可用所以適時之變化也必以享為言享猶若是則其自奉可知矣初九巳事遄徃无咎酌損之巳止也巳事止其事也遄速也與詩崧髙式遄其行之遄同初與四應四有疾初徃救之則所謂己事者巳疾之事也巳人之疾與它事不同徃不速則緩不及事而有咎矣必速徃則咎可免故曰已事遄徃无咎四言損其疾使遄有喜无咎蓋與此相𤼵初九才位俱剛雖陽實有餘而可損然在下處卑是冝酌量深淺而損之弗可過甚故曰酌損之九二利貞征凶弗損益之貞者固守以正也征者以正而行也九二剛而不正故戒之曰利貞征凶蓋恐其說以奉上也夫當損下益上之任者三也初與二皆非所當損初九以剛居剛且曰酌損之況九二以剛居柔乎二若說以奉五則徒爾損下非益上之道也惟宜以剛德自守不妄說不妄動則于下弗損而于上實有益故曰弗損益之卦以損下益上為義爻以陰虚為損陽實為弗損卦以二體言爻則以一畫言六三三人行則損一人一人行則得其友三人下三爻也一人六三也初九九二皆陽剛之實而三獨為陰柔之虛是三人同行而損其一人也一人行則得其友謂三上相應一陰一陽兩相與也兩相與則専參以三則疑戒占者當致一也六四損其疾使遄有喜无咎上三爻皆受益者也而四言損其疾何哉受人之益則已之疾損也益之者誰初九是也損之義損有餘以補不足而初九曰酌損之所以為六四之益也損之諸爻唯六四以柔居柔而虚弱之甚是其疾也使遄使初九之遄也四雖未能盡去其不善然急于從人之善是亦善也故有喜而无咎六五或益之十朋之龜弗克違元吉六五虛中損已以應九二本受下之益者也而上九與之相比又從而益之故曰或益之上九且或益之況九二之應乎若上若下皆益之雖鬼神亦弗能違其吉為最大而甚善故曰十朋之龜弗克違元吉上九弗損益之无咎貞吉利有攸徃得臣无家上九弗損益之其義與九二同損極成益居上益下益於己弗損於人有益此所謂惠而不費者也故其占曰无咎若能以剛德自守則吉而利有攸徃其辭全類彖辭者上九乃成卦之主爻也六三亦成卦之主爻彖辭不以屬六三而以屬上九主陽而言也臣指三在下是為臣家亦指三在内是為家无家者公爾忘私國爾忘家也三以得上為得友上以得三為得臣上之益下其惠既如此故下之報上其忠亦如此震下巽上益利有攸徃利渉大川益増長也損倒轉為益則下震上巽以初九六四兩爻取義損下益上曰損損上益下曰益二卦皆主下體而言益之為卦下動而上巽以行則利有攸徃以濟則利渉大川初九利用為大作元吉无咎初九陽畫之大震體之動是為大作當益以興利之時四為近君大臣能以巽順之道下任初九故初九得以盡其才力而為之大作夫興事動衆最易有咎況在下而當此大任必其所作大善而有益于民可也无益于民而興事動衆則大作乃為大擾而益反為損矣豈但无咎而已六二或益之十朋之龜弗克違永貞吉王用享于帝吉損六五或益之上九之剛益之也益六二或益之初九之剛益之也皆非出于正應故言或六二當損上益下之時虚而能受中而无過為一人或益之衆人皆益之雖鬼神亦弗能違故曰或益之十朋之龜弗克違二也不可恃其益之者衆而驕逸自縱當永乆固守臣下之道則吉故戒之曰永貞吉享帝祭天也王用享于帝吉謂王者得此占用此爻義動而有事于上帝則受福而吉是亦居下而受上之益也六三益之用凶事无咎有孚中行告公用圭凶事凶年救荒之事也施益于凶荒之時與常時不同不有變通之道何以益之量冝應卒如後世汲黯之𤼵倉乃无咎不然則下專自任上必忌疾欲无咎得乎孚謂初九同體而相信也有孚中行謂與人相信又以中道而行也圭者通信之物指初九而言古者大夫執圭而使所以申信也益以初九為下卦之主爻故六三之告于公也不敢越度以自專必用初九以達信故曰告公用圭三公侯之位也六四中行告公從利用為依遷國三四皆不得中而皆言中行雖非二五之中亦全卦之中也以益下為心而所行合于中道則告公无有不從故曰中行告公從三四皆公侯之位三告公用圭四告公不用圭何哉六三位不當而去君逺故告公必用圭以致信六四位當又居近君之地故告公即從而不用圭也益六四即損六三向在下體今居上體故言遷近五故言依以柔附剛以小附大得所依矣如周遷依晉鄭邢遷依齊是也四巽體卑巽則能依託于人故曰利用為依遷國三四皆告公三用事而後告四先告而後遷又何也曰益用凶事乃救荒危急之事況去君逺若待告而後為之則无及矣故告于用事之後遷國大事也與危急之事不同四又近君故告之于先必待公從而後為之也九五有孚惠心勿問元吉有孚惠我德此爻凡兩言有孚當分為兩說惠順也與書大禹謨惠迪吉之惠同九五比四而應二四與二皆與我相孚者也四之惠心蓋與我相比而惠我心也其事雖于我若有損而其道則于我大有益茍以其損也而問之是使四不得沛厥施也故勿問則元吉二之惠我德蓋知我勿問則亦以益下為心而惠我德也九五為損上益下之君巽而又中正故其象如此上九莫益之或擊之立心勿恒凶卦以損上益下取義上九當下益六三今乃曰莫益之何哉益極則又成損不能益人反欲損人人亦莫之與也莫之與則或有撃之者至矣擊之者誰九五是也五非上之應故言或益與損不同損彖傳云損剛益柔有時損下之道時暫而巳不可恒乆也益彖傳云益動而巽日進无疆天施地生其益无方益下之道則冝恒乆不恒乆不可也上居巽體之極躁進躁退而立心不恒凶之道也其義與恒九三同乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸徃夬決也五陽決一陰衆君子去一小人如水之決莫之能禦也然一隂在上與九五同是兊體而其情相説九三又與之相應非剛決未易去也揚于王庭謂上六處兊説之極近比九五之君而揚揚自得肆其旡忌憚也孚信也號平聲呼也上六恃與九五相孚遂號呼九三以為已之黨三若與之相應是黨惡也何以自安于衆君子之中蓋有厲矣五无正應豈宜告自九四之邑而謀動干戈于邦内哉故曰告自邑不利即戎二居大臣之位宜與衆君子同心協力往除君側之惡故曰利有攸往初九壯于前趾往不勝為咎初九以剛居剛壯也處卑而勇往直前故曰壯于前趾衆皆未往而我獨憤而先往往能勝乎往不勝則有咎矣不曰有咎而曰為咎者其咎乃自為之也九二惕號暮夜有戎勿恤號與戎皆指上上號三二聞其號而驚惕故曰惕號驚惕則知戒備是故暮夜有戎而勿用憂恤也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎九三以剛居剛壯也頄面觀骨也壯于頄謂剛決之志𤼵于外也以此而決小人是疾之已甚而招禍豈所謂決而和之道哉其終必至于激變而有凶也夬之五陽皆君子今獨稱九三為君子則其不與小人為黨也夬夬者決而又決也獨行謂諸爻皆无應而三獨應上是不與衆同而獨行也隂陽和則雨遇者不期而㑹非其本心也當衆陽決一隂之時九三乃與之交疑于汚也故曰若濡始焉衆陽疑其迹之汚未免有愠終則察其心之正而无有咎之者故曰有愠无咎九四臀无膚其行次且牽羊悔亡聞言不信坐則臀在下故困初言臀行則臀在中故夬姤三四言臀易以柔爻為膚剛爻為无膚夬之所決者上也三與上應五與上比四也亞于三五之間坐則不能安行則不能進故曰臀无膚其行次且九四剛而不正很愎如羊本有悔也今曰牽羊悔亡者三陽追逐于後而與之俱進也羊性很愎牽者當其前而力挽之則忿而不行讓之使前而隨其後則行也言即彖辭所謂告自邑之言九四很愎故聞九五之告而不信得此占者茍能聞言而信則可轉凶而為吉也九五莧陸夬夬中行无咎莧陸皆指上六之隂柔莧門辯反陸章陸一名當陸皆澤草也莧葉柔而根淺陸葉柔而根深五比上甚近視上猶莧也三應上稍逺視上則猶陸也九五以剛陽之君決去上六隂柔小人猶芟夷莧陸有何難者然與之私情相説非一決所能去也五與三俱言夬夬者三與上應五與上比皆當決而又決也三既絶其私應五又絶其私比則上也无所恃矣又言中行无咎者君子去小人之道貴乎決而和今九五與九三皆以中道而行和而不暴又何咎之有上六无號終有凶上之所號呼者三之應也三不應則上无所號呼矣彖傳言剛長乃終夬至上則隂盡陽純而小人終矣小人為惡而至于此則其終之有凶非不幸也宜也巽下乾上姤女壯勿用取女姤遇也夬之上六倒轉則為姤之初六向嘗決之今又遇之也初巽體巽為長女故曰女壯不期而與人相遇已自非正况又一隂而遇五陽可見女徳之不正也取去聲勿用取女戒四也初比二已為二所先得四取之可乎夬姤二卦皆以一隂為主彖辭皆主其所應而言易蓋為君子謀不為小人謀也初六係于金柅貞吉有攸往見凶羸豕孚蹢躅柅車下止輪之物金柅指九二之剛爻一隂始生貞静而止則吉故曰係于金柅貞吉躁動而往則凶故曰有攸往見凶羸即係也與羸角羸瓶之羸同豕隂躁之物初六之象也孚謂應四而與之相孚蹢躅乃躁動而跳躍之狀初係于二是以伏而不動四若與之相孚則自此跳躑而不復可制矣九二包有魚无咎不利賔魚隂物指初六止初六之進全在九二二不能止則長而為遯不至于剥不已也君子制小人使之順命歸吾籠絡如魚在包苴不能縱逸則何咎之有賔非獨指四初為姤之主爻諸陽皆其賔也凡遇初者皆不利初隂在下雖微二宜即制之不利及賔若使之進而與四相遇不但于四不利亦非諸陽之利也九三臀无膚其行次且厲无大咎臀无膚之説與夬九四同二與初比四與初應三也亞乎二四之間而其行次且蓋危厲矣能无咎乎然其徳剛正不為隂柔所牽故雖危厲亦无大咎九四包无魚起凶初六之魚已近為九二所有四雖應初不如二之近又焉得魚夫初六乃不中不正之女彖辭戒之曰勿用取女九四雖不得魚无後災若起而求之則凶矣九五以杞包瓜含章有隕自天杞大木九五之象也瓜柔物指初六也杞譬則君𤓰譬則民杞參天瓜附地猶五與初逺而不相遇今曰以杞包瓜則相遇矣瓜延蔓之物自下而達于上杞葉茂遂包之也含即包之謂章命令之美其初含蓄不露一旦告于四方自上而降則猶瓜熟蒂脱自杞墜地故曰含章有隕自天九五徳位中正權不下移雖去初逺而下情无不上達故言其所遇之道如此上九姤其角吝无咎姤其角與晉其角同皆以剛居上為角之象上九處姤之極剛亢絶物而鄙吝如此能无咎乎而去初甚逺與小人不相遇亦无咎也坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃聚也此卦坤下兊上坤為地兊為秋地氣𤼵散于夏迨秋則収斂而合聚萃之義也萃下亨字衍文觀傳可見王與大人皆指九五假當依馬融作古雅反訓大與豐彖辭王假之同王假有廟謂王者于民物萃聚之時大立祖考之廟以致孝享也是時宜見大人乃得亨通而所聚又宜正否則人聚為茍合財聚為悖入故于利見大人亨之後繼之曰利貞大牲殺牛以祭也時為損則二簋可用享不以為簡時為萃則用大牲不以為過各以其時也内順外説无往不可故其象占又為用大牲吉而又利有攸往初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎有孚謂與二同體同徳而相孚也又欲應四則其孚不終志亂而莫知所從故曰有孚不終乃亂乃萃號呼也四若號初初當應之四乃兊體之説既見則相與一握手為笑勿用憂恤也四與五蓋同體初往從四亦可因四以萃于五又何咎之有故曰若號一握為笑勿恤往无咎握與號笑皆指四六二引吉无咎孚乃利用禴五為萃主二與之應為四所間而莫能萃故不言萃所以吉而无咎者五引而進之也若不俟其引而遽往則不但不吉亦不能无咎矣禴薄祭也用禴而言孚乃利何哉蓋當萃聚之時唯相孚然後宜用此禮不相孚則不可用也六二柔順中正虛中而上應九五剛健中正誠實而下交上下相孚如此故宜用禴六三萃如嗟如无攸利往无咎小吝萃之時利見大人三與五非應非比而不得其萃未免有嗟嘆之聲三之應在上上方自不獲萃而涕洟三而求援于上則亦无攸利矣既曰无攸利又曰往无咎往何之也三與四比則其往也亦可因四以萃五也初亦言往无咎初之往既因四而得萃于五則三也捨四可乎三之從四四亦巽而受之故无咎第无正應而近比于四所聚非正有此小疵耳九四大吉无咎萃六爻皆无咎四獨大吉而後无咎又不言萃何也四為九五之近臣衆之所聚咎之所歸也唯能部領在下三隂聚而歸順乎五然後大吉而无咎九五萃有位无咎匪孚元永貞悔亡九五尊居天位為萃之主故曰萃有位剛而有所守中正而无過為故无咎雖然謂之有位不過僅有其位號耳差强于豫之六五非若比九五之專也匪孚謂與已不相孚者也五之所孚唯六二耳如初則四之應三則四之比皆匪孚于我者也天下或有匪孚于我豈能无悔而曰悔亡者由其元永貞也元永貞之義與比同比唯九五一陽天下皆知比于五故元永貞言于彖萃有二陽則恐天下莫知所萃故元永貞言于五亦猶宻雲不雨自我西郊小畜則言于彖小過則言于五其義各有所取也上六齎咨涕洟无咎齎持也咨當依陸希聲作資上六以隂柔居外而下无正應徒齎其資逺來求萃于五而求萃不得自傷其窮于是涕洟交作而憂懼之甚也夫當天下咸萃于五上獨背之而不得萃何為而无咎曰其居使之然也非其罪也故无咎此爻取義與屯比上六同周易集說卷七
