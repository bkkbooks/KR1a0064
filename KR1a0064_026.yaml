body:
  text: 周易集説卷二十六宋俞琰撰文言傳一古易十二篇文言傳自為一篇題曰文言傳者孔子明文王彖辭爻辭言外之意以盡乾坤二卦之藴而餘卦之説因可以類推也自王弼移附乾坤二卦後加文言曰三字冠於首而除去傳字後人遂不曰文言傳而僅曰文言或謂文飾其言或謂交錯而言或謂古有是言而孔子文之或謂言不文則不足以傳逺故因其文以詳言其理所以文飾乾坤之大徳愚案陸徳明釋文梁武帝云文言是文王所制梁武之説必有所據但制字未瑩耳或曰文言文王言即彖辭爻辭孔子傳述文王所言之意而推廣之故曰文言傳愚觀其反覆發明乾坤二卦彖辭爻辭之意則知古易題曰文言傳良是矣分明彖辭爻辭皆文王之言而孔子傳述之也首章云元者善之長也春秋左氏傳惠伯之説同穆姜則以善字為體字較好或者因而疑之曰兹非孔子之文孔子以前穆姜惠伯嘗言之則此語乃古語也愚則曰古無是語穆姜惠伯亦無是語左氏葢借孔子之説為穆姜惠伯之説耳何以見之如吕相絶秦書此豈當時史氏之文哉蓋皆左氏為之也又如國語司空季子之占既取八物之象又有坎勞卦之語審如是則孔子之前司空季子已有是説矣謂説卦為非孔子所述亦可也吁讀易者要當明辨茍輕信左氏之浮言而反疑聖人無乃不可乎元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也元亨利貞莫非善也元居亨利貞之首故曰善之長亨者通也亨而無不盡美故曰嘉之㑹利者宜也利而無有乖戾故曰義之和貞者正而固也處事而固守以正則何事不立故曰事之幹乾之元亨利貞即人之仁義禮智今於元亨利貞不言仁禮智而於利獨言義以見君子不以利為利而以義為利也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事伊川程子曰比而效之謂之體紫陽朱子曰此語未安體仁如中庸體物之體相似仁理也人物也以人之身而體仁之理乃足以長人矣愚謂君子以仁為體則痒痾疾痛舉切吾身而無一毫之非仁故足以長人長人者居人之上而為之君長也輔世長民莫如徳則無一物不在所愛之中蓋惟仁者則宜在髙位不仁而在髙位是播其惡於衆也故曰君子體仁足以長人禮者天理之節文嘉會謂事事盡美而動容周旋無不中節也禮以會而後行會以嘉而合禮故曰嘉㑹足以合禮利與義皆訓宜利自義中來義安處便是利非義之外别有利也大凡利於已不利於物則為悖於義而不和豈所冝哉蓋唯利物而不以已害物則足以和於義而不悖斯得其冝故曰利物足以和義貞固謂擇善而固執之也固而不正則衆議得以屈之正而不固則衆力得以傾之唯知正之所在而固守之乃足以立事故曰貞固足以幹事言利貞而不言元亨言仁義禮而不言智蓋互文見意將使學者觸類而長之也紫巖張氏曰不言智而言貞惡夫智容有不貞者君子行此四德者故曰乾元亨利貞人道與天道一也君子行此仁義禮智即行此元亨利貞也君子即乾也仁義禮智即元亨利貞也自前至此乃第一節申彖傳之意初九曰濳龍勿用何謂也子曰龍徳而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可㧞濳龍也此以下乃第二節申爻傳之意歐陽文忠公曰此非孔子所作之全篇也若皆孔子作則其文自有次第何假子曰以發之亦不應自稱子曰也其先言何謂後言子曰乃講師自為問答之言亦如公羊穀梁之傳春秋先言何曷而後道其師之所傳以為傳也紫陽朱子曰所謂子曰者是弟子後來添入亦不可知近來胡五峰將通書除去篇名却在上面各添周子曰此亦可見其比愚謂中庸大學亦稱子曰蓋皆後人所加也濳見躍飛皆龍徳也龍徳即君徳今曰龍徳而隠謂以九居初雖有君徳乃在下而隠者也不易乎世守其道而不為習俗所移也不成乎名晦其行而不求名譽之著也遯世无悶遺佚而不怨也不見是而无悶人不知而不愠也樂即无悶之謂无悶故樂也樂則行之者君子樂天知命安貧而不憂則遵初九在下之象而行此濳龍勿用之道也憂則違之者小人不知天命長戚戚而不樂則悖初九在下之戒而違此濳龍勿用之道也言樂而兼言憂亦猶後章坤初六不善之殃與善之慶並説以見君子則如是小人則反是也或以進字假行字避字假違字而云見可而進知難而避是豈初九爻辭之旨哉夫既濳矣既勿用矣尚何見可而又進即尚何知難而致避耶或又謂君子有時乎憂樂其行其違皆出於我去聖人之意逺矣確堅也確乎其不可㧞者内有所守而堅確富貴不能淫貧賤不能移威武不能屈也此章始言龍徳而隠終又總結之曰濳龍也蓋自不易乎世至確乎其不可㧞皆初九濳龍之徳而君子所以勿用也若為世俗所移而求名譽之成遯世而悶不見是而悶内無所守而為人所㧞則豈初九潛龍之德哉九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也龍徳而正中謂九二有乾龍之剛徳而在潛躍之間無過無不及而正得其中也庸常也常言常行必信必謹則口不妄語身不妄動也邪即人欲誠即天理遏人欲所以存天理也理欲界限不可不嚴弗為之防則人欲存乎其中而天理亡矣故閑邪存其誠也善世猶言兼善天下不伐不有其善也位非九五何以善世而九二云爾者徳博故也徳博而化正已而物正也此大人之事也君徳謂君人之大徳孔子贊乾之九二曰君徳蓋明指大人之為九二也他卦皆以二為臣位未嘗以二爲君徳乾六爻皆言人君之事九二蓋人君之子未為人君之時未有君位而有君德者也其位雖臣其徳則君故孔子贊其徳曰龍徳又言君徳言信行謹閑邪存誠贊其徳之中善世而不伐徳博而化皆申徳施之義中庸云唯天下至誠為能化又云誠者非自誠已而已也所以成物也子思皆夲乎此九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳脩業忠信所以進徳也脩辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣進徳脩業謂君子終日乾乾也何以進徳忠信所以進徳也徳與忠信皆主於心者也何以居業脩辭立其誠所以居業也業與辭皆見於事者也事已成謂之業脩業者業未成則脩而成之也居業業已成則居而守之也居與論語百工居肆之居同辭言辭也脩謂脩省非脩飾也誠即忠信也立其誠謂立其誠意而不為私意所汨撓也若但以脩飾言辭為心則偽矣君子閑邪存其誠則無一念之不正也脩辭立其誠則無一言之不實也至謂行吾所有之徳進而至於此也蓋指九三夲爻即非謂至於九五終卒吾所脩之業居而終於此也亦指九三夲爻即非謂終於九五幾乃幾及之幾與比六三幾不如舍之幾同皆訓近即非幾㣲之幾存義謂存其分義而不可過也君子之於徳也知其所當至而篤行焉則其至之也如九三之位至於下體之上而無不及故曰知至至之可與幾也君子之於業也知其所當終而固執焉則其終之也如九三之位終於下體之上而無過故曰知終終之可與存義也居上位謂九三位居九二之上也在下位謂九三位在九四之下也徳進而已不有故不驕業修而上不忌故不憂無咎者善補過也九三過剛而不中又處危地本不能無咎也所以無咎者以其終日進脩乾乾不息又因其時而惕懼則足以補其過矣時釋夕字危釋厲字不驕不憂釋無咎之義至之終之可與幾可與存義皆申終日乾乾反覆道之義紫陽朱子曰知至至之屬忠信進徳意思進字貼著幾字至字貼著進字知終終之屬修辭立誠居業意思居字貼著存字終字貼著居字又曰可與幾可與存義是旁人説如可與立可與權同居業如此存義如此蓋慎守臣位而知終者也安有犯上之心哉九四曰或躍在淵无咎何謂也子曰上下无常非爲邪也進退无恒非離羣也君子進徳脩業欲及時也故无咎九四才剛位柔故其躍也或上或下而無常或進或退而無恒位不正為邪九二九四皆以陽居隂位而不正故皆言邪羣指在下三陽非為邪謂其動而或躍非為小人之邪媚也非離羣謂其静而在淵非離君子之善類也既非為邪又非離羣何為而不寕若是也君子之進徳脩業欲及時也時難得而易失君子不敢自失也學記云當其可之謂時失時則如上九之亢而年事過髙精力衰弱無能為矣有不動動則有悔况又不知進退豈得無咎今九四所以無咎者知進知退而又能不失其進徳脩業之時也夫時至九四吾惟進吾九四之業而已吾於分内所當進者進之所當脩者脩之又何咎之有進脩有重習之意而三四在重乾之交故此兩爻皆言進徳脩業上與進釋躍字下與退釋在淵之義無常無恒釋或之義非為邪非離羣欲及時以申進無咎之義上上聲下離皆去聲九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩夲乎天者親上夲乎地者親下則各從其類也物之聲同則自以聲相應氣同則自以氣相求如水性潤下而濕地之濕者水必流焉火性炎上而燥物之燥者火必就焉龍水畜雲水氣故龍出則雲生虎威猛之獸風疾烈之氣故虎嘯則風生蓋各以其類相從也天運動而在上故物之本乎天者亦飛動而親上地處静而在下故物之本乎地者亦静植而親下無非各從其類也人為萬物之靈亦萬物中之動者耳聖人之於人亦類也是故聖人作於上而萬物覩於下聖人作釋飛龍在天萬物覩釋利見大人紫陽朱子曰分明以聖人為龍以作言飛以覩解見字上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也卦有六爻爻各有位是故彖傳謂六位時成說卦謂六位而成章則上九豈得無位今曰无位者九五為乾之君居乾九五之正位而尊無二上也上九亢極而過中貴極而失正其位雖在九五之上而無九五之正位故曰貴而無位凡卦皆以五為君初為民二三四上並為臣上九居至髙之位而去初甚逺故曰髙而无民二三四皆從五而不輔已故曰賢人在下位而无輔上九既无正位又无民又無賢人之輔乃又動而不知止能無悔乎爻辭言有悔孔子釋之曰是以動而有悔也蓋吉凶悔吝生乎動動則有悔不動則無悔也貴與髙釋亢字无位无民无輔皆申盈不可久之義伊川程子曰王弼以為無隂陽之位隂陽繋于竒耦豈容無也乾元上九云无位乃爵位之位非隂陽之位也開封趙氏曰九五有位有民有輔上九无位无民无輔則失聖人之㫖矣濳龍勿用下也此以下乃第三節重論六爻之義以再申前意也下謂初九之位在六爻之下龍在下則濳陽在下則藏君子在下則隠其為勿用一也紫陽朱子曰濳龍勿用下也與濳龍勿用陽在下也只是一意但重說耳見龍在田時舍也舍如館舍之舍時舍謂時止則止君子當隨時而止也乾之六爻以德言則皆君徳以位言則唯九五為君位餘皆臣位九二雖有君人之徳然其時為臣則當安臣位故曰見龍在田時舍也平菴項氏曰舍非用舍之舍舍之則為濳龍矣舍者隨其所在而居焉古語舍訓為置茍置於此則舍於此故傳舍亦為傳置乾之時舍井之時舍隨之志舍下姤之志不舍命四舍字皆去聲龍夲行天之物不常在田出潛之初時寓於此故曰時與濳異者濳則入而不出舍則已出而未行又曰時舍以在字言之終日乾乾行事也行事行吾分内所當行之事即進徳脩業之事也或躍在淵自試也試釋躍字與中庸日省月試之試同君子謹失時之戒而自試其所學蓋欲自知其淺深也飛龍在天上治也上釋天字初言下五言上蓋相發也伊川程子曰上治以天徳位天位治所從出亢龍有悔窮之灾也窮而不知變則災必逮夫身窮釋亢字災謂有悔乾元用九天下治也易窮則變變則通通則久體乾之元用乾之久則變不窮聖人通其變使民不倦是以天下治也潛龍勿用陽氣潛藏此以下乃第四節又申前意初之潛也隠而在下陽氣潛藏於重泉微而未之見也見龍在田天下文明二之見則出濳離隠雖不在上位然德博而化天下皆文明矣見非表暴之謂也誠則形形則著著則明故天下利見而為之動為之變為之化而盡皆如已之文明也平菴項氏曰天下文明以見字言之終日乾乾與時偕行三居下卦之上時既進矣君子之徳亦與時而進也或躍在淵乾道乃革四之躍也離於下而進於上與在下之時不同矣乾道於是乎革也革者變也下乾以終上乾方始猶天道更端之時也平菴項氏曰卦至四則下革而為上時至卯則寒革而為暄皆進而得時者也飛龍在天乃位乎天徳九天徳五天位有是徳乃宜在是位也亢龍有悔與時偕極易以爻為所處之人位為所逢之時以九居三而三陽方盛故與時偕行九三蓋得時者也以九居上而六陽已窮故與時偕極上九蓋失時者也或曰乾以徳明爻初曰徳之隠二曰徳之中三四皆曰進徳五曰位乎天徳獨上不言徳上其有悔而以徳者乎乾元用九乃見天則歐陽文忠公曰初無不變變無不通此天理之自然也故曰乾元用九乃見天則廣平游氏曰將來者進成功者退天之則也愚謂天則則天道也寒極而變暑暑極而變寒是之謂則乾所以用九而不用七者九變而七不變也故用九則見天則乾元者始而亨者也利貞者性情也此以下乃第五節復申彖傳之意天者莫非一元之運行周流而不間斷是以生生而不窮物之生也皆自此萌動暢茂條逹故曰乾元者始而亨者也性言其静也情言其動也物之動極而至於収斂而歸藏則復其夲體之象又將為來春動而發用之地故曰利貞者性情也静而至於静之極但言其性足矣又兼言情何耶曰元起於貞貞下蓋有元繼焉動生於静静中蓋有動存焉貞而元静而動終而復始則生生之道不窮若但言性而不言情則止乎貞純乎静而已矣不見貞下起元静中者動之意而非生生不窮之道也此所以不分别孰為性孰為情而特渾而言之曰利貞者性情也鄭𤣥不明此義乃以性情作情性淺矣乾始能以美利利天下不言所利大矣哉乾始即乾元也元乃生物之始也美即亨也亨乃衆美之㑹也乾能生育萬物以利天下而天下皆獲其美利故曰乾始能以美利利天下乾之利天下無徃而非利不可以名焉故曰不言所利如坤言利牝馬之貞屯言利建侯之類皆指其所利而名言之名言則小不言則大故又贊其不言所利而特曰大矣哉或者疑之曰不言所利而二五之爻以利見稱何也曰孔子之意蓋為乾之彖辭不言所利非謂乾之爻辭不言所利也大哉乾乎剛健中正純粹精也六十四卦唯乾純陽而其徳最大故孔子贊乾之元乾之利皆曰大又贊乾之九五曰大哉乾乎剛健中正純粹精也剛則不屈健則不息中則無過無不及正則無反無側純則無雜粹則無疵精則純粹之至也乾之六畫無不剛無不健二五皆剛健而得中九五則剛健得中而且正六畫皆陽而無一隂畫間於其間可謂純矣二五皆純而且粹九五則純粹而且精此七字惟乾之九五足以當之九五蓋乾之主爻也凡卦皆有主爻皆以五為君孔子毎賛主爻之徳必兼五言觀彖傳可見况夫乾之主爻在五而五又為君位其徳又如此全美此孔子所以極其辭而稱贊之也六爻發揮旁通情也發揮動也旁通猶言曲盡情猶言用乾之六爻在夲卦則彼此情相通若動而散於諸卦則自屯蒙以至既濟未濟凡以九居初居上居二五居三四者其情悉皆相通無不曲盡其義坤之六爻亦然横渠張子曰乾發揮徧被於六十四卦其說是已時乘六龍以御天也雲行雨施天下平也時謂乾之時聖人於此時乘六陽之運以御天則如天之雲行雨施而普天之下咸被其澤也君子以成徳為行日可見之行也得於心為徳行於身為行成徳之成與成性之成同成之為言貞也謂仁義禮智無不具也君子以仁義禮智發而為事業故曰君子以成徳為行誠則形形則著故曰日可見之行也首章云君子行此四徳此又云君子以成徳為行蓋申首章之意上行字去聲下行字平聲濳之為言也隠而未見行而未成是以君子弗用也此以下乃第六節復申爻傳之意上文云君子以成徳為行日可見之行也此乃云行而未成何其說之相悖歟曰非相悖也上文申彖意蓋終言一卦之徳此申爻意乃單言初九之徳其義各有所取也隠而未見行而未成非謂初九不行也時乎濳隠而所行未著爾或曰此章云濳之為言也末章云亢之為言也此兩起句文法同蓋欲使學者因文究義以見乾之初九猶人之卑微乾之上九猶人之衰老唯宜守静而安常皆不可變動而用事也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也博學之則多識前言徃行以蓄其徳問以辨之蓋將擇其善也擇善而知所從矣則又不可不加涵飬之功故寛以居之寛則不廹居之久則守之固至於徳盛仁熟乃可推而行之以及物也夫君子之學問如此寛仁如此雖未為人君而有君人之大徳故前章贊之曰君徳此又重引之蓋深明九二之徳為君徳而大人即九二也若獨指九五為大人而以利見大人為九二利見九五則非易之㫖也雲間田氏曰諸卦二五皆君臣相應唯乾坤二卦不可以此論先儒乃曰乾卦純體皆君道坤卦全體皆臣道聖人慮學者拘於正應以論乾坤特於乾九二兩賛曰君徳九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣虞翻曰以乾接乾故重剛位非二五故不中或者乃謂以剛居剛為重剛在九三則猶可在九四則不通矣乃又曰九四下重字衍文豈其然乎不若從虞翻之說為長天謂五田謂二九三上不及九五之中而不在天下已過九二之中而不在田其不中若是豈不危厲君子處此則終日進徳脩業乾乾不已又因日之夕而為之惕是以雖危而无咎夫九三上不在天下不在田則奚在曰在人九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎九三居重乾之間而在下卦之上其位已過九二之中故曰重剛而不中九四亦居重乾之間而在上卦之下其位不及九五之中故亦曰重剛而不中九四上不在天下不在田固與三同然比之三則四也又居上體而出於人之上矣故曰中不在人夫上既不在天下既不在田中又不在人果何在邪曰在淵易卦兼三才而兩之以下二畫屬地中二畫屬人上二畫屬天三四雖皆人位而三附於地蓋在人之正位四之在淵則離地而近於天非人所處之地故或之或之者何蓋疑之也君子於此戒慎恐懼唯知進徳脩業而已故无咎或曰孔子贊乾之六爻必於此兩爻云九三九四而文法又同亦欲使學者因文究意以見九三九四並在重乾之間而俱得无咎者其才與位皆相似故也夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉㐫先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎二五爻辭皆言大人孔子賛九二但稱君子贊九五則稱大人尊九五也九五蓋乾之主也又以見九三止有大人之徳而無大人之位九五則徳位兼修也九五大人中正無私以天徳居天位而與天為徒故天地日月四時鬼神悉皆相合而無間也天者自然之理也誠之所為先與理合天亦弗能違也先後皆去聲紫陽朱子曰先天而天弗違者如禮雖先王未之有而可以義起之類蓋雖天所未為而吾意之所為自與道契天亦弗能違也後天而奉天時者如天叙有典天秩有禮之類雖天之所已為而理之所在當亦奉而行之蓋大人無私以道為體也亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎九三居下體之極知至而又知終上九居上體之極乃知進而不知退知存而不知亡知得而不知喪三所以無咎上所以有悔知與不知之異也苟知進退存亡而不以得喪累其心又於進退存亡之間不失其在我之正又豈有悔乎首言進退存亡而兼言得喪次言進退存亡乃不及得喪何也曰進退存亡天道也得喪乃人事耳孔子所以兩致其唯聖人乎之辭者謂其真知天道進退存亡而不失其正者非聖人則不能也人事固亦有進退存亡若僅釋以人事則凡有識知而安於分義者能之何待聖人而後可耶此章句法與繋辭傳天下何思何慮同又如論語禹吾無間然矣稱顔子曰賢哉囘也蓋皆兩致其辭而贊歎之也紫陽朱子曰再言其唯聖人乎始若設問而卒自應之也王肅疑兩言聖人為重複遂改其一為愚人謬矣周易集説卷二十六
