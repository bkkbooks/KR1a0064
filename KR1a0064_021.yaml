body:
  text: 周易集說卷二十一宋俞琰撰爻𫝊二復自道其義吉也君子之進退必由其道今既復自道則揆之以義而吉也宜矣牽復在中亦不自失也往而不復則不能不自失既復矣則亦不自失也其所以不自失者何也處中而不至于過也云亦者承上文之義以初九之不失而亦不失也初既復自道矣故二也亦不自失皆言自者不喪已之謂也夫妻反目不能正室也爻辭曰夫妻反目夫子乃釋之曰不能正室蓋又因此發明修身齊家之道以示教也虞翻曰妻當在内夫當在外今以妻乗夫而出在外故曰不能正室有孚惕出上合志也於君臣相合之際不以得君為樂而以位危為懼乃引避三陽而不妨賢路如六四者乃近君之賢臣非小人也爻辭於九五言有孚六四亦言有孚其君臣相合如此故爻𫝊曰有孚惕出上合志也言惕而不言血何也伊川程子曰惕出則血去可知矣有孚攣如不獨富也小畜之時内有衆君子則九五富矣然而九五之富非自能爾也要皆六四之功也今九五以六四有容衆之徳遂與之孚信攣結而共享其富故曰有孚攣如不獨富也既雨既處徳積載也君子征凶有所疑也爻曰尚徳載謂其所尚當如是也爻𫝊曰徳積載謂其積久而後如是也故曰既雨既處徳積載也疑猜疑也升九三曰升虛邑无所疑也蓋衆人皆升我亦與之俱升在上又有應而前无拒之者其升无疑小畜上九則不然謂之既處矣而又征行非所宜也况无應乎其行不能无疑故曰君子征凶有所疑也不言婦貞厲月幾望蓋省文也泰之九二亦然素履之往獨行願也願者志之所向履初九上无正應在下位而不援乎上故謂之獨行願人唯不能自安於貧賤之素未免唯利是趨徇乎人而同流合汙若夫安履其素而行則清修潔白不願人之文繡唯求其在我而已中庸云君子素其位而行不願乎其外與比同旨幽人貞吉中不自亂也初與二皆無應居履之時初无應而獨行其願所守者正也二不以无應而自亂蓋其所守者中也或曰乾虎在上九二以幽静之徳居中而安其所履豈以在彼之剛暴咥人遽亂其在我者而荒忙失措哉眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也眇者雖能視不能洞見則亦何明之有跛者雖能履不能逺到則亦難與之行故曰眇能視不足以有明也跛能履不足以與行也其位不當而又妄動焉則有咥人之凶矣故曰咥人之凶位不當也位雖不當其志則剛而欲見用於君上而有為故曰武人為于大君志剛也夫以六居三其才雖不足道其志則亦可取故但言其志剛不復深咎之九四上九亦位不當而獨于六三言位不當何也曰六三雖為履之主爻而上有九五之君在焉故於九五則稱其位正當于六三則斥其位不當此聖人崇陽抑隂尊君卑臣之微意也隆山李氏曰六三一時得權之主而九五則一卦定位之主也三言位不當五言位正當上下之分不可亂也愬愬終吉志行也初曰獨行願去君逺也四曰志行近君也此與否睽未濟之九四凡四言志皆此意也君子㓜而學之壯而欲行之處履之時居近君位則其志行矣履以和行故六三之志徒剛九四之志則行夬履貞厲位正當也以九居五不患其不剛明惟患其躁急履之九五正當至尊之位若過於剛决而所行又固執之甚則危厲矣故戒之曰夬履貞厲位正當也爻𫝊言位正當凡四履否兊中孚皆見於九五何也曰卦有六位唯九五然後為正當也當平聲後倣此元吉在上大有慶也人之踐履貴乎有終况其位在上乎在上而克終此莫大之慶也故曰元吉在上大有慶也慶平聲叶前韻後倣此㧞茅征吉志在外也志在外謂君子未出仕之時其身雖處草莱而其志則在廊廟也彖𫝊云内君子而外小人以朝廷為内野為外爻𫝊云志在外則以家為内出仕於國為外志在外與咸初六渙六三凡三言之皆以外卦為好包荒得尚于中行以光大也光大謂胷次明闊而有容人之量也伊川程子曰舉包荒一句而通解四者之義童溪王氏曰止舉包荒而下文之義亦兼矣此亦省文之例也无往不復天地際也際㑹也坎以六四遇九五九六相㑹故曰剛柔際泰九三遇六四正當乾坤二體之㑹故曰天地際翩翩不富皆失實也不戒以孚中心願也郭京以失實作反實愚謂失實與蒙六四遠實同皆指陽為實也隂之從陽猶貧之依富也今三隂在外而失所依故曰皆失實也願者上下交而其志同也泰之時上下不相疑忌小人之順從君子蓋出其本心故曰中心願也以祉元吉中以行願也二五交而其志同又以中徳相合得以行其願也城復于隍其命亂也征伐不出于君而出于大夫命不出于國而出于邑可謂亂矣㧞茅貞吉志在君也賢者未嘗一日忘君也身雖處畎畆乃心罔不在王室泰之時可以有為故其志在外不幸處否之時无可為者故其志唯在君而已爻辭云貞吉亨言君子處否之道爻𫝊云志在君蓋推明君子之本心大人否亨不亂羣也六二涅而不淄者也其徳中正雖處否之時而在初六六三羣隂中不亂也不亂羣之義與坤六二不習同不釋小人吉以見易為君子謀不為小人謀也包羞位不當也六三之位不中不正而包六二之中正多見其不知量也有命无咎志行也初去君逺則志在君四近君則志行其義與履九四同有命无咎則向者在君之志今得以行矣大人之吉位正當也大人尊居君位之正而處否有道遂得以保其存而不亡故曰大人之吉位正當也當平聲在九五則贊之曰位正當在六三則斥之曰位不當履九五六三亦然无非崇陽而抑隂尊君而卑臣也伊川程子曰无其位則雖有其道將何為乎故聖人之位為大寳否終則傾何可長也否終縱无人傾之終將自傾豈有長否而不傾者哉伊川程子曰反危為安易亂為治必有剛陽之才而後能故否上九則能傾否屯上六則不能變屯也出門同人又誰咎也爻辭云同人于門爻𫝊乃云出門同人出門而同人則非能致人之同也初九蓋非善與人同而无咎者也乃未之有同而未有咎之者爾蓋是時未有二五之正應亦未有三四之爭奪則有誰咎之秀巖李氏曰又誰咎凡三言之在解與節者其應不同同人于宗吝道也野者衆之所共通道也宗者已之所屬吝道也吝而謂之道人道以親親為大親親仁也未有仁而違其親親之道乃與他人同也同人于宗固吝然亦人所共由之道非其他私意之比故曰同人于宗吝道也伏戎于莽敵剛也三嵗不興安行也敵剛謂所敵者九五之剛也九五之大師在上戰則必克非九三伏戎之可敵也安語辭安行者度徳量力决不可行行將安之其義與无妄彖𫝊何之矣同紫陽朱子曰安行言不能行乗其墉義弗克也其吉則困而反則也夫既乗其墉矣則其攻二也是豈力弱而弗克哉特以義之弗克而弗攻耳二與五剛柔相應中正以相與義豈能奪孔子恐占者以弗克攻為力不足故釋之曰乗其墉義弗克也升而不已必困今也乗其墉以攻二則亦勞而困矣謂之凶可也何為而吉耶曰九四蓋困而知反者也故曰其吉則困而反則也則即所謂義也九四蓋今而後得反于義也校之九三則四也畏義而弗克視畏威而不興者盖有間矣同人之先以中直也大師相遇言相克也五與二以中正之道相應其先未遇而號咷以其由中之直為三四所間而不得伸終焉相遇盖用大師克之也克勝也與書泰誓予克受受克予之克同言相克者以見二陽之强如敵國而非用大師不能勝也秀巖李氏曰困九五亦言以中直義與此同同人于郊志未得也上九在同人之時而獨居卦外患爭之禍則免矣其志則未得也夫上九之志非不欲内同于六二也而適處于郊六二甚逺蓋其居使之然也大有初九无交害也大有初九即同人之上九昔在同人之時逺于六二而不能與之同故曰志未得今倒轉為大有之初九則又逺于六五而不能與之交亦不利矣豈非无交害耶故曰大有初九无交害也大有時也初九位也時位如此所以无交害爻𫝊凡稱卦名者皆以時言凡稱爻名者皆以位言龜山楊氏曰當盛大之時貧且賤焉耻也則无交冝有害矣大車以載積中不敗也九二任重而道逺剛得中而无過為猶大車載物所積酌中則馬有餘力車有餘量然後不致顛覆也大車且然若車小而所積過中其有不敗者乎公用享于天子小人害也享于天子之占唯公可用小人得此占則不利如南蒯占得黄裳元吉而敗是也害是釋弗克匪其彭无咎明辯晳也九四居近君之地不能无嫌疑焉今也自抑如此所以别嫌疑也如九四者可謂明辯君臣之義而晳者矣晳明貌音智叶害字志字韻當如詩東門之楊明星晳晳作去聲伊川程子曰賢智之人明辯物理當其方盛則知咎之將至故能損抑不敢至于滿極也漢上朱氏曰離為明互兊口為辯晳荀氏作晰厥孚交如信以發志也威如之吉易而无備也在心為志盖未發也發之者信也繫辭𫝊云人之所助者信也當大有之世在下者本有恊助之志而在上者能以誠信接下又足以感發之則應之者交至故曰厥孚交如信以𤼵志也易平易也備防備也六五為大有之主其道徳之威足以服人而人自敬之畏之也其為吉也校之屑屑然從事乎兵刑術數之防閑此則坦然平易而無戒備之勞故曰威如之吉易而无備也威如之吉其義與家人上九同大有上吉自天祐也居大有之時為衆陽者不以大自有為六五者亦不以有自尊故六爻皆不繫卦名爻辭乃于初九曰大有初九上九曰大有上吉者大有言其時初上言其位也六五為大有之主初去五逺故有无交之害上去五近故有天祐之吉時位然也謙謙君子卑以自牧也爻辭謙謙句㸃爻𫝊乃以君子綴于謙謙之下謂謙謙乃君子之徳非君子則不能謙謙也卑者在下之謂牧者馴養六畜之名牧牛馬者常守之而不使奔逸君子之牧心亦猶是也自牧與象辭自彊自昭之義同節初齊氏曰九三勞而謙二四上為九三而謙而初无所為故曰自牧而與九三俱稱君子鳴謙貞吉中心得也卦以九三為謙之主而六二自下承之得其所謂謙矣是以中心得上六雖與三應乃髙據于上則失其所謂謙矣是以志未得勞謙君子萬民服也九三以一陽居衆隂之中衆隂皆順而從之有萬民服之象萬者數之盈一陽五隂之卦多言之如懐萬邦建萬國之類皆是也萬民所以服君子者非服其勞也服其勞而能謙也九三爻辭本以勞謙句㸃爻𫝊又以君子二字屬之言勞而能謙乃君子之徳非君子則不能如是也表記云君子雖自卑而民敬尊之况九三而能謙宜其萬民服也无不利撝謙不違則也物各有則或過焉或不及焉皆違則也六四上承六五之柔主以盡事君之禮固不為不及又下讓九三之功臣而不敢當其承已其謙如此亦不為過矣故曰无不利撝謙不違則也準齋吳氏曰撝字從手謙以撝言所謂手容恭也與人交接而手容不恭是必傲慢之人也繫辭之論謙有徳言盛禮言恭之語如四之謙亦可謂徳盛禮恭者矣利用侵伐征不服也九三曰萬民服六五乃曰征不服聖人之意蓋有在矣九三雖剛臣也六五雖柔君也詎有萬民服九三之剛臣而或有不服六五之柔君者乎不服則不容不正之也聖人於君臣之義其嚴謹如此侵伐當依郭京作征伐盖承經文之誤爾夫侵奪之事乃戰國之君所為王者不為也郭京曰越已之分乃謂之侵君上之所行祗合征正之不合侵奪其說是已鳴謙志未得也可用行師征邑國也二承三上應三此兩爻皆曰鳴謙二則中心得上則志未得何也處卑在下之為得也上六之行師爻辭言利用爻𫝊乃斷之曰可用可者當其時之可也可則用不可則已謙之上六豈得已者哉是以斷之曰可嵩山晁氏曰多國字初六鳴豫志窮凶也曰初六者謂其以隂柔之質居至卑之位也小人之志短淺一得志即心滿意溢不勝其恱易以窮也位方在豫之初不能安時處順乃恃其有應于上而輕肆如此是其志已先窮而自取其凶也不終日貞吉以中正也六二所以不終日貞吉以其徳之中正也徂徠石氏曰下不從初六鳴豫上不從六三盱豫居中守正不從樂豫故吉或曰中正當作正中叶志窮凶韻其倒置與艮六五同文言𫝊云龍徳而正中是其例也易言正中者六餘見比隨巽盱豫有悔位不當也位不當謂處非其位也六二中正則不為逸樂所移六三不中不正則仰望于人而求逸樂此六二所以吉六三所以有悔也由豫大有得志大行也九四之由豫也在上者信任之在下者順從之故得曰大有志曰大行盖以一陽統衆隂而居人臣之極位動乎上而下無逆之者又无他爻以分其權故其志得以大行也大賢在下位則志之所行者小為近臣而得權則志之所行者大彖𫝊云剛應而志行盖謂此也李隆山曰彖𫝊専指九四故爻𫝊與彖𫝊同六五貞疾乗剛也恒不死中未亡也以六五之柔乗九四之剛此柔主遇强臣之象也貞疾而稱六五以其位言也所以恒不死者柔得中而无大豫雖為剛陽所逼猶有虛位存焉盖未亡也冥豫在上何可長也在上亦以位言也豫至此極矣豈可長久而不知變乎故曰冥豫在上何可長也何可長者欲其速改也趙氏輯聞云在上所以釋㝠何可長所以釋豫官有渝從正吉也出門交有功未失也初九震體震以陽爻為主為主者故不當隨人而陽亦不當隨隂然以下從上以正從正則隨道之當然也夫初九以陽居陽正也六二以隂居隂亦正也以初九在下之正從六二在上之正故吉六二與六三皆半剛半柔故爻辭皆言失初九剛正而専一出門即與二交則得所從之正故不失也渝者何權以適變也稱輕重而行之以合于義是之謂權權非知道者不能行行權則不能不失經故戒以從正吉正釋貞字當隨之時不得適變則失時徒知適變而不能守正則失已二者皆非也唯能趨時適變而于適變之間又能以正道固守而擇其善者從之斯不失矣此爻與同人初九相似同人之初九出門而同六二非與九四同也此則出門而交六二亦非與九四交也或者拘于正應以四言明功而初言出門交有功是謂交于四蓋泥于兩功字而不思隨之義乃是近而相從非逺而相應也况九四剛而不正者也初而與之交則豈得為從正哉係小子弗兼與也人之一身安能兼與得此則失彼二者不可得而兼也二係三則失初非欲棄初也勢不能兼也趙氏輯聞云事不能兩得人不能兼與隂必隨陽則二之與初者情也下必隨上則二之與三者時也當隨之時係三則失初二者不可得兼兼初與三而立義故變係係大夫志舎下也舎止也釋居字當作去聲舎下謂六三居貞而止于九四之下也處隨之時當以下隨上以隂係陽不可躐等而進四隨五而獲則三也亦可隨四而得此則三之志也志在隨時豈肯躐四以求五故曰係大夫志舎下也漢上朱氏曰先儒舊讀舎音捨王弼讀舎與乾九二時舎也之舎同爻辭曰利居貞此曰志舎下也以舎訓居弼之說為長三四相比近也四亦无應宜相親也以隂求陽以下隨上順也隨有獲其義凶也有孚在道明功也九四之隨有獲蓋居近君之地而有逼上之嫌人必疑忌若獨擅其有以為己私則其凶宜矣故曰隨有獲其義凶也然九四與九五徳皆剛明彼此皆相知而相信无所謂凶也然則九四所以得免其凶也者其功在乎率天下以隨五能盡其臣下之道而足以自明故曰有孚在道明功也安定胡氏曰既有孚信在于臣子之道而上得剛明之君知已非叛逆之意故足以明已之功孚于嘉吉位正中也九五處尊而其位正中九四雖强然亦何敢不隨九四既隨則天下无不隨之矣然則九五之所以得吉者以其位之正中而能致在下之隨也伊川程子曰隨以得中為善隨之所防者過也若上六過此而處外則其道窮矣拘係之上窮也處隨之世天下皆隨九五而上六獨在外有不得其隨而上窮之象夫隨至于上亦窮矣上窮而无可隨則不容不返而係五故曰拘係之上窮也幹父之蠱意承考也意在承當其事而成其親之令名不欲見其過也幹母之蠱得中道也幹母之蠱不可過甚九二得中道而不過剛幹母蠱之善者也得中道釋不可貞之義幹父之蠱終无咎也爻辭言其无大咎是未免乎有小咎也孔子釋之曰終无咎何耶曰但恐不能幹耳既幹矣終亦无咎也裕父之蠱徃未得也六四之才僅能裕而弗能幹若欲有所往則未見其有得必先有失故曰裕父之蠱往未得也幹父用譽承以徳也六五之徳足以承任幹父之責矣以令名蓋前人之愆是不以才幹而以徳幹也故曰幹父用譽承以徳也以釋用字徳釋譽字初以意承五以徳承皆能幹父之蠱者也故初與五皆言承承謂本爻非指他爻也不事王侯志可則也志可則謂其志可以為後人之法則也準齋吳氏曰如曾子不忍違親而辭齊之聘其志豈不可則周易集說卷二十一
