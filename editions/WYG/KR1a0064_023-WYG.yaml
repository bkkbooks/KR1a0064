body:
  text: 周易集說卷二十三宋俞琰撰爻傳四咸其拇志在外也外指四初與四感應以相與雖未能遽行而拇動則志之所之巳在於四矣滎陽吕氏曰初以隂居下靜而未行蓋心感而迹未應者也雖凶居吉順不害也以凶吉兼言在人所處何如耳動雖凶然處之有道守正而不先動則亦可轉凶而為吉也茍能以謹愼自居為應而不為感則不至乎有害故曰雖凶居吉順不害也以坤六四準之順當作愼古字順愼通用咸其股亦不處也志在隨人所執下也處即居也曰亦者承上文而言二之腓動而不能居三之股亦然也不處者居不能安其位失艮體之止也夫九三以剛陽之才為内卦之主二隂乃隨我者也我當以主自居豈宜隨人今其志如此則其所執卑下矣或曰下謂二也其所以不處者以其志在隨人而所執者下之隂也隂躁欲動已又隨之安能止哉或疑九三艮體也何為不能止在下之柔而乃與之俱動也曰此乃感象也當感之時雖止亦動也貞吉悔亡未感害也憧憧徃來未光大也繫辭𫝊云情偽相感而利害生蓋感得其道則利感失其道則害九四貞吉而悔亡亦未為所感之害但於徃來之間加之以思慮之憧憧而所感者私則感之道狹矣是未足以為光大也咸其脢志未也未字下當有發字與害字大字叶韻觀坤之爻𫝊可見在心為志出口為言言心聲也咸其脢則言未出口而其志在心未發也不及无悔蓋其志未發則其无悔可知矣今諸解者以未字作末字以為所感淺末非也咸其輔頰舌滕口說也滕𫝊也滕口說謂以口說𫝊布以感人也紫陽朱子曰滕騰通用平菴項氏曰初上皆不言凶悔吝者當感之時柔在内者必應於外柔在外者必說於内皆其常理又所應皆正非妄感也故无凶悔諸儒謂滕口說為鄙之非也若鄙之則為吝矣事自有當用口說之時凡訓詁誓命皆口説也滕字虞翻本作騰蓋𫝊布之義書所為播告之脩也但専恃口說亦不為美故不得言吉浚恒之凶始求深也論語云欲速則不達孟子云其進鋭者其退速恒貴久於其道凡為學為治皆然恒之初豈可以遽求深求深則凶也逍遥李氏曰譬如掘井始浚便求深决无所成九二悔亡能久中也九二以位言九二處非其位不能无悔所以悔亡者位雖不正然居下卦之中而能久於其道何悔之有道者何中是也中庸云人皆曰予知擇乎中庸而不能期月守也盖中非難能久於中為難能而九二能之則其悔亡也宜矣不恒其徳何所容也論語云人而無恒不可以作巫醫盖不恒其徳人皆羞與為伍雖巫醫之中亦无所容其身况為公卿大夫而與賢者同處乎久非其位安得禽也書伊訓云恒于遊畋時謂淫風謂畋非可久之事也畋之久則无禽矣九四居恒之時其位不當久非其位也久而所處非其位徒爾久耳必无所獲也婦人貞吉從一而終也夫子制義從婦凶也春秋穀梁𫝊云婦人以貞為行者也孟子云以順為正者妾婦之道也愚謂古之貞女不更二夫其從夫也一於柔順終其身而不變夫子處事則當制之以義不可泥於一若從婦人之道執一而不通徇常而不知變則非夫子所宜故曰婦人貞吉從一而終也振恒在上大无功也在上以位言居上之道持重可也今以隂柔居上而輕躁如此是以大敗其事而无功也或曰大指九三上之應在三三不恒而上遂振以為恒蓋三不足以綱之也大无功蓋責三矣平菴項氏曰師六三恒上六皆以大无功解凶字言敗績也遯尾之厲不徃何災也徃則災不徃則何災之有此戒小人勿進逼君子也童溪王氏曰汝不徃則陽亦遂其遯計何見傷害也執用黄牛固志也彖辭云小利貞爻辭云執之用黄牛之革爻𫝊申之曰固志蓋勸小人固守其志不可以寖長之勢進逼君子也固釋牛革或曰牛當作革革字下垂訛為牛係遯之厲有疾憊也畜臣妄吉不可大事也九三當遯之時而為二隂所係如有疾病而困憊之甚也孝經云治家者不敢失於臣妾而况於妻子乎臣妾蓋家人之小且賤者耳懐之以親愛固之以私恩是乃畜臣妾之道施之大事則有所不可如是也或曰過剛而不中故不可以當大事君子好遯小人否也爻辭云好遯君子吉小人否謂君子則吉小人則不吉也爻𫝊云君子好遯小人否也而不及吉字蓋謂惟君子為能好遯小人則不能好遯也雖不及吉字然既好遯則遯而亨其吉不假言也嘉遯貞吉以正志也君子進以禮退以義仕固不可以不正遯亦不可以不正九五之遯所以為嘉者以其能正其志而不為回邪也準齋吳氏曰使後世之為臣者其於居位皆能如此正其志尚安有僣竊之患哉肥遯无不利无所疑也三比隂四五應隂皆有反顧之心而不能无疑上九在外而下无係應是以无所疑也无所疑與升九三同秀巖李氏曰此决於進彼决於退也壯于趾其孚窮也初九剛陽之壯將以上進而上无應援遂孚于二此乃不得已而孚非出於本心之孚故曰其孚窮也九二貞吉以中也九二以位言以九居二在他卦皆為不當位在大壯則吉者以剛居柔而不過乎壯又能以中道自守也秀巖李氏曰爻辭言九二貞吉者三而此言以中解言得中道未濟言中以行正大意相類但各叶韻耳小人用壯君子罔也小人用壯君子罔也其句法與君子好遯小人否也全相類孔子恐後世疑爻辭有兩用字以為小人之用與君子同故特去其一藩决不羸尚徃也尚與上同尚徃謂前无阻礙可以進而上也喪羊于易位不當也以六居五雖在尊位而其才柔弱不能制在下之剛故曰喪羊于易位不當也秀巖李氏曰在大壯之世以柔居尊失其壯矣不能退不能遂不詳也艱則吉咎不長也人之處事以為易則不詳審以為艱則詳審向也既以不詳審而致咎今詳審而不輕率則其咎不長也晉如摧如獨行正也裕无咎未受命也以六居初固非正也而以柔處下是亦正也進而見摧於四奈之何哉唯有獨行吾正而巳初在三隂之下未交接於君乃未有禄位未有爵命者也无官守无言責則其進退豈不綽綽然有餘裕哉秀巖李氏曰𫝊文多舉首句所謂獨行正者乃并貞吉賛之也受兹介福以中正也六二受兹介福者以其中正也衆允之志上行也衆皆允之者蓋其志皆欲上行以順承大明之君也鼫鼠貞厲位不當也初六六三位皆不當獨於九四言不當者衆皆以柔順麗乎大明巳獨以剛暴進廹之豈其所當也失得勿恤徃有慶也能盡其在我而无患得患失之心則其徃也有慶矣維用伐邑道未光也上九陽畫又離明之體乃曰未光何也曰四據其應其道不容不伐必用伐而得之未足以為光明也萃之三隂為九四所據故其九五爻𫝊亦曰未光君子于行義不食也君子于行唯義所在義不容畱則去又何暇食六二之吉順以則也六二以位言時當明夷何吉之有六二旣中且正安時處順不失其則故吉伊川程子曰則謂中正之道南狩之志乃大得也九三雖與上六之隂相應其志唯在於陽明之地是捨闇而就明也當明夷之時而能捨闇就明是以大有得濮園趙氏曰南狩之志先儒或指為武王之事不可以訓非聖人之意也入于左腹獲心意也意者心之所𤼵也當此之時苟可以自見吾亦為之如不可為從吾所好故曰入于左腹獲心意也箕子之貞明不可息也箕子正士也紂雖囚奴之不失其正也商亡而箕子存是天無息明之理也向與比干同被害則洪範不作明遂息矣天下後世安知皇極之訓哉箕子當依蜀才作其子詳見本爻辭蓋承爻辭之誤厚齋馮氏曰五君位也為人主而夷天下之明不可以訓故文王移置於上六以初登于天後入于地况明夷之主六五在下而承之則明夷之主之子之象也厚齋此說蓋依蜀才本作其子深得易之本㫖矣夫箕子雖紂之庻兄蓋臣子也紂雖無道乃君父也以紂為父亦可然依諸說以上六為紂則又未之思爾初登于天照四國也後入于地失則也四國指六五以下四爻照謂居上而臨下靡不照見也失則謂不安處於上而下與三應是棄上趨下而失其正道也或以六二順以則為文王順帝之則上六失則為紂失君人之則皆非也閑有家志未變也在心為志今釋閑有家而曰志未變者婦訓初來子訓嬰孩於其未變之初而豫為之防也待其巳變而後為之防則人情乖離傷恩害義者多矣書周官云制治于未亂保邦于未危是此意也六二之吉順以巽也蒙六五曰順以巽事師之道也漸六四曰順以巽事君之道也家人六二曰順以巽盖事夫之道也事夫而能順以巽乃婦人之賢徳此六二之所以吉也六二以位言以其居中履正故有此吉家人嗃嗃未失也婦子嘻嘻失家節也家節謂治家有法則而貴乎得中不可過也九三蓋過矣始焉家人嗃嗃而畏懼亦未為失節嚴之過而婦子之至親者卒皆悲怨嘻嘻而不能堪則失節矣節初齊氏曰嗃嗃不過有所拂逆嘻嘻則有所嗟怨矣孔子以嗃嗃為未失而謂嘻嘻為失節蓋欲乗其未失而節之也雷霆天之怒也使日轟轟焉求人之過而誅擊之則將不勝其病矣富家大吉順在位也爻辭云富家大吉爻𫝊釋之曰順在位蓋謂富家不以多財為吉而以順在位為吉也何謂順在位父父子子兄兄弟弟夫夫婦婦是也禮運云父子篤兄弟睦夫婦和家之肥也豈以多財為吉哉富而以順居之則滿而不溢可以保其家而長守其富吉孰大焉王假有家交相愛也嚴以分言愛以情言治家之道固不可不嚴又不可嚴之過如九三之過剛則上下之情離而婦子至於悲怨九五剛而得中所以上下之情交而彼此相愛六二曰无攸遂謂能執柔順以事其上九五曰王假有家謂能務行寛大以臨其下此所以交相愛也威如之吉反身之謂也家之本在身身脩而后家齊家人之卦初應四二應五三獨不應上上盖不正也諸爻皆正上獨不正君子於此必自反也自反而正矣家庸有不齊者乎聖人恐其但知嚴於責人而不能責巳故曰威如之吉反身之謂也秀巖李氏曰威如之吉與大有之𫝊略同夫子慮人以猛為威故特出此義見惡人以辟咎也見惡人以辟咎者以禮接見惡人盖所以辟咎非辟其人也爻戒其二而𫝊釋其一舉其重者言之耳遇主于巷未失道也遇主于巷雖非朝覲之正非為邪也六二與九五盖君臣之正應二雖失位未失事上之道也伊川程子曰遇非枉道逢迎也巷非邪僻幽徑也故夫子特云遇主于巷未失道也見輿曳位不當也无初有終遇剛也位不當謂所居不正故有如是艱阨也遇剛謂始為九四九三兩剛所阨終與上九之剛相應也交孚无咎志行也四之志欲與初交初與四不交則四之志不行今既交則四之志行也伊川程子謂唯有君則能行其志盖以四近五故也平菴項氏曰初以四為惡人其見之也以辟其為咎爾非望其有所同也四以初為善士與之相遇誠交而氣合則化孤為同化厲為安巳不作咎則人得上行矣故曰交孚无咎志行也四近君而初在下四不正而初正故其辭如此厥宗噬膚徃有慶也秀巖李氏曰睽六五與晉六五同皆文明柔順虚中之主徃則有慶也遇雨之吉羣疑亡也見豕負塗而恐其汚已固亦有焉見載盈車之鬼而恐其祟巳果有是哉鬼无形安能見見之者有所疑爾此妄見非真見也心有所疑則諸境見於前疑既釋則諸境皆滅是說惟深於道者知之俗儒不知也上九疑六三之甚故有如此怪異今既相遇而人情和洽則胸中之疑皆涣然而釋矣故曰遇雨之吉羣疑亡也伊川程子曰睽極則咈戾而難合剛極則躁暴而不詳明極則過察而多疑其見三如豕之汚穢而又背負塗泥見其可惡之甚也既惡之甚猜成其罪惡如見載鬼滿一車也鬼本無形而見載之一車言其以无為有妄之極也物理極則必返其始睽也无所不疑故云羣疑睽極而合則皆亡也徃蹇來譽宜待也釋文云鄭氏本作宜待時也蹇之時固以見險而能止為智尤宜待時而動若遂止而竟弗徃豈所宜哉王臣蹇蹇終无尤也䟦渉勞苦以求濟國家之難雖未見其濟然以身徇國終亦可取盖无尤之者也徃蹇來反内喜之也九三來歸為主於内而得位則在内二隂皆喜之如春秋書季子來歸是也反當作正承爻辭之誤爾徃蹇來連當位實也處蹇難之中而倚人之力非實則不足以恃今六四所以來連九三者以九三當位而實也平菴項氏曰六四當位實也上六以從貴也實與貴皆指陽言之六四以九三為實以九居三非當位實乎六四則連之而已上九以九五為貴以九居五非貴乎上九則從之而巳若但言當位則六四亦當位也故加實字以明之恕齋趙氏曰易以陽為實先儒謂六四以隂居隂為得其實者非也大蹇朋來以中節也九五身在大蹇之中而衆皆來助之者以其居中而有節能以蹇難自守不敢少縱於法度之外也徃蹇來碩志在内也利見大人以從貴也内指九三貴指九五孔子恐占者不知來碩為應九三見大人為從九五故曰徃蹇來碩志在内也利見大人以從貴也易道貴陽賤隂從貴盖謂從九五之陽也秀巖李氏曰以從貴也與鼎初六同剛柔之際義无咎也義宜也九二為下卦之主而初六自下承之故曰剛柔之際義无咎也與坎六四同皆取近而相鄰之義乃若䝉九與六五相應則言剛柔接九二貞吉得中道也九二以位言以剛居柔在他爻為不正在二則以得中為吉􅂏𫝊云其來復吉乃得中也而爻𫝊云九二貞吉得中道也盖以九二居中而能以中道自守也負且乗亦可醜也自我致戎又誰咎也可醜猶言可惡以小人而乗君子之器斯亦可醜也巳自我致戎是誰之過歟自取其咎也釋文云致戎本又作致寇案其失自虞翻始虞前皆依爻作寇解而拇未當位也解以二四兩陽爻成卦爻𫝊獨於九四曰未當位何也秀巖李氏曰案諸爻失位者皆云位不當而此變其文者謂未當君位也若進而之五則當盡去羣隂乃為得耳南窗湯氏曰易唯二五為當位自餘皆為不當位愚謂從李氏湯氏之說則當字作平聲讀君子有解小人退也不曰退小人而曰小人退者君子既有解而無誅戮則小人信服自爾退也退謂退而改過以自新也公用射隼以解悖也解之終豈容更有悖逆不順者射之則悖者解矣周易集說卷二十三
