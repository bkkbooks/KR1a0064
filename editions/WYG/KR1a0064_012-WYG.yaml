body:
  text: 周易集説卷十二宋俞琰撰象辭二山下有火賁君子以明庻政无敢折獄艮山靜而止質也離火動而明文也火明於山下則質而以文故曰山下有火賁夫山下安得有火所以有火者有人於此居之也人居於山下則煙火輳集與荒山寂寞之境不同矣庻衆也與庻物之庻同非謂其小也秀巖李氏曰政與獄皆有小大不當執庻字以為小也君子以明庻政无敢折獄者修明庻政之治具則可飾之以文若斷獄則不可也書吕刑曰非佞折獄唯良折獄佞為口才也口才且不可斷獄矧可以文而飾之乎茍恃其明察而深文巧詆縁飾以没其情在小人則敢如是在君子則无敢如是也君子而如是則非君子矣豐卦明於内而動於外故其象曰折獄致刑賁則明於内而止於外故其象曰明庻政无敢折獄深居馮氏曰明庻政者離之明无敢折獄者艮之止又曰先之以臨觀之教養後之以噬嗑賁之刑政刑特以輔教而已山附於地剥上以厚下安宅山之根深藏於地中不可得而紀極而曰山附於地以衆人所共見者言之耳莫高匪山今乃附著於地剥之象也山之巔高出於地上安靜而不摇蓋以地厚故也宅居也為人上者欲安居於上可不使下之厚乎書五子之歌云民惟邦本本固邦寧蓋本固則邦寧下厚則上安未有本不固而邦寧下不厚而上安者也謂之上者凡居衆人之上者皆不可刻剥其下非但人君為然也隆山李氏曰易中象辭曰大人曰君子曰先王而此獨曰上者剥之世在下故指在上之一陽而為之辭也圭叔吕氏曰厚下坤象安宅艮象上九一爻為廬亦宅之義卦取柔變剛義象取上安下義各有所主也平菴項氏曰凡彖所言皆六爻消長之象凡象所言皆八卦取物之象大抵卦有吉凶善惡而象无不善者蓋天下所有之理君子皆當象之遇卦之凶者既不可象之以為凶德則必於凶之中取吉以為象焉剥與明夷是也人君无用隂剥陽之理則當自剥以厚下君子无用暗傷明之事則當自晦以涖衆凡此皆於凶中取吉諸象之例皆然雷在地中復先王以至日閉闗商旅不行后不省方復十一月之卦是時天氣正寒而井泉初温陽氣在下故也先王以至日閉闗而不通往來故商旅於至日不行后於至日不省方蓋安靜以養其稚陽之氣不敢先時而動夫震陽初復於坤地之下其氣至㣲唯安靜而後能長是宜愛護以養之未可勞動人或動而泄之是爭天地之先而分奪其氣也先王謂古先哲王后謂時王或謂后乃繼體守成之君言先王而又言后所以别於先王也至日閉闗乃先王之遺法至日不省方後王遵先王之遺意也平菴項氏曰彖取陽之復來故可以出入象取雷之在地中故不可以行不可以出彖與象取義不同諸家與彖同説則非衆象之例亦非此象之義也愚按書舜典云十有一月朔廵狩正當省方之時今乃曰后不省方蓋為冬至之一日爾他日不然也夫闗所以通來往豈可閉商旅皆欲出於塗豈可使之不行今曰至日閉闗商旅不行亦不過謂冬至之一日而已閉闗象坤之闔户商旅象坤之衆震為大塗商旅所行之路坤為迷不行之象也坤為地方之象也顔師古訓方為常謂不省方為不視常務殆非也天下雷行物與无妄先王以茂對時育萬物六十四卦之象例作一句无分為兩句者先儒皆以天下雷行為句物與无妄為句誤矣唯胡旦與深居馮氏雲間田氏以天下雷行物與作一句今從之无妄之為卦上乾天下震雷雷之動於天下而无妄行物之動於天下亦无妄與故曰天下雷行物與无妄與者應也无妄誠也天以誠動物以誠應皆无妄也兼山郭氏曰天无私覆地无私載日月无私照率歸之自然而已此无妄之本也愚謂无妄則誠誠者天之道也天之道自然而已矣天道出於自然雷之行於天下物之動於天下亦莫不皆出於自然夫唯其皆出於自然是以雷發聲則萬物出而與之俱動有翼者動而飛有足者動而走生於山林者動於山林生於川澤者動於川澤其動也時至而氣自化蓋无一物不由乎天理之自然豈有妄耶先王以茂對天時長育萬物夫何為哉亦不過順天理之自然而一出於誠耳豈有妄耶夫天有是時先王非能先後之也對而循之耳物有是生先王非能損益之也育而成之耳中庸之所謂誠即易之所謂无妄也中庸云唯天下至誠為能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣子思之説蓋本乎此伊川程子曰茂對之為言猶盛行永言之比無他説也節齋蔡氏曰對與對上帝之對同言至誠之動無時不動無物不育也平菴項氏曰時以象天物以象震節初齊氏曰象言育者三卦蒙也蠱也无妄也蠱上艮互震在下蒙无妄皆下震互艮在上震者物之生理而艮所以育之也一陽入於坎出於震而艮在坎震之間此育之意也天在山中大畜君子以多識前言往行以畜其德漢上朱氏曰天在山中以人所見為象聖人論天地日月皆以人所見言之深居馮氏曰以氣言之天之氣藏於山中亦為大畜之象天之氣固無不在唯山則氣所附而能藏畜之也愚謂大畜之為卦下乾天上艮山是為天在山中大莫大於天而曰天在山中則其所畜者大矣今人以九霄之上日月所麗處為天遂疑天不在山中殊不知地之上虚空處皆天也大凡掘一尺地則有一尺天是故井中有井中之天洞中有洞中之天室中有室中之天山中有山中之天何必以九霄之上乃為天哉小而壺中甕中亦莫不有天又何必以天不在山中為疑哉人之藴畜由學而大君子以多識前賢往聖之善言善行而學以聚之則其胷中所得日以富矣蓋其所識者多則其徳之所蓄者大也識音志與論語黙而識之識同平菴項氏曰文在外故為小畜識在心故為大畜漢書作志義同深居馮氏曰識記也多識如天之容覆畜德如山之圍繞虚齋趙氏曰互震足兌口於中爻有言行畜德之象山下有雷頤君子以慎言語節飲食山者禽獸草木生植之地雷動則禽獸草木皆動蓋不可非時而動也雷動而在山上則聲已出山是為小過在山下則聲猶未出山其動不至於過是頤養之象也人之所養在乎言語飲食言語妄出於口則禍至飲食妄入於口則病生二者皆養身養德之切務君子知禍從口出病從口入是以慎節其出入頤乃口頰之象故取其切於頤者言之曰慎言語節飲食充此言語之類則凡號令政教之出於已者皆所當慎而不可悖出充此飲食之類則凡貨財賦税之入於上者皆所當節而不可悖入虚齋趙氏曰言語飲食取其動慎與節取其止澤滅木大過君子以獨立不懼遯世无悶澤水蓋潤養其木者也今也高漲而浸滅其木不亦過甚矣乎是大過之象也木雖為水浸滅而其根幹未嘗動摇故君子之於時也在位則獨立而不懼不在位則遯世无悶獨立不懼非有大過人之才不能也遯世无悶非有大過人之德不能也揚庭鄭氏曰獨立不懼居大位任大事者也遯世无悶有大德无大位者也其説是已夫當此大過之時尚可以有為則君子之在其位任其責者不容不為故雖千萬人吾往矣夫何懼果不可以有為則君子之不在其位不謀其政者退而避之而已有何悶君子之才之德大過於人故能若是不然則獨立而人莫我輔能不懼乎遯世而人莫我知能无悶乎獨立象巽木之植遯世象巽之伏不懼无悶象兌之説紫巖張氏曰序卦云頤者飬也不養則不可動故受之以大過考大過之象非養之有素其能至於是乎節齋蔡氏曰獨立不懼巽木象遯世无悶兌説象水洊至習坎君子以常德行習教事坎為水下卦坎上卦又重之以坎故曰水洊至習坎洊之義與洊雷震之洊同雷曰洊聲相續也水曰洊流相續也水之流也前者往而東去後者又從而西來往者過來者續往來相繼繼而不絶是兩坎之象也坎字上加習蓋承卦辭之誤常德行謂德行有常而不改習教事謂教事練習而不輟治已治人必皆重習然後熟而安之也節齋蔡氏曰常德行坎剛中象習教事重坎象或曰坎北方之卦積隂肅殺之氣在焉坎險也難也兵凶器戰危事以其行險而犯難也故重坎取兵武之象教事如月令仲春教振旅仲秋教治兵之事是也詩常武云有常德以立武事德行无常而欲武事之立難矣論語云以不教民戰是謂棄之戰乃武事而以文事教之古之道也武事而无文之教則殘民以逞不敗亡者幾希明兩作離大人以繼明照于四方離明也下卦離上卦又重之以離是為明兩作非並作也水就下故坎言水洊至火炎上故離言明兩作也秀巖李氏曰明兩作雷雨作二象皆當以作字為句深居馮氏曰日出曰明没曰昏作起也發也與詩薇亦作止之作同解言雷雨作亦此義也明作猶言明發兩猶再也日一而已而旦旦明作以見重離之象愚謂離為日不稱日而言明天无二日也他卦之離有在上者有在下者亦皆不稱日何也日君象也易道无所不通稱日則唯人君可用如士庻皆不可用也大人以德言乃王公之通稱蓋有大德而與天地合德日月合明者也繼明者今日之明繼前日之明而不絶其明相繼不絶故能徧照四方不然則耳目所及且不能照又安能徧照於四方萬里之逺哉繼明即是明兩作謂前日在下位而其明如此今日在上位而其明亦如此前後自相踵蓋皆一人之明非謂後王而繼前王之照而世襲其明也紫陽朱子曰明兩作猶言水洊至今日明來日又明若説兩明却是兩個日頭白雲郭氏曰六十四卦唯離象獨稱大人大人者與日月合其明故稱大人伊川程子曰諸象或稱先王或稱后或稱君子或稱大人稱先王者先王所以立法制建國作樂省方勑法閉闗育物享帝皆是也稱后者后王之所為也財成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱山上有澤咸君子以虚受人山上何為而有澤澤氣上蒸於山而山受之也山上而有澤則山體中虚可知矣山唯中虚乃能受澤心唯中虚乃能受人心有私主而物欲窒之則自滿自是必將拒人故君子觀此山上有澤之象而以虚受人也家語云損其自多以虚受故能成其博也與此同㫖圭叔吕氏曰虚取山之虚象受人取山受澤之潤象節初齊氏曰所謂受者歸斯受之也若有心於受則巳非虚矣又曰澤非山上所有也而有焉蓋為山之虚也使止欲象澤之通於山則豈不可如蹇之山上有水而必曰澤非以其有水也以其虚也彼實也故為蹇此虚也故為咸趙氏輯聞云彖辭爻辭與象辭義各有攸主易變無窮聖人之取義未嘗執一釋彖言咸感釋象言虚受唯圓機之士可以學易雷風恒君子以立不易方雷迅則風烈風飛則雷厲二者常相從而不厭故曰雷風恒方謂事情所向立不易方謂君子卓然自立有定向而不妄動也平菴項氏曰巽入也而在内震出也而在外二物各居其位故謂之恒雷入而從風風出而從雷二物易位而相從故謂之益象於恒言立不易方於益言則遷與改其義明矣天下有山遯君子以逺小人不惡而嚴紫陽朱子曰天體無窮山高有限遯之象也愚謂遯之義雖是退避亦取逺去之意以象言之山止於下天行於上天蓋逺於山而相去甚遼絶也君子觀象以逺小人豈有他哉不過危行言遜而已遜其言則不惡不使之怨也危其行則有不可犯之嚴不使之不遜也此君子逺小人之道也若怒悻悻然見於面目發於聲音則疾之己甚適致小人之忿怨以激其變耳豈全身逺害之道哉逺去聲惡入聲張横渠讀為憎惡之惡亦通不惡是君子待小人之禮嚴是君子守己之節天下有山遥望之天與山若相接連何惡之有及到山頂則山自止於下天自行於上山於天邈不可干豈非嚴乎隆山李氏曰大畜之為卦天在山中蓋艮在上而乾在下乾之健進艮而止之故曰大畜遯之為卦天下有山則是乾在上而艮在下乾之健行于外艮在下而不能止之故曰遯雷在天上大壯君子以非禮弗履雷在地中則陽氣潛藏出地則陽氣奮發在天上則陽氣甚盛是大壯之象也大壯二月卦雷乃發聲之時也雷之發聲必以其時非其時則不發君子之舉動必由乎禮故非禮則弗履禮者天理之節文取乾天之象履者足之動取震足之象或曰乾為首震為足以足加於首此非禮之甚者也冠雖敝猶不可加以屨何况乎首而可加以足乎聖人以震在乾上足無加首之理故特曰非禮弗履漢上朱氏曰雷在天上非所履而履故史墨謂雷乗乾為臣強之象君子以是動必以正非禮弗履也明出地上晉君子以自昭明德明謂離日之明不言日而言明詳見離象或謂日君象也不敢指斥故稱明以代之非也日者衆陽之宗若月若星若河若電若霞若霓皆假日以為明日之明乃自已之明也未出地則其明為地形所蔽及其出也漸漸升騰而起則其明昭著於上晉之象也明德君子固有之德也自昭者自有此明德而自明之也夫人之德本明其不明者人欲蔽之耳人欲蔽之不能不少昏昧而其本然之明固未嘗息也忽爾省察而知所以自明焉則吾本然之明亦如日之出地而其明昭著初無増損也自之一字蓋謂由吾自巳為之耳非由乎人也大學所謂明明德所謂自明與此同㫖乾之象曰天行健君子以自強不息我竭我力也晉之象曰明出地上晉君子以自昭明德我明我德也君子唯盡其在我而已矣平菴項氏曰明德以象日自昭以象地明入地中明夷君子以涖衆用晦而明按渾天之説天包地地在天中猶雞卵中黄天虚空無體日行於虚空遶地而轉其出也在虚空之中與地相去懸絶其没也亦然何嘗入於地中此卦下坤上離離日在坤地之下其明隱而不見故曰明入地中地之中惟有水耳日何嘗入之哉涖臨也涖衆不用晦而明則衆心睽疑以此為明則亦不明甚矣用晦而明則衆乃安和是以君子之明必用晦也用晦於外而明於内君子蓋觀此明入地中之象而得涖衆之道故唯韜光晦迹以逺害不察察以為明也家語云水至清則無魚人太察則無徒明其可盡用哉伊川程子曰古之聖人設前旒屏樹者不欲明之盡乎隱也深居馮氏曰所涖者衆安得人人而察之涖之象離明也而入坤地之中為晦之象虚齋趙氏曰自昭者治己之德用晦者涖衆之道風自火出家人君子以言有物而行有恒齊家之道自修身始此風自火出所以為家人之象也君子知風之自於是齊家以修身為本而修身以言行為先言行之接莫親且久於家人豈容有一毫矯飾是以君子言必有物而无妄行必有恒而不改物謂事實言而誠實則有物不誠實則无物也恒謂常度行而常久則有恒不常久則無恒也深居馮氏曰體巽以言有物入人之謂言也體離以行有恒可見之謂行也上火下澤睽君子以同而異火性炎上而又在兑澤之上澤性潤下而又在離火之下上不逮下下不奉上二卦合體而性不同睽之象也君子以同而異是謂於大同之中有不同者焉非謂求異於衆也猶之飲酒雖與衆同飲而不同沉湎耳論語云君子羣而不黨中庸云君子和而不流此即同而異之謂也同象二女之同異象火澤之異伊川程子曰在人理之常則莫不同於世俗之失則異不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳秀巖李氏曰彖言睽中有合所以責君子之濟睽象言同中有異所以論君子之不茍同山上有水蹇君子以反身修徳坎水本流通之水若出於艮山之下則為蒙泉之始達今在艮山之上澁滯而不流通蓋為土石所礙耳夫以艮山之峻阻而有坎水之險陷在其前則險阻艱難不勝跋渉勞苦矣蹇之象也君子之遇蹇則反求諸身自修其德而已有所未善則必改無歉於心則唯加勉不行險以徼倖也孟子云愛人不親反其仁治人不治反其智禮人不答反其敬行有不得皆反求諸已此之謂也虚齋趙氏曰反身取艮之背修身取坎之心節齋蔡氏曰反身者止乎外艮象修德者養乎中坎象雷雨作解君子以赦過宥罪深居馮氏曰易有兩卦自為義例者雲雷為屯雷雨作為解愚謂震雷在下而坎水在上則水氣結而為雲屯之象也震雷在上而坎水在下則水氣散而為雨解之象也秀巖李氏曰明兩作雷雨作二象皆當以作字為句愚謂作者動也明兩作動而又動也雷雨作謂二者俱動也君子觀此解散之象以赦過宥罪凡有過誤而非故犯者則赦而釋之有罪惡而當刑罰者則宥而寛之號令如雷之震而天下無不聳動恩澤如雨之霈而天下無不喜悦使幽閉久繫之人一旦弛其禁錮脱其桎梏如陷穽中出而復見天日則其憂悶鬱結之氣无不解散所以體天地與物為新之意而與民為新也過言赦罪言宥聖人之意可見矣蓋過誤可赦故犯不可赦也故唯寛之而巳若赦之則非義也赦過宥罪固君子之仁心然小過可赦過之大亦不可赦也小罪可宥罪之大亦不可宥也赦宥之令數出則長姦滋惡豈良民之幸與當知易之所謂赦過宥罪特因險難解散而與民更始故有是也不然何以於蹇卦之後言之節齋蔡氏曰赦宥解義過動震象罪陷坎象山下有澤損君子以懲忿窒欲咸損二卦以山澤上下取義所重皆在山與彖傳之説不同夫彖傳自是一説象辭自是一説其説或相通或不相通蓋不可強同如必欲合為一説則豫之作樂崇德豈可以為建侯行師復之閉闗不行豈可以為利有攸往哉夫山澤二者其氣相通者也山體中虚而受潤於是澤氣上通而山上有澤是為咸之象山下有澤則澤冦山而山塞澤澤也日壅山也日削是為損之象揚子雲曰山殺瘦澤增高其説是已人之忿怒氣湧與山之突兀相似况多忿如少男者乎故君子懲之必如山之傾摧人之意欲無厭與澤之汗下相似况多欲如少女者乎故君子窒之必如澤之填塞紫陽朱子曰懲忿如摧山窒欲如填壑亨仲鄭氏曰通互體論之震動忿也艮山止之是為懲忿兌説欲也坤土塞之是為窒欲風雷益君子以見善則遷有過則改恒言雷風恒益言風雷益並无所謂上下蓋風雷相遇於天地間上下無常不可以上下言也若曰雷下有風恒風下有雷益是何言與今人見益之象辭但曰風雷益遂以為風雷相益未之思爾撓萬物者莫疾乎風動萬物者莫疾乎雷二者固不相悖然而風乃隂氣也唯能撓物而已其所以成發育之功者得雷之陽氣動而為之助耳如山下有澤損謂艮山因兌澤之冦而為損非為山澤相損也風雷益謂巽風得震動之助而為益非為風雷相益也易以陽為善隂為不善風隂氣動則撓物則謂之不善可也物為所撓而衰者以損枯者以折豈非過甚者乎得雷之陽氣相助遂為之鼓舞於兩間變其昔者殺物之不善轉而為今日生物之善夫是之謂益君子見人為善則喜而遷就之知已有過則悔而改更之亦猶風得雷助而為益也震出也入而在内巽入也出而在外遷改之象也與恒之立不易方蓋相反或謂彖傳之意蓋謂損下益上為損損上益下為益皆以下卦為重今曰山為澤所寇而為損風得雷之助而為益則以上卦為重無乃與彖傳之意相悖乎曰彖傳言六爻剛柔之義象辭言二體上下之象非相悖也各有所發明也彖傳自是彖傳意象辭自是象辭意豈可併而為一而必欲求其同哉節齋蔡氏曰遷善震象改過巽象周易集説卷十二
