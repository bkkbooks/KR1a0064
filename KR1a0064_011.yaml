body:
  text: 周易集說卷十一宋俞琰撰象辭一象者伏羲所畫八卦天地水火雷風山澤之象其辭則孔子為之也彖辭爻辭亦皆有象乃獨以天行健君子以自彊不息之類為象辭何也曰彖辭爻辭固皆有象然又有占辭又有象占相渾之辭象辭則止乎象而已並無吉凶悔吝之占辭故特謂之象辭其象則乾坤為天地艮兌為山澤震為雷更不别取他物巽坎離則不然巽為風遇天遇雷在上在下皆為風在地澤水火之上亦為風遇山則在下為風在上為木在地澤水火之中亦為木坎為水遇地風火澤之上下皆為水在山上亦為水在山下則為泉在天下亦為水在天上則為雲遇雷而在上亦為雲在下則為雨離為火純離之象不言火而言明遇地亦皆言明遇天山水澤風木則皆為火遇雷則為電凡此取象皆以人所共見者言之也其辭則與彖爻之辭不同彖辭爻辭有善有惡或善惡相半象辭則無有不善也且如剥如明夷皆凶卦也而剥曰上以厚下安宅明夷曰君子以涖衆用晦而明必於凶中取吉以為之辭卦雖凶君子於此觀象玩辭而善用之則亦轉凶而為吉蓋不待乎占也是以每象皆著一以字以者用也用而見之於事也稱上稱大人者皆一剥與離是也稱先王者七比豫觀噬嗑復无妄渙是也稱后者三泰復姤是也稱君子則五十三易蓋為君子謀不為小人謀也天行健君子以自強不息天行健謂天之運轉無停也按說卦乾為天乾不特為天也又為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果今曰天行健舉其大者言之也紫陽朱子曰凡言重卦皆取重義此獨不然者天一而巳但言天行則見其一日一周而明日又一周若重復之象非至健不能也又曰天無體只二十八宿便是體愚謂天如雞卵地在天中如雞卵中黃二十八宿繞而轉則地之東南西北四圍上下皆虚空虚空即天也天虚空無形無以見其行二十八宿之行蓋即天之行也乾君象也不言君而言君子者君子乃上下之通稱也以用也安定胡氏曰六十四卦象辭皆著一以字蓋以明其用易也自與晉自昭明徳之自同用功在我非由乎人也強者𤼵於一念之烈也不息者不間斷也自強象乾之健不息象乾而又乾夫聖人與天為徒則至誠無息今不言無息而言不息何也曰誠者天之道也聖人之無息是也誠之者人之道也君子之自強不息是也伊川程子曰乾道覆育之象甚大非聖人莫能體欲人皆取法故取其行健而已至健固不足見天道也君子以自強不息法天行之健也深居馮氏曰天一晝夜行九十餘萬里人之一呼一吸謂之一息每一晝夜一萬三千五百息則一息之間天行已八十餘里亘古亘今未嘗止息何其健哉嵩山晁氏曰天行健當作天行乾趙氏輯聞云按集韻乾或作􅪫當是􅪫訛為健也河南吳氏曰六十三卦始於地勢坤終於火在水上未濟皆有卦名獨乾曰天行健者字書乾一作􅪫豈本作􅪫而傳寫之訛遂以為健耶或謂諸卦皆舉卦名惟乾言健者乾為君為父不指斥其名所以尊君父也愚謂或者亦不過強為此異論耳其實乾健二字乃聲之訛也地勢坤君子以厚徳載物坤者乾之配乾言天故坤言地天得乾道之大者地得坤道之大者聖人從其大者故乾坤皆言天地而六子之象亦各舉其大者言之也下卦坤上卦又重之以坤一下一上象地勢髙下之相因故曰地勢坤天行以氣言地勢以形言厚徳謂君子自厚其徳也君子於乾法其強於坤法其厚法地勢以自厚猶法天行以自強也載物謂任重也今夫地載華嶽而不重振河海而不洩萬物載焉可謂能任重矣君子之徳博厚配地則其自任以天下之重也亦如坤地之博厚而無不持載也小人則不然小人薄徳而方寸褊窄見人有能則媢疾以惡之見人有善則違之俾不達惟務刻剥而使人無所措手足又安能容物盖與君子之厚徳載物不可同日而語矣厚徳象坤徳之厚載物象坤上有坤雲雷屯君子以經綸陽承隂則隂氣騰而為雲隂鬱陽則陽氣奮而為雷隂陽和洽然後化而為雨屯之為卦坎水在上謂之雨可也不言雨而言雲隂陽之氣方屯結而未通也雷動於雲中而未成雨故曰雲雷屯屯難之世君子有為之時也君子將以解天下之屯難而為之緻謀締慮反覆紬繹猶治絲然既經之使不亂其常又綸之使不失其序也經綸猶言經理綸理之也綸與倫通平菴項氏曰彖言世變之屯象則自言人道之常經者立其規模綸者糾合而成之亦有艱難之象焉經以象雷之振綸以象雲之合山下出泉蒙君子以果行育徳水出山下泉之象也泉方出而未達如人之蒙穉未知所適故曰山下出泉蒙徳者心之所得者也行者身之所行者也行貴乎果決徳貴乎涵養徳乃行之源也君子觀泉之出於山下涓涓不巳終將通達是以果決其行又觀其𤼵源自山中來源頭深逺而有涵養是以育養其徳平菴項氏曰果行象泉之出育徳象山之深力行者似戇養徳者似愚皆有蒙之象焉彖言治人之蒙此言君子以蒙自治也雲上於天需君子以飲食宴樂上上聲與澤上於天之上同音夬取決義故言澤而不言雲需取待義故言雲而不言雨今夫雲之上於天也必待其族而雨君子之飲食也必待其類之聚而宴樂君子於此蓋居易以俟命不行險以徼幸也享以訓恭儉以禮為主燕以示慈恵以恩為主故宴飲不以醉為度取樂而巳飲食象坤水之潤宴樂象乾體之健平菴項氏曰飲食以養陽象坎宴樂以養隂象乾飲食宴樂需客之具也古語燕客為需今人謂之待客亦此意也天與水違行訟君子以作事謀始天在上而西行水在下而東流一西一東其行相違而不親訟之象也孔氏正義云不云水與天違行者凡訟之所起必剛健在先以為訟始故云天與水違行也君子觀此象以作事謀始所以絶訟端於事之始也始謀盡善則他日不至於訟矣伊川程子曰謀始之義廣矣若慎交結明契劵之類是也聖與都氏曰天為三才之始水為五行之始圭叔吕氏曰乾坎皆有始義坎為謀作事亦取乾義地中有水師君子以容民畜衆師卦上坤地下坎水而曰地中有水何也曰水由地中行也水由地中行未見其有水也鑿之則有水水不外於地而普天之下皆水也古者井田之法隠兵於農未見其為兵也用之則為兵兵不外於農而普天之下皆兵也此地中有水所以為師之象也民者農也兵者衆也容民畜衆在平居无事之時則散處斯民為大司徒之比閭族黨州鄉无非農也一旦用之於有事之時則聚處其衆為小司徒之伍兩卒旅師軍无非兵也深居馮氏曰容民如地之受水畜衆如水之有坊坤容而坎畜也師臨二卦為坤故一以容民一以容保民地上有水比先王以建萬國親諸侯地上有水水與地最相親而無間者也是為比之象先王以封建萬國親撫諸侯亦如水之與地相比也先王非謂周王蓋謂古先王天下者如堯舜禹湯皆是也聖與都氏曰萬國猶地也諸侯之得國猶水之居地也深居馮氏曰象稱先王凡七卦比之建國豫之作樂觀之省方噬嗑之明罰復之閉闗无妄之育萬物渙之享帝立廟皆王者之事從古而然故稱先王節初齊氏曰唐虞萬國周止千八百國而孔子猶言萬國者衆建而少其力也衆建則多助少其力則易制周制殆非孔子意也然則曰先王其不為周言歟風行天上小畜君子以懿文徳風有氣而無質能畜而不能乆况行於天上而未能下及萬物則其畜也小君子以懿文徳猶風行天上僅能舒卷煙雲而成文耳懿者柔淑粹美之謂如容儀之温恭言辭之和婉皆足以為徳之文飾不能如大畜之前言往行所識者多而所畜者大也懿取巽體柔順之象徳取乾體剛健之象文象互離之文明平菴項氏曰以山畜天則其所畜大矣以風畜天則其力之所至止於盪摩披拂是以謂之小懿者小徳之名君子以小懿而文大徳雖不若前言往行啟𤼵培灌之多然而和氣令辭婉容愉色所以輔成其徳者不可廢也上天下澤履君子以辨上下定民志澤如湖海之類是也兊澤瀦水於下而乾天運行於上履之象也君子以辨别上下之分蓋將定民之志使士農工商各安其業而不生覬覦之心也序卦云物畜然後有禮故受之以履履乃有禮之卦也曲禮云夫禮者所以定親䟽決嫌疑别同異明是非也今夫君子以辨上下定民志不言於上天下水之訟又不言於上天下地之否而必言於上天下澤之履何也曰上天下地其分自遼絶又何必辨上天下水其行自相違亦不必辨唯上天下澤則有不可不辨者焉蓋澤水漫漶逺望則與天相連不知孰為天孰為澤此君子所以觀此象以辨上下定民志也伊川程子曰古之時公卿大夫而下位各稱其徳終身居之得其分也位未稱徳則君舉而進之士修其學學至而君求之皆非有預於巳也農工商賈勤其事而所享有限故皆有定志愚謂民志不定蓋由尊卑無等貴賤無别則不知孰為上孰為下也上下不辨則卑踰尊賤妨貴天下紛紛何時而治乎上下既辨民知尊卑有等貴賤有别截然如天淵之不侔則其志一定各安其所履而莫敢覬覦然後可以言治也聖人之於易象疑似之間必致意焉故不曰天下有澤亦不曰澤在天下而必曰上天下澤者所以嚴君臣上下之大分也天地交泰后以財成天地之道輔相天地之宜以左右民乾上坤下天地之定位也泰之為卦則下乾而上坤上下易位蓋象天氣之下降地氣之上騰故曰天地交泰所以不曰地天交泰而必曰天地交泰者天君象也地臣象也地不可以先天臣不可以加於君也后謂時王古者天子與諸侯皆稱后天子為元后君天下也諸侯為羣后各君其國也或以后為繼體守文之君其説亦通天地之道以隂陽言天地之宜以時勢言財裁通用左右古佐佑字財成者因其全體而財成之所以制其過也輔相者隨其所適而輔相之所以補其不及也氣化流行有寒有暑后則財成其道分春夏秋冬而為四時地形廣袤有燥有濕后則財成其道分東西南北而為四方春宜耕夏宜耘秋宜穫冬宜藏此天時之宜也后則輔相其宜使之髙者種黍下者種稻無不得其當如堯典之厯象日月星辰而以閏月定四時成嵗禹貢之别九州則三壤皆財成輔相以左右斯民之法也后觀天地交泰之象以任財成輔相之責於兩間以左右斯民使之用天之時因地之利以遂其生養所以賛天地之化育也左右即輔翼匡直之謂與益稷左右有民之左右同紫巖張氏曰陽為左隂為右左右之而使歸中也愚謂在天地則財成之以制其過輔相之以補其不及在斯民則左右之以救其偏無非皆欲其中也易道之貴中蓋如此天地不交否君子以儉徳辟難不可榮以禄否卦上乾天下坤地上下不交而窒塞不通否之象也是時小人道長君子道消君子以儉嗇其徳所以逺避小人之害也儉者收斂於内而不敢呈露也辟與避通用君子於此唯欲全身逺害而已豈以爵禄為榮雖繫馬千駟弗顧也萬鍾於我何加焉是故人君之爵禄不可得而榮之也紫陽朱子曰收斂其徳不形於外以辟小人之難人不得以禄位榮之秀巖李氏曰歐陽公集古録䟦尾載漢𤣥儒婁先生碑云父缺安貧守賤不可榮以禄與朱子説同紫巖張氏曰坤吝嗇為儉徳三陽在外為辟難坤邑為禄平菴項氏曰儉徳辟難不與害交也不可榮以禄不與利交也此君子所以體天地不交之象也世固有假避禍之名以保榮禄者故聖人必兼言之不可榮猶言不可得而榮非戒其不可也儉徳又屬地之嗇不可榮以禄又屬天之髙金華唐氏曰夬而不施禄是去小人以為己利也否而榮以禄則邦無道而富貴也天與火同人君子以類族辯物不曰天下有火亦不曰火在天下而必曰天與火者天覆於上火炎於上是天與火相同也是故天與水相違則為訟天與火相同則為同人卦名同人而象辭乃云君子以類族辯物得无異乎蓋族有逺近之不同類聚之則近者同乎近逺者同乎逺物有髙下之不同辯别之則髙者同乎髙下者同乎下而無不得其同也準齋吳氏曰泰乃君子之卦否乃小人之卦同人乃分别君子小人之卦故取髙明之象言之深居馮氏曰類族象天之兼覆辯物象火之鑒形火在天上大有君子以遏惡揚善順天休命離在坤下則為明入地中明夷離在乾上則為火在天上大有夷則明入地中而不見有則明在天上而大也紫陽朱子曰火在天上所照者廣為大有之象所有既大無以治之則釁孽萌於其間矣天命有善而無惡故遏惡揚善所以順天反之於身亦若是而已矣愚謂物有善有惡宜有以彰别之不然則善惡混淆惡者日茂而善者莫之能伸君子以惡不可縱善不可隠於是見人有惡即止遏之使之不復為惡有善即顯揚之使之勇於為善所以然者非君子之私意也順天命也蓋天命有徳作善則降之百祥故君子揚之也以天天討有罪作不善則降之百殃故君子遏之也亦以天君子豈容心於其間哉不過順承天之休命耳休美也天之命蓋有善而無惡也誠齋楊氏曰同人明在下而不敢専故止於類而辯大有明在上而由己出故極於遏而揚準齋吳氏曰此象大義是謂人君有髙明之徳則為去小人用君子獲天祐也節齋蔡氏曰遏惡揚善離象順天休命乾象地中有山謙君子以裒多益寡稱物平施山本髙於地者而曰地中有山則以卑藴髙含蓄而不露圭角謙之象也裒多惡盈也益寡益謙也君子以己下人不敢自髙以善與人不敢自有於是裒取己之有餘以增益人之不足又稱量其宜而均其施與猶權衡然不至於過亦不至於不及適平而止非謂奪甲之多以益乙之寡而必欲物之齊也裒多益寡象山在地中稱物平施象山與地平稱平聲施去聲裒鄭荀董氏蜀才作桴云取也字書作掊廣雅云掊减也或疑地中安得有山蓋非實象平菴項氏曰此正實象也以天下地勢觀之地之最下而負海者其中最多大山非地中有山而何若曰地下有山則不可爾或者疑之曰謂地下有山何為不可也愚應之曰非知渾天之說不足以語此知渾天之説則知山與水皆在地中猶人身中之有骨與血故比與豫皆言地中若地下則是虚空安得有山雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考雷在地中其聲未𤼵則其氣閉鬱及其出地奮𤼵而有聲則其氣通達而和暢豫之象也豫之為卦内坤順外震動和順積中而𤼵於聲樂之象也樂記云樂者天地之和也又云樂者所以象徳豫之象辭云先王以作樂崇徳謂先王作一代之樂所以𤼵揚祖考之徳而尊崇之也崇徳諸儒皆以為褒崇功徳又添一功字唯深居馮氏謂褒崇祖考之徳乃與象辭之意合今從之殷盛也薦享禮也上帝天之尊稱以主宰而言故謂之帝以配祖考當作配以祖考如商湯祭昊天而配以嚳祭五帝而配以契是也萬物本乎天人本乎祖祀上帝而以祖考配報本之道也樂外也徳内也作樂象震之動崇徳象坤之順帝出乎震震在上有上帝之象互艮為門闕互坎為隠伏有宗廟祖考之象節初齊氏曰祭義云君子合諸天道春禘秋嘗又云禘有樂而嘗無樂先王祭祀之禮蓋合乎天道以仲春之月雷乃𤼵聲是以春禘有樂至秋嘗之時雷乃收聲是以無樂郭白雲引此以明先王作樂之道因雷之收𤼵其微如此夫雷之出於地上春分時也文王八卦以震準之震正春也而曰帝出乎震雷出而帝與之俱也夾鍾二月律也郭兼山謂周大司樂以圜鍾為宫而奏於圜丘圜鍾夾鍾也正體豫以作樂也圜丘祭天郊祭也周之郊以后稷配天故言殷薦之上帝以配祖考然郊特牲云周之始郊日以至則雷在地中時也而易與大司樂云爾者豈其始用冬至而周公時已用仲春歟其曰先王豈周以前皆仲春歟澤中有雷隨君子以嚮晦入宴息雷𤼵聲於春收聲於秋兊正秋也時為秋則雷亦隨時而收聲故曰澤中有雷隨若言雷震於澤中澤隨震而動則是歸妹之象非隨之象也君子以嚮晦入晏息者時動則動時靜則靜時當止息君子亦隨時而止息禮君子晝不居内夜不居外隨時之道也夫當旦晝之時事物交接於前君子蓋不能不與之酧酢至昏晦之時羣動旣息則君子不能不與之俱息若乃終日役役至暮夜而不知止息則神疲力竭而弗能繼矣豈隨時之道哉或曰然則周公坐以待旦孔子終夜不寢非歟曰嚮晦入晏息君子之隨時處常也待旦不寢聖人之救時處變也震東方之卦日出之地曰𤾉谷兊西方之卦日入之地曰昧谷今自震東而趨於兊西有嚮晦之象卦互巽入艮止有入而止息之象山下有風蠱君子以振民育徳小畜之風在天上觀之風在地上渙之風在水上並無所阻故皆言行蠱之風則止於山下為山所阻而不能條達故不言行而言有康節邵子曰蠱者風之族也蠱以風化故風字從虫今夫山下有風則木多滯淫而蠧生焉蠱之象也振起也君子以振民育徳者民心偷惰而風俗澆薄則當振起之使之深耕易耨歡於生業而壯者以暇日修其孝悌忠信則庶乎民徳歸厚也育徳與蒙取象同而其意則異蒙言育徳乃君子之徳蠱言育徳乃民之徳紫陽朱子曰振民有風之象育徳有山之象澤上有地臨君子以教思无窮容保民无疆澤上之地岸也岸在澤上而下臨於澤故曰澤上有地臨言其相臨而最親近也君子之臨民豈以威加而力制之蓋以徳教容保之而已若以刑政臨民又施以威力是不能容又安能保民乎哉教取兊口之象容取坤腹之象節齋蔡氏曰教思无窮澤潤地之象也容保民无疆地容澤之象也蛟峰方氏曰思訓斯語辭風行地上觀先王以省方觀民設教風之行於地上則卑而及物所加者偃所觸者動有周遊歴覽之義故為觀之象先王以省察四方俯觀民之風俗而就為之設教如王制所謂天子五年一巡守命太師陳詩以觀民風令市納賈以觀民之好惡修其教不易其俗是也夫風行地上各隨其時時為二月則谷風至自東時為五月則凱風至自南時為八月則閶闔風至自西時為十有一月則廣莫風至自北四時所至無有差忒先王之省方二月則東巡守五月則南巡守八月則西巡守十有一月則朔巡守亦猶風行地上而無不周及也平菴項氏曰方與民屬地省之觀之教之屬風雷電噬嗑先王以明罰勑法諸卦象皆順說唯泰與噬嗑倒說泰不言地天而言天地此聖人崇陽抑隂尊君卑臣之微意也噬嗑不言電雷而言雷電伊川程子紫陽朱子皆以為倒置或曰按噬嗑之彖傳云雷電合而章蓋取其交而相合耳不交則為電雷交則為雷電也愚則曰噬嗑之象豈有他哉不過取其威明二者之並行耳先王以明罰勅法則威明並行亦如電與雷相合而震耀使天下知所畏而莫敢犯也或又疑之曰若然則噬嗑與豐取象何以異哉曰豐則光明後動猶電閃而雷繼之震而擊物故豐之象曰折獄致刑噬嗑則不然雷先動於下電乃明於上唯震耀而已不擊物也故噬嗑之象但曰明罰勅法明罰如金作贖刑所以懲其過也勅法如象以典刑所以防其惡也言之於設教之後所以輔教之不逮也秀巖李氏曰釋文云勑俗字也字林作敕圭叔吕氏曰明罰離象勅法震象明而示之雖愚知避嚴而勅之雖悍知畏深居馮氏曰離火也而不為火者五卦其遇雷則為電噬嗑豐是也遇地則為明晉明夷是也而重離亦以明言之周易集説卷十一
