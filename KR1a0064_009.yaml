body:
  text: 周易集説卷九宋俞琰撰下經四艮下艮上艮其背不獲其身行其庭不見其人无咎艮止也一陽止于二隂之上也卦之兩體皆艮則上下各止其所有兩人相背而不相嚮之象夫止而不動者背也動而行者身也上九静而止于上九三互震則動而行于下一止一行其情不相得故曰艮其背不獲其身身指九三而言既相背而不相嚮則九三行于庭内不見上九之在外故曰行其庭不見其人人指上九而言然則上九所以不獲其身者艮其背故也九三所以行其庭不見其人者亦艮其背故也觀彖傳可見艮之時動亦止静亦止動静不失其時又何咎焉初六艮其趾无咎利永貞趾在下而先動者也艮其趾者止於初也事止於初則未至有失故无咎復恐其隂柔无定力而不能永乆以正道固守故戒之曰利永貞六二艮其腓不拯其隨其心不快腓足肚隨股而動者也九三剛而失中不得止之宜六二雖有中正之徳而不能拯其不中之失二之行止蓋係乎所主不得自由也二静而欲止三則動而欲行二非不欲止三之行也而隂當從陽下當從上不可得而止也而況三居下體之上為下卦之主則行止在三而不在二二不容不隨三也其隨也非其心之所願是以不快九三艮其限列其夤厲薫心三居上下二體之間其象如門之限閾在人身則腰是也腰有腎唯宜止而安静不可動橈者也夤脊膂也其夤列而至於薫灼其心則危亡可立而待也列當依孟喜作裂薫當依孟喜作熏與詩雲漢憂心如熏之熏同醫書謂剛暴者多怒怒則氣阻而結成疽疽者阻也疽發于背則毒氣熏心而不食此危證也九三過剛不中妄動於艮止之時故其象如此心指四而言四居輔之下限之上正當心之位也夫重震重艮皆以兩剛爻取義震初吉而四不吉艮上吉而三不吉何也震初動而四則止艮上止而三則動也震之四互艮而止於震動之時故有震遂泥之失艮之三互震而動於艮止之時故有列其夤之患蓋與卦義相反故也六四艮其身无咎咸艮皆以人身取象咸之四以心之思言艮之四以身言何也咸言思者面面相對因其見而有感也艮言身者背背相偝无所見而遂止也人之一身无非動者艮其身則止而不動矣吉凶悔吝生乎動動則有咎不動則无咎也陽好動隂好静六四純乎隂静雖與九三同互震體不隨九三妄動故其象占如此六五艮其輔言有序悔亡輔者言之所自出言妄𤼵則有悔況言於艮止之時能无悔乎今曰艮其輔則輔不妄動言有序則言不妄𤼵是以悔亡六五柔得中而无過故其象占如此上九敦艮吉上居重艮之極止而過於敦篤得止道之至善者也故諸爻之中獨此爻為吉震之動不可過故震至上則凶艮之止不患乎過故艮至上則吉艮下巽上漸女歸吉利貞漸之為卦内艮止而外巽順其進蓋漸而不驟也巽為長女自外而來故曰女歸古者婚禮有納采問名納吉納徵請期親迎蓋以漸而進故聖人以女歸之道言漸女以夫為家嫁為歸歸則為妻奔則為妾奔則速歸則漸也人之進於事士之進於朝能如女歸之漸則吉而又曰利貞者始雖以漸而吉終宜固守以正也初六鴻漸于干小子厲有言无咎鴻陽鳥而水居者也飛有序進有漸故漸卦六爻皆取鴻象干水涯鴻漸于干則附近於水猶未離其居也昔居于水今漸于干則其進不驟猶君子安於漸而不務速進也初六隂柔之小故稱小子出而方與世接未閑於禮法加以險阻在前故此心危厲而不能自安初之應在四四也與之不相得遂有言語見毁初能以危厲自慎而禮義不愆則亦无咎也有言无咎句法與損六四有喜无咎夬九三有愠无咎同六二鴻漸于磐飲食衎衎吉初六以柔居剛上无應援則有危厲之憂六二柔順中正上與九五相應故有磐石之安自干而進于磐進以其漸身安志舒故飲食衎衎而吉衎衎和樂意與詩南有嘉魚式燕以衎之衎同九三鴻漸于陸夫征不復婦孕不育凶利禦宼陸髙平之地自磐而陸其進雖有漸然以水鳥居之非所安也夫謂本爻之陽婦指六四之隂與小畜九三同陽本在上之物乃止于下是征而不復也隂以近比相合而非其正應是孕而不育也其象如此其占則凶莫甚焉而又言利用禦宼何也秀巖李氏曰四非婚乃宼也愚謂三以四為宼而禦之則利以之為婦則凶利與凶皆占辭也六四鴻漸于木或得其桷无咎自陸而進于木則其進亦有漸矣桷指三三與四非應故言或木之横平如屋椽之方者謂之桷鴻足方不能握枝或得横平之方木如桷者而托足焉則庶乎少安而无咎也夫六四乗九三之剛本非所安豈得无咎蓋以柔居柔而其徳又巽順故无咎九五鴻漸于陵婦三嵗不孕終莫之勝吉陵比之木則又漸進于髙矣婦指二二與五蓋正應也為三四所閒故歴三嵗之乆而不孕雖未能即合然九五之與六二以中正之道相交終非三四所能勝也三與五皆言婦三凶而五吉何也五與二應乃夫婦之正配故吉三與四比乃夫婦之邪匹故凶上九鴻漸于陸其羽可用為儀吉陸程子朱子皆依胡安定作逵謂通邑大都九達之路也鴻本水鳥自水涯而磐石自磐石而平陸自平陸而林木自林木而髙陵无非野外幽寂之境今進于逵則人皆仰而見之矣其進有漸蓋非一旦驟至于此君子之進有序亦當如是也儀謂儀仗用羽毛為飾者旌旄之類是也其羽可用為儀吉者上九位雖極髙而不為无用之象其占如是則吉也詩鴻鴈云鴻鴈于飛肅肅其羽蓋有行列而其次序不亂也兊下震上歸妹征凶无攸利歸妹兄嫁妹也震為長男兄也兊為少女妹也漸言女歸自彼歸我之辭娶婦之象也此言歸妹自我歸彼之辭嫁妹之象也歸妹以六三為成卦之主爻六三以隂居陽其位不當又以柔乗剛動而必凶得此占者它事皆无所利初九歸妹以娣跛能履征吉娣乃妹之妹也詩韓奕云諸娣從之娣即媵之異稱歸妹以二為夫家二乃嫡室所處之位初在二之下故為娣也詩江有汜云之子歸不我以與此以同但彼不用而此用也剛非女子所宜初九剛而不中跛之象也跛雖能履常在人之後其占為征吉者處下而能行其娣媵之道也彖言征凶爻乃言征吉何也曰位不當則凶位當則吉初九位當也九二眇能視利幽人之貞九二剛而不正眇之象也眇雖能視不足以為明矣自知其貌不颺是以守静居貞非過也宜也不言歸妹者六五已備矣故别取一義而曰眇能視利幽人之貞與履九二同彼不願仕此不願嫁其貞一也六三歸妹以須反歸以娣須賤妾也六三處兊説之極不中不正而居九二之上此妾之佞媚而上僭者也歸妹而用須以從嫁豈所宜哉不若反而歸之唯用初九之娣娣雖跛蓋剛正賢女也反謂復還歸謂歸寧以用也九四歸妹愆期遲歸有時愆期謂過時也下无正應是以歸妹而愆期也遲歸非故爾遲遲其行蓋有待而然也待者何待六五之命也六五之命君命也未得君命不敢擅也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉六五王姬也以柔徳居尊下應九二為帝乙歸妹之象與泰六五同君嫡室之稱袂大袖良鮮美也娣以服飾為容故其袂良非謂其制度過於君也六五雖王姬之貴而隂爻之虚初九雖在下乃陽爻之實是其君之袂不如其娣之袂良也六五以柔徳居中謙虛之至故其歸夫家也能執婦道而不自滿假如月之將望而其光未盈吉之道也故曰月幾望吉上六女承筐无實士刲羊无血无攸利上之應在三女蓋指三士則自謂也三承上之筐而无實上刲三之羊而无血以其不相應不可以奉祭祀也古者娶婦三月而廟見士必以血祭女必以蘋蘩之屬實於筐篚今有筐而无實是虛筐也有羊而无血是死羊也廟見之禮宜如是乎不敬甚矣何所利哉不言歸妹以其不成歸妹之禮也離下震上豐亨王假之勿憂宜日中豐者至滿至髙而極盛之義為卦下離明上震動故亨時既極盛為人君者其喜乎其憂乎蓋庸君則喜賢君則憂憂之何如憂其盛極則必衰盈乆則必虧也今曰王假之勿憂宜日中戒後世王者處豐之道也假大也當依馬融作古雅反王假之與孟子王請大之同豐盛之時地大物衆王者當務行寛大勿用屑屑然徒憂蓋豐盛之極固不可不憂然徒憂亦无益天下之事唯中乃无憂不中則有憂勿憂之道宜以日中為法茍能如日之正中无所偏照則可常保其豐兹蓋聖人持盈守中滿而不溢髙而不危之道也初九遇其配主雖旬无咎往有尚隂乃陽之配以九遇六配也六二乃下卦離之主爻故言主與明夷六二言主人同皆指六二也今以初九之剛遇六二之柔雖周旋至于旬日而无相資之益然亦无咎但不可過旬耳往謂往與四合初之應在四今九四與初九不相應在它卦為兩剛相敵而不相得在豐卦則雷電皆至明動相資者也初亟往而與之合則有相資之益而可嘉尚若與六二相比過旬而不往則徒爾以火濟火災及之矣不係卦名以其在豐之初未至於豐也六二豐其蔀日中見斗往得疑疾有孚𤼵若吉蔀乃周匝障蔽之物二之應在五而六五為上六小人所蔽故其象為豐其蔀斗以昏見日中无見斗之理日中而見斗則俾晝作夜以象豐盛之時遇暗君也往得疑疾謂二往從五則反致其疑而見疾也二五本同徳相孚者也二能積其誠意以感𤼵之則五雖柔暗亦當釋其疑疾而撤去其蔽此則轉凶為吉之道也故曰有孚𤼵若吉若語辭九三豐其沛日中見沬折其右肱无咎豐其蔀者蔽其所居也豐其沛者蔽其所行也沛當依釋文作斾旌旗之屬也沬音昧斗杓後星也沛與沬皆指上六日中而見沬則隂暗尤甚於見斗也九三與上六為正應上六乃大其障蔽于上在其下者幽暗而不可行是故九三雖有剛明之才亦无以自見也肱以右為用折則不可用矣非其咎也易以陽為右隂為左九三陽爻故稱右九四豐其蔀日中見斗遇其夷主吉四承五故其象亦為豐其蔀日中見斗夷醜類主指五或疑九四震體震以陽爻為主而指六五隂爻為主何也曰六五尊居君位豐之主也九四臣也臣不可為主也九六隂陽相合而不稱配者君不可以配臣也稱夷者以君臣同體而言也當此豐盛之世暗君在上為小人所蔽故日中反為昏暗之時若以九四剛明之才輔相之則君臣相遇亦轉凶為吉之道也豐與明夷大率相似所不為明夷者賴有九四爾六五來章有慶譽吉章指九四以剛居柔而剛柔文故為章不言章來而言來章欲六五之柔來致剛明之賢也六五下无正應而能來致九四以為己輔則雖柔必强雖暗必明當有慶又有譽而吉不係卦名不自以為豐也不自以為豐然後能來致九四之章上六豐其屋蔀其家闚其户閴其无人三嵗不覿凶上居豐盛至極之地乃豐大其屋以自髙又為蔀周匝其家以自障蔽不明甚矣家與户皆指九三人亦指九三閴苦鵙反静也閴其无人謂九三離體本明上六障蔽之而其明弗彰雖有人猶无人也覿私見也上以豐盛自髙深居簡出而不與物接則无人見之是以三嵗之乆雖九三之正應亦不與之私見也自絶如此得不凶乎艮下離上旅小亨旅貞吉旅失其本居而客寄於它方也家人與旅以離内離外取義内離外巽入而麗乎内是為家人内艮外離止而麗乎外故為旅也旅小亨謂在上者之旅六五是也旅貞吉謂在下者之旅九三是也故彖辭兩言旅以别之六五在旅雖居尊位而下无剛陽正應之助豈能大亨以及人然在旅而柔得其中順乎二陽而得所託亦足以為一身之小亨故曰旅小亨九二在旅處多凶之地亦无正應羇孤窮困豈宜妄動唯以正道固守則吉故曰旅貞吉初六旅瑣瑣斯其所取災詩旄丘云瑣兮尾兮流離之子節南山云瑣瑣姻婭瑣之義皆訓小初六隂柔之小處下體之下為人卑汙而計較瑣屑在旅之瑣瑣者也不明大體故六二九三俱目之為童僕旅之時親已者寡它爻皆无應獨初與四應然九四陽性而離體非就下者也初未免捨四而之三三蓋内體之主也初既服役于三而三也適有焚次之禍則初有焦頭爛額之災矣是災也斯其所自取也不屑就則不至于斯也六二旅即次懷其資得童僕貞次旅中之館舍即就也資旅中所用之物懷者藏也懷其資而不露于外善處旅而免禍者也童僕指初六貞占辭也貞字當自為句在旅雖无應援而六二有柔順中正之徳故有次舍之安又有資可懷又得童僕代勞則當以正道自守不必茍求也九三旅焚其次喪其童僕貞厲次以本爻所處之位言次焚則其資可知矣二即而三焚二去離火稍逺三則近之也童僕亦指初二得而三喪二去初甚近三則逺之也一即一焚一得一喪相反如此何哉曰六二柔而得中九三過剛而不中也夫居剛而仕剛平居且猶不可況在旅乎在旅當以柔順謙下為先不當過剛過剛則人所不容次安得而不焚過剛則无徒童僕安得而不喪貞厲當自為句謂占者如此固執而不改則危也九四旅于處得其資斧我心不快處對出而言出則不處處則不出九四蓋茍安于旅伏而不出者也斧析薪之利器資用也既得其資斧而曰我心不快何也曰未得其位故也在旅未得其位又无童僕雖有資斧而躬自樵蘇此心有何快哉然則四也差强於三不及二多矣六五射雉一矢亡終以譽命射食亦反雉指上九焚巢之鳥射雉而一矢亡雖无所得而其所喪亦不多也終以譽命謂以六居五柔而不懦剛而不暴又有文明之徳終以此而得譽命也五君位也王者无外故爻於六五獨不言旅非謂旅之六五不取君義上九鳥焚其巢旅人先笑後號咷喪牛于易凶上九旅寓在上過剛自髙而遇禍故其象為鳥焚其巢鳥巢且焚則人之館舍可知矣處上而自以為得故喜而先笑既而失其所安故悲而後號咷牛指六五易當依王肅音亦與疆埸之埸同埸畔也五與上同體是其畔也上處離之極其性炎燥又剛亢絶物近有六五之柔順而遽失之凶之道也夫在旅而遭焚蓋不容留矣唯有行乎然牛存則有可行之資牛喪則雖欲行而无所資其象與大壯同但有牛羊之異耳然大壯喪羊則无悔旅喪牛則凶者羊很物牛順物很可喪順不可喪也它爻皆言旅此獨言旅人何也伊川程子曰上承鳥焚其巢故不得不稱旅人巽下巽上巽小亨利有攸往利見大人巽入也一隂伏於二陽之下有柔行巽入之象卦疊兩巽則上下相巽而柔皆順乎剛雖有亨道然過柔則懦故其占僅為小亨巽順而前无險阻故其占又為利有攸往柔非剛不能自立故其占又為利見大人大人指九五初六進退利武人之貞進退與觀六三同彼指九五此則自謂皆巽體也巽申命行事之卦也令出則務在必行豈宜或進或退初六卑巽而不中柔懦而不武故或進或退而不能自決也若以武人處之則貞固足以幹事矣故曰利武人之貞隂爻何以為武人陽主生隂主殺故履六三與此皆言武人九二巽在牀下用史巫紛若吉无咎牀以安身巽在牀下過巽而不自安之謂古之人尊者坐于牀卑者俯伏拜跪于牀下當巽之時以九居二其位不當故其象如此史指三巫指四古者祭禱則用史巫史以人之意達于鬼神巫以鬼神之意達于人三近二故為史四近五故為巫二與四三與五同功而異位故三可達二意于五四可達五意于二也六子自相遇之卦與乾坤同例无正應今九二九五兩剛本不相應非用三四不能達也二於是盡其卑巽俯伏拜跪于牀下三四交相往來於二五之間猶祭禱而用史巫之紛紛遂有感應之吉而无過巽之咎也夫九二卑巽如此毋乃為諂乎然當巽之時不厭其卑巽況用之於事神蓋其陽剛中實至敬盡禮出于忠心之真誠非諂也孔子家語云祝以孝告嘏以慈告王肅注云祝通孝子語於先祖嘏傳先祖語於孝子家語之所謂祝嘏即易之所謂史巫也九三頻巽吝頻與復六三頻復之頻同三居下卦之窮故復六三巽九三皆曰頻九三爻位皆剛本不能巽況在重巽之時下无正應不得已而巽於六四此乃窮蹙无可奈何而後勉為之巽猶人行至水頻更无可進之地而其勢窮蹙不容不退步也其巽如此故吝夫頻一也何咎之有窮而卑巽則可羞吝也六四悔亡田獲三品巽以一隂伏于二陽之下是之謂巽在重巽則六四之柔乗九三九二兩剛之上是不巽也能无悔乎悔亡者居得其正又在上體之下也三品指下三爻初六之柔九二之中九三之剛是為三品四居五下巽順而盡事君之禮故初六九二九三皆巽順之是猶畋獵而有三品之獲也王制云諸侯無事嵗三田一為乾豆二為賓客三為充君之庖即此三品也九五貞吉悔亡无不利无初有終先庚三日後庚三日吉巽有四剛爻九二九三上九皆言巽獨九五不言巽九五蓋人君之尊不可過於巽也夫尊居君位為巽之主命令之所自出固守以正乃吉否則有悔今九五之處巽既中且正是以吉而悔亡又无不利初謂事之始无初始未善也有終既更而後善也卦互兊為口所以出命也兊居西方故言庚初在互兊三畫之先先庚三日也五在互兊三畫之後後庚三日也庚者更也出命於未更三日之先又申之於既更三日之後則所行之事无不善故吉先後皆去聲上九巽在牀下喪其資斧貞凶巽在牀下過於巽也資斧利用之器喪其資斧下无應而失助也巽至上九巽極當變不可固執也故戒之曰貞凶九二上九皆失位爻辭皆曰巽在牀下一吉而上凶何也曰巽以中正為貴九二雖不正其處巽則得中故吉上九不正又不中又不知變故凶周易集說卷九
