body:
  text: 周易集説卷八宋俞琰撰下經三巽下坤上升元亨用見大人勿恤南征吉升進而上也萃升皆以坤上坤下取義萃三隂聚于下倒轉為升則三隂升于上下巽而上順九二以剛德居中與六五相應是以元亨大人指九二用見與利見不同利見者宜見之用見將變動而有為則見之也既見則有慶故勿勞憂恤南征前進也巽居東南坤居西南皆南方之卦南方陽明之地進則遂其升而得行其志故吉釋文云用見本或作利見初六允升大吉允升者初以四之允而升也初與四雖不相應然彼之柔以時升此之柔亦以時升彼此蓋相信相從也在下而升者得上之人信從而不疑是以大吉九二孚乃利用禴無咎二五雖相應有九三阻于其前而莫能升故不言升萃與升相反而孚乃利用禴俱言于下卦之中爻何也禴所以享上也六二求萃于上九二亦求升于上故其義同而有小異者萃六二所應乃九五之剛既引于上而吉矣孚可知也故先言無咎而後言孚升九二所應乃六五之柔安知其孚與否也故先言孚而後言無咎是果孚也則吾用禴也利而無咎不孚而用禴則不唯不利且有咎矣今九二以剛德居中能盡臣道以事上六五雖柔而其德謙順以接下彼此皆至誠相孚故二之用禴也禮雖簡亦無咎九三升虛邑三與上應而坤之順在前更無阻礙則其升也如入無人之境故曰升虛邑言至易也六四王用亨于岐山吉無咎二應五升將何之故不言升四近五聖人嫌其逼五故亦不言升而别取祭享之義曰王用亨于岐山亨許兩反與隨上六同皆當作祭享之享六四在升之時其德最為柔順王者得此占用此爻義動而有事于山川則誠意上升足以達于神明故吉六五貞吉升階貞者固守以正而不變也升階猶言踐阼先言貞吉而後言升階蓋貞吉然後可以升天子之位也六五以隂柔居尊而其位不正故為此戒上六冥升利于不息之貞升至于上極矣上六以隂爻處坤隂之極知進而不知退非冥而何得此占者唯利于不息之貞貞者固守以正也正而不息則利不正而不息則不利也坎下兊上困亨貞大人吉無咎有言不信困者窮而憊乏之義困井二卦以坎下坎上取義井以水上出為功困以水下漏為厄又陽剛為隂柔掩蔽所以為困也亨以二體言為卦內坎險外兊説在險而以道自説是以身雖困而道則亨也曰貞曰大人吉無咎皆指九二有言不信則指上六困之成卦蓋在此兩爻也九二陷于坎險中能以貞道處困而不變故吉而無咎上六兊口之説非不能言然處困厄之極唯宜默耳有言則人誰信之徒尚口辨無益也初六臀困于株木入于幽谷三嵗不覿株木槎枿之木初六處困而在下卦之底其位又不當如臀坐株木而不得其安柔弱不能自拔如入于幽谷隂暗而不見其明困之甚也覿私見也初欲應四而二間之四亦困于金車未能與之私見故三嵗不覿止云三嵗聖人不絶人以終困也九二困于酒食朱紱方來利用亨祀征凶無咎九二雖在困中而不失其所守但以醉飽過傷而反為酒食所困耳故曰困于酒食上有剛中之君與二同德必將下來相求故曰朱紱方來困之時不宜變動而用事唯宜享祀耳九二以剛德居中其心至誠專一自能感通于上故曰利用享祀處困之道靜而處下可也豈宜往哉往則必凶故曰征凶而又曰無咎何也曰君命召則不容不往也何咎之有六三困于石據于蒺藜入于其宫不見其妻凶承乘皆剛進則有九四之辱退則有九二之危故其象為困于石據于蒺藜宫所居之室也三內體故言宫其應在上上兊女三坎男上蓋三之妻也而與三不相應故其象占又為入于其宫不見其妻凶九四來徐徐困于金車吝有終自外而內為來徐徐緩也九四來徐徐蓋與初六三嵗不覿相發初之所以三嵗不覿者以九四之來徐徐也金車兵車也為五所乘不得不黽勉從事乎五是以有金車之困唯其困于金車是以來徐徐而至于三嵗既歷三嵗故始雖不覿今則覿始雖吝終則有與也大抵力不足而過勞則困乏非有援助則莫能濟况居困之時乎四與初雖相應而初以柔居剛固不能濟四之困四以剛居柔亦不能濟初之困所以吝而乃有終者它爻皆無應四獨有應初之柔雖不能相濟畢竟有與也豈不勝于無與而孤立者哉九五劓刖困于赤紱乃徐有説利用祭祀劓謂刑上六以去在上之小人刖謂刑六三以去在下之小人三與上同惡相濟以掩君子不去之則九二莫能上達也赤紱猶坤言黃裳皆下體之服以人臣在上而不僭則為黃裳以人君在上而接下則為赤紱五求二以共濟天下之困而二未至五乃側席以待蓋焦心勞思之甚是困于赤紱也夫以九五剛中之君下求九二剛中之臣何為乃徐有説耶以小人未去故也小人去則二五相遇然後有君臣相得之説也處困之時五與二皆以剛德居中用之于祭祀則其心至誠專一足以通于鬼神故其占又為利用祭祀釋文云祭祀本作享祀上六困于葛藟于臲卼曰動悔有悔征吉葛生于下其藤蔓攀附于上上之應在三彼此皆柔猶葛藟之纒繞故曰困于葛藟臲卼髙危不安貌處上卦之上而又下乘九五之剛故曰于臲卼六三欲牽引上六以為己援然是時困極將變上六不自為計則雖悔無及矣曰者自謂也動悔有悔征吉謂動而悔前之失知有後悔則莫如脫去六三之纒繞而自為征行之計則吉也巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶困井二卦以坎水之上下取義坎水在兊澤之下則為困在巽木之上則為井井者穴地出水之處井之為卦下巽入上坎水入乎水而上水故謂之井古者八家為井四井為邑邑有時而變遷井則不變遷故曰改邑不改井井乃困之倒體因倒轉為井則六三變為六四改邑之象也二五之剛中如舊不改井之象也井之泉不以常汲而竭亦不以不汲而盈故曰無喪無得困下坎上兊中互離巽井下巽上坎中互兊離昔為困具此四卦今為井亦具此四卦此無喪無得之象也往者汲于此來者汲于此故曰往來井井汔幾也繘汲水之綆瓶汲水之器羸綰絆也汔至而亦未繘者幾及于泉而不得泉則與未施繘無異也汔至亦未繘為句井羸其瓶為句彖傳之誤亦承彖辭之誤云爾民非水火不生活今其瓶羸于井中而凶謂汲者非其任也汔與汔濟之汔同羸與羸角羸豕之羸同初六井泥不食舊井無禽卦以陽爻為泉隂爻為井泥如字初象井底處至下而水未離乎泥也井有泥則汚濁故不可食困以六居初倒轉為井井亦以六居初是未改邑之前舊有此井故謂之舊井禽與擒同易以陽實為有隂虛為無初六乃隂爻是無所獲也故曰無禽師六五之應乃九二故言有禽恆九四之應乃六二故言無禽彼指應爻此則本爻自謂也九二井谷射鮒甕敝漏九二之井亦舊井也泄之則其下泉眼通甃之則其旁土堅實九二則猶未泄未甃也井谷指六四謂井中之虛處井舊而弗甃則其旁崩潰為谷也射食亦反濺也鮒乃井蝦指初六也井既崩潰土必不堅實土塊墮入于井則其水激濺而射于鮒也甕乃汲器指九五也敝漏則不能受又安能汲九二陽爻雖有水然上無正應而下比初六功不上行故其象如此九三井泄不食為我心惻可用汲王明並受其福泄者浚而澄治之以喻君子之修潔也井既泄則可食而猶不食以喻君子之未見用也我三自謂心惻指上上與三相應蓋知我而為我心惻者也惻傷之也但能傷其可食而不食可用而未用非能汲之也孰能汲之其九五乎九五王也王明而用三則上下並受其福否則君子沈于下僚亦猶井雖泄而不用汲何福之有六四井甃無咎甃者壘磚以為井壁也三既泄而為新井矣四不甃則崩潰不已必至于湮塞能無咎乎才雖不足以濟物然能自修治故亦無咎九五井冽寒泉食三既泄四既甃至五則冽矣冽者清之至也九五爻位俱陽故冽既冽且寒此井泉之至美而可食者也三居井之半其水僅半井而去泥未逺故雖泄而人亦不食至五則水滿井矣去泥甚逺而清潔如此故食井以上出為功五未及乎上故不言吉上六井收勿幕有孚元吉收如字疑即汲字訛為收爾幕當作羃掩之也井養而不窮蓋以濟人利物為功邑有井則居者行者皆得而汲之况繼澤無水之困後正當濟人之困而使之汲羃之可乎上與三相應三井泄不食知上六為已而心惻則其相孚也久矣今井道成于上而元吉蓋由九三泄治之功也離下兊上革已日乃孚元亨利貞悔亡革變也革鼎二卦皆以離上離下取義木入火中則然烹飪用鼎之象也金在火上則鎔改變從革之象也已日已革之日也孚信也古者垂法于象魏特舊法耳猶浹日而斂之況變舊而從新乎夫人之情可與習常難與適變可與樂成難與慮始變革之初四海之廣萬姓之衆才識智愚之不齊人已利害之不同豈即日所能使之遽信哉故必已日而後信也天下之事壅滯而頽弊之極不容不革革之所以致其通易窮則變變則通革之為卦內文明外和説故有大通之道也事以有悔而後革無悔則安用革革雖有大通之道又宜固守以正其悔乃亡否則所革未當又有變動之悔也初九鞏用黃牛之革鞏固也黃牛之革指六二黃中色牛順畜革柔而堅韌之物初居革之始在下而無應豈宜妄動而驟有變革以中順之道固之可也初九剛陽而離體火性炎上勇于有為故為此戒革之義本訓變而皮革所以固物蓋借用耳如履之為禮噬嗑之為市合占法例如是也獸皮本硬物治去其毛而熟之則變而為柔蓋皮革之革亦取變之義也六二已日乃革之征吉無咎爻至三為終日過三則為已日二其日之正中歟彖言革已日乃孚爻則曰已日乃革之得無異乎曰彖言王朝之革爻則言侯國之革六二曰已日乃革之征吉無咎蓋待上之人已革而後革之則征吉而無咎也乃之云者必已日然後可革今離日方中蓋未已也日未已則未可遽革也六二柔順中正而所為不僭故其象占如此九三征凶貞厲革言三就有孚征動而行也貞靜以守也征凶則貞必吉征吉則貞必凶今言征凶又言貞厲何也曰時未可為不可遽為征則凶也事有當革不可不革貞則厲也六二柔而得中動則不至于過故許之曰征吉九三剛而不中又在離體之極恐其躁動故戒之曰征凶復恐其以剛明自任故又戒之曰貞厲三去聲革言三就謂謀之再三而後成就也上與三應三至上凡歷三爻故曰三就猶士喪禮云馬纓三就注云纓當胸削革為之三就三重三匝也革言如此則其有孚可知矣九四悔亡有孚改命吉九四剛而不中本當有悔然以剛居柔而不暴必待已日而後革革而當者也是以悔亡彖言已日乃孚又言悔亡蓋與九四相發將革而謀之謂之言革而行之謂之命四上孚于五下孚于三上下相孚而後改其命令故吉四在離日之外日既已矣故言改五與上在既改之後則言變變乃革之成改則猶未也革之下三爻皆有謹重而不敢輕改之意至四而猶未敢輕變古人之重改作蓋如此九五大人虎變未占有孚九五大人為革之主其德日新其威足以服人彰彰然在人耳目天下皆望而畏之故曰大人虎變占所以決疑未占有孚孚之素也大人者與鬼神合其吉凶者也況又順天應人而時有變革之象已炳然如虎之文蓋無有不孚者故無待乎質諸鬼神而後無疑也三四五同互乾體故皆言有孚上六君子豹變小人革面征凶居貞吉九五大人出為革之主如虎之變天下靡不畏服凡為君子者皆自新如豹之換毛為小人者亦皆改過而回心嚮道故曰君子豹變小人革面面者嚮之謂革至于上革道成矣不必一一吹毛而求其疵也往則自取多事而有紛更之凶故唯守靜而居貞則吉巽下離上鼎元吉亨易全卦取物象命名唯井與鼎井之上坎水鼎之上離火而下卦皆巽蓋水以綆汲火以薪傳也鼎器也非特有安重之義蓋其致潔以為烹飪之用則又有新義為卦內巽順外文明又六五以柔中之德居尊而下應九二剛中之臣故亨吉字羡文當依伊川程子作鼎元亨觀彖傳可見初六鼎顛趾利出否得妾以其子無咎初在鼎之底故象趾往與四應則其趾向上是為顛趾否悲已反不臧也夫顛趾非鼎之正何利之有蓋鼎初顛趾則宿昔漬穢不臧之物皆顛覆而出之因以致其新潔乃所以為利也夫烹飪之初不去其宿穢則為新物之害初六隂柔之資不中不正如小人內懷不善因經顛覆之禍乃去其不善以從善是亦利也妾指四得妾謂買妾而得其人也生子不以妻而以妾豈能無咎今得妾而無咎者以其有子故也在鼎之初有子以主器又何咎焉九二鼎有實我仇有疾不我能即吉易以陽爻為實九二陽實居中鼎有實之象也我仇有疾指初六謂初六隂柔與已相並而有否惡之疾非嘉偶也即就也與詩東門之墠子不我即之即同不我能即吉者初方顛覆自救不暇安能我即然而隂從陽者也我雖自守彼必相求我當有以却之使不來即我則吉蓋鼎中有實唯當上奉六五之正應不可使小人近比而得以染指也九三鼎耳革其行塞雉膏不食方雨虧悔終吉耳數偶而中虛所以受鉉也九三乃剛陽之實而其數竒是改變其所以為耳之義故曰鼎耳革或疑耳在五何為三又言耳曰三當鼎腹耳雖出于鼎口之上蓋根于鼎腹也凡物皆以足行唯鼎以耳行耳既不可受鉉安能舉之以行故曰其行塞鼎不行則雖有美味亦不得而食之故曰雉膏不食隂陽和則雨三與五同功又同互兊體又九六相合是方雨也虧欠而不足也悔自省其失也三與上不相應得五而失上豈非三之所欠而不足者乎五與三同此鼎耳三雖革五不革也逮夫五受上九之鉉而行則三也亦與之俱行是故始雖有悔終亦吉也九四鼎折足覆公餗其形渥凶四本鼎腹非鼎足也四與初應初六之柔在下不能勝其重任猶鼎之折足也大臣任非其人而敗乃公事猶鼎折足而顛覆其中之實也聖人烹以享帝養賢非為口腹之私是為公餗形渥當作刑剭古有屋誅之法謂所殺不于市而適甸師氏者也四居大臣之位剛而不中所應者柔故其象如此其占則凶六五鼎黃耳金鉉利貞六五位居鼎耳中而不偏虛而能受故曰黃耳鉉貫于鼎耳所以舉鼎而行也金堅剛之物指上九而言以六五而承上九猶鼎之黃耳而得金鉉也其象如此而其占則為利貞謂宜固守其中德而不可變也六五質本隂柔恐其所守不固是以戒之上九鼎玉鉉大吉無不利鼎之鉉一而已豈有兩鉉哉今疊見焉五耳有鉉而非鉉之正位上乃正位也五稱上為金鉉以其剛也上乃自稱為玉鉉何也金一于剛玉則具剛柔之德也上九以剛居柔故稱玉鉉鼎至上九鼎功已成而有濟人之用吉之大者也用以享帝亦利用以養賢亦利故曰無不利震下震上震亨震來虩虩笑言啞啞震驚百里不喪七鬯震動也一陽動于二隂之下也卦疊兩震則動于下而達于上故亨震之象為雷來謂雷聲之來虩許逆反虩虩與蘇蘇索索皆雷聲震來虩虩謂雷之初來而其聲震動也啞烏格反啞啞驚而輟聲也笑言啞啞謂笑者言者聞雷聲之虩虩遂啞啞然噤無一聲也震以雷言驚以人言百里不特謂雷聲達于百里蓋以震之長子言古者王畿千里諸侯之國皆方百里震雖乾君之長子其位則諸侯故稱百里喪失也匕鬯祭物也七之狀如畢用以舉鼎實者鬯乃秬黍酒和鬱金用以灌地降神也不喪七鬯謂長子主器而能盡其誠敬之心不失其所守也祭物亦多矣必曰七鬯者以震卦繼鼎卦之後也此卦兩體皆震有長子繼長子為君之象蓋百里之命寄于長子一身唯能常懷敬畏如當雷聲震驚百里之時則可以保守百里之國而不失為宗廟社稷之祭主也彖辭凡三言震震亨總上下二體而言震之所以亨次言震來虩虩蓋指下卦又言震驚百里則指上卦重震初九震來虩虩後笑言啞啞吉震之彖辭見于初九初九震之主爻也于笑言啞啞之上添一後字謂聞雷之初來其聲虩虩而後笑者亦不笑言者亦不言也處震之初而恐懼如此則獲安靜和平之福故又于笑言啞啞之下添一吉字六二震來厲億喪貝躋于九陵勿逐七日得震來指初厲謂雷聲之厲億當依虞翻作噫于其反與啞啞不同啞啞者震來之初卒然聞之遂輟聲是為啞啞噫則震之近而可畏遂失聲是為噫喪失也貝指初九之剛陽六二隂柔所資以為助者也躋登也九陵指九四初之應在四初往應四則既躋于九陵矣二安能得其助是喪貝也然在重震之時諸爻皆不相應何況九四陷于坎險則初之往也勢不容留故雖躋于九陵不久當復還初復還則二之所喪勿用追逐不久亦復得也卦爻凡六而言七日何哉天道好還七日則周而復始也六三震蘇蘇震行無眚蘇舒緩也震至六三則雷聲舒緩而少息也震行謂雷之行雷當作聲之時動而行於天下則萬物靡不暢達乃無災眚若于當行之時止而不行則萬物其不遂夭閼於是乎故行則無眚不行則有眚君子于此體震之行而不止則亦無眚蓋三雖震體之動而互艮止恐其止而不行故勉之使行也九四震遂泥初九之震始震也得位而在初故其震也聲甚大九四之震洊震也失位而在四隂之中則其震也沉滯而聲不揚與初九不侔矣故曰震遂泥遂言其無返之意泥乃計反沉滯也六五震往來厲億無喪有事初曰震來言雷聲方震動而來二曰震來指初之來以五視初則初之始震為既往四之洊震為復來五蓋震往而復來之時也厲謂雷聲之厲也億與二之億皆當作噫中心恐懼而失聲也二五皆中爻主心故皆言噫無喪即不喪匕鬯之謂二乘初之始震出於不意故喪其貝五乘四之洊震畏而知戒故無所喪有事謂有事于宗廟社稷以為祭主也震之主爻在初而無喪有事乃歸之五五乃震之君也易道尊君而卑臣例如此上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言索桑落反上六處重震之極雷聲漸小而漸消散故曰震索索矍矍兩目左右顧而不定貌即漢光武謂馬援矍鑠哉之矍以隂柔處動極故其視矍矍下無正應征將何之蓋動極則當靜征行則必凶故戒之曰視矍矍征凶躬上之本體鄰為近已者六五是也四之震在五為近在我則隔于五蓋猶未及我也故曰震不于其躬于其鄰能恐懼修省於震未及身之前故亦無咎婚媾有言羡文觀爻傳不釋可見周易集説卷八
