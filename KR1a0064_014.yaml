body:
  text: 周易集說卷十四宋俞琰撰彖傳一文王之辭謂之經孔子之辭謂之傳傳者所以釋經之辭也經有彖辭即文王所繫於卦下之辭孔子釋文王卦下之辭而傳述其意故謂之彖傳古者經與傳各為一書自費直以傳解經而後鄭𤣥以彖傳連經文然猶若今乾卦次序至王弼乃自坤卦而始每卦以彖傳移綴於彖辭之後又加以彖曰兩字冠之後之人遂不謂之彖傳而直謂之彖夫以孔子之彖傳為彖則文王之彖辭當復謂之何哉魏晉而下去古日逺訛以傳訛至今讀者習以為常弗察也先儒謂西漢時六經與傳皆别行逮東漢諸儒作注始合經傳為一如春秋三傳之文不與經連故石經公羊傳皆無經文藝文志所載毛詩故訓傳亦與經别及馬融為周禮注乃云欲省學者兩讀故具載本文而就經為注鄭𤣥與馬融同時𤣥以易傳連於易經蓋倣融例而弼又援𤣥例也乃若杜預分左氏傳連於經范望散太𤣥測於八十一首之下皆欲取便於學者之誦覽故也唐太宗詔名儒定九經正義孔穎達奉詔與諸儒參議於易則獨取王弼自唐至宋著為定論不本正義者以為異說於是後之學者惟王弼是從竟莫敢移動吕汲公王原叔朝以道李巽巖吕東萊朱紫陽皆以分經合傳非古吳仁傑稅與權編周易古經亦皆極論王弼之失讀易者要當審其是不可狃於舊說而復以彖傳為彖云大哉乾元萬物資始乃統天紫陽朱子曰此專以天道明乾義又曰此一節首釋元義愚謂彖辭云元亨利貞不過謂大亨而利於正彖傳分而為四又以元為重故特贊之曰大哉乾元物有氣斯有形始者氣之元生者形之元形雖資坤而生氣則資乾而始故曰萬物資始夫乾之元亨利貞析之以配四時固皆天之德若獨論乾元之大則元者生意也亨者生意之長利者生意之遂貞者生意之成亨利貞之三者皆屬元之所統故曰乃統天統者以一該衆無所不總之謂大莫大於天而元統之則天亦萬物中之物耳元其大矣哉雲行雨施品物流形紫陽朱子曰此釋乾之亨也愚謂乾之亨乃陽氣亨通而物皆暢達之時是時天油然作雲沛然下雨凡昔之凝滯者皆至此而流動昔之潛伏者皆至此而形見故曰雲行雨施品物流形施去聲始豉反前言萬物此言品物萬與品同歟異歟曰元為禀氣之始未可區别故總謂之萬亨則流動形見而洪纎高下各有區别故特謂之品或謂孔子贊乾四德獨不言亨何也誠齊楊氏曰言元言利言貞而不言亨非不言亨也雲行雨施品物流形即亨也節齊蔡氏曰雲行雨施亨之見乎氣也品物流形亨之見乎形也大明終始六位時成時乘六龍以御天終謂下乾之終九三是也始謂上乾之始九四是也九三九四乃乾下乾上之交接處一乾方終一乾又始則生意於此續而不絶故不曰始終而特曰終始說卦云終萬物始萬物亦是此意彼言艮東北丑寅之交此則言兩乾上下之交也或以初為始上為終初上乃一卦之始終非此之謂也或以元為始貞為終元貞乃四德之始終非此之謂也大明終始謂聖人大明天道之終始以示人也六位卦之六畫也易六畫而成卦一畫有一畫之位一位有一位之時乾六位各以時成則乾道於是乎備矣乾而止於三畫則終而無繼豈生生之謂易哉所謂大明終始所謂六位時成皆發明重乾六畫之義六龍乾之六爻也六位言六畫之定分六龍言六爻之變象六位乃諸卦之所同六龍則純乾之所獨也時乘六龍以御天謂聖人當此之時乘六陽之亨通以行天道與天道同一亨通也紫陽朱子曰此言聖人之元亨也乾道變化各正性命保合大和乃利貞紫陽朱子曰此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也愚謂乾道天之道也變化隂陽之變化也隂變為陽陽化為隂寒暑之往來是也寒往則暑來暑往則寒來一往一來而不已是之謂道天道之所以為變化者何變化萬物也萬物蓋隨四時之推移而為之變為之化也天所賦為命物所受為性物受天之所賦自形自色自生自長莫不小遂其小大遂其大是為各正性命謂各得其性命之正也大音泰大和即元氣也保謂保全而無虧合謂合聚而不散物皆斂華就實而保合大和則又為來春發生之地也乃利貞者由是而利貞也承上文之意推本元亨而言也蓋自元而亨亨而利利而貞貞則又元不貞則無以為元元乃物之萌芽初出時亨乃物之長茂時利乃物之收斂時貞乃物之結實而歸宿處唯有此歸宿處是以貞下起元靜極而復動冬極而復春生意常周流而不絶若使元亨而不利貞春夏而不秋冬則元氣磔裂發散無餘而乾道或幾乎熄矣何變化之有首出庶物萬國咸寧紫陽朱子曰此言聖人之利貞也愚謂聖人聰明睿知冠乎羣倫超出庶物足以有臨足以表正萬邦而天下皆得其所安故曰首出庶物萬國咸寧首即元也萬國願戴聖人為首亦猶萬物資始於乾之元也孔子贊乾之利貞而又言首其意亦可見矣蓋曰貞不終於貞而貞之後又繼以元也聖人體乾之元出而君臨萬國是為萬國之元首萬國各有其君則又各為其國之首蓋推廣乾元之大以見生生之道無窮也乾彖傳三言物初言萬物次言品物又言庶物何其異耶曰萬物偕天而言也品物以在地而言也庶物即品物對人君而言則謂之庶庶者衆也至哉坤元萬物資生乃順承天乾天道也坤地道也天尊地卑故乾元稱大坤元稱至至義差緩雖不若大之盛然乾之所至坤亦至焉坤元蓋與乾元同其大也孔子嫌於兩大同稱故變文而贊坤之元曰至哉所以尊乾也聖人於尊卑之辨謹嚴如此萬物資乾元以始有氣而未有形資坤元以生乃有形父母之道也是故天氣不下降於地則地亦不能生物地之生物乃順而承天之施也承受也奉也坤順乾而受乾之施下奉上之道也坤厚載物德合無疆含𢎞光大品物咸亨順與厚皆坤德順而承天之施所以生物厚而合天之無疆所以載物乾德之大無不覆幬而無此疆爾界之限坤德之厚無不持載亦無此疆爾界之限是之謂合夫坤其靜也翕翕則含𢎞其動也闢闢則光大含𢎞如此光大如此是以品物咸得亨通也或曰陽明而隂暗陽大而隂小光大者乾之德坤安得光大曰坤之德含容𢎞博而與乾合則亦光明盛大也孔子贊坤之德不曰大而曰至蓋以尊無二上而不可與乾並稱次贊坤之亨乃曰含𢎞光大則坤德之大實與乾同不然坤何以為乾之配牝馬地類行地無疆柔順利貞君子攸行龍行天之物故以象天馬行地之物故以象地坤順而承天是以博厚載物而合乾無疆牝馬柔順而類地是以引重致逺而行地無疆彖辭云利牝馬之貞孔子加以柔順二字而釋之曰柔順利貞何也彖辭云君子有攸往自連下文孔子併及之而釋之曰君子攸行又何也曰孔子所以錯綜其辭者蓋又發明文王言外之意而謂君子所行柔順而貞則宜柔順而不貞則不宜也孝經云故當不義則子不可以不爭於父臣不可以不爭於君故當不義則爭之從父之令又焉得為孝乎坤臣子之道也臣子之事君父唱則必應固不可不柔順然倡之不以道而亦應焉則過於柔順而不貞矣過於柔順而不貞則柔為小人之善柔順為小人之阿順豈君子之所宜哉先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆坤不能自行順乾之健而行君子有攸往先則迷而失其道後則順而得其常西南兌離巽皆坤朋乃與類行東北雖喪其朋然隂當從陽乃終有得主之慶慶叶韻平聲音羌君子之出處隨地而安隨地而貞不限西南東北皆吉故曰安貞之吉應地無疆方其在西南則安於西南猶女子在室則安於父母家及其往東北則安於東北猶女子嫁而從夫則安於夫家在此亦貞而吉在彼亦貞而吉君子無入而不自得焉或者乃謂惟當貞於陽方不當貞於隂方則拘於一而與應地無疆之義背馳矣坤彖傳凡三言順三言無疆順坤德無疆則乾德也坤合乾之無疆則地亦無疆是故馬之無疆類地君子之無疆應地屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧易六十四卦惟乾坤二卦純剛純柔無所謂上下之乘承亦無所謂內外之配應其餘六十二卦則皆剛柔錯雜乃有乘承配應既有乘承配應則其說千變萬化而無窮矣剛謂乾之九柔謂坤之六始交謂乾之初交坤而成震難生謂坎水之險在前此合上下二體釋卦之名義也動者震之德險者坎之德震在坎中是謂動乎險中此雖具上下卦二體之德並言其意則在初九初九蓋屯之主爻也大釋元字大亨貞謂屯之時動則可以出險而大亨固不容不動然又不可遽動唯以貞道固守則利也陽在隂中則激而為雷隂陽和洽則蒸而為雨雷雨之動滿盈謂震雷坎雨閉固鬱塞必至於滿盈而後動以象屯道艱難而未能遽通也天造時運也草震象謂雜亂而未定也昧坎象謂幽暗而未明也屯之時如此豈宜有所往唯宜建侯建侯所以濟難也不寧不遑寧處也難生故不寧侯未建則難未解欲寧處得乎山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙卦下坎水上艮山退則困於坎水之險而不可處進則閡於艮山之止而不可往進退莫知所之是之謂蒙山下有險言卦象險而止言卦德蒙言卦名自此以下皆言卦義以亨行者蒙以亨而後行未亨則止既亨則行也蒙豈能遽亨所以亨者時也當其可之謂時蓋不憤則不啓不悱則不發也時中者於其可亨之時而亨之不先時不後時也志謂五之志應謂應二也二以剛明之賢處下五以童蒙之君居上非是二求五蓋五之志應於二也伊川程子曰賢者在下豈可自進以求於君茍自求之必無信用之理古之人所以必待人君致敬盡禮而後往者非欲自為尊大蓋其尊德樂道不如是不足與有為也剛中指九二以其剛而得中則告而有節乃可决人之疑也瀆蒙謂告之不一則其說煩亂而愈滋其惑也是不惟問者瀆告者亦瀆也夫童蒙求我之初其志蓋專一也吾當盡誠以告之不告則失人至於再至於三則煩數而其志不專一矣不若不告告則失言也聖者無所不通之謂童蒙之時便當以正道涵養其正性是乃作聖之功也古之人含德之厚比於赤子大人之所以為大人者不失其赤子之心而已童蒙之時情竇未開天真未散粹然一出於正所謂赤子之心是也蓋涵養正性全在童蒙之時若童蒙之時無所養而失其正則他日欲望其作聖不可得矣文王曰初筮告孔子釋之曰以剛中也文王曰再三瀆瀆則不告孔子釋之曰瀆蒙也文王曰利貞孔子釋之曰蒙以養正聖功也孔子蓋發明文王言外之意故其意又加詳焉或曰亨行二字羡文需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也須待也險在前謂前遇坎水之險也剛健而不陷謂乾不陷於坎也坎雖險乾以剛健能需而不躁進則無陷溺之憂矣揆之以義蓋不至於困窮也卦互兌兌為澤坎水在兌澤之上則澤有水而其象亦為不困窮也位乎天位謂以九居五也上五兩爻皆屬天位而五為天之正位故言天位正中謂正得其中也需之時剛明之君與剛明之臣同德相孚五也又能以正道固守而其剛明之德不為二隂所掩是以亨且吉也正中以明有孚與貞位乎天位以明光亨與吉往有功謂需極則當往往則有難濟之功蓋無不往而坐待險平之理也此卦彖傳先以卦德釋卦名義而曰需須也險在前也剛健而不陷其義不困窮矣蓋合二體而言次曰需有孚光亨貞吉位乎天位以正中也蓋贊九五之主爻終曰利涉大川往有功也蓋又合二體之德言或曰需之為卦以乾遇坎而為之辭故乾雖剛健而以險難在前不能不為之需乃若遇巽則其剛健為隂小所畜遇艮則其剛健為陽大所畜各因其所遇而為之辭也同是坎也以震遇之則動乎險中而能濟難屯卦是也以艮遇之則見險而能止不犯於難蹇卦是也需則知險難在前遂不躁進又有剛健濟難之才遂不即止必有待焉而後進與屯蹇異矣訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也上剛指乾下險指坎在上者恃其剛以陵下在下者懷其險以伺上一剛一險訟之由也險者狡而工於爭健者強而力於爭險而健是以訟也夫上剛下險分兩體之上下而以彼此言險而健則合兩體為一而總言之也若使險而不健亦不能訟健而不險亦不生訟唯險而又健則內懷險惡而多蓄智謀外恃壯健而不畏敲撲訟之所以成也此以卦德釋卦名義也健字句絶乃及於訟或以健訟相連誤矣剛來而得中指九二九二蓋成卦之主爻也自彼而此謂之來訟乃需之倒體需主爻在五訟主爻在二向為需之主則剛處於五今為訟之主則剛來於二也或謂訟為四陽卦自遁來而九三降為九二非也得中謂居下體之中也訟不可成謂非吉德得已則已不得已而為之亦不可極其終也中正指九五訟唯中正而有理則宜見中正之人故曰利見大人尚中正也淵指坎水訟之時人情乖違深入險地必遭陷溺故曰不利涉大川入于淵也伊川程子曰據卦才而言更取成卦之由為義者此是也卦義不取成卦之由則更不言所變之爻也據卦辭二乃善也而爻中不見其善蓋卦辭取其有孚得中而言乃善也爻則以自下訟上為義所取不同也師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣師者衆也周禮以五人為伍五伍為兩二十五人也四兩為卒百人也五卒為旅五百人也五旅為師二千五百人也卦唯一陽而有五隂之衆故曰師衆也正謂兵出而有名也書武成云將有大正于商注云大正以兵征之蓋謂武王伐紂以有道誅無道是為大正也孟子云征之為言正也能役天下之衆而以之討亂禁暴弔民伐罪然後謂之正不正則兵出無名人心不服何以王天下今興師動衆而名正言順可以王天下矣故曰貞正也能以衆正可以王矣九二剛得中而無過為上與六五柔中之君相應故曰剛中而應行此危險之道而上順天理下順衆心故曰行險而順夫兵者不祥之器用之則傷財害民是毒天下也蓋蠻夷寇賊毒害於民聖人不得已而伐之用兵乃所以去其害猶用瞑眩之毒藥以攻毒疾疾既毒則其用藥亦不容不毒也如此而民皆從之既吉而又無咎之者以其剛中而應行險而順也故曰以此毒天下而民從之吉又何咎矣不然則雖欲無咎且不可得而况吉哉涑水司馬公曰夫治衆不以剛則慢而不振用剛而不獲中則暴而無親上無應於君下無應於民則身危而功不成所施不在於順則衆怒而民不從四者非所以吉而無咎也吉而無咎則唯剛中而應行險而順乎比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也紫陽朱子以比吉也三字為衍文郭京以比吉兩字為彖辭但誤增也字凡彖傳先舉彖辭後以義結彖辭下並無也字姑蘇潘氏曰比輔者臣親其君也下順從者民親其君也愚謂比以九五為主輔謂六四不憚其勞而輔己也下順從謂在下三隂皆順而從已也近有六四順而為之輔下有三隂順而無不從此九五所以為比之吉也坤順也初至四皆坤畫有衆皆順從之象上六不與焉今但曰下順從而不及上蓋斥上六在外也剛中謂九五剛而得中也卦有內外二體筮法先成者為內卦後成者為外卦故蒙以內卦為初筮比以外卦為原筮孔子釋蒙之初筮曰以剛中也釋比之原筮亦曰以剛中也蒙之剛中乃九二比之剛中則九五是也剛則所守者固中則無過為此所以原筮元永貞無咎也厚齊馮氏曰萃之與比下體坤地則同而上體水澤之象亦不相逺萃以九四一爻有分權之勢故元永貞於五言之若比下無分其權者故元永貞言之於彖義各有在也上下應謂九五與初二三上下之情相通也衆方歸附之初上下之情蓋猶未通四居其間不憚其勞以下之意達於上又以上之意達於下然後上下之情通故曰不寧方來上下應也上六處比之極有不得其比之象窮而無所歸故曰後夫凶其道窮也周易集說卷十四
