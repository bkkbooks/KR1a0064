body:
  text: 周易集說卷三十四宋俞琰撰繫辭下傳三子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德易三百八十四爻凡九皆乾陽之闢凡六皆坤隂之闔故曰乾坤其易之門邪門猶闔戶闢戶之義或以為學易自乾坤兩卦而入非也乾陽物也坤隂物也一闔一闢為易之門而其變至於四千九十六皆此二物也以二物之德言則隂與陽合陽與隂合而其情相得以二物之體言則剛自剛柔自柔而其質不同故曰隂陽合德而剛柔有體以用也撰為也天地之所為可見者也易則以此二物體之神明之德不可測者也易則以此二物通之故曰以體天地之撰以通神明之德釋文云本又作易之門戶邪愚案魏伯陽參同契亦作乾坤者易之門戶紫陽朱子曰乾坤便是易只一箇隂陽做底如一門二戶一闔一闢也又曰六十四卦只是一隂一陽闔闢而成下文云乾陽物也坤隂物也隂陽合德而剛柔有體便見得只是這兩箇又曰諸卦剛柔之體皆以乾坤合德而成故曰乾坤易之門誠齊楊氏曰明乎乾之陽則知舉六十四卦之陽本乎陽者皆乾也明乎坤之隂則知舉六十四卦之隂本乎隂者皆坤也知易之道隂陽合德剛柔有體則知易之道所以體天地之所為而與天地為一體通神明之德而使神明無遁情矣天地之撰如三子者之撰撰之言為也童溪王氏曰撰所以造物也其稱名也雜而不越於稽其類其衰世之意邪名不特謂卦名凡卦爻所稱事物之名皆是也其稱雖雜亂不一然不越乾陽坤隂二物而巳於此而稽考其事物之類則非一言而盡與淳古不侔矣故曰其衰世之意邪於字侯果以為嘆辭紫陽朱子曰萬物雖多無不出於隂陽之變故卦爻之義雖雜出而不差謬然非上古淳質之時思慮所及也故以為衰世之意蓋指文王與紂之時也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣往謂既往之事人所不明者易能彰之來謂方來之事人所未知者易能察之顯謂百姓之日用至顯而人所共見者易則微之而使人敬慎而不敢慢幽謂死生之說鬼神之情狀至幽而人所難見者易則闡之而使人洞曉而無所疑知往來之事見幽顯之理則人心無不開明者矣蓋彰往察來則又可以因往而推來微顯闡幽則又可以因顯而知幽也當名如同人之宗觀之賔蠱之考小過之妣所命之名皆因其實而當也辨物如乾之龍姤之魚噬嗑之肉剝之牀所取之物皆因其事而辨也正言者明其理而直言其事如利見大人利用享祀利用侵伐是也斷辭者斷以吉凶之辭如小貞吉大貞凶可小事不可大事是也備謂無所不具也斷辭則吉凶明而人事息矣此所以謂之備或曰斷辭即彖辭也紫陽朱子曰而微顯恐當作微顯而開而之而亦疑有誤其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而𨼆其稱名雖小其取類則大如坤之牝馬以取類於地是也其旨所及者逺如坤言履霜堅冰至臨言八月有凶是也其辭交錯而有文如損言龜弗克違於六五益言龜弗克違於六二夬言臀無膚於九四姤言臀無膚於九三是也其言委曲而切中於理如泰之朋亡得尚于中行無妄之其匪正有眚不利有攸往是也其事直陳於前而其義則隱如蠱之先甲三日後甲三日巽之先庚三日後庚三日是也因二以濟民行以明失得之報二疑也報應也聖人因民心之疑二無以決遂作易以濟其所行之行濟如濟水疑則不敢濟決其疑則濟也故為占辭以明其失得之報應示之以行有失得則報有吉凶也右第六章言聖人作易之事紫陽朱子曰此第六章多闕文疑字不敢盡通後倣此易之興也其於中古乎作易者其有憂患乎易興於中古謂殷周之時作易者有憂患指文王夫伏羲始畫八卦因而重之為六十四是伏羲作易也今以為文王何也曰易之畫始於伏羲易之辭則始於文王故皆謂之作也夫易始作於伏羲有其畫無其辭再作於文王乃有六十四卦彖辭并三百八十四爻辭易道遂興興者起也文王以前易只是卜筮之書掌於太史太卜占吉凶而已至文王繫之辭以明吉凶始就所占之辭教人以修身齊家治國平天下之道則是易道之著明起於文王也文王之作易何為有憂患也耶曰文王身受羑里之難又為天下後世計此所以有憂患也夫易無思無為者也今曰有憂患何也曰無思無為者易有憂患者作易之聖人也是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也是故兩字承上文而言履謂踐履基猶基址之在下築土宜實人之踐履自下積纍而至上步步皆實則德有其基也謙謂卑以自處柄所以自持也以謙自持則德有其柄也復謂反其本人性本善一念或差則失其本然之天苟能自反而復其善則德有其本也恆謂常久固者堅固也損以懲忿窒欲則不善日損而德日修也益以遷善改過則善日益而德日裕也困窮之際正可以觀德人能安於困窮而不失其所守如歲寒之松柏疾風之徑草則亦足以自别此所謂德之辨也井之德安靜而不動此所謂德之地也巽之德柔順而能深入細微事至則隨宜斷制此所謂德之制也紫陽朱子曰凡卦皆反身修德以處憂患之事也而有序焉基所以立柄所以持復者心不外而善端存恆者守不變而常且久懲忿窒欲以修身遷善改過而長善困以自驗其力井以不變其所然後能巽順於理而制事也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱此一節如書臯陶謨之九德蓋兼體用而言也履以兌柔應在上之乾剛是以和說而周至謙以艮陽下於坤隂而處下體之上是以尊髙而光明復小而辨於物者一陽初生於羣隂之下其氣雖微而不為羣隂所亂如暗中一㸃白其光雖小而不為黑所掩也恆雜而不厭者剛柔皆應而其文交錯如青黃之相間可謂雜矣而其所自守者有常至久而不厭也損先難而後易者其初用力頗難及其慣習則如自然也益長裕而不設者因有此理而就加充長之不必造作則僞也困窮而通者有所守則身窮而道亨也井居其所而遷者井本不動之物汲以養人濟物則隨所汲而往也巽稱而隱者二陽顯然在上稱也一隂入於其下隱也稱量事物之輕重而意不露但見其隨宜斷制而不見其迹也紫陽朱子曰有隱而不能稱量者有能稱量而不能隱伏至露形迹者皆非巽之道也巽德之制也巽以行權都是此意履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權履以和行者君子之踐履以和為貴不和則不可行也謙以制禮者禮尚謙卑惟謙卑斯可以制禮也復以自知者反求諸巳而內自省也恆以一德者處煩雜之中久而不二則其德終始惟一也損以逺害益以興利者善日益則其利日興也困以寡怨者固窮而不尤人怨是用希也井以辨義者澄心靜慮則物來善應義無不辨也巽以行權者巽順而不與物忤則能隨物輕重而行權權所以平物之輕重也聖人行權酌而處之以合於義而巳安定胡氏曰九卦皆即以之一字言之亦如六十四卦象辭皆著一以字蓋以明其用易也右第七章三陳九卦之德說者皆謂聖人處憂患之道或曰九卦之兩體多取坤與巽兌蓋坤順也巽入也兌說也皆善處憂患而不怨天不尤人者也謙下艮上坤復下震上坤取坤順者凡二履下兌上乾損下兌上艮困下坎上兌取兌說者凡三恆下巽上震益下震上巽井下巽上坎巽上下皆巽取巽入者凡四獨於離無取蓋取憂患之中用晦則可用明則不可也九家易云先陳其德中言其性後敘其用也紫陽朱子曰易中儘有處憂患之卦非謂九卦之外皆非所以處憂患也若以困為處憂患之卦則屯蹇非處憂患而何觀聖人之經正不當如此後世拘於象數之學乃以為九陽數聖人之舉九卦蓋合此數也尤泥而不通矣平庵項氏曰三陳之中皆有辨字其一曰困之辨辨於巳也其二曰復小而辨於物辨於人也其三曰井以辨義人已之間兩致其辨也史學齊曰三陳九卦有深旨焉自履德之基至巽之制皆以之字發明其德此初陳也自履和而至至巽稱而隱皆以而字發九經之體此再陳也自履以和行至巽以行權皆以以字發九經之用此三陳也此九卦有德有體有用益切於人事之要易之為書也不可逺為道也屢遷易者載道之書也道不可須臾離也君子居則觀象玩辭動則觀變玩口可一日逺之哉屢遷謂六爻之變動也變動不居周流六虛上下無常剛柔相易不可為典要唯變所適此言易道之屢遷也變動不居謂六爻變動或為九或為六也六虛即六爻之位周遍也流行也位因爻而見爻之九六未定則其位虛也上上聲下去聲上下無常謂或在上或在下也剛柔相易謂陽剛變為隂柔隂柔變為陽剛而相交易也典常也要約也屢遷如是則不可以為定法唯變所適而巳紫陽朱子曰易不可為典要揚雄太𤣥却可為典要他定三百五十四贊當晝三百五十四贊當夜晝則吉夜則凶吉之中又自分輕重凶之中又自分輕重易却不然有陽居陽而吉者又有凶者有隂居隂而吉者又有凶者有有應而吉者有有應而凶者是不可為典要之書也又曰易不是死法太𤣥都是死法其出入以度外內使知懼又明於憂患與故無有師保如臨父母此言易書之不可逺也內謂下卦外謂上卦自內而往外為出自外而來內為入度節度也出入以度謂君子之出處進退當有節度蓋不可不謹也外內使知懼如泰倒轉為否內乾出而為外乾則彖辭戒之曰不利君子貞此在外而使之知懼也如需倒轉為訟外坎入而為內坎則彖辭戒之曰不利涉大川此在內而使之知懼也又明於憂患與其所以致憂患之事因詳悉而告之則夫人至此鮮有不知懼者矣知懼之心油然而生則雖無師保之訓誨而儼如在父母之側不敢有自肆之心也易之為書切近而有益於人也如此人之於易也其可逺之乎初率其辭而揆其方既有典常苟非其人道不虛行此合易書與易道並言也率循也辭謂卦爻之辭揆度也方謂事情之所向典謂可考常謂可守始循其辭以度其事情之所向則其為善也既有典常可考可守矣然神而明之則存乎其人而為道也見於實用其為書也不為空言苟非其人則其道不能以自行其書亦空言而巳前云不可為典要謂易之言吉凶無定法此云既有典常謂易之言吉凶則有定理右第八章誠齊楊氏曰此章言易道之用存乎變易道之體存乎常易道之行存乎人周易集說卷三十四
