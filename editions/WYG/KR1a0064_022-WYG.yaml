body:
  text: 周易集說卷二十二宋俞琰撰爻𫝊三咸臨貞吉志行正也初九所居之位正則其志之上行无不正也况當陽剛寖長之時上與六四相應而六四亦正如此則初九之志得以行其正也與臨初九同正釋貞字咸臨吉无不利未順命也未順命三字諸說多出於牽强而其義未穩夫既咸臨而吉无不利矣何乃未順命也涑水司馬公以為二在下體而不當位故小人未肯盡受命伊川程子則以為二與五至誠相感非由順上之命安定胡氏謂未字羨文厚齋馮氏亦謂羨文愚案臨之彖𫝊云剛浸而長說而順剛中而應大亨以正天之道也盖隂陽往來相為消長此天運之常也今九二適當陽剛浸長之時上下相應而吉无不利是豈有心于逼隂而遽求其上進哉順天命之自然而已矣安定胡氏厚齋馮氏皆以未字為羨則與爻辭之意不相戾亦與彖𫝊之意合今從之甘臨位不當也既憂之咎不長也六三以隂居陽是其位既不當矣復乗在下之二陽能无咎乎若恬然不知憂懼則何能无咎既而知其為咎而憂懼焉則亦能改過而遷善矣此其所以咎不長也至臨无咎位當也三无應而比二以說媚陽此不正者之所為也故斥之曰位不當四與初為正應以順應陽此正者之所為也故稱之曰位當童溪王氏曰六四正也不曰位正當而曰位當何也曰當臨之時大亨以正大者之事也故不以正予隂也大君之宜行中之謂也臨下之道唯行之以中為宜不宜過乎剛也過剛則暴豈大君之所宜哉不宜過於柔也過柔則弱又豈大君之所宜哉今以六居五柔而得中又能下任剛中之賢則剛柔相濟是乃大君之所宜也宜者何即行中之謂也中乃隨時取宜非任明察以為智也行中釋宜字敦臨之吉志在内也上六篤厚君子也所以成吉者體坤徳之順而其志在乎從陽也内謂内卦内雖无應而上六之志則唯在内不以尊髙自居也古為徐氏曰臨上六志在内與否初六志在君同否之初六本非應五臨之上六本非應二此可以志論耳初六童觀小人道也初六以位言也不曰小人无咎而曰小人道論謂小人在下識見短淺是乃小人之常道而其咎不足言也東萊吕氏曰辭雖􅃌小人意却屬君子小人則可君子則不可闚觀女貞亦可醜也婦人主閫内之事女子无外交之禮其為簾視壁聴此乃婦人女子之常態尚亦可醜士而為婦人女子之態豈不甚可醜哉亦者承上文而言童觀固為小人之道而闚觀亦可醜皆非君子之道也觀我生進退未失道也節初齊氏曰未失道蓋為九五幸之也九五一或放失所守則六三必不止于其下也或謂六三坤體而互艮是以止于其下而不敢進亦未失坤順之道也觀國之光尚賔也爻辭觀其利用賔而孔子釋之曰尚賔盖嘉其觀感而化也節初齊氏曰觀成卦以六四六四卦主也而九五在上六四不可以主自居也故勸使用賔孔子釋之曰尚賔盖尚其用賔不尚其為主也故曰配尚或曰賔禮皆欠玩味用字觀我生觀民也爻辭曰觀我生君子无咎爻𫝊乃曰觀我生觀民也謂人君觀自已之得失又當觀民徳之善否以自省察也中庸云本諸身徵諸庶民此之謂也觀其生志未平也觀之時四隂甚長二陽漸銷生意如此君子盖深為之憂而其志未安故曰觀我生志未平也或謂上九觀九五之生而其志憤然不平則又過矣伊川程子曰上九雖不在位然以人觀其徳用為儀法故當自慎省觀其所生常不失於君子則人不失所望而化之不可以不在於位故安然放意無所事也是其志意未得安也故云志未平也屨校滅趾不行也屨校滅趾則不能行則惡積而罪大自此始矣噬膚滅鼻乗剛也龜山楊氏曰九四為間者也而初應之二剛合則為間大而難噬矣愚謂六二之柔既乗初九之剛則其噬膚也蓋不得不用力焉不然不能及胏也或者乃謂隂柔不能自動必資陽剛以為助然後可動今六二不乗初九之剛而動則其為力不勞矣夫爻𫝊言乗剛凡五如屯之六二豫之六五困之六三震之六二无非皆因之以為害者也曷嘗資之以為利哉遇毒位不當也六三處非其位故遇毒論語云其身不正雖令不從六三自處不當焉能治人故反為人所害也利艱貞吉未光也諸爻言噬噬惟九四之噬最難今九四以艱貞而後吉固吉矣校之六五盖未足以為光也貞厲无咎得當也居離明之中其明不至于察而罰當其罪所以貞厲而无咎者得其所當也彖𫝊言不當位爻𫝊言得當彼以位言此以事言也位謂以柔居五故不當事謂以柔用獄故得當平菴項氏曰當字平聲得其當中也又曰噬嗑上三爻離卦也九四離之初故曰未光上九離之極故曰聰不明六五離之中故曰得當何校滅耳聰不明也上九離體非不明也而曰聰不明盖罪其聞義不能徙不善不能改也既不聰矣又何明之有此與夬之九四辭同而義稍異舎車而徒義弗乗也易中凡言乗皆自上而乗其在下者二在已上奚可乗也義弗可乗故寜捨安而就勞也賁其須與上興也上謂九三在其上也九三質也文恃質而興此六二所以待九三之興而與之俱興也興起也永貞之吉終莫之陵也陵勝也終莫之陵者柔終不能勝剛也九三既以剛正之質固守則六二之柔雖文終不能勝之也六四當位疑也匪寇㛰媾終无尤也郭京曰六四下有皤如二字節齋蔡氏曰所當之位可疑也蓋以當字作平聲四當賁道變革之位與初正應四止而初文明體性各異而不相得彼此皆不能无疑然體性雖異合之則成章始以我為寇而見疑終則與我為㛰媾而疑釋故无尤也終无尤此與剥蹇鼎旅凡五言之皆一意六五之吉有喜也六五以位言有喜者居尊位而有化成天下之喜也有喜此與大畜升凡三言之皆一意白賁无咎上得志也上亦以位言上之所以得志盖以六五之志同也剥牀以足以滅下也滅下謂先不見其足也􅂏𫝊云剥剥也柔變剛也柔之變剛自此而始盖銷滅初九之剛變而為初六之柔也滅釋蔑字下釋足字剥牀以辨未有與也與應也未有與謂在上未有君子之應則无以遏止小人之進也崔憬曰至三則有應故二未有與也愚謂六二若有九五剛徳之與則小人知有忌憚又何至于是哉不言无與而言未有與盖有望乎上九也剥之无咎失上下也失者與衆隂相失而不相得也上謂六四六五下謂六二初六荀爽曰衆皆無陽三獨應上故失上下剥牀以膚切近災也切近災謂災及六四則切近君位而六五亦災也以宫人寵終无尤也小人所貪者寵利耳假之以權則亂遠之則怨以宫人之寵寵之而駢首順序終无尤也伊川程子曰於剥之將終復𤼵此義聖人勸遷善之意深切之至也君子得輿民所載也小人剥廬終不可用也民􅃌衆隂載釋輿字輿所以載而行民所載謂在上不可一日无君子而君子之道不可一日不行于世也小人頼君子在上而得以自存若使用其姦以害君子則其終也自失所覆猶之害木者蠧木亡則蠧亦亡矣然則小人之姦終亦何所用哉不遠之復以脩身也不遠之復此君子以之為脩身之道也脩之何如知不善則速改以從善而已休復之吉以下仁也仁指初九下仁下附初九也仁者心之徳善之本初九脩身而反本復善可以為仁矣二之吉盖以親近初九而吉也頻復之厲義无咎也六三窮而後復勢雖危厲然揆之以義亦无咎也中行獨復以從道也道指初九脩身之道從道者初九脩身以道而六四從之也六四于衆隂之中從道而不從衆盖得所從矣或曰從道比之下仁則在其次矣一初九也彼以為仁此以為道道就身言而仁以道言也敦復无悔中以自考也二居下卦之中故休復吉四居衆隂之中故中行獨復五居上卦之中故敦復无悔孔子釋敦復无悔而曰中以自考盖謂六五因二之中四之中以自考乎已之中也自考而中矣則又何悔之有考察也反觀内省之意也與履上九之考同王弼以考為成非也迷復之凶反君道也君指五反君道者五中而上不中五自考而上不能自考也或曰君指初初乃復之主也初不遠而上逺故曰反君道也无妄之往得志也論語云言忠信行篤敬雖蠻貊之邦行矣今以誠實无妄之道而往則何所往而不得志哉不耕穫未富也不耕而穫天祐之也言其富則未也他人用功於前天而不復自强為善故以未富儆之不兼舉菑畬盖耕穫與菑畬其旨則一故不縟其辭云行人得牛邑人災也行人得牛其得也盖出於意外邑人之災其災也亦出于意外天實為之謂之何哉可貞无咎固有之也六三位不當盖有災矣九四位亦不當宜亦有咎然能知時度勢以貞徳自守又誰咎焉如此而无咎固當有之非出于意外也故曰可貞无咎固有之也其語意與益六三爻𫝊同无妄之藥不可試也試謂嘗之也无病而嘗藥則反為病矣无妄之行窮之災也初九曰得志天命之祐而其志得也上九曰窮之災天道之窮而有此災也童溪王氏曰先儒謂在人曰眚在天曰災固有是說也今觀上九之爻贊以災釋眚則知災即眚也眚即災也天即人也人即天也有厲利已不犯災也知其危而止其行故不犯災需初九亦乾體而曰不犯難難謂坎水之險此曰不犯災災謂艮山之阻輿說輹中无尤也中謂下卦之中唯其中故无尤雜卦云大畜時也時止則止又何尤焉環溪吳氏曰輿說輹一也在小畜之三不免反目在大畜之二則无尤也以其中也利有攸往上合志也三雖乾體之健而能處之以艱難守之以正固然後有攸往是以與上合志節初齊氏曰艮欲止之而乾健自止此其志所以合也六四元吉有喜也以六四之柔正初九之健而初也亦以已為利而不敢犯上此六四所以有喜也六五之吉有慶也六四六五皆以柔制剛初在下微而易制二則漸進而難制矣今既說其輹而不進此六五所以有慶也平菴項氏曰喜慶皆隂陽相得之辭卦中唯二隂有應故四為有喜而五為有慶喜者據已言之慶則其喜及人五居君位故及人也若論止物之道則制之于初乃為大善故四為元吉而五獨吉而已何天之衢道大行也卦以止健為義爻止于上九則止極而行无復止矣何謂天道是也何謂衢道之大行是也非真有所謂天衢也道釋天字大行釋衢字觀我朶頤亦不足貴也孟子云養其大體為大人養其小體為小人又云飲食之人則人賤之矣今初九陽徳之大本有可貴之質乃内捨其大而外觀其小豈不為人所賤故曰觀我朶頤亦不足貴也盖賤其不能自養也六二征凶行失類也征凶而稱六二者謂六二居得其位自養以正盖不必動動則自取其凶也二與初皆震體是為同類初方頼我之養我若有行則與初相失故曰行失類也十年弗用道大悖也頤道静止則吉下三爻之凶皆以其動而六三躁動之甚又且不正不中故曰道大悖也悖釋拂字顛頤之吉上施光也以六四之隂養初九之陽雖曰事屬倒植然居近君之位而當大臣之任則其在上而施下也光矣上釋顛字施釋頤字居貞之吉順以從上也爻辭云拂經爻𫝊乃曰順以從上順則不拂矣拂則不順矣无乃其說之自相戾乎曰非也拂者違二五相應之常順者順承上九以隂而從陽也此與蒙之六五同彼有應故從二此无應故從上由頤厲吉大有慶也慶釋吉字大有慶則天下皆頼之也嚮非六五順從而諫行言聴則膏澤不下於民何吉之云藉用白茅柔在下也處下而事上不可不慎初六過慎如此盖以柔處下也柔釋茅字在下釋藉字老夫女妻過以相與也老夫而老妻女妻而士夫是本分也老夫而女妻則過分矣故曰老夫女妻過以相與也棟橈之凶不可以有輔也九三過剛雖有應于上亦不可以輔盖其强愎自用非无人輔之有輔而不可以輔也然上六之才柔甚亦非能輔之者此九三所以无輔而凶也伊川程子曰棟當屋室之中不可加助是不可以有輔也棟隆之吉不橈乎下也下謂初六之應也初六之才雖柔其位則剛亦足以支撑乎下所以九四之棟不橈不橈則隆而吉橈則雖隆亦凶矣枯楊生華何可久也老婦士夫亦可醜也枯楊生華是竭其精英發露于外豈能長久老婦得其士夫則柔邪過甚而可醜此與解九三皆曰亦可醜說文云醜可惡也與詩牆有茨言之醜也之醜同過渉之凶不可咎也不可咎謂不可以其過甚而責之也過渉而至于滅頂之凶雖于事不濟然殺身成仁其志盖可愍也豈可咎之哉如東漢諸人是已或者不原其心從而追咎之過矣習坎入坎失道凶也在坎之底陷而又陷是謂失道若使得其道而出則不凶矣習坎以全卦之時言入坎以二體之内言求小得未出中也未出中者正在險中而未能出也上无應援雖欲出中未能也來之坎坎終无功也彖辭云行有尚孔子釋之云往有功此乃云終无功何也彖言一卦之義爻則言一爻之義也終无功釋勿用二字六三進退皆險故終无出險之功也樽酒簋貳剛柔際也六子卦以本卦自相重者其六爻俱不相應唯以相近比為義坎六四之柔近比乎九五之剛乃君臣相與㑹合之際故曰剛柔際也剛柔際釋納約自牖无咎或曰古本无貳字釋文云樽酒簋一本更有貳字其實皆非也當作樽酒貳簋為是今曰樽酒簋貳盖承爻辭𫝊寫之誤坎不盈中未大也陽為大九五陽爻大也中未大者九五雖有剛中之才唯自祇于既平而无咎未足以為大也上六失道凶三歳也上六以位言失道而曰上六者上六居坎之終將出險矣復陷而不能出是失道而自取其凶也與初之失道異矣履錯之敬以辟咎也以剛明之才動于下此心謹畏有如履錯之敬則咎亦可以辟而免焉故曰履錯之敬以辟咎也黄離元吉得中道也九三言日昃之離六二其日中之離乎居下卦之中而得其中道故比他爻為最吉六二盖離之主爻也日昃之離何可久也夕陽無限好只是近黄昏猶人之暮年景薄桑榆安能長久也伊川程子曰明者知其然也故求人以繼其事退處以休其身􅋓如其來如无所容也无所容謂罪大惡極世所不容也六五之吉離王公也離雖以六二為主爻而六五尊居君位乃離之王公也九四豈可恃其强而陵廹之哉以下陵上以臣廹君此九四所以終于死棄而六五所以吉也爻𫝊以六五兩字表而出之以見六五乃離之王公其名位終不可以干也易以大事稱王小事稱公今以王公並稱盖言其名位非言其事也離如字或作去聲非王用出征以正邦也征之為言正也邦有不正則不容不征所以正邦也漢上朱氏曰王肅本此下更有獲匪其醜大有功也周易集說卷二十二
