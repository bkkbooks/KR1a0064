body:
  text: 周易集説卷十五宋俞琰撰彖傳二畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨宻雲不雨尚往也自我西郊施未行也柔指六四六柔爻四柔位以柔居柔得其位之正而上下五陽皆應之是為小畜故曰柔得位而上下應之曰小畜伊川程子曰解成卦之義而加曰字者皆重卦名文勢當然單名卦唯革有曰字亦文勢當然健而巽合二體之德釋小畜之所以亨也剛中指九五志行指六四此又以九五六四兩爻釋小畜之所以亨也亨而謂之乃蓋謂六四雖為成卦之主爻然隂柔不能自亨必得九五剛中之君主於其上而六四之志上與之合夫然後得以行其志而亨不然不能亨也紫陽朱子曰易中説陽處便扶助推移到隂處便抑遏壅絶蓋不特小畜為然他卦以隂爻為主者皆然宻雲不雨尚往也自我西郊施未行也謂隂氣包畜陽氣不往則陽氣尚往而為雨不成故其施未行蓋太陽出時雲從西來布滿空中則隂陽相迎和洽而為雨詩螮蝀云朝隮于西崇朝其雨是也若夫太陽在東而雲往於西安能成雨今也雲在宻邇而不雨以喻六四隂小力弱欲籠絡天下賢士以為己用而三陽雖與已宻邇尚往而不肯附己六四雖能繫其情而未能全制之也以諸爻觀之初與四為正應所當相從也且不肯從二非四之應又焉得從三與四則近而不相得又豈能遽使之從此所以施未行然上有九五與之志合則其終必行今特未爾履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也履柔履剛也謂兌六三之柔履乾九四之剛蓋以二體釋卦名義非謂六居三也夫以柔而履剛其危如蹈虎尾而虎不見咥何耶蓋有道也和説而應之也履者君子行己之道君子非禮勿履故履為有禮之卦非以履訓禮也禮之用和為貴人有剛暴難制者宜以和柔之道制之若以剛制剛則兩剛相遇必有一傷况居下者乎此履道所以貴乎和説而應乎上也事上之道如賤事貴卑事尊皆當和説不和説則犯顔忤㫖適以激怒而取辱非亨道也今乾剛在上如虎兌柔盡和説之禮以應之夫然後亨蓋履以六三隂柔為成卦之主爻隂柔不能以自亨必待陽剛而後亨故曰説而應乎乾是以履虎尾不咥人亨疚病也隂干陽則陽為之病今九五以剛德處上得乾之中居乾之正而尊履君位彼六三者雖為成卦之主爻然以柔德處下不能為我之病而九五之德光明自若故曰剛中正履帝位而不疚光明也易六十四卦以乾居上者不特一卦未嘗於九五言帝位唯履九五獨言帝位聖人之意可見矣履者辨名分之卦也六三雖以一隂統衆陽然而臣也其位則處下也上有九五之君在焉六三蓋不可僭也故特稱賛九五之尊而名其位曰帝位易道祟陽而抑隂尊君而卑臣其例嚴宻蓋如此也泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也泰正月之卦方春之時天氣交於下地氣交於上而萬物皆暢達泰之為卦實象之在人事則君臣上下之情相交而莫不道同志合故曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内卦乾陽之健外卦坤隂之順故曰内陽而外隂内健而外順君子陽類也三陽在内故曰内君子小人隂類也三隂在外故曰外小人聖人之於小人不過外之而已不為已甚也蓋天地間有陽則有隂有君子則有小人雖唐虞成周泰和極盛之際亦不能無小人但君子健而用事於内則小人順而聽命于外耳泰之時小人在外固不為君子之害君子在内亦未嘗加害於小人君子小人兩不相傷而其情亦自相通若内若外皆得其所此其所以為泰也陽自復而起一陽初生是為十一月之卦歴臨至泰陽寖長是為正月之卦自此上進為二月之大壯為三月之夬陽日以盛隂日以衰故曰君子道長小人道消也或曰六十四卦乾上乾下之卦八坤上坤下之卦八凡得乾坤之一體者或言健順或言剛柔並不言隂陽獨否泰言隂陽蓋泰否即乾坤上下之往來也諸卦或有乾而无坤或有坤而无乾泰則坤上而乾下否則乾上而坤下乾坤之二體具故言隂陽否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也雜卦云否泰反其類也泰言天地交否則曰天地不交泰言上下交否則曰上下不交泰言内陽而外隂否則曰内隂而外陽泰言内君子而外小人否則曰内小人而外君子泰言君子道長小人道消否則曰小人道長君子道消每每與泰相反於此見泰之所以為泰否之所以為否者交與不交耳故泰否彖傳發端之辭皆曰則是猶言不過如是非有他也且夫泰之時天地交是以萬物通否之時天地不交是以萬物不通其相反固然矣如泰言上下交而其志同否當言上下不交而其志不同今乃曰上下不交而天下无邦何至如是耶曰不有君子其能國乎否之時君子擯棄而在外雖有邦猶无邦也无邦猶言匪人蓋上下不交而所用者小人雖謂之匪人可也君子不用而國非其國矣謂之无邦可也豈但其志之不同也哉又如泰云内健而外順則否當云内順而外健今乃曰内柔而外剛何也曰健順德也剛柔質也否之時隂柔用事於内肯順君子哉順則不否矣故不以健順言而但以剛柔言也柔者易以親故在内剛者易以疎故在外否之所以上下不交者由其親小人而内之疎君子而外之也内小人而外君子是以小人之道日長君子之道日消也同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志柔得位得中指六二乾指九五九五乾之主也同人之成卦在二二與五應故以二五兩爻取義九五剛得位得中而六二柔得位得中兩爻剛柔相應上下相同此卦名所以為同人彖辭所以云同人于野亨同人曰三字程子朱子皆以為衍文夫六二為同人成卦之主爻既得位得中矣必曰應乎乾者明其柔弱而以已同人非能為主致人之同已也是故孔子釋利渉大川則又曰乾行蓋大險大難必剛健乃能有行非柔弱所能濟柔弱者雖得位得中茍非應乎乾則亦不能行也然則同人之所以亨所以利渉大川蓋有九五乾剛在上而六二能應之是以同人于野則亨渉大川則利也文明以健總論二體之德中正而應則又指二五而言大抵同人之際雖粲然有文以相接然不健則必將厭倦豈能與人同中正而无應則雖欲同人而人不我同故必文明以健中正而應然後可以與人同也同人之道必以正否則小人之茍同耳小人之情同乎已者是之異乎己者非之唯求同己不求同理此小人之私也君子則不然同乎理則謂之是異乎理則謂之非唯求同理不求同已此所謂君子正也正者何至公无私也至公无私則天下之志是非好惡雖不同皆足以通之故曰唯君子為能通天下之志大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨柔得尊位大中而上下應之曰大有者六五以隂柔居人君之尊位在羣陽之大中上而上九下而初九九二九三九四皆應之更无他爻分其應此卦名所以為大有而六五所以獨擅其尊稱也諸爻得位失位並无凶咎以其皆應於六五也其徳剛健而文明總言二體之德應乎天而時行則專指六五六五乃大有之主爻也謂六五當大有之時下應乎乾之九二順天時而行也是以元亨者謂大有二體如是大有六五之主爻又如是所以元亨也六五以一隂統衆陽雖得尊位大中而上下皆應之然其才終是柔弱不能自亨故必應乎乾而後亨也小畜下卦亦乾也六四亦以一隂統五陽也然柔弱不能以自亨則曰剛中而志行乃亨履之上卦亦乾也六二亦以一隂統五陽也然柔弱不能以自亨則曰應乎乾是以履虎尾不咥人亨同人之上卦亦乾也六二亦以一隂統五陽也然柔弱不能以自亨則亦曰應乎乾又曰乾行也凡此皆以隂柔不足為主必有待乎陽剛而後亨也或曰同人與履皆云應乎乾大有乃云應乎天同歟異歟曰彼應其德故言乾此應其時故言天其義各有所取也或又曰大有比純乾只爭一畫若以九居五則為乾而御天矣不言應天也謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也謙卦艮下坤上艮本坤體乾交之而成艮艮之光明即乾之光明也艮陽畫在上而陽氣發見于外是以光明天道下濟而光明謂天本居上其道則謙降而下交於地故其光无不著明也地道卑而上行謂地道卑處於下而能謙順以奉上故其氣騰而上行也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謂三才鬼神其理皆如是也謙尊而光謂在上君子而能體天道之謙則愈有光也卑而不可踰謂在下君子而能體地道之謙則我既自卑矣人亦无以加於我也文王曰君子有終孔子釋之曰君子之終以之字易有字孔子蓋又發明文王之意非謂謙道唯君子乃能終身行之也孔子先以天地之道言謙次以天地鬼神合人事而言謙所謂謙尊而光即天道下濟而光明也卑而不可踰即地道卑而上行也曰天道下濟曰地道卑釋謙字曰光明曰上行釋亨字餘釋君子有終之義或曰謙乃一陽五隂之卦九三乃成卦之主爻也凡卦以一陽統五隂者彖傳皆以剛言故復曰剛反師曰剛中而應豫曰剛應比曰以剛中也剥曰柔變剛也而謙之彖傳獨不言剛何也曰謙以止順為徳不可以用剛也伊川程子曰濟當作際下際謂下交也豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉豫之九四以一陽統衆隂為成卦之主爻而衆隂无不宗之謂之柔應剛可也謂之上下應之可也今特曰剛應何也曰豫之時君弱臣強聖人嫌之故抑之也九雖剛不與柔相應則其志亦不能行四也以一陽居五隂之中為天子近臣上承六五之柔君下與初六之民相應而坤衆皆順從之遂得以行其志故曰剛應而志行天下之事逆理而動者往往心勞而事艱唯以順而動不悖於理則從容不廹而此心安和悦樂故曰順以動豫夫豫之所以為豫者順理而動也順理而動雖天地亦然豈獨人事為然故曰豫順以動故天地如之而况建侯行師乎是故天地以順動而不違乎理則日月之數不過四時之序不忒聖人以順動而不違乎理則刑罰不煩而民畏服時義謂豫之時其義如此大謂三才之道天下萬事萬物之理皆不過如此也易六十四卦各有其時亦各有其義與用孔子賛其大矣哉者十二卦或言時義或言時用或止言時何也項平庵曰豫隨姤旅皆若淺事而有深義故曰時義大矣哉欲人之思之也坎之險難睽之乖異蹇之跋渉皆非美事有時或用之故曰時義大矣哉欲人之别之也頤大過解革皆大事大變故曰時大矣哉欲人之謹之也隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉彖傳凡言剛來柔來與剛柔上下皆以兩卦反對取義如訟九二云剛來蓋自需九五來无妄云剛自外來蓋自大畜上九來或曰訟在需後謂訟自需來可也无妄在大畜先奚可謂无妄之剛自大畜來耶曰泰極為否否極則為泰損極成益益極則成損前後之相仍也知泰否損益之相仍則知无妄倒轉為大畜大畜倒轉為无妄後卦蓋兼前卦而言前卦亦兼後卦而言不以先後拘也夫隨倒轉則為蠱蠱倒轉則為隨隨初九之剛實自蠱上九來而居六二之下故曰剛來而下柔下去聲或謂自否而來非也動而説隨蓋合二體之德而言隨也剛不下於柔則其勢離動而不説則其情乖烏得隨故唯剛來而下柔動而説乃可以為隨也天下隨時當作天下隨之紫陽朱子曰王肅本時作之胡旦曰轉𨽻者誤增日為時愚按古篆之為㞢時為旹蓋傳者之誤也隨時之義當作隨之時義紫陽朱子曰王肅本時字在之字下愚按豫遯姤旅四卦例則之時倒為時之蓋由上文之誤而誤也夫所謂大亨貞无咎而天下隨之蓋指九五謂九五處隨道亨通之時能固守以正而无咎則天下皆隨之也隨之為卦大抵以下隨上故初交二二係三三係四四隨五凡在下者无不隨上是謂天下隨之雖然隨之義一也又言交又言係何也曰初九乃成卦之主爻主不可以隨人故不言隨而言交係者隨而攀戀不捨之義六二六三上六其性皆隂柔而攀戀相隨不捨故皆言係隨道貴乎正故諸爻雖取其相比相隨而不必其應然非陽居陽位隂居隂位則必有戒之之意隨之時其義甚大蓋不可以為細故末節而不思其義故特賛之曰大矣哉蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也蠱乃隨之倒體隨以初九上六為成卦之主倒轉為蠱則初九之剛上而為上九上六之柔下而為初六故曰蠱剛上而柔下上上聲下去聲或就本卦升降而謂蠱自泰來非也剛者上而過於高柔者下而過於卑一高一卑不相為謀蠱之由也居蠱之時在下者柔而不事其事或進或退而不能為在上者雖剛而能事則又止而不肯為以至紀綱日隳刑政日弛而天下事无有不壊者蓋巽固進退不決茍非艮之止亦未至於蠱唯其巽而止所以蠱也巽則无奮迅之志止則无健行之才上下皆委靡退縮不能以有謀有為於是事事因循茍且積弊而至於蠱故曰巽而止蠱夫巽而止蠱蓋以卦德言致蠱之由非飭蠱之道也猶險而健訟亦以卦德言致訟之由豈治訟之道哉蠱也者前人之舊弊也飭之則亦有亨通之道特患无其人耳如其道有其人治天下猶運之掌蓋不難也要之世雖蠱壊元氣猶存尚可以致亨今也飭之不過除去其弊耳弊既除去則又如其先之亨通故曰蠱元亨而天下治也孔子釋利渉大川而曰往有事者當蠱壊之時宜渉艱險而往有攸濟不可處之於无事之域也文子云流水之不腐以其逝故也户樞之不蠧以其運故也大抵器欲常用久不用則蠧生體欲常動久不動則病生蠱之時止而不動則天下之事終於蠱而已矣故勉之使往不宜坐視其弊而弗救也孔子釋先甲三日後甲三日而曰終則有始天行也者欲其動而有為也卦互震震動也動所以飭蠱也天道好還六甲必六旬一周蓋未有極而不返之理蠱而飭焉則弊者可以復新壊者可以復完亦如天道之運行終則復始也此言剛上而柔下恒彖傳亦言剛上而柔下此言終則有始恒彖傳亦言終則有始此何以為蠱彼何以為恒也曰巽而動所以為恒巽而止所以為蠱也夫所謂巽而止蠱蓋言巽而止則蠱巽而不止則不謂之蠱也蒙彖傳曰險而止蒙蓋言險而止則蒙險而不止則不謂之蒙也蒙下坎而上艮其中亦互震動動於蒙是為治蒙之道動於蠱是為治蠱之道可以類推也或曰蠱言先甲後甲而以為終則有始巽言先庚後庚而以為无初有終何也曰甲者十干之首事之端也既亂而復治則又如其初故於蠱之甲曰終則有始庚者十干之過中事之當庚者也始焉不善既更而後善故於巽之庚曰无初有終其義各有所取也周易集説卷十五
