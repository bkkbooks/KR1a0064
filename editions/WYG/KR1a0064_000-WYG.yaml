body:
  text: 周易集説易類提要臣等謹案周易集説四十卷宋俞琰撰琰字玉吾呉人讀易三十餘年未嘗倦輟其書集諸家之説用功閲二十八年凡四易稿始成同時漢東孟淳單父李克寛錢唐白珽西秦張瑛同郡顔堯煥干文傳諸輩皆推而重之琰嘗與孟淳講坤之六二謂六二既中且正是以其徳直方惟從乾陽之大不習坤陰之小故無不利又謂彖傳剛柔上下言來不言往皆以兩卦相並而取義其發諸儒所未發多類於此琰又有讀易須知易圖纂要易經考證易傳考證六十四卦圖古占法卦爻象占分類易圖合璧連珠易外傳諸書今皆不傳然其自為後序稱諸編皆舊所作將毁之而兒輩以為可惜又畧加改竄而存於後則舊刻本附此數書今佚之也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易集說序周易集說者集諸説之善而為之說也曷為善能明三聖人之本旨則善也夫易始作於伏羲僅有六十四卦之畫而未有辭文王作上下經乃始有辭孔子作十翼其辭乃備當知辭本於象象本於畫有畫斯有象有象斯有辭易之理盡在於畫詎可捨六畫之象而専論辭之理哉捨畫而玩辭捨象而窮理辭雖明理雖通非易也漢去古未逺諸儒訓解多論象數蓋亦有所本至魏王弼以老莊之虚无倡於前普韓康伯又和於後聖人之本㫖遂晦沿襲至于唐諸儒皆宗之太宗詔名儒定九經正義於易則取王韓而孔穎達輩以當時所尚故雖其説未盡善亦必為之回護由是二三百年間皆以虚无為髙至宋濂洛諸公彬彬輩出一埽虚无之弊聖人之本㫖始明奈何世之尚占而宗邵康節者則以義理為虚文尚辭而宗程伊川者則以象數為末技而邵程之學分為兩家羲畫周經亦為兩途遂使學者莫之適從逮夫紫陽朱子本義之作𤼵邵程之未𤼵辭必本於畫理不外於象聖人之本㫖於是乎大明焉琰幼承父師面命首讀朱子本義次讀程𫝊長與朋友講明則又有程朱二公所未言者於心蓋不能無疑乃歴考諸家易說摭其英華萃為一書名曰大易㑹要凡一百三十卷不揣固陋遂自至元甲申集諸説之善而為之說凡四十卷因名之曰周易集説云元貞丙申五月六日林屋山人俞琰序
