body:
  text: 周易集説卷三十七宋俞琰撰説卦傳二帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮八卦始於震歴巽離坤兊乾坎而終於艮此氣化運行之序也帝即天也以其主宰萬物故謂之帝自震而出出而後齊齊而後相見相見而後致役致役而後戰戰而後勞勞而後成成則復出矣他卦不稱言而兊艮稱言蓋兊即説之謂艮即成之謂康節邵子以此為文王八卦所謂後天之學也崔憬曰帝者天之王氣也春分震王而萬物發生立夏巽王而萬物潔齊夏至離王而萬物皆相見立秋坤王而萬物皆致養秋分兊王而萬物之所悅立冬乾王而隂陽相薄冬至坎王而萬物之所歸立春則艮玉而萬物之所成終成始也以其闕王天下故謂之帝平菴項氏曰後天卦之序播五行於四時震巽二木王春故震在東南次之離火主夏故為南方之卦兌乾二金王秋故兌為正秋乾次之坎水王冬故為北方之卦土王四季故坤土在夏秋之交為西南之卦艮土在冬春之交為東北之卦木金土各二者以形王也水火各一者以氣王也坤隂土故在隂地艮陽土故在陽地震陽木故正東巽隂木故近南而地接乎隂兌隂金故正西乾陽金故近北而接乎陽此其序甚明而世之言後天者或未之思也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所説也故曰説言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮萬物隨帝而出入者也前言帝此言萬物其致一也震居東方位在卯於時為春氣化之運行自東而始故曰出乎震巽居東南辰巳之間於時為春夏之交物之長短不齊者至此畢達而無不潔齊故曰齊乎巽離居南方位在午於時為夏氣之旺嘉之㑹也故曰相見乎離離明也聖人南面而聽天下嚮明而治蓋取之此者取其大明當天而位居正中也坤居西南未申之間於時為夏秋之交氣至西南則稍息而役役者休致矣致猶曲禮致事之致老而休息也坤地也萬物之役役者至此皆休致而養於地故曰致役乎坤兌居西位在酉於時為正秋氣至西而揫斂萬物無不説澤故曰説言乎兑乾居西北戌亥之間於時為秋冬之交氣至西北則隂之終而陽之始也蓋自巽至兌四卦皆隂今也忽與乾遇則隂陽相薄而戰故曰戰乎乾坎居正北方位在子於時為冬氣至此藏伏而弗見坎水也物之勞者莫若水是為勞卦既戰而後勞勞而後歸萬物之所歸由其勞也故曰勞乎坎艮居東北丑寅之間於時為冬春之交一歳之氣於此乎終又將於此乎始始而終終而始終始循環而生生不息此萬物所以成終成始於艮也艮止也不言止而言成蓋止則生意絶矣成終而復成始則生意周流故曰成言乎艮真西山夜氣箴云子盍觀夫冬之為氣乎木歸其根蟄坯其封凝然寂然不見兆朕而造化發育之妙實胚胎乎其中蓋闔者闢之基貞者元之本而艮所以為物之始終西山以闔闢貞元發明終始兩字其説明矣闔也貞也即萬物之終也闢也元也即萬物之始也或曰兌不言正西而言正秋者萬寶告成實在正秋不特在西也正秋秋分也以兌為秋分則震為春分而他卦皆可以𩔖推也坤不言西南而言地者地即土也萬物皆産於坤土而土王四季不可以一方言也坎為正北方之卦又兼言水者天一生水實在於此所以為生物之根也他卦皆言萬物而乾獨不言者戰不係於物也他卦皆无所取而離獨有所取者以其居中而正當聖人南面之位也節齋蔡氏曰震巽離乾坎艮皆以方言兌以時言坤以地言所以然者夫子欲備三者之義而互言之耳右第五章言文王八卦方位始震終艮為運行四時生成萬物之序白雲郭氏曰自天地定位之後皆論八卦此章獨異復有重釋之辭蓋上論八卦之位不明言其所故下復明言之曰震東方也巽東南也如是則無嫌於重釋也神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也神无方妙而不可測者也八卦各居一方雖各有所在神則无在无不在萬物之出入皆有迹可見神則无迹可見蓋妙乎萬物者也即其妙萬物者而為言則雷之動萬物風之撓萬物火之燥萬物澤之説萬物水之潤萬物艮之終始萬物此非神之所為乎固皆神之所為而其神之妙則又在乎終始之間艮乃萬物之終始也莫盛乎艮之盛鄭𤣥作成明道程子曰大抵終始萬物莫盛乎艮此儘神妙須儘研窮此理愚謂萬物出乎震成乎艮艮居東北與震相連是為靜極復動是為貞下起元萬物蓋於此而終又於此而始終始之間動靜相接此乃天地造化之至妙者也故曰始萬物終萬物者莫盛乎艮且夫物之方萌雷以動之萌而未舒風以撓之舒而尚柔火以燥之堅其長也澤以説其外水以潤其内既説且潤矣於是艮以止之止則終終則復始此六子各一其用而其所以妙萬物者如是也乃若能變能化畢成萬物則又在乎兩相為用不然則獨陽不生獨隂不成有何變化遂又以六子兩兩相對而曰故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也横渠張子曰一故神兩故化蓋謂此節齋蔡氏曰逮及也悖逆也既盡也右第六章先言六子之功用而其方位用文王八卦後言水火雷風山澤之相偶則又用伏羲八卦紫陽朱子曰文王八卦則兌震以長男而合少女艮巽以長女而合少男皆非其耦故自動萬物者莫疾乎雷至終萬物始萬物者莫盛乎艮皆别言六子之用故以四時之次言而用文王八卦之序下則推其所以成用於隂陽各得其偶故用伏羲八卦若上用伏羲卦次則四時失其序下用文王八卦則兌震艮巽皆非其偶矣或疑此章但言六子而不言乾坤非不言乾坤也六子之神妙功用即乾坤之神妙功用也紫陽朱子曰除了乾坤著一句神也者妙萬物而為言引起則乾坤在其中矣崔憬曰艮不言山獨舉卦名者以動撓燥潤之功是雷風水火至於終始萬物於山義則不然故言卦而餘皆稱物各取便而論也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌説也健順動入陷麗止説此八卦之德也凡天下萬事萬物之性情包括无有遺者向㣲孔子發明之則乾坤震巽坎離艮兌終古不知為何義先儒以此八字為八卦之訓詁誠哉是言也乾三畫純乎陽剛動而不息故曰健坤三畫純乎隂柔靜而從陽故曰順震以一陽生於二隂之下故曰動巽以一隂伏於二陽之下故曰入坎以一陽投於二隂之間有陷溺之象故曰陷離以一隂亞於二陽之間有附麗之象故曰麗艮之一陽窮極於二隂之上故曰止兌之一隂發見於二陽之上故曰説夫震坎艮皆陽卦其動其陷其止蓋皆健之屬也巽離兌皆隂卦其入其麗其説蓋皆順之屬也健則能動順則能入此震巽所以為動為入也健遇順則陷順遇健則麗此坎離所以為陷為麗也健者能動則能止順者能入則能説此艮兌所以為止為説也其他近取諸身逺取諸物名件雖不一皆當以此八德求之若一一細碎牽合附㑹則失之鑿而鄙矣右第七章言八卦之德如此吾何以知此為八卦之德也曰先儒固嘗言之愚則於大有彖傳知之大有彖傳云其德剛健而文明孔子蓋明以乾之健離之明為德也紫陽朱子曰此言八卦之性情性者其本性如此情者其發用亦如此白雲郭氏曰八卦之名出於包犧氏上古之言止此八者而巳文王能明之而不訓其義孔子訓之故後世可以學易非健順八字則易不復能讀矣故乾坤八字盡三才之道健順八字盡八卦六十四卦之道乾為馬坤為牛健而能行逺故乾之象為馬順而能載重故坤之象為牛造化權輿云乾陽物也馬故蹄圓坤隂物也牛故蹄拆陽病則隂故馬疾則卧隂病則陽故牛疾則立馬陽物故起先前足卧先後足牛隂物故起先後足卧先前足平菴項氏曰案天文馬於辰為午於宿為星直一隂之月陽生於隂也馬性本隂故雖健而能順行牛於辰為丑於宿為牛直二陽之月隂生於陽也牛性本陽故雖順而善鬭震為龍龍能潛能躍而又能飛蓋物之最大而變化莫測者也故乾以龍言震得乾之初畫剛而善動故亦為龍康節邵子曰重淵之下有動物豈非龍乎平菴項氏曰震東方也東方七宿有角有尾謂之蒼龍又十二支以辰為龍宿直角亢角為蛟亢為龍皆震位也翼為蛇軫為蚓主已亦震之餘氣也巽為雞巽得坤之􅀄畫柔而善伏故以為雞括蒼龔氏曰雞羽屬也而不能飛其性則為入為伏知時而善應也漢上朱氏曰巽為風風主號令故雞號知時將號動則鼓擊羽翰而後有聲平菴項氏曰酉為雞於宿直昴蓋金畜也而主巽者巽位在巳金王於酉而生於巳也九家易云風精為雞正巽之畜也坎為豕豕内剛而處汙穢坎之陷也漢上朱氏曰豕水畜也美脊剛鬛則坎中陽也垂耳俯首而尾不足本末隂也平菴項氏曰坎正北方之卦也亥為豕於宿直室正水畜也故主坎離為雉雉文采外著離之明也平菴項氏曰離南方之卦也南方七宿謂之朱鳥有咮有翼而无尾故又謂之鶉鳳與鶉皆火畜也獨取雉者鳳全陽鶉全隂也凡走𩔖皆屬隂凡飛𩔖皆屬陽鶉雉草伏野走而能卑飛皆隂之附乎陽者也而雉得陽為多故其性介其色文埤雅云雉不能逺飛高不過一丈長不過三丈故高一丈長三丈為一雉此雉之隂也書稱雉為夏翟以其色備五采尾至夏則光鮮此雉之陽也雉交蛇蛇化雉者已與午皆朱鳥之次也雉化蜃雀化蛤者内肉外殻皆離之象也雉於宿直胃與巽雞同直亦蛇雉之義歟艮為狗艮為狗外剛而内馴也正義云艮為止狗能守家業止外人平菴項氏曰戌為狗於宿直婁西方之宿也而主艮者狗火精也艮位在寅火墓於戌而生於寅也九家易云狗火精畏水故犬鬭以水灌之則解兌為羊兌為羊外柔而内很也平菴項氏曰未為羊於宿直鬼南方之宿也而主兌者金生於土也羊屬土土生金故有角而能觸右第八章逺取諸物如此以文王八卦方位言之雞雉皆鳥屬也故離為雉而在南巽為雞而在東南牛羊馬豕狗皆獸屬也故兌羊在西坎豕在北坤牛在西南乾馬在西北艮狗在東北龍能飛能走故屬震而在東方介乎鳥獸之間乾為首坤為腹首者衆陽之所㑹圓而在上故乾為首腹者衆隂之所藏虚而有容故坤為腹王太古曰案伏羲八卦乾在上三卦之中故為首坤在下三卦之中故為腹震為足巽為股足主行震之一陽動於下有足之象故為足脛本曰股輔下體者也巽之為股未詳其義王太古曰案伏羲八卦震在下三卦而向左故為足而足之力在左巽在上三卦而向右故為手而手之力在右今説卦巽手與艮股互置求之於經觀卦上體從巽故曰盥盥者滌手也豐卦九三則曰折其右肱豈非二三四互巽乎姚氏嫌豐之无艮乃欲改肱為股未之思爾坎為耳離為目水内景陽在内猶耳之内聰故坎為耳火外景陽在外猶目之外明故離為目或曰腎屬水而外通於耳坎之象也心屬火而外通於目離之象也漢上朱氏曰耳目通竅水火相逮也平菴項氏曰人覺則神在目寐則神在耳故覺則開目而視離日主晝也寐則用耳而聽坎月主夜也坎陽陷於隂故耳居隂而能聽離隂麗於陽故目資陽而後視艮為手兌為口兌為口者兌之隂畫上虚故有口之象艮之為手未詳其義王太古曰案伏羲八卦艮在下三卦之後而為股今説卦之文與巽手互置然在易艮之初六曰艮其趾六二曰艮其腓咸下體從艮故初六曰咸其拇六二曰咸其腓九三曰咸其股而不以為手此明證也愚謂荀氏九家易又以艮為鼻麻衣易亦以艮為鼻其説云艮為鼻兌為口者山澤通氣也巽為手震為足者雷風相薄也陳安卿舉此以問朱子朱子對曰鼻者面之山晉管輅已如此説右第九章近取諸身如此皆用伏羲八卦方位言之漢上朱氏曰鄭本此章在乾為馬之前乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女乾純陽象天坤純隂象地六子皆自乾坤而生故乾稱父坤稱母震坎艮皆坤體乾之陽來交於坤之初而得震則謂之長男交於坤之中而得坎則謂之中男交於坤之末而得艮則謂之少男巽離兌皆乾體坤之隂來交於乾之初而得巽則謂之長女交於乾之中而得離則謂之中女交於乾之末而得兌則謂之少女索者隂陽之相求也陽先求隂則陽入隂中而為男隂先求陽則隂入陽中而為女茲蓋天地造化自然之道也人之夫婦男女其道亦然昧者自不察爾孔氏正義云得父氣者為男得母氣者為女誠哉是言也今曰一索再索三索蓋以三畫自下而上之次序言稱者尊之之辭謂者卑之之辭或曰三男之卦以氣言之則得乾一爻之竒以體言則得坤二爻之偶以體言之則得乾二爻之竒是故一爻為氣二爻為體伏羲卦位則以體相聚而女從父於東南男從母於西北文王卦位則以氣相依而男從父於東北女從母於西南不可槩觀也右第十章以家之八位擬八卦又言六子皆生於乾坤周易集説卷三十七
