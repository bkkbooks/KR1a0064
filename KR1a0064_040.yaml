body:
  text: 周易集說卷四十宋俞琰撰雜卦傳雜卦者孔子釋六十四卦名義而前後雜糅不依上下經次序之舊也然乾坤居首而咸恆亦居三十卦之後則雜之中又有不雜者存焉案隋經籍志云秦焚書周易獨以卜筮得存唯失說卦三篇後河內女子得之今韓康伯注本以說卦三篇分出序卦雜卦則序卦雜卦之名蓋始於康伯又案史記云孔子晚而喜易序彖繫象說卦文言而不及序卦雜卦則漢初猶以序卦雜卦總名之曰說卦也朱漢上曰三易之卦其次各異首艮者連山也首坤者歸藏也首乾者周易也聖人猶慮後世未知三易之變故於雜卦一篇雜糅衆卦錯綜其義以示變易之無窮以愚觀之先天圖始乾而終坤此伏羲氏之易也周易始乾而終未濟此文王之易也雜卦始乾而終夬兹非孔子之易歟夫夬之為卦五陽而一隂此乾之純只爭一畫若決去在上一隂即為純乾今置夬於雜卦之終聖人之意可見矣蓋易道貴乎變通變通則不窮夬而又乾則生意周流不息是故雜卦不終之以他卦而必終之以夬也始而乾終而夬亦猶六十四卦始於乾終於未濟皆此意也雜卦之作大槩兩兩相對而其義則各各相反如乾剛則坤柔比樂則師憂餘卦皆然至大過則有不然者故鄭𤣥云自大過以下卦㫖不協以錯亂失正弗敢改耳至蘇東坡始改之紫陽朱子亦以為當改蔡節齊又改之今依蔡氏本乾剛坤柔六十四卦不剛則柔不柔則剛無非皆剛柔也獨言乾剛坤柔者他卦皆剛柔相雜乾則六畫純剛坤則六畫純柔也平菴項氏曰乾剛坤柔與離上坎下相類語若淺近而乾坤坎離之性盡於二語之中不可以復加也凡易之剛爻皆乾也凡易之柔爻皆坤也凡繫辭之乾坤皆謂剛爻柔爻非但謂六畫之兩卦也盡三百八十四爻不過剛柔二字而已比樂師憂比與師皆以一陽統五隂而憂樂不同者比以一陽居五為比之君而下皆順從故樂師以一陽居二為師之帥而動衆行險故憂節齊蔡氏曰比主居上得位故樂師主居下失位故憂臨觀之義或與或求臨觀各具二義上以尊臨卑下以大臨小彼此相臨是或與或求也在下者仰觀乎上在上者俯觀乎下彼此相觀是或與或求也或曰二陽在內方進而臨在外之四隂是我出而與人也二陽在上將去而四隂在下仰觀之是人望而求我也屯見而不失其居蒙雜而著見音現屯主初言初震體之動見也居屯之時而在內故不失其居雜當依郭京作稚蒙主上言上艮體之少男稚也居蒙之時而在上故著屯昧而蒙著著乃昧之反也震起也艮止也陽起於下而止於上震之陽在下起也艮之陽在上止也三畫卦與重卦皆然天道蓋起於東方而止於東北也損益盛衰之始也損上以益下此乃盛之始也損下以益上此乃衰之始也損益蓋未至於盛衰而盛衰自此始也大畜時也無妄災也乾健而艮能止之時𫝑然也是時乾雖健不容不聽命於艮也無妄而有災焉非人也天也萃聚而升不來也地氣萃而在下是以聚而不去地氣升而向上是以散而不來平菴項氏曰萃則坤衆在內故聚升則坤衆往外矣故不來精氣聚則為物魂氣上升則散而不來矣謙輕而豫怠也謙抑而不自重其失也輕逸豫而不自檢其失也怠平菴項氏曰自以為少故謙自以為多故豫少故輕多故怠怠或為怡蓋以怡時烖來於韻為叶爾然怠字何嘗不叶平上去入之分自沈約始贊易時固未有分也豫怠二字本是古語鄭允中曰知謙之為輕則知豫之為重知豫之為怠則知謙之為勤噬嗑食也賁無色也頤中有物故曰噬嗑噬而嗑之所以食也以色而為飾曰賁唯其無色所以賁之若元有色則不可謂之賁也節齊蔡氏曰頤中有物故食賁則其色不常故無色兌見而巽伏也兌之一隂說而在外故見巽之一隂入而在下故伏三畫卦與重卦皆然隨無故也蠱則飭也故者事之所因也動而說則隨時而巳無所因也故曰隨無故也蠱者隨之反隨無故蠱則有故也不飭則大壞極弊而不可救故曰蠱則飭也飭者修飭也或曰故謂故舊與革去故之故同隨人則忘舊蠱則飭而新也剝爛也復反也爛謂一陽消亡于上反謂一陽復生于下剝極而為復猶碩果不食爛而墜地則其核中之仁又從而發生也晉晝也明夷誅也晉之日在上晝也明夷之日在下則明者傷矣故曰誅晉為晝明夷其夜矣明夷為誅戮晉其禮貌乎或曰明出地上晉晝也明入地中明夷昧也昧誤作誅井通而困相遇也井之坎在上而其水上出故曰井通困之相遇乃抵塞而不通之意困下坎而上兌兌之下爻實則川壅而成澤也坎在兌下而六三適與九四相遇抵塞而不通故曰困相遇也既與之相遇則避之而不可違之而不得無如之何也平菴項氏曰以通與遇為反對則遇為相抵而不通之象矣巽之上爻主塞坎水之上流而井之坎乃出其上蓋塞而後通者也故謂之通兌之下爻主塞坎水之下源而困之坎適在其下正遇其蹇所以困也自乾坤至此凡三十卦正與上經之數相當咸速也恆久也咸之速感應之道也婚姻之道不可以不速速則及時恆之久悠逺之道也夫婦之道不可以不久久則偕老渙離也節止也渙散則離節約則止此理之常也渙節皆有坎水風以散之則離澤以瀦之則止平菴項氏曰渙節正與井困相反井以木出水故居塞而能通渙則以水浮木故通之極至於散也節為澤上之水故居通而能塞困為澤下之水故塞之極至於困也解緩也蹇難也動而已出乎坎險之上則時勢寬緩矣故曰解緩也止而正在乎坎險之中則時勢急難矣故曰蹇難也言解緩則知蹇之急言蹇難則知解之易互文見意也平菴項氏曰蹇解皆以水言解近於渙緩而止之也蹇近於節難而止之也睽外也家人內也睽相踈者也踈則外之家人相親者也親則內之關子明曰明乎外者物自睽故曰睽外也明乎內者家自齊故曰家人內也平菴項氏曰內外皆以離言火在外則氣散火在內則神凝治身治國一也否泰反其類也泰下乾而上坤故泰之彖辭曰小往大來否下坤而上乾故否之彖辭曰大往小來其類相反如此故曰否泰反其類也夫文王卦序先泰而後否孔子乃先言否後言泰同歟異歟曰泰極則為否否極則為泰其道則一不以先後拘也或疑六十四卦皆兩兩相對而其義皆相反今特以否泰言何也曰否泰皆三剛三柔一上一下最瞭然可見而易曉故舉而言之以例其餘也平菴項氏曰乾在外則否坤在內則泰大壯則止遁則退也大壯之時隂既衰而陽既盛則君子不可以不知止也遁之時隂浸長而陽浸消則君子不可以不知退也括蒼龔氏曰君子非用壯也勢足以勝小人則止非好遁也勢不足以勝小人則退愚謂止與退皆以乾言或以止為隂之止非也大有衆也同人親也所有者大故衆善與人同故親平菴項氏曰大有同人皆以離之中爻為主在上則人歸乎我是故謂之衆在下則我同乎人是故謂之親革去故也鼎取新也革改更也所以去其舊弊鼎用以烹則取其新潔也平菴項氏曰革以火鎔金故為去故鼎以木鑽火故為取新小過過也中孚信也小過四隂在外而過其常也中孚二隂在中而守其信也伊川程子曰存於中之謂孚見於事之謂信豐多故也親寡旅也豐之時富盛而相親者衆故多故舊旅之時貧窮而無上下之交故相親者寡嵩山朝氏曰荀本豐多故親為句無也字下云寡旅也平菴項氏曰卦名皆在句上旅獨在下者取其韻之叶也以多故對寡親則故非事故之故矣凡物之情豐盛則故舊合羇旅則親戚離二卦皆主離言之雷與電俱至其黨不亦盛乎山上有火其勢不亦孤乎離上而坎下也離為火其性炎上坎為水其性潤下三畫卦與重卦之義皆然坎言行有尚離言畜牝牛吉水潤下故尚其行於上火炎上故欲其畜於下坎不行於上則入於坎窞凶離不畜於下則突如其來如凶平菴項氏曰乾陽而在上坤隂而在下者隂陽之定體如人之首上而腹下也離女而在上坎男而在下者隂陽之精互藏其宅如人之心上而腎下也是故腎之精升而為氣則離中之隂也心之精降而為液則坎中之陽也火隂物也而附於陽故炎上水陽物也而藏於隂故就下然則日為隂月為陽乎曰日則陽矣而日中之精則隂之神也月則隂矣而月中之精則陽之神也故曰離上而坎下非知道者不足以識之小畜寡也履不處也小畜之主六四也不足以制在下之三陽蓋其隂力單弱故曰小畜寡也履之主六三也雖說而應乎乾然其位不當而猖狂妄行故曰履不處也需不進也訟不親也需訟皆以乾而言需之乾在坎下有所待而行故不進訟之乾在坎上相違而行故不親隆山李氏曰乾上離下是為同人乾上坎下是為訟離為火火性炎上而趨乾故曰同人親也坎為水水性就下與乾違行故曰訟不親也頤養正也大過顛也頤與大過相反頤養正則大過反是東坡蘇氏曰初上者本末之地以陽居之則正以隂居之則顛故曰頤養正也大過顛也節齊蔡氏曰自此以下有亂簡案雜卦例皆反對叶韻為序今以其例改正愚謂蔡氏先大過後頤蘇氏先頤後大過此兩句當從蘇氏其餘從蔡氏既濟定也未濟男之窮也既濟六爻皆當位故定未濟三陽皆失位是為男之窮夫未濟之三隂亦皆失位不曰女之窮而唯言男之窮何也曰男陽也女隂也陽為君子隂為小人言陽而不及隂又以見易為君子謀不為小人謀也或曰男之窮蓋獨指上九而言上九陽爻處未濟之終失位之極是為男之窮也歸妹女之終也漸女歸待男行也歸妹者女子既歸之後也既得所歸則女道終矣諺有之曰女嫁為絶此即女之終之謂也孟子曰男子生而願為之有室女子生而願為之有家女子以嫁為歸有家則有所歸矣漸者將歸之時待男子之親迎而後行也平菴項氏曰終與窮不同終者事之成女之義從一而終不可以復進也窮者時之災事窮勢極君子之不幸也遘遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也遘即姤也姤之時一隂在下而與衆剛相遇故曰柔遇剛也倒轉而為夬則一隂在上為衆剛所決故曰剛決柔也君子陽類也小人隂類也君子之與小人相為盛衰猶隂陽之消長君子長則小人憂小人蓋以遭遇為喜以決去為憂也嵩山朝氏曰鄭本憂作消括蒼龔氏曰遘柔遇剛非困之相遇矣剛長乃終而復於乾也深居馮氏曰始言乾剛坤柔矣此遂以剛決柔終焉復其始也夬決則乾矣以明六十四卦之本於乾也平菴項氏曰自咸恆至此三十四卦正與下經之數相當隆山李氏曰天下之事不至於決則不通故雜卦之次序與十三卦之制器尚象皆終于夬周易集說卷四十
