body:
  text: 周易集説卷二十九宋俞琰撰繫辭上傳二一隂一陽之謂道繼之者善也成之者性也隂陽氣也何以謂之道蓋太極動而生陽動極則靜靜而生隂靜極復動一動一靜互為其根是之謂道繼謂靜極而復動一動一靜而無繼則造化熄矣今也靜極復動則貞而又繼之以元元乃善之長也故曰繼之者善也成謂動極而復靜自元而至於貞則動極復靜而成終矣靜乃天之性也故曰成之者性也紫陽朱子曰繼善是動處成性是靜處又曰繼是靜之終動之始也且如四時到得冬月萬物都歸窠了若不生來年便都息了蓋是貞而復生元無窮如此平庵項氏曰一隂一陽猶言一出一入明竒偶之迭用也隂陽氣也隂陽迭用者道也道之所生無不善者元也萬物之所同出也善之所成各一其性者貞也萬物之所各正也陳北溪曰繼成字與隂陽字相應是指氣而言善性字與道字相應是指理而言仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣仁者知者莫不均具此性而俱有此善但其氣稟不同故其所見亦不同爾仁者之所見在仁遂謂此道為仁知者之所見在知遂謂此道為知皆一偏也至於百姓則日用常行乎隂陽之中無往而非隂陽之道而莫之或知猶之每日飲食而弗知其味此所以君子之道鮮矣紫陽朱子曰仁者謂之仁是見那發生處智者謂之智是見那收斂處百姓日用而不知是不知所謂發生亦不知所謂收斂醉生夢死而巳漢上朱氏曰君子之道則合仁與智橫渠張子曰謂之名之也之謂直為也顯諸仁藏諸用鼓萬物而不與聖人同憂仁本藏於內者也顯諸仁則自內而外如春夏之發生所以顯秋冬所藏之仁也用本顯於外者也藏諸用則自外而內如秋冬之收成所以藏春夏所顯之用也鼓謂鼓動萬物而生生不息也不與聖人同憂者聖人人也吉凶與民同患故不能無憂天地之道則不過鼓動萬物而使之自生自成耳天地不能加毫末於其間也是故語其德則聖人好生天地亦好生天地蓋與聖人同語其心則聖人有憂天地無憂天地蓋不與聖人同圭叔吕氏曰因上文仁智而言天地之大也用即智在天道則不言智而言用智存於心有心則有憂而天道則無心也盛德大業至矣哉富有之謂大業日新之謂盛德天地以生物為德以成物為業其德業至盛至大亦無以加矣聖人之德業與天地之德業一也何謂大業富有之謂也富有者何大而無外物成而靡所不有也何謂盛德日新之謂也日新者何方來無窮物生而與物俱新也天地之德業蓋如此若言聖人之德業則亦如此聖人即天地也天地即聖人也生生之謂易隂生陽陽生隂隂陽相生而其變無窮故曰生生之謂易夫是太極動而生陽靜而生隂是為兩儀既生兩儀又生四象既生四象又生八卦八而十六十六而三十二三十二而六十四等而上之蓋生生而無窮也成象之謂乾效法之謂坤成象巳成之象也效陳也法謂造化之詳密而可見者乾主氣故言象坤主形故言法後章觀象於天即此象也觀法於地即此法也紫陽朱子曰效呈也陳也一似説效羊效犬效馬又曰效字難看如效順效忠效力之效有陳獻意思言陳出許多物事極數知來之謂占數蓍之策數也窮極其數而知方來是之謂占通變之謂事變卦之爻變也通達其變見之於行是之謂事或言通變或言變通同歟曰窮則變變則通易也通其變使民不倦聖人之用易也隂陽不測之謂神隂陽動靜不可測度是之謂神橫渠張子曰一物兩體氣也一故神兩在故不測或曰方其揲蓍之初卦猶未成或為隂爻或為陽爻蓋不可以測度非神而何右第五章紫陽朱子曰此章言道之體用不外乎隂陽而其所以然者則未嘗倚於隂陽也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣易之為道也廣大其為書也亦廣大以言乎逺以言乎邇以言乎天地之間無所往而非易以逺而言則其理通行而不禦以邇而言則其理具在目前靜而且正以天地之間而言則萬事萬物之理無不備焉可謂廣大矣深居馮氏曰以言乎逺則不禦天也乾也以言乎邇則靜而正地也坤也以言乎天地之間則備矣人事也屯蒙而下六十二卦也虞翻曰禦止也逺謂乾邇謂坤天髙故不禦也地貞靜而德方故正也紫陽朱子曰不禦無盡也夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉守一之謂專兩闔之謂翕乾畫竒而實不變則其靜也專變則其動也直直乃坤之德也坤畫偶而虛不變則其靜也翕變則其動也闢闢乃乾之德也廣生大生謂乾坤廣大而生生之道無窮也乾天道也無所不包故大坤地道也無所不受故廣大則極於有形之外廣則限於有形之內此乾坤之辨也明道程子曰不專一則不能直遂不翕聚則不能發散紫陽朱子曰乾一而實故以質言而曰大坤二而虛故以量言而曰廣秀巖李氏曰此章專以乾坤言易廣大配天地變通配四時隂陽之義配日月易簡之善配至德廣大配天地謂乾坤之廣大如天地之廣大也變通配四時謂乾坤之變通如四時之變通也隂陽之義配日月謂乾坤隂陽之義與日月之隂陽相似也易簡之善配至德謂乾坤易簡之善與人心之至德相似也至德即中庸之德橫渠張子曰得天下之理之謂德故曰易簡之善配至德深居馮氏曰隂陽之義配日月復之七日陽之義也臨之八月隂之義也右第六章誠齋楊氏曰此章言聖人所以贊易之道其極至於廣大之二言其原生於乾坤之二卦子曰易其至矣乎夫易聖人所以崇德而廣業也至矣乎贊易道之至極而無不盡也聖人本諸天地而作易聖人之德業即天地之德業也聖人之所以崇德廣業於易見之矣節齋蔡氏曰明其理於內者德也盡易而理益明非崇德歟著其理於外者業也盡易而理益著非廣業歟廬陵歐陽公曰凡有子曰字者皆講師之説也紫陽朱子曰十翼皆夫子所作不應自著子曰字疑皆人所加也知崇禮卑崇效天卑法地髙明莫如天卑順莫如地知欲其髙明而不卑汚蓋效天也禮欲其卑順而不髙傲蓋法地也紫陽朱子曰人之知識不可不髙明而行之在乎小心如大學格物致知是智崇處正心修身是禮卑處天地設位而易行乎其中矣天位乎上地位乎下易則行乎天地之中非謂知崇禮卑為天地設位而易行乎知禮之中也明道程子曰天地設位而易行乎其中何不言人行乎其中蓋人亦物也若言神行乎其中則人只於鬼神上求矣若言理言誠亦可而特言易者欲使人默識而自得之也成性存存道義之門成性之成與成德之成同人之性渾然天成蓋無有不善者更加以涵養功夫存之又存則無所往而非道無所往而非義矣謂之門者道義皆自是而出也誠齋楊氏曰本然之謂理當然之謂義自其本然而行其當然之謂道右第七章平庵項氏曰此章言聖人體易於身也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象賾當依紫陽朱子訓雜亂與春秋傳嘖有煩言之嘖同擬比度也天下之物亦衆矣賾則雜亂不一未易見也聖人有以見之而比擬卦畫有健順陷麗動入止説之形容則象其物之所宜而名之是故謂之象如乾陽也乾之三畫純陽而其性健則其象宜以為天坤隂物也坤之三畫純隂而其性順則其象宜以為地震亦陽物震之一陽動於二隂之下則其象宜以為雷巽亦隂物巽之一隂入於二陽之下則其象宜以為風如説卦所列者是也環溪吳氏曰茍明乎象則天地之大可坐而窺鬼神之奧可默而知聖人之已言者可曉然而無疑其未言者可以類而推之聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻天下之事亦多矣不動則不見也會謂理之所聚處通謂理之無礙處典禮謂法度之常而天下通行者也聖人之作易既有以見天下之動而觀其會通以行其典禮則其係六爻之辭以斷吉凶亦莫不觀其會通以行其典禮前言設卦觀象係辭焉而明吉凶乃指彖辭明則使人有所知而不昧也此言係辭焉以斷其吉凶乃指爻辭斷則使人決於行而不疑也紫陽朱子曰如庖丁解牛會則其族而通其虛也典禮只是常事猶言常禮常法又曰會而不通則窒礙而不可行通而不會則亦不知許多曲直錯雜處故必觀會通而後可以行典禮又曰一卦之中自有會通六爻又各自有會通且如屯卦初九在卦之下未可以進為屯之義乾坤始交而遇險阻亦屯之義似草穿地而未甲亦屯之義凡此數義皆是屯之會聚處若盤桓利居貞便是一個合行底却是通處也言天下之至賾而不可惡也言天下之至動而不可亂也聖人惟能見天下之賾故能言天下之至賾聖人惟能見天下之動故能言天下之至動天下之物雜而不一可謂賾之至矣聖人於易象言之則犂然當心蓋不可惡也天下之事變而不常可謂動之至矣聖人於易爻言之則井然有條蓋不可亂也惡烏故反紫陽朱子曰惡厭也擬之而後言議之而後動擬議以成其變化前云言天下之至動謂易此云擬之而後言議之而後動謂人擬議猶言比評謂裁度其當否使合於理也擬於未言之先則其言合乎理而無失議於未動之先則其動合於理而無差是故聖人之於易也設此卦觀此象擬其形容而後係之以言議其時位而後斷之以動所以成易道隂陽變化之功而與天地參也或曰前言剛柔相推而生變化蓋伏羲作易之事此言擬議以成其變化乃文王用易之事卦爻之隂陽變化出於伏羲之畫故言生文王以辭述而成之故言成紫陽朱子曰觀象玩辭觀變玩占而法行之此下七爻則其例也鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎此釋中孚九二爻義謂戶之動發於樞矢之動發於機言行乃君子之樞機要當慎其所發發而善則榮發而不善則辱由身而加乎民自邇而見乎逺極其至則動天地不可不慎也君子比鶴出其言釋鳴字居其室即在隂之義千里之外應之即其子和之之義言出乎身加乎民行發乎邇見乎逺即我有好爵吾與爾縻之之義紫陽朱子曰鶴鳴子和好爵爾縻此本是誠信感通之理夫子却專以言行論之蓋誠信感通莫大乎言行也同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭此釋同人九五爻義謂君子之出處語默其迹雖或不同其心則同無往而非道也金乃至堅之物二人同心則其利可以斷金蘭乃芬香之物同心之言相合則似之愈久而愈不厭二人指九五與六二九五之陽在上有或出或語之象六二之隂在下有或處或默之象出處語默即先號咷後笑之義二人同心斷金臭蘭即相遇之義初六藉用白茅無咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣此釋大過初六爻義謂君子過慎之至所以無咎也物無問厚薄輕重自其茍且者為之則舉是物置諸地而安斯亦可矣今又以茅藉之又何咎之有薄莫薄乎茅重莫重乎藉茅之為物雖薄用之以薦藉則可重也當知薄在物可重在人用之輕則輕用之重則重亦在人用之何如耳慎守斯術推而行之於事其亦無所失矣物薄釋茅義用可重釋藉義無失即無咎義節齋蔡氏曰凡天下之事過則有失惟過於慎則無所失故無咎勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也此釋謙九三爻義謂君子重厚之至而能以其功下人所以有終也夫好髙好勝人之常情其能謙者鮮矣況有功勞可尊乎有勞而不自伐以為勞有功而不自德以為功重厚之至也德言其盛也今也有功而不德可謂德之盛矣禮言其恭也今也勞而不伐可謂禮之恭矣致極也存位猶乾九三之存義致恭以存其位謂禮極其恭所以存其分義而不敢踰越非謂保其祿位而強為之謙也有功釋勞字不伐不德釋謙義存其位即有終之義伊川程子曰致恭者所以存其位如言為善者有令名君子豈為令名而為善乎厚齋馮氏曰不德者即有德色之德亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也紫陽朱子曰此釋乾上九爻義當屬文言此蓋重出也孔氏正義云此明無謙則有悔故引乾之上九亢龍有悔證驕亢不謙也童溪王氏曰知聖人深豫乎謙之九三則知聖人深戒乎乾之上九可知也何也亢者謙之反也九三致恭存位上九則貴而無位九三萬民服上九則髙而無民九三能以功下人上九則賢人在下位而無輔此九三所以謙而有終上九所以亢而有悔也不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也此釋節初九爻義謂君子之修身謹行必先謹夫言語則無咎也合意以謀之一言而漏之利未加於民而適足以産禍召亂則其亂之所生也豈非言語以為階乎為君而言語不密則禍及其臣晉殺其大夫陽處父是也為臣而言語不密則自喪其身鄭雍糾之死是也大抵幾微之事不密則禍從口出而其害立成是以君子之慎密也不惟其身不妄動言語亦不妄發也誠齋楊氏曰唐髙宗告武后以上官儀教我以廢汝此君不密則失臣也陳蕃告竇太后願出臣章宣示左右此臣不密則失身也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也此釋解六三爻義謂小人處非其位而自招其害也聖人作易以盡情偽而盜之情偽亦知之故曰作易者其知盜乎董仲舒曰乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其禍患必至也愚謂負者以身負物物貴而身賤故曰負也者小人之事也乘者以身乘車身尊而物卑故曰乘也者君子之器也君子之器非小人所當乘也故曰小人而乘君子之器盜思奪之矣上不可慢也下不可暴也上慢下暴則盜亦乘其過惡而伐之矣古之良賈深藏若虛今也輕慢其藏而不能隱密是教語盜賊使取之也古之賢女不事華飾今也夭冶其容而怪服異裝是教語淫者使犯之也是皆有以招之也招謂自召之也藏去聲右第八章紫陽朱子曰此言卦爻之用節齋蔡氏曰自中孚初爻至此凡七乃夫子擬之辭而為三百八十四爻之凡例也周易集説卷二十九
