body:
  text: 周易集說卷三十三宋俞琰撰繫辭下傳二是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也是故兩字承前章而言正義云前章皆取象以制器以是之故易卦者寫萬物之形象也愚謂易有畫乃有象如乾象天坤象地巽下坎上而為井巽下離上而為鼎之類皆是也豈特十三卦之象而巳哉象即像之謂既謂之像則不過其理近似而已學者深求其義則過過則必至於鑿也彖乃一卦之全材爻則分而為六所以效天下萬事萬物之動也其間有得有失是以吉凶由動而生悔吝由動而著也生謂從此而生出著謂自微而著見悔有改過之意至於吉則悔之著也吝有文過之意至於凶則吝之著也原其始而言則吉凶生於悔吝之小疵要其終而言則悔吝著而為吉凶也括蒼龔氏曰像者體也以上下言也材者用也以內外言也陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也震坎艮三男陽卦也曷為而多隂三男皆坤體乾交坤而得之也巽離兌三女隂卦也曷為而多陽三女皆乾體坤交乾而得之也陽卦皆一陽而二隂是為陽卦多隂隂卦皆一隂而二陽是為隂卦多陽其所以然者何哉陽卦竒隂卦耦也陽卦竒者震坎艮皆五畫也隂卦耦者巽離兌皆四畫也其德行何也一與不一也陽卦一陽而二隂是謂一君而二民隂多陽少以二民共事一君一也故為君子之道隂卦一隂而二陽是謂二君而一民陽多隂少以二君共爭一民不一也故為小人之道也紫陽朱子曰君謂陽民謂隂右第四章僅兩節疑錯簡前一節當屬前章後一節當在貞夫一之下易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮此以下釋咸九四爻義思者索其所欲慮者防其所惡何思何慮謂天下萬事萬物之往來甚衆若以思慮為感則是自取其憧憧也如日月寒暑未嘗不往來而其往來也任氣之自運何思何慮又如尺蠖龍蛇未嘗不屈伸而其屈伸也委形之自然何思何慮天下之理本同歸而殊其塗者自不同天下之理本一致而百其慮者自不一蓋往來者人事之常安能使之不往來但不可加以思慮之憧憧爾若加思慮之憧憧則徒自紛紛然豈咸感之道哉兩稱天下何思何慮蓋甚言咸感之道君子以虛受人無所事乎思慮也龜山楊氏曰易所謂無思者以為無所事乎思云爾故其於天下之故感而通之而巳今曰不可以有思又曰不能無思此何理哉日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉日月相推而明生寒暑相推而歲成此皆自然之往來非憧憧往來也往者屈來者信屈信相感而生生之不息則其利無窮矣信音伸伊川程子曰此以往來屈信明感應之理屈則有信信則有屈所謂感應也故日月相推而明生寒暑相推而歲之功用由是而成故曰屈信相感而利生焉感動也有感必有應凡有動皆為感感則必有應所應復為感感復有應所以不巳也又曰近取諸身百體皆具屈信往來之義只於鼻息之間見之屈信往來只是理不必將既屈之氣復為方信之氣生生之理自然不息如復言七日來復其間無所斷續陽巳復生物極必返其理須如此橫渠張子曰屈信相感而利生焉感以誠也情僞相感而利害生雜以僞也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也尺蠖屈而求信龍蛇蟄而存身此皆物性之自然也義即易中之義致與大學致知之致同精研義理無毫釐之差而深造於神妙所以致之於用也見於用而利施於身而安所以為崇德之資也精義入神內也致用外也自內而達外猶尺蠖之屈以求信也利用安身外也崇德內也即外以養內亦猶龍蛇之蟄以存身也屈信之道不過如斯而已故又曰過此以往未之或知也伊川程子曰前云屈信之理矣復取物以明之尺蠖之行先屈而後信蓋不屈則無信信而後有屈觀尺蠖而知感應之理也龍蛇蟄藏所以存息其身而後奮迅也不蟄則不能奮矣動息相感乃屈信也君子潛心精微之義入於神妙所以致用也潛心精微積也致用施也積與施乃屈信也利用安身以崇德也承上文致用而言利其施用安處其身所以崇大德業也紫陽朱子曰因言屈信往來之理而又推以言學亦有自然之機也又曰精義二字聞諸長者所謂義者宜而巳矣物之有宜有不宜事之有可有不可吾心處之知其各有定分而不可易所謂義也精義者精於此而巳所謂精云者猶曰察之云耳精之之至而入於神則於事物所宜毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也誠齊楊氏曰精於庖者其刀入神精於射者其矢入神茍入神矣其致用於庖與射也何有精於技猶若是而況精於義理而入神者乎是故以之致用則用必利以之安身則身必安窮神知化德之盛也神無方妙而不可測者也化無迹泯而不可見者也自精義入神真積力久以至於窮盡其神是以知化窮神而知化則從容中道遊於何思何慮之天而與天為一矣兹非德之盛乎故曰窮神知化德之盛也窮神猶言窮理盡性知化猶言至於命橫渠張子曰窮神是窮盡其神也入神是僅能入於神也言入如自外而入義固自有淺深又曰窮神知化乃德盛仁熟之所致非智力能强也紫陽朱子曰此上四節皆以釋咸九四爻義易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶困之六三上有九四如石之當吾前三也非所困而困焉名之辱也必矣下有九二如蒺藜之居吾後三也非所據而據焉身之危也必矣既辱且危奚可動哉動則變為大過之棺椁是死期之將至也妻其可得見耶死期將至古本作死其將至釋文云亦作期橫渠張子曰此明不能利其用也括蒼龔氏曰困之六三不能安身以崇德況利用乎紫陽朱子曰石是挨動不得底物事自是不須去動他若只管去用力徒自困耳又曰且以人事言之有著力不得處若只管著力去做少間去做不成他人便道自家無能便是辱了名易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也隼者禽也弓矢者公用以射隼者也器謂弓矢人謂公也隼居髙墉之上而公用射之此小人處危地而將就擒之時也是時君子之器已成是以動而無所礙出而有所獲也昔也時未至則君子藏器於身又何敢動今也動而無不利如此謂其成器而後動者也括者結而有所凝之謂伊川程子曰行一身至於天下之事苟無其器與不以時而動小則括塞大則喪敗自古喜有為而無成功或顛覆者皆由是也橫渠張子曰此明能精義以致用者括蒼龔氏曰解之上六能利用矣況安身以崇德乎子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也小人不以不仁為恥故見利而後勸不見利不勸也不以不義為畏故威而後懲不威不懲也如噬嗑初九曰屨校滅趾無咎此乃小懲而大誡是為小人之福也此以下比先泛論事物之理然後舉易曰以證之與前不同郭京曰動字誤作勸字橫渠張子曰所舉易義是聖人議論到此因舉易義以成之亦是人道之大且要者也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶一小善不足以成君子之名君子之所以成名者善之積也一小惡不足以滅小人之身小人之所以滅身者惡之積也善惡之積皆非一朝一夕之故惡小則罪亦小惡大則罪亦大小人以缺如噬嗑上九曰何校滅耳凶則其罪大而不可解矣家語云勿謂何傷其禍將長勿謂何害其禍將大焰焰不滅炎炎若何涓涓不壅終為江河其是之謂乎首不稱子曰蓋連上文子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑小人所以傾危者自以為位可恆安也所以滅亡者自以為存可恆保也所以禍亂者自以為治可恆有也君子則不然安而不忘危存而不忘亡治而不忘亂如否九五曰其亡其亡繫于苞桑而畏懼如此是故其身安而國家可以保守也安危以身言存亡以國家言治亂以天下言括蒼龔氏曰否之九五能安身者也子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也不度其德之薄而居尊位不揣其知之小而謀大事不量其力之小而當重任其不及禍者鮮矣如鼎之九四曰鼎折足覆公餗其形渥凶可謂不勝其任矣橫渠張子曰此明不知利用以安身者子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望知幾之幾與前幾事不密之幾同蓋幾者始動之微吉凶之端先見而未著人所難知者也知幾其神乎謂君子生有定見之明事未著而先已知也衆人皆不知而君子獨先知之不謂之神可乎諂佞也瀆亂也交於上以恭巽過則為諂交於下以和易過則為瀆君子當豫之時不屈已以徇人而無上交之諂不屈人以徇巳而無下交之瀆其知幾乎衆皆迷而忘返君子則見幾而動何待終日他日吉凶既判果如所料然則君子之不諂不瀆者非其有先見之明疇克爾耶知幾以理言見幾以事言知在內見在外也如豫之六二曰介于石不終日貞吉石者至重之物定而不動者也君子之不諂不瀆介然自守而如石焉則胸中自有定見若吉若凶一覽即決何待終日柔指六五剛指九四豫之時九四之剛上逼六五之柔而威震主矣衆人所不察君子獨先知之豈非先覺之賢乎君子知今日之微如是遂知他日之彰必如是知今日之柔如是遂知他日之剛必如是此君子先有定見之明髙出衆人之表是乃萬夫之望也望與詩彼都人士萬民所望同叶韻音亡或曰豫之九四恐亦不至乎僭叛聖人豫防之爾如坤之初六方言履霜便言堅冰至易之為戒例如此也橫渠張子曰幾者象見而未形也伊川程子曰知幾者君子之獨見非衆人所能及又曰斷别也其判别可見也紫陽朱子曰漢書吉之之間有凶字或問朱子曰幾者動之微何以獨於上交下交言之曰上交要恭遜便不知不覺有箇諂底意思在裏頭下交不瀆亦是如此所謂幾者只才覺得近諂近瀆勿令如此便是知幾進齊徐氏曰上交交於三也下交交於初也當豫之世四為權臣三比而初應之皆權臣之與也二之於四本無係應以位在初三之間所比非人易為所纍一或不謹而諂瀆焉則陷於逸豫不能見幾而作矣括蒼龔氏曰豫六二知幾神之事也非精義不足以明之子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祇悔元吉殆將也庶近也聖人知幾賢人則近幾耳聖人無過故無不善賢人則或有過故猶有不善但賢人有不善則未嘗不知知之則未嘗復行也顔子之不二過蓋近道矣如復初九曰不逺復無祇悔元吉則顔子其殆庶幾乎東坡蘇氏曰世所以不食烏喙者徒以知之審也如使知不善如知烏喙則世皆顔子矣所以不及聖人者猶待知爾括蒼龔氏曰復初九殆庶幾所謂精義也天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也天地絪緼謂乾坤隂陽之感也男女搆精謂六子隂陽之合也萬物化醇謂氣化者也皆二而一者也如損六三曰三人行則損一人一人行則得其友蓋言致一也男女即是六子非真謂人之男女若以為人之男女則人之男女止能生人豈能生萬物也哉括蒼龔氏曰精義則足以致一若損之六三是也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶君子位正身安而後動則動無不與心平氣和而後語則語無不應定其交之可求而後求則求無不與君子修此三者故處世得以全身而逺害也乃若危以動則無黨與懼以語則無應援無交而求則誰其與之人皆莫之與則傷之者自外而至矣如益上九曰莫益之或擊之立心勿恆凶益上九之位不正只居六爻之窮其身心之危懼可知矣不能益人而反求人之益其交其求又可知矣則其擊之者自外而來烏得不凶橫渠張子曰此又終以致用之戒郭京曰危以動則民不輔也輔誤作與平庵項氏曰危以動則民不與黨與之與也無交而求則民不與取與之與也右第五章所舉十卦皆言君子學易之事周易集說卷三十三
