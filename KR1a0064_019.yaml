body:
  text: 周易集說卷十九宋俞琰撰彖傳六漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也漸之進也紫陽朱子謂之字疑衍或是漸字郭京易舉正云吉下誤增也字秀巖李氏按王肅本女歸吉也作女歸吉利貞本漸乃歸妹之倒體歸妹六三進為漸六四是進而得位也或謂坤六三進交於乾下自內往外而為女歸之象誤矣人患不得位耳不得位則雖賢無以施其功令既進得位則其往也有功矣進得位往有功也蓋釋女歸吉而指六四進以正則可以正邦也蓋釋利貞而指九五彖傳凡論主爻之得必以五兼言之此易道尊君之大義也夫正邦之道當先正身其身正孰敢不正今九五之進也以正則國人化之如二如三如四皆進以正初上雖不得位然初以隂居下上以陽居上亦無有不正者諸爻皆正而九五又得尊位之正又剛而得中故不止乎往有功而其正又可以正邦也止而巽動不窮此合二體而言漸也止有安靜之義巽有和順之義內不止則非漸之道外不巽則非進之道內止而外巽則安靜和順而無躁進之失有不動動則不至於困窮也大凡欲速則不達其動必窮今夫漸之動也止而巽則非欲速者也是以動而不窮也歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也歸妹之為卦兌下震上九四陽爻在上卦二隂爻之下六三隂爻在下卦二陽爻之上一上一下有天地相交之象故曰歸妹天地之大義也夫有天地則有萬物有萬物則有男女男女之交與天地之交其義一也是故天地交則萬物作興不交則萬物從何而生男女交則生生之道不窮不交則人道廢而人類滅矣今夫女之歸男乃生生相續之道男女交而後有生息有生息而後其終不窮前者方自此而終後者又自此而始始終相續而不窮此歸妹所以為人之終始也說以動謂兌之說以震之動也動而嫁妹凡親黨之在內者皆喜說也大抵兄之於妹未必如愛女之情甚切今也父有遺孤而子能嫁之宗族蓋無有不喜說者以其所歸者妹也故曰說以動所歸妹也夫震為長男兄也兌為少女妹也或者以震男為夫兌女為妻遂謂說以動為男說而動夫卦名歸妹則當以兄嫁妹求其義指兄為夫可乎唯其誤以震男為兌女之夫乃謂所歸者小女而就震言說遂謂長男說小女之色不以德殊不思說者兌也非震也又就兌言動遂謂少女說而動殊不思動者震也非兌也二三四五皆位不當也三五皆柔乘剛也而彖傳之意則專指六三何也曰六三乃成卦之主爻也六三位不當又以柔乘剛蓋不特在夫婦為失倡隨之意又為臣犯君子抗父賤陵貴小加大無一而可此所以動則皆凶而無攸利也豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎豐者至高至滿而極盛之義故曰豐大也為卦下離明上震動明以動相資故亨節齊蔡氏曰明以動合二體言其致亨之道豐疑作亨王者處豐大之世天下至廣人民繁庶事物衆多保之治之之道當務行寬大蓋非小才小智所能故曰王假之尚大也日正中則大明當天而其照天下也無幽不燭無隱不彰王者富有四海所治既衆思慮安得周及必如日之正中而無偏照則宜故曰勿憂宜日中宜照天下也然日無常中之時中則必昃月無常盈之時盈則或食天地之大猶有盈虛之變而與時消息况於人况於鬼神且以人言之有生則有死不能常生而不死更以鬼神言之有聚則有散又安能常聚而不散盈虛猶言盛衰消息猶言進退盛極則衰進極則退理之常也是理也非獨人與鬼神如是雖天地亦如是故曰日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎於豐大之時而為此戒蓋以持盈之道略不謹慎則必至傾覆也文王曰宜日中謂豐大之時居至尊而照臨天下當如日之正中乃無偏私蓋恐其不及而勉之孔子又恐其過而不能常如日之正中遂戒以日中則昃月盈則食與夫三才鬼神之道蓋又發明文王彖辭言外之意旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅二五皆柔得中今曰旅小亨柔得中乎外蓋指六五謂六五柔順而得在外之中與他卦之柔得中者不同也伊川程子曰所謂得在外之中中非一揆旅有旅之中也愚謂剛強非處旅之道人所不能容故莫尚乎柔順在旅而柔順則知處旅之道矣然柔順又不可過過於柔順則無以自立甚而柔媚取容而順從乎人適以自賤皆非得中者也豈處旅之道哉故唯柔得中乎外而順乎剛斯可矣順乎剛亦指六五謂六五處兩剛之間而能順乎剛德之人以為己之助也承乘皆剛是羇旅之人交於強有力者也茍非善處則取辱招禍必矣旅之為卦下艮止上離明止而麗乎明蓋兼上下二體總言之也論語云居是邦也事其大夫之賢者友其士之仁者此即止而麗乎明之謂也所謂止而麗乎明雖兼二體而言其所重則在上九九三艮體之止也其位在旅之下而得其所止則其自處者正又能附麗於明則其所依者又正可謂善處旅矣其占為上下皆小亨而在下者又當守其旅之正故總結之曰是以小亨旅貞吉也或曰旅彖傳凡兩言小亨其一疑衍非也旅之時最難處旅之義不可不知蓋其亨雖小其時義則大故又贊之曰旅之時義大矣哉聖人小其亨而大其時義非大旅也大其處旅之道也重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人巽之取象在天為風在人君為命風者天之號令其入物也無不至命者人君之號令其入人也亦無不至卦叠兩巽有號令重復之象故曰重巽以申命申猶書堯典申命羲叔之申義皆訓重漢上朱氏曰內巽者命之始也外巽者申前之命也愚謂孔子明言重巽以申命蓋申命所以體重巽之義也九五之剛為巽之主中正而無過為命出則九二之剛巽乎九五而罔敢或違故曰剛巽乎中正與姤傳謂剛遇中正相似彼以四五言此以二五言也夫二五兩剛本不相合以在重巽之時而上下相巽此九五之志所以行也六四在九五之下順承九五之剛初六在九二之下亦順承九二之剛故曰柔皆順乎剛上以巽道化下下以巽道事上上下皆巽是以小亨而利有攸往又利見大人孔子蓋總解文王彖傳三句故用是以兩字結之其句法與旅之彖傳同夫巽以六四之柔為成卦之主爻而孔子乃曰剛巽乎中正又曰柔皆順乎剛而不以隂為主易道崇陽抑隂尊君卑臣例如此也平菴項氏曰以卦體言之重巽以申命是小亨也事必待申命而後行豈大亨之規模哉剛巽乎中正而志行是利有攸往也柔皆順乎剛是利見大人也其辭與旅相類皆總陳卦義而用是以二字結之故知當作三句分說也兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉說和說也兌以一隂居二陽之上其柔外見而和說故曰兌說也卦疊兩兌則二五以剛爻居中有中心誠實之象三上以柔爻居外有接物和柔之象中心誠實則不欺於天接物和柔則不拂于其人說也以道而所守者正是以上順天理下應人心故曰剛中而柔外說以利貞是以順乎天而應乎人向使外柔而中不剛則內無所守其說必流殆將無所不為而違道干譽又何順天應人之有順天指上兌而言應人指下兌而言乃若說以先民說以犯難此兩說字亦為重兌而發夫和說之道若內若外無施不可在內而以之先民則民皆欣然效力忘其勞而不辭在外而以之犯難則民亦欣然赴敵忘其死而不顧茲蓋說之以道故也說之以道孟子所謂以佚道使民雖勞不怨以生道殺民雖死不怨殺者是也以至父語之子兄語之弟遞相勸勉皆忘其勞與死而無怨心則其說也豈不大矣哉故曰說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉民勸謂民自勸非勸之使然也孔氏正義云先以悅豫勞民然後使之犯難則民皆授命忘其犯難之死伊川程子曰說道之大民莫不知勸人君之道以人心說服為本故聖人贊其大渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也渙之剛來與隨之剛來同皆指後卦而言渙乃節之倒體渙九二之剛蓋來自節之九五既非自漸來亦非自否來夫剛之來也雖在下卦坎險之內而險難蓋巳渙散不至乎窮極故曰剛來而不窮渙六四之柔在節為六三本在下體又不得位倒轉為渙之六四則得巽位隂柔之正而上與九五同是巽體又同其正故曰柔得位乎外而上同此據成卦之由而釋亨之義也剛來濟柔動乎內而無險困之難柔往輔剛止乎外而無違逆之乖此所以能渙散險難而致亨也王謂九五渙之君也有九二剛中之臣相與渙散其險難又有六四同體之正人為之輔由是九五之王得以大建宗廟中天下而立使民望有所屬故曰王假有廟王乃在中也巽木以為舟楫有致逺之功當此風行水上之時氷釋而舟楫可通故曰利涉大川乘木有功也童溪王氏曰不及利貞疑有逸文郭京易舉正云利涉大川下脫利貞二字誠齊楊氏曰濟難才也散難非才也德也巽之才木也其德風也水之深能溺萬物然乘一木則悠然而濟水之怒能決九川然遇一風則歘然而散才以濟之德以散之天下之大難一朝渙散而不復聚渙之所以亨也節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民節之剛柔分與噬嗑同皆以一剛一柔分居內外而各為之主也九五九二皆以剛爻居得其中是為剛得中剛柔分而不至乎偏剛得中而不至乎過此節之所以亨也故曰節亨剛柔分而剛得中中下缺一也字上六柔而失中居節之極是乃過於節而節之苦者也凡物過節則苦味之過正形之過勞心之過思皆謂之苦節而苦則非通行之道故曰苦節不可貞其道窮也為卦下兌說上坎險說以行險此又以二體言節之所以亨也險乃人之所難行者也說以行之則亨矣又豈至乎困窮哉當位以節中正以通此再釋亨義也九五居得其位為節之主以身率先用節之道度吾身之可行者行於天下中而無過正而無私則通行而無弊矣若夫已自不能節而強人以所難是豈通行之道哉或曰節居第六十卦計三百六十爻應一歲三百六十日當期之數一歲之間自立春至大寒為氣二十有四為節十有二而溫凉寒暑各有其定限遂成春夏秋冬故曰天地節而四時成天地之有四時此天地之節也人君體天地之節以裁制其法度輿服宫室莫敢或侈稅賦徭役莫敢或過然後財無妄費民無橫害故曰節以制度不傷財不害民論語云節用而愛人正是此意蓋節用所以愛人傷財則必至於害民也古之人恭儉而取民有制者何也深知傷財為害民之本也中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也柔在內謂六三六四之柔在四剛之內剛得中謂九五九二居得其中內以全卦言中以二體言也中孚成卦之主爻在六三六四而彖傳又兼九五九二言崇陽而抑隂不以隂為主也說而巽孚乃化邦此又以二體言孚也為卦兌下巽上一說一巽上下相孚故邦國不言而化也豚魚即江豚也出則澤上必有風未嘗失信許渾詩謂江豚吹浪夜還風是也或從王弼分豚魚為二物謬矣郭京易舉正云豚魚吉信及也今本多豚魚二字愚謂信及豚魚猶詩序云德如羔羊及乃近似之謂非施及之及也謂人之不失信比及於豚魚之信也巽木動於兑澤之上有乘木之象四陽在外而內函二隂有舟虛之象舟虛則無沉溺之患而利於涉險也中孚以利貞乃應乎天也謂守信而不以正則悖理也天即理也應天謂合乎理也中孚之道近乎誠誠者天之道人之心虛則誠誠則天矣厚齊馮氏曰中孚之義猶無妄有正有不正如盜賊之相羣男女之私期皆孚之不正者也故曰中孚以利貞小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也陽大隂小小過之卦二陽而四隂小者過也小者雖過然小事亦有過而亨者也小過下脫亨字當云小過亨小者過而亨也事有時而當過則其過也從時之宜非過也况又以正道固守而不至過甚故曰過以利貞與時行也六五六二隂柔雖小然皆得中故施之小事則可九三九四陽剛雖大然皆不得中位故施之大事則不可郭京易舉正云柔得中是以可小事也今本脫可字而事下誤增吉字理或然也小過乃中孚對體中孚肖離離為雉鳥飛之象也飛鳥之象在中孚則有之變為小過則飛鳥已過但遺其音聲耳亦謂中孚有卵象鳥自卵出故小過有飛鳥之象又謂二剛在中四隂在外翼之為飛鳥展翼之象皆鑿說也柔之為道在下而承剛為順在上而乘剛為逆上逆而下順釋不宜上宜下之義上逆謂六五乘九四之剛而在上也下順謂六二承九三之剛而在下也若就飛鳥言之則遡風而上為逆隨風而下為順也當此不宜上宜下之時詎可捨順而趨逆哉伊川程子曰所過當如飛鳥之遺音鳥飛迅疾聲出而身已過然豈能相逺也事之當過者亦如是身不能甚逺於聲事不可逺過其常在得其宜耳不宜上宜下更就鳥音取宜順之義又曰有飛鳥之象焉此一句不類彖體蓋解者之辭誤入彖中伊川所謂彖即彖傳也以彖傳為彖蓋承王弼之舊云爾或謂大吉之大亦衍文蓋承彖辭傳寫之誤也既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也一說謂既濟所以亨小者是必大者亨其小者然後可以為亨也一說謂小上更有一小字大者亨小而小者亨則大者之亨可知也紫陽朱子依嵩山朝氏云濟下脫小字當作既濟小亨小者亨也愚謂陽大隂小小指六二也三隂之中唯六二正而且中有亨通之道焉孔子恐人以小亨為亨之小故特加者字明其為六二之亨也六二蓋既濟之主爻也初三五陽位而以九居之此剛正而位當也二四上隂位而以六居之此柔正而位當也剛柔正而位當在他卦亦有之乃若三剛之柔皆正而位皆當則六十四卦之中獨此一卦而已故孔子於此特贊之也六二以柔順之德附麗於二陽之間而得其中故曰初吉柔得中也六四上六不中者也九五陷於其間止而不動則必至於困窮故曰終止則亂其道窮也彖辭曰終亂彖傳乃曰終止則亂終止何以亂也於其終有止心則亂也人之常情處無事則止心生止則怠怠則有患而不為之防此所以亂也當知終止則亂不止則不亂也是故君子有終身之憂而無一朝之患豈至於困窮哉隆山李氏曰既濟六五三隂皆在三陽之上而離之一隂又居中而履正其曰亨者指離之一隂而為之言也平菴項氏曰六二以柔為卦之主隂為小故稱小焉謂小大皆亨者誤也未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也中謂六五之中柔得中未出中皆指六五未濟所以亨者六五為未濟之主柔得其中而無過為也故曰未濟亨柔得中也卦有兩險下體坎三四五又互坎此兩險也故必至於上九乃可以脫險乃可以言濟六五雖處下坎之上而未脫互坎之險則猶在未濟之中故曰小狐汔濟未出中也終謂卦之終上九是也續繼也六五茍能繼其前功更進一步而終之則出乎險外而未濟當變為既濟矣奈之何小狐力弱而不能繼哉故曰濡其尾無攸利不續終也既未能出中又不能續終然則何時而可亨也故又曰雖不當位剛柔應也謂六五位雖不當然不有九二之應則剛柔相濟有亨道焉豈可竟以為無攸利哉文王以未濟次既濟孔子釋未濟復於無攸利之後釋亨字曰雖不當位剛柔應也蓋易道貴乎變通不欲其終窮也或以為此八字錯簡當在柔得中也下豈其然乎平菴項氏曰既濟未濟皆以柔為主既濟自六二而達於上六則既濟之事已終故為既濟未濟自初六而至于六五幾於濟矣而未能出中以至於上則其事猶未終也故為未濟知此義則未濟之卦辭不待解而自明矣其曰雖不當位亦指六五言之雖六爻皆不當位義但取五而已周易集說卷十九
